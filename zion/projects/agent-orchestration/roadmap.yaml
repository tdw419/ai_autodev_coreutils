- id: 'phase-162'
  title: 'Runtime Application Vulnerability Monitoring (AVM)'
  status: planned
  goal: 'Detect security vulnerabilities in agent-generated code at runtime using instrumentation-based monitoring'
  description: |
    The "AI Unpredictability: From Vibe Coding to Engineered Trust" research (291 lines,
    65 citations) describes instrumentation-based Application Vulnerability Monitoring (AVM)
    that detects security vulnerabilities at RUNTIME as code actually executes, rather than
    relying solely on static pre-production scanning. The research notes that approximately
    40% of code generated by AI assistants contains at least one security vulnerability,
    with SQL injection (up to 80% failure rate), cross-site scripting (~86%), log injection
    (~88%), and hardcoded secrets being the most prevalent. In repository-level tasks,
    frontier models solve over 60% of tasks functionally but fail over 80% of security tests.

    Static scanning alone is insufficient because "vibe coding" workflows routinely bypass
    pre-production security gates. Phase 126 (Secret Leak Detection) performs static
    credential scanning in agent output. Phase 9 (Review Sensor) does LLM-based code review
    for qualitative assessment. Phase 15 (Safety Policies) gates high-risk actions via
    approval. None of these perform RUNTIME instrumentation-based vulnerability monitoring
    -- watching code as it executes to detect logical flaws, injection attempts, and
    privilege escalation at the point of execution. Phase 162 closes this gap with an
    AVM framework that instruments test execution, monitors for vulnerability patterns,
    and generates findings for the review sensor and safety policies.
  deliverables:
  - name: AVM instrumentation framework
    description: 'Instrument test execution to detect runtime vulnerability patterns in agent-generated code'
    status: planned
    acceptance_criteria:
    - description: 'Detects at least 5 vulnerability patterns at runtime (SQL injection, XSS, command injection, path traversal, SSRF)'
      validation: test with vulnerable code samples
    - description: 'Generates structured findings compatible with review sensor input'
      validation: verify finding format matches review_sensor input schema
    tasks:
    - id: p162.d1.t1
      title: Create avm_monitor.py module
      status: planned
      description: 'Create avm_monitor.py: (1) VulnerabilityPattern dataclass: id, name, category (injection, xss, auth, crypto, config), severity (critical/high/medium/low), detection_method (regex, ast, runtime_trace, behavior), description, cwe_id, (2) AVMMonitor class that wraps test execution with: subprocess monitoring for command injection, environment variable capture for secret exposure, network request interception for SSRF detection, file access monitoring for path traversal, (3) detect_sql_injection(trace) using parameterized query detection, (4) detect_command_injection(trace) using shell metacharacter analysis, (5) detect_path_traversal(trace) using normalized path comparison, (6) generate_findings() that produces structured VulnerabilityReport list, (7) CLI: python3 avm_monitor.py --run <test_command> --output <findings.json>.'
      files:
      - '~/zion/projects/agent-orchestration/avm_monitor.py'
    - id: p162.d1.t2
      title: Integrate AVM into DAG executor test nodes
      status: planned
