        24h), (2) config -- quick access to orchestrator config (max_concurrent, active repos, polling interval), (3) history -- recent human actions (tickets filed, PRs reviewed, config changes), (4) alias
        support: common workflows as shortcuts (e.g., "morning-review" = triage + review-queue + status), (5) --watch mode for status that auto-refreshes. This is the human''s "command center" -- the single
        interface they need to interact with the orchestrator.'
