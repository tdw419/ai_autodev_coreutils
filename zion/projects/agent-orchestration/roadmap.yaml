- id: 'phase-154'
  title: Three-Tier Watchdog with OS Signal-Based Recovery
  status: planned
  goal: 'Implement a three-tier watchdog system (passive observation, SIGUSR1 nudge, critical escalation) for recovering stuck or frozen agent processes'
  description: |
    The "Building an AI Agent Bridge" research (300 lines, 62 citations) describes an
    ASCII watchdog system that polls shared state every 5 seconds and implements a
    three-tier recovery sequence: Level 1 (passive intervention) checks for pending
    questions and routes them to operators; Level 2 (active nudge) sends SIGUSR1 to
    unblock frozen processes or SIGALRM to enforce task timeouts; Level 3 (critical
    escalation) halts the autonomous loop and sends alerts. The research provides a
    signal usage table: SIGUSR1 (code 10) for waking orchestrators and triggering
    heartbeat, SIGALRM (code 14) for enforcing task timeouts, SIGTERM (code 15) for
    graceful shutdown, and SIGKILL (code 9) for forced termination. Phase 14 (Health
    Monitor) watches agent processes but does NOT use OS signals for recovery or implement
    multi-tier escalation. Phase 117 (Cron Mutex) handles locking but not process-level
    recovery. Phase 50 (Chaos Testing) tests resilience but does not provide production
    recovery mechanisms.
  deliverables:
  - name: Multi-tier watchdog daemon
    description: 'Background daemon that monitors agent processes and recovers from stuck states'
    status: planned
    acceptance_criteria:
    - description: 'Watchdog detects stuck agents within 30 seconds of last activity'
      validation: test stuck detection
    - description: 'Three-tier recovery escalates automatically if lower tier fails'
      validation: test escalation
    tasks:
    - id: p154.d1.t1
      title: Create watchdog daemon
      status: planned
      description: 'Create watchdog.py: (1) WatchdogDaemon class that runs as background thread, (2) poll_interval configurable (default 5s), (3) Monitor agent processes via: (a) last_activity timestamp in state file, (b) process existence via PID check, (c) CPU/memory usage via psutil, (4) stuck_threshold configurable (default 30s no activity), (5) Level 1 recovery: check for pending questions, route to operator, (6) Level 2 recovery: send SIGUSR1 to process, wait 10s for response, if still stuck send SIGALRM, (7) Level 3 recovery: if stuck_count > 3, send SIGTERM, wait 5s, then SIGKILL, emit critical alert.'
      files:
      - '~/zion/projects/agent-orchestration/watchdog.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/watchdog.py'
  - name: Signal handler and process recovery
    description: 'Register signal handlers in agent processes to respond to watchdog signals'
    status: planned
    acceptance_criteria:
    - description: 'Agent processes handle SIGUSR1 by logging heartbeat and checking for pending work'
      validation: test signal handling
    - description: 'Agent processes handle SIGALRM by gracefully terminating current operation'
      validation: test timeout enforcement
    tasks:
    - id: p154.d2.t1
      title: Create signal handlers
      status: planned
      description: 'Create signal_handlers.py: (1) register_watchdog_signals(process_state) that installs: (a) SIGUSR1 handler: log heartbeat, dump current task state, check for interrupted I/O, (b) SIGALRM handler: set timeout flag, gracefully cancel current operation, save state, (c) SIGTERM handler: save state, close connections, exit cleanly, (2) ProcessState class that tracks: current_task, last_activity, stuck_count, pending_questions, (3) Signal-safe state file updates using fcntl locks.'
      dependencies:
      - p154.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/signal_handlers.py'
    - id: p154.d3.t1
      title: Write watchdog tests
      status: planned
      description: 'Test cases: (1) watchdog detects stuck process within threshold, (2) Level 1 routes pending questions, (3) Level 2 SIGUSR1 wakes frozen process, (4) Level 2 SIGALRM enforces timeout, (5) Level 3 escalates after 3 failed nudges, (6) SIGTERM triggers graceful shutdown, (7) SIGKILL as final fallback, (8) watchdog metrics (recovery_count, escalation_count) are tracked.'
      dependencies:
      - p154.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_watchdog.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_watchdog.py'
  dependencies:
  - source: 'phase-14'
    target: 'phase-154'
    type: soft
    reason: Health monitor provides process monitoring infrastructure
    technical_notes: 'The research emphasizes that OS signals provide "guaranteed execution" -- unlike instructions in markdown files that agents may ignore, signal handlers always execute. SIGUSR1 is a user-defined signal that does not terminate the process, making it ideal for "nudging" frozen agents. The three-tier approach prevents over-reaction: not every stuck state requires escalation, and most are resolved with a simple nudge. The 5-second poll interval provides near-real-time detection while keeping CPU overhead minimal.'
  risks:
  - 'Signal handling in Python has limitations (only main thread can receive signals)'
  - 'SIGUSR1 may interfere with application code that uses the same signal -- use SIGUSR2 as fallback'
  - 'Watchdog daemon adds a persistent process to manage -- ensure it does not become a single point of failure'
