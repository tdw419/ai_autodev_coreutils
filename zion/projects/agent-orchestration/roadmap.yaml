  technical_notes: 'Knowledge transfer is fundamentally about "learning from experience" across projects.
    The key challenge is relevance -- agents should only see patterns that are actually useful for their
    current task. Simple keyword matching is a good starting point; future work could use embeddings for
    semantic similarity. The knowledge base is stored as flat JSONL files for simplicity -- no database
    needed for the expected scale (hundreds to low thousands of patterns). Patterns from failed runs are
    NOT stored (only successful runs contribute to knowledge), which keeps quality high by default.'
  risks:
  - Pattern injection could confuse agents if patterns are irrelevant -- need good relevance scoring
  - Knowledge base could grow unbounded -- need pruning strategy
  - Cross-project patterns may use different conventions -- need repo-specific filtering
  - Prompt bloat from too many patterns -- strict limit on injected context
