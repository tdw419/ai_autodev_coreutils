        files -> add "security", if diff touches SQL/query files -> add "performance", if diff touches test files -> add "testing", if diff is large (>200 lines) -> add "architecture", always include "style"
        as baseline, (3) perspective_profiles: YAML file mapping file patterns and change characteristics to recommended perspectives, (4) cost_aware: if budget is tight (from phase 32), reduce to top-2
        most relevant perspectives instead of all 5, (5) history_feedback: track which perspectives produce the most actionable findings per project type, weight future selection accordingly.'
      dependencies:
      - p94.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/ensemble_review.py'
