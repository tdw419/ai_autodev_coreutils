      validation: 'python3 decomposer.py --decompose ISSUE_NUM --max-parts 6'
      met: false
    tasks:
    - id: p26.d2.t1
      title: 'Implement sub-issue generation'
      status: planned
      description: 'Add --decompose mode to decomposer.py: (1) call an LLM with the issue body and project context (AI_GUIDE.md, file tree), (2) prompt the LLM to produce sub-tasks with: title, body, affected
        files, dependencies between sub-tasks, estimated complexity, (3) validate sub-tasks are independently executable (no circular dependencies), (4) create sub-issues on GitHub via gh CLI with parent/child
        linking, (5) label sub-issues as agent-ready and link back to parent. Include --dry-run to preview decomposition without creating issues.'
