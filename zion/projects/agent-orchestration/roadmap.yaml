- id: phase-33
  title: Application Legibility Toolkit
  status: planned
  goal: Build automated tools that make codebases directly understandable and verifiable by agents --
    the "Application Legibility" principle from Harness Engineering
  description: 'The Harness Engineering research emphasizes "Application Legibility" -- making software
    directly understandable and verifiable by the agent. This includes: integrated observability (local
    access to logs/metrics/traces), rigid architecture enforcement (strict layering limits agent search
    space), and constraints enforced mechanically via structural tests. Phase 17 covers structural invariants
    but focuses on checking existing code. This phase goes further: it provides tools that help agents
    UNDERSTAND a codebase quickly (architecture maps, dependency graphs, entry point discovery) and tools
    that help projects BECOME more legible (architecture linter, module boundary checker).'
  deliverables:
  - name: Codebase comprehension module
    description: Module that generates agent-readable summaries of a codebase''s architecture and structure
    status: planned
    acceptance_criteria:
    - description: Module can analyze a codebase and output an architecture summary
      validation: python3 legibility.py --analyze /path/to/project
      met: false
    tasks:
    - id: p33.d1.t1
      title: Create legibility.py module
      status: planned
      description: 'Create legibility.py: (1) analyze_architecture(project_dir) -- scan directory
        structure, detect layers (types, config, repo, service), identify entry points, map dependencies,
        output as structured JSON, (2) generate_architecture_doc(project_dir) -- create a markdown
        architecture overview suitable for AI_GUIDE.md, (3) find_entry_points(project_dir) -- detect
        main files, API routes, CLI entry points, (4) map_dependencies(project_dir) -- build an import
        dependency graph, detect circular dependencies, identify unused modules. Output agent-readable
        summaries that help autonomous agents quickly understand a new codebase.'
      files:
