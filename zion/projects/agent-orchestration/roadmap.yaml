        with acp_command=claude, (3) SubprocessBackend -- wraps any CLI tool (Codex, aider, etc.) via subprocess, (4) MockBackend -- returns canned responses for testing, (5) BackendConfig dataclass with
        model, provider, max_tokens, temperature. Each backend reports: model name, token usage estimate, latency, cost estimate.'
