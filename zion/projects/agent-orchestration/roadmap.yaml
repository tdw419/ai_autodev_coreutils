    scope_files:
    - '~/zion/projects/agent-orchestration/dag.py'
    - '~/zion/projects/agent-orchestration/pipelines/multi-session-pipeline.yaml'
  - name: Session chain tests
    description: 'Test chain creation, context marshaling, orchestrator integration, and DAG nodes'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover chain lifecycle, context marshaling, budget enforcement, and DAG integration'
      validation: 'python3 -m pytest test_session_chain.py -v'
      met: false
    tasks:
    - id: p97.d4.t1
      title: Create test_session_chain.py
      status: planned
      description: 'Create test_session_chain.py: (1) test_create_chain: creates chain with unique ID, stores metadata, (2) test_start_end_session: creates session within chain, saves results on end, (3)
        test_context_marshaling: multi-session chain produces context brief within budget, includes task desc + last outcome, (4) test_context_budget_respected: set max_tokens=500, verify marshaled context
        is truncated appropriately, (5) test_chain_completion: chain marked complete when last session outcome includes completion flag, (6) test_task_size_estimator: large task detected as multi-session,
        small task detected as single-session, (7) test_orchestrator_chain_flow: mock large issue, verify chain created, first session run, second session scheduled with chained context, (8) test_dag_chain_context_node:
        pipeline with CHAIN_CONTEXT loads correct context, (9) test_dag_chain_complete_node: pipeline branches correctly on chain completion status, (10) test_dag_chain_end_session_node: session results
        saved correctly, (11) test_chain_persistence: chains survive process restart (files on disk), (12) test_chain_listing: list_chains returns all chains with correct metadata.'
      dependencies:
      - p97.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_session_chain.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/test_session_chain.py'
  dependencies:
  - source: 'phase-20'
    target: 'phase-97'
    type: soft
    reason: Context window optimization from phase 20 provides the budget calculation that context marshaling must respect
  - source: 'phase-65'
    target: 'phase-97'
    type: soft
    reason: 'Stop hooks from phase 65 handle single-session loop control; session chaining extends this to multi-session'
  - source: 'phase-8'
    target: 'phase-97'
    type: soft
    reason: Execution history from phase 8 records individual sessions; chain tracking adds logical task grouping on top
  - source: 'phase-5'
    target: 'phase-97'
    type: soft
    reason: 'DAG executor from phase 5 is extended with CHAIN_CONTEXT, CHAIN_COMPLETE, and CHAIN_END_SESSION nodes'
  - source: 'phase-47'
    target: 'phase-97'
    type: soft
    reason: 'Knowledge persistence from phase 47 and session chaining both externalize agent state -- they should share the persistence layer'
  - source: 'phase-68'
    target: 'phase-97'
    type: soft
    reason: 'Session identity from phase 68 provides per-session profiling; chaining adds cross-session identity'
  technical_notes: 'Session chaining is the key architectural pattern that enables agents to handle tasks of arbitrary complexity. The research describes this as "persistence through externalized artifacts"
    -- code, git history, and test results carry forward while conversation history is reset. The critical design decision is how much context to marshal between sessions: too little and the next session
    repeats work, too much and it exceeds the smart zone (phase 20). The context_budget module from phase 20 should be reused here. Chain state should be file-backed (like execution history from phase 8)
    for crash recovery. The task_size_estimator is necessarily heuristic -- it should be configurable and learn from historical data in execution history (phase 8).'
  risks:
  - 'Task size estimation may be inaccurate, leading to unnecessary multi-session chains or single-session attempts on tasks that need chaining'
  - 'Context marshaling could lose critical information between sessions, causing agents to repeat or contradict prior work'
  - 'Chain state files could grow large for very long chains -- implement retention/archival for completed chains'
  - 'Multi-session chains consume more tokens than single-session execution -- cost tracking (phase 32) should account for chain overhead'
  - 'Chain scheduling via cron adds latency between sessions -- consider background process for active chains'
  scope_lines_total: 480
  test_target: 12
