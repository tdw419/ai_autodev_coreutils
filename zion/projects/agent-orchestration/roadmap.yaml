    be committed to the repo (not generated at test time) so they run in CI even when the orchestrator is not involved. The generator is idempotent: running it twice with the same invariants produces the
    same output. AST-based import analysis is more reliable than regex-based approaches but slower -- cache import trees for performance. Consider generating tests for each invariant as a separate file
