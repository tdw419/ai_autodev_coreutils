    technical_notes: 'TOON achieves its efficiency by declaring keys once per table-like block and streaming values row by row, eliminating the repeated key overhead of JSON arrays. The research recommends using TOON at model boundaries while keeping JSON as the canonical storage format for software compatibility. The accuracy improvement (73.9% vs 69.7%) is attributed to explicit schema headers that help the model validate structure.'
