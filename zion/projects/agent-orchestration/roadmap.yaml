- id: 'phase-57'
  title: Skill Registry and Reusable Role Templates
  status: planned
  goal: Create a registry of reusable skills and role templates that can be shared across projects and teams
  description: 'The Harness Engineering research describes "the skills, documentation, and automated review agents that together defined what ''good'' code looked like" as the core value of the outer harness.
    Phase 6 creates role specialization but roles are project-local (YAML files in roles/ directory). Phase 34 covers agent-generated tooling but doesn''t address sharing. This phase creates a skill registry:
    (1) a standardized format for packaging skills (prompt templates + tools + quality gates), (2) a local registry (directory-based, no server required) for storing and versioning skills, (3) publish/subscribe
    workflow for sharing skills between projects, (4) skill composition (combining multiple skills into a role), (5) a CLI for managing skills (list, install, create, publish). This enables the "Dark Factory"
    pattern at scale: instead of each project building its own harness from scratch, teams share proven skills. The research notes that the OpenAI team''s harness was their "competitive advantage" -- a
    skill registry makes that advantage shareable.'
  deliverables:
  - name: Skill packaging format
    description: Define a standardized format for packaging reusable skills
    status: planned
    acceptance_criteria:
    - description: 'Can create a skill package with prompt template, tools, and quality gates'
      validation: 'python3 skill_registry.py create --name my-skill --template ./template.md'
      met: false
    - description: 'Skill package format is self-describing (metadata, version, dependencies)'
      validation: 'read skill.yaml, verify all fields present'
      met: false
    tasks:
    - id: p57.d1.t1
      title: Define skill package format and create skill_registry.py
      status: planned
      description: 'Create skill_registry.py: (1) skill package format: skill.yaml (name, version, description, author, tags, dependencies, applicable_labels, role_requirements), prompt.md (prompt template
        with {{variables}}), tools/ (optional tool scripts), gates/ (optional quality gate scripts), examples/ (usage examples), (2) create command: scaffolds a new skill package directory, (3) validate
        command: checks skill format completeness, (4) each skill is a directory under ~/.orchestrator/skills/ or a project-local skills/ directory. Design inspired by VS Code extensions and npm packages
        but simpler (no registry server, just git-friendly directories).'
      files:
      - '~/zion/projects/agent-orchestration/skill_registry.py'
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/skill_registry.py'
