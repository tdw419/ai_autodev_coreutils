- id: 'phase-161'
  title: 'CRANE Constrained Decoding for AI Node Output Validation'
  status: planned
  goal: 'Ensure AI nodes produce structurally valid output by enforcing formal grammar compliance while preserving reasoning flexibility'
  description: |
    The "AI Unpredictability: From Vibe Coding to Engineered Trust" research (291 lines,
    65 citations) describes the CRANE (Constrained Reasoning Augmented Generation) algorithm
    that enforces formal grammar compliance (JSON, YAML, SQL) via logit masking while
    preserving reasoning flexibility through delimiter-switched windows. The model reasons
    freely in unconstrained mode, then switches to constrained decoding when specific
    delimiters (e.g., << and >>) mark the start and end of structured output sections.
    CRANE achieves +10 percentage point accuracy improvement on GSM-symbolic and FOLIO
    benchmarks by preventing the model from generating syntactically invalid output during
    structured reasoning tasks.

    In the Hermes orchestrator context, AI nodes sometimes produce malformed YAML pipeline
    definitions, invalid JSON task results, or broken code that downstream Bash nodes cannot
    parse. Phase 17 (Structural Invariants) checks code structure against project rules,
    not AI output format compliance. Phase 71 (Config Validation) validates YAML config
    files, not AI-generated output. Phase 62 (Prompt Engineering) manages prompts, not
    output decoding. No existing phase ensures AI nodes produce structurally valid output
    in formal grammars. Phase 161 closes this gap.
  deliverables:
  - name: Output grammar validator
    description: 'Validate AI node outputs against configurable grammars with delimiter detection and malformed output recovery'
    status: planned
    acceptance_criteria:
    - description: 'Supports JSON, YAML, and custom grammar validation via configurable schemas'
      validation: test validator with sample outputs
    - description: 'Delimiter-switched validation allows unconstrained reasoning in designated sections'
      validation: test with mixed constrained/unconstrained output
    tasks:
    - id: p161.d1.t1
      title: Create output_validator.py module
      status: planned
      description: 'Create output_validator.py: (1) GrammarRegistry class that maps node types to expected output grammars (JSON schema, YAML schema, regex patterns), (2) CRANEValidator class that wraps AI node output with: delimiter detection for constrained/unconstrained sections, grammar enforcement using jsonschema for JSON, yaml.safe_load for YAML, custom validators for code, (3) RecoveryStrategy enum: RETRY_WITH_CONTEXT (re-prompt with error message and original output), STRIP_AND_RETRY (strip malformed section and retry), FALLBACK_TO_RAW (pass through with warning), (4) validate_node_output(node_type, raw_output) function that returns ValidationResult with is_valid, parsed_output, errors, recovery_applied, (5) register_grammar(node_type, grammar_config) for extensibility, (6) CLI: python3 output_validator.py --validate <node_type> --input <file>.'
      files:
      - '~/zion/projects/agent-orchestration/output_validator.py'
    - id: p161.d1.t2
      title: Integrate validator into DAG executor
      status: planned
      description: 'Modify executor.py to wrap AI node execution with output validation: (1) After AI node produces output, run validate_node_output() before passing to next node, (2) If validation fails, apply recovery strategy based on configuration, (3) Log validation results to execution history, (4) Add output_grammar field to pipeline YAML node definitions for per-node grammar specification.'
      dependencies:
      - p161.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/output_validator.py'
    - '~/zion/projects/agent-orchestration/executor.py'
