- id: 'phase-65'
  title: Stop Hooks and Agent Loop Control
  status: planned
  goal: 'Implement the "stop hooks" mechanism from the Ralph Wiggum pattern to intercept agent termination, check for completion tags, and re-feed prompts when work remains'
  description: |-
    The research describes stop hooks as the mechanism that makes Ralph Wiggum loops work: "stop hooks that intercept the agent's attempt to exit, check for completion tags, and re-feed the prompt if work remains." This phase implements that mechanism as a reusable module that wraps around delegate_task sessions, enabling autonomous multi-iteration agent loops with fresh context per iteration.
    Without stop hooks, the Ralph Wiggum pattern is a concept without an implementation -- agents simply exit when done and there is no mechanism to detect incomplete work and restart with fresh context.
  deliverables:
  - name: Stop hook framework module
    description: 'Create stop_hooks.py that intercepts agent session termination and decides whether to re-feed the prompt or allow exit'
    status: planned
    acceptance_criteria:
    - description: Hook can intercept agent exit and inspect completion state
      validation: unit test with mock agent that exits with various states
      met: false
    - description: 'Hook supports configurable completion criteria (tags, file patterns, exit codes, test results)'
      validation: test with each criterion type
      met: false
    - description: Hook enforces max_iterations to prevent infinite loops
      validation: test that agent stops after N iterations
      met: false
    tasks:
    - id: p65.d1.t1
      title: Create stop_hooks.py with core framework
      status: planned
      description: 'Create stop_hooks.py with: (1) StopHook class with before_exit(session_state) -> continue|stop decision, (2) CompletionCriteria enum: TAG_FOUND, ALL_TESTS_PASS, EXIT_CODE, FILE_PATTERN,
        CUSTOM_SCRIPT, (3) SessionState dataclass: workspace_path, iteration_count, last_output, test_results, completion_tags_found, (4) LoopController that wraps a delegate_task session: run loop until
        hook returns stop or max_iterations reached, (5) each iteration starts fresh context (Ralph Wiggum smart zone), (6) persistent artifacts carry over (git history, workspace files), (7) iteration
        summary logged to execution_log, (8) CLI: python3 stop_hooks.py --workspace PATH --max-iterations 10 --criteria tag:IMPLEMENTATION_COMPLETE'
      files:
      - '~/zion/projects/agent-orchestration/stop_hooks.py'
      scope_lines: 140
      scope_files:
      - '~/zion/projects/agent-orchestration/stop_hooks.py'
  - name: Completion tag detection
    description: Detect completion markers in agent output and workspace files
    status: planned
    acceptance_criteria:
    - description: Detects standard completion tags in agent output text
      validation: test with output containing various tag formats
      met: false
    - description: 'Detects completion markers in workspace files (e.g., TODO comments resolved)'
      validation: test with workspace containing marker files
      met: false
    tasks:
    - id: p65.d2.t1
      title: Add completion detection to stop_hooks.py
      status: planned
      description: 'Add completion detection: (1) tag scanning in agent output: look for patterns like [DONE], [COMPLETE], IMPLEMENTATION_COMPLETE, <!-- READY -->, (2) file-based detection: check for completion
        marker files in workspace (.done, .complete), (3) TODO detection: count TODO/FIXME comments before and after, consider complete if all resolved, (4) test result detection: if tests were run, check
        if they pass, (5) git diff detection: if agent made no changes since last iteration, consider stuck, (6) configurable tag patterns via YAML config, (7) compound criteria: ALL must be met (AND) or
        ANY must be met (OR)'
      files:
      - '~/zion/projects/agent-orchestration/stop_hooks.py'
      dependencies:
      - p65.d1.t1
      scope_lines: 90
      scope_files:
      - '~/zion/projects/agent-orchestration/stop_hooks.py'
  - name: Loop context management
    description: 'Manage context reset between iterations, carrying over only persistent artifacts'
