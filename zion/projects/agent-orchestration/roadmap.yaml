    - description: 'Users can opt into seeing full reasoning via "show more" toggle'
      validation: test toggle behavior
    tasks:
    - id: p155.d1.t1
      title: Create progressive disclosure filter
      status: planned
      description: 'Create progressive_disclosure.py: (1) OutputFilter class that classifies output chunks as: thinking (internal reasoning), acting (tool calls, file edits), status (milestone summaries), (2) Default mode: show only status and acting chunks, hide thinking chunks, (3) Verbose mode: show all chunks (thinking + acting + status), (4) Status extraction: parse agent output for milestone patterns like "[Acting] ...", "[Thinking] ...", "[Done] ...", (5) Compact status view: show checklist of completed/pending milestones, (6) Configurable via ORCH_VERBOSE env var or per-task metadata.'
