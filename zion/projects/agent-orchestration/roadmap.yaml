      status: planned
      description: 'Create templates/ directory with pipeline YAML templates. Create template_lib.py: (1) Template dataclass: name, description, version, tags, parameters (with defaults and descriptions),
        pipeline_yaml (with {{parameter}} placeholders), (2) list_templates() -> available templates with metadata, (3) instantiate(template_name, params) -> rendered pipeline YAML with parameters filled
        in, (4) validate(template_name) -> check template follows DAG schema (phase 5) and best practices (no AI-only pipelines, at least one test step), (5) templates: a) bug-fix: analyze(bash: git log)
        -> plan(AI) -> implement(AI) -> test(bash) -> review(AI) -> PR(bash), b) feature: plan(AI) -> implement(AI) -> test(bash) -> lint(bash) -> review(AI) -> PR(bash), c) refactor: analyze(AI) -> plan(AI)
        -> implement(AI) -> test(bash) -> invariant-check(bash) -> review(AI) -> PR(bash), d) test-writing: analyze(AI: find untested code) -> generate-tests(AI) -> run-tests(bash) -> fix(bash: loop until
        green) -> commit(bash), e) docs: analyze(AI) -> generate(AI) -> validate-links(bash) -> commit(bash), f) dep-update: update(bash: dependabot/pip) -> test(bash) -> fix(bash: loop) -> PR(bash), g)
        security-audit: scan(bash: bandit/safety) -> analyze(AI) -> fix(AI) -> test(bash) -> PR(bash), h) perf-optimize: profile(bash) -> analyze(AI) -> implement(AI) -> benchmark(bash) -> PR(bash). Each
        template has configurable parameters (e.g., test_command, lint_command, max_loop_iterations).'
