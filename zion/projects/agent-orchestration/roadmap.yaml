      dependencies:
      - p51.d1.t1
      - p51.d2.t1
      - p4.d3.t1
      scope_lines: 80
      scope_files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/orchestrator.yaml'
      - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-4'
    target: 'phase-51'
    type: soft
    reason: 'Federation extends the base orchestrator loop from phase 4 with cross-instance coordination'
  - source: 'phase-16'
    target: 'phase-51'
    type: soft
    reason: 'Multi-repo orchestration from phase 16 is a prerequisite for effective federation'
  - source: 'phase-30'
    target: 'phase-51'
    type: soft
    reason: 'Inter-agent communication from phase 30 provides the notification patterns that federation extends'
  - source: 'phase-41'
    target: 'phase-51'
    type: soft
    reason: Priority queuing from phase 41 should work across federated instances
  technical_notes: 'Federation is the scaling architecture. The GitHub-label-based locking approach is deliberately simple: no etcd, no Redis, no external dependencies. Labels on GitHub Issues serve as
    a natural distributed lock visible to all instances. The trade-off: label-based locking has higher latency (API calls) but zero infrastructure cost. For high-performance federation, the file-based or
    HTTP backend can be swapped in. Federation should be opt-in: single-instance mode (the default) should not be affected.'
  risks:
