- id: 'phase-173'
  title: Disposable Experiment Arena
  status: planned
  goal: 'Create a dedicated workspace pattern for rapid parallel prototyping with automatic winner selection, cleanup, and learnings extraction'
  description: |
    The research describes the Dark Factory model where "a team can run a hundred parallel Ralph Wiggum loops to explore
    different architectural approaches to a problem, only keeping the one that passes the most rigorous set of automated
    quality gates." Phase 28 implements speculative execution for comparing strategies on the same task, but it lacks the
    full "arena" concept: a dedicated disposable workspace lifecycle, automatic winner selection based on multi-dimensional
    scoring, automatic cleanup of losing experiments, and extraction of learnings from failed experiments. This phase
    operationalizes the "code as disposable artifact" principle.
  deliverables:
  - name: Experiment arena manager
    description: 'Module that manages parallel experiment workspaces with full lifecycle (create, score, select, cleanup)'
    status: planned
    acceptance_criteria:
    - description: 'Arena manages N parallel experiment workspaces from a single task specification'
      validation: test with 3 parallel experiments
    - description: 'Each experiment has: isolated workspace, unique strategy/config, execution result, quality score'
      validation: inspect experiment metadata
    tasks:
    - id: p173.d1.t1
      title: Create experiment_arena.py module
      status: planned
      description: 'Python module: (1) ExperimentArena class with create_arena(task_spec, strategies, scoring_config), (2) Experiment record: id, task_spec, strategy, workspace_path, status (pending/running/complete/failed), result, scores, created_at, completed_at, (3) launch() -- create N workspaces (one per strategy), spawn workers via spawner.py with strategy-specific config, (4) score(experiment) -- run scoring pipeline: test pass rate (from test runner), lint score (from linter), review score (from review_sensor.py if available), invariant compliance (from invariant_checker.py), legibility score (from legibility.py), (5) composite_score() -- weighted combination of all scoring dimensions, (6) select_winner() -- pick experiment with highest composite_score above threshold, (7) cleanup(experiment) -- remove workspace, archive scores, (8) cleanup_losers() -- remove all non-winning experiments, (9) extract_learnings() -- compare winner vs losers, identify what differentiated them, produce learnings summary, (10) arena_config.yaml: scoring weights, thresholds, max_parallel, cleanup_policy (immediate/delayed/never).'
      dependencies:
      - p28.d1.t1
      - p11.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/experiment_arena.py'
