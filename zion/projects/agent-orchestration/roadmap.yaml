- id: phase-14
  title: Agent Health Monitoring (Deacon Pattern)
  status: planned
  goal: Implement the Gas Town Deacon pattern -- a health supervision daemon that monitors running workers, detects
    stuck agents, and manages resource usage
  description: 'Gas Town''s Deacon role is a "daemon beacon; central health supervisor" that monitors
    the health of all running agents. Currently the orchestrator can spawn workers but has no way to
    detect if a worker is stuck, consuming excessive resources, or has silently failed. This phase adds
    health monitoring: periodic checks on workspace activity, disk usage tracking, timeout detection,
    and auto-recovery or escalation for unhealthy workers. This is essential for running the orchestrator
    in production where workers may run for hours.

    '
  deliverables:
  - name: Health check module
    description: Python module that checks the health of active worker workspaces
    status: planned
    acceptance_criteria:
    - description: Module can scan all active workspaces and report health status per worker
      validation: python3 health_check.py --all
      met: false
    - description: Detects stuck workers (no file changes in N minutes)
      validation: create a stale workspace, run health check
      met: false
    tasks:
    - id: p14.d1.t1
      title: Create health_check.py module
      status: planned
      description: 'Python module that: (1) scans all workspaces with status "in-progress", (2)
        checks last file modification time (stuck detection), (3) measures disk usage per workspace,
        (4) checks for zombie processes (optional, via ps), (5) reports health as JSON with per-worker
        status (healthy, stale, oversized, unknown). Configurable thresholds: stale_after_minutes
        (default 30), max_disk_mb (default 500). Support --watch flag for continuous monitoring.'
      files:
      - ~/zion/projects/agent-orchestration/health_check.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/health_check.py
  - name: Auto-recovery for stuck workers
    description: Automatically detect and handle stuck workers (timeout, escalation, or restart)
    status: planned
    acceptance_criteria:
    - description: Stuck workers are detected and marked as failed after timeout
      validation: simulate stuck worker, verify detection
      met: false
    tasks:
    - id: p14.d2.t1
      title: Add auto-recovery logic to health_check.py
      status: planned
      description: 'Add to health_check.py: (1) when a worker is stale beyond threshold, update
        its meta.json status to "failed", (2) post a comment on the GitHub issue explaining the
        timeout, (3) optionally archive the workspace, (4) log the recovery event. Support --auto-recover
        flag and --escalate flag (create a new issue for human review). Recovery modes: mark-failed
        (default), archive, retry (re-spawn with reduced max_turns).'
      dependencies:
      - p14.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/health_check.py
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/health_check.py
  - name: Health monitoring cron job
    description: Scheduled cron job that runs health checks and auto-recovers unhealthy workers
    status: planned
    acceptance_criteria:
    - description: Cron job runs health checks every 15 minutes
      validation: cronjob list
      met: false
    tasks:
    - id: p14.d3.t1
      title: Create health monitoring cron job
      status: planned
      description: 'Create a Hermes cron job that runs health_check.py --auto-recover every 15
        minutes. Include config for thresholds, notification on failure, and escalation. The cron
        prompt should read health_config.yaml for settings.'
      dependencies:
      - p14.d2.t1
      files: []
    scope_lines: 20
    scope_files: []
  - name: Health dashboard in status.sh
    description: Show worker health status alongside the existing status dashboard
    status: planned
    acceptance_criteria:
    - description: status.sh shows health status per active worker
      validation: run status.sh, check for health section
      met: false
    tasks:
    - id: p14.d4.t1
      title: Add health section to status.sh
      status: planned
      description: 'Add a "Worker Health" section to status.sh that calls health_check.py and
        displays: per-worker status (healthy/stale/oversized), disk usage, last activity time,
        time since spawn. Use color coding if terminal supports it (green=healthy, yellow=stale,
        red=failed).'
      dependencies:
      - p14.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/status.sh
    scope_lines: 40
    scope_files:
    - ~/zion/projects/agent-orchestration/status.sh
  dependencies:
  - source: phase-11
    target: phase-14
    type: soft
    reason: Workspace lifecycle from phase 11 provides the state tracking that health monitoring depends on
  technical_notes: 'Health checks are filesystem-based (no need for process monitoring). Stuck detection
    uses file modification timestamps. Disk usage via du -sb. The Deacon pattern is complementary to
    the Dog pattern (phase 11): Dog cleans up completed workspaces, Deacon monitors active ones.'
  risks:
  - Stuck detection threshold is tricky -- too short and you kill slow workers, too long and stuck workers waste resources
  - Auto-recovery could lose work if a worker was actually making progress on a long task
  - File modification time may not accurately reflect agent activity (agent might be "thinking")
  scope_lines_total: 260
  test_target: 10
- id: phase-15
  title: Safety Policies and Approval Gates
  status: planned
  goal: Add configurable safety policies modeled on Symphony's approval_policy to control when human approval
    is required before agent actions proceed
  description: 'Symphony supports three approval modes: untrusted (every action requires approval), on-failure
    (only failed actions require approval), and never (fully autonomous). The current Hermes orchestrator
    runs in "never" mode exclusively -- no human checkpoints exist. This is fine for trusted pipelines
    but risky for production repos, sensitive changes, or new team members. This phase adds configurable
    approval gates at the pipeline level, node level, and orchestrator level, enabling a spectrum from
    fully autonomous to fully supervised operation. This is the "Outer Harness" safety layer from Harness
    Engineering applied to the Hermes orchestrator.

    '
  deliverables:
  - name: Approval policy engine
    description: Configurable approval modes that gate pipeline execution at defined checkpoints
    status: planned
    acceptance_criteria:
    - description: Support for untrusted, on-failure, and never approval modes
      validation: configure each mode, verify behavior
      met: false
    tasks:
    - id: p15.d1.t1
      title: Create approval.py module
      status: planned
      description: 'Python module implementing approval policies: (1) ApprovalMode enum (untrusted,
        on-failure, never), (2) check_approval() function that takes mode, node result, and policy
        config, returns (approved: bool, reason: str), (3) untrusted mode: every AI node requires
        approval before proceeding, (4) on-failure mode: only failed bash/test nodes require approval
        before retry, (5) never mode: no approval needed (current behavior). Include approval_context
        that captures what needs approval (diff, test output, prompt).'
      files:
      - ~/zion/projects/agent-orchestration/approval.py
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/approval.py
  - name: APPROVAL node type for DAG
    description: Add an APPROVAL node type that pauses pipeline execution until human approval
    status: planned
    acceptance_criteria:
    - description: Pipeline YAML can include approval nodes that block until approved
      validation: create pipeline with approval node, execute it
      met: false
    tasks:
    - id: p15.d2.t1
      title: Add APPROVAL node type to DAG executor
      status: planned
      description: 'Add NodeType.APPROVAL to dag.py. The approval node takes: prompt (what the human
        is approving), timeout (how long to wait before failing), and on_timeout (fail or skip).
        In executor.py: when an approval node is reached, write a pending approval file to the workspace,
        post a GitHub comment requesting approval, and poll for an approval file or comment. If approval
        is granted, continue. If timeout, apply on_timeout behavior. Support --auto-approve flag to
        bypass for CI.'
      dependencies:
      - p15.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/dag.py
      - ~/zion/projects/agent-orchestration/executor.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/dag.py
    - ~/zion/projects/agent-orchestration/executor.py
  - name: Approval-safe pipeline template
    description: Pipeline YAML that includes approval gates at critical checkpoints
    status: planned
    acceptance_criteria:
    - description: Pipeline template has approval nodes before commit and PR creation
      validation: read pipeline YAML
      met: false
    tasks:
    - id: p15.d3.t1
      title: Create safe-pipeline.yaml with approval gates
      status: planned
      description: 'Create pipelines/safe-pipeline.yaml based on standard-pipeline.yaml but with
        APPROVAL nodes inserted: (1) after implement (approve code changes before testing), (2) after
        review (approve before commit). The approval nodes include context about what changed (file
        list, diff summary) so the approver can make an informed decision. Include a --mode flag
        that switches between untrusted and on-failure by changing which approval nodes are active.'
      dependencies:
      - p15.d2.t1
      files:
      - ~/zion/projects/agent-orchestration/pipelines/safe-pipeline.yaml
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/pipelines/safe-pipeline.yaml
  - name: Approval audit trail
    description: Log all approval decisions with who approved, when, and why
    status: planned
    acceptance_criteria:
    - description: Approval events are logged with timestamp, approver, decision, and context
      validation: check log files after approval
      met: false
    tasks:
    - id: p15.d4.t1
      title: Add approval logging to approval.py
      status: planned
      description: 'Append approval events to ~/.orchestrator/logs/approvals.jsonl. Each entry:
        timestamp, pipeline, node_id, issue_number, decision (approved/rejected/timeout), approver
        (auto or github_username), reason, context_snapshot (files changed, test results). Add a
        CLI subcommand to approval.py: audit (show recent approvals), stats (approval rate, average
        wait time).'
      dependencies:
      - p15.d1.t1
      - p8.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/approval.py
    scope_lines: 60
    scope_files:
    - ~/zion/projects/agent-orchestration/approval.py
  dependencies:
  - source: phase-7
    target: phase-15
    type: soft
    reason: Approval logic should be tested before deployment
  - source: phase-8
    target: phase-15
    type: soft
    reason: Approval events should be logged to the execution history from phase 8
  technical_notes: 'Approval is filesystem-based for simplicity: pending approvals are JSON files in the
    workspace. For GitHub integration, approvals can be triggered by comments with "/approve" or "/reject"
    on the issue. The APPROVAL node type is the key innovation -- it makes safety a first-class concept
    in the DAG, not an external wrapper.'
  risks:
  - Approval nodes can stall pipelines indefinitely if no one approves -- need timeout and escalation
  - Different approval modes for different repos/tasks adds configuration complexity
  - Human approval defeats the purpose of autonomous orchestration -- needs to be optional and off by default
