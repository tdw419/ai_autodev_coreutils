- id: phase-13
  title: Pull Request Automation
  status: planned
  goal: Complete the issue-to-PR lifecycle by auto-creating pull requests after successful pipeline execution
  description: 'Symphony''s end-to-end flow is: issue -> workspace -> agent work -> PR. The orchestrator currently
    stops at "workspace with commits" -- no PR is ever created. This phase closes that gap by adding PR creation
    after successful pipelines, with metadata linking the PR back to the issue, the role, and the pipeline used.
    This transforms the orchestrator from a "workspace factory" into a true autonomous development pipeline that
    mirrors the 500% PR increase reported by OpenAI teams using Symphony.

    '
  deliverables:
  - name: PR creator module
    description: Python module that creates GitHub PRs after successful pipeline execution with orchestrator metadata
    status: planned
    acceptance_criteria:
