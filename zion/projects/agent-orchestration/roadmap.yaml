- id: 'phase-61'
  title: Agent Quality Regression Testing
  status: planned
  goal: 'Create a benchmarking framework that measures agent output quality on canonical tasks over time, catching regressions as models or configurations change'
  description: 'The research emphasizes that quality comes from the harness: "the team focused on building the harness: the skills, documentation, and automated review agents that together defined what
    ''good'' code looked like." Phase 7 tests the orchestrator''s own code, but no phase systematically measures the quality of agent output. This is critical because: (1) model updates can silently degrade
    agent performance, (2) configuration changes (new roles, pipelines, policies) can have unintended quality impacts, (3) without baseline measurements, you can''t prove the orchestrator is improving.
    This phase creates: (1) a benchmark suite of canonical tasks with known-good outputs, (2) automated benchmark runner that executes tasks through the full pipeline and scores results, (3) quality metrics:
    correctness (tests pass), style compliance (linters pass), review score (from phase 9 sensor), efficiency (tokens used, turns taken), (4) regression detection: alert when benchmark scores drop below
    thresholds, (5) trend tracking: visualize quality over time across model versions and config changes. This is the "agent CI" -- continuous integration for agent quality.'
  deliverables:
  - name: Benchmark task suite
    description: 'Curated set of canonical tasks with known-good reference implementations'
    status: planned
    acceptance_criteria:
    - description: At least 10 benchmark tasks covering different complexity levels
      validation: 'python3 quality_bench.py list -- show task catalog'
      met: false
    - description: Each task has a reference solution and scoring criteria
      validation: inspect task definition YAML files
      met: false
    tasks:
    - id: p61.d1.t1
      title: Create benchmark task definitions
      status: planned
      description: 'Create benchmarks/ directory with task definitions in YAML: (1) each task has: id, title, description, difficulty (small/medium/large), category (bug-fix, feature, refactor, test, docs),
        (2) setup: files to create, code state before task, (3) acceptance: tests that must pass, linters that must pass, files that must exist, (4) reference_solution: a known-good implementation for comparison,
        (5) scoring_weights: correctness, style, efficiency weights for composite score. Start with 10 tasks across all categories.'
      files:
      - '~/zion/projects/agent-orchestration/benchmarks/'
      - '~/zion/projects/agent-orchestration/quality_bench.py'
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/benchmarks/'
      - '~/zion/projects/agent-orchestration/quality_bench.py'
  - name: Benchmark runner
    description: Execute benchmark tasks through the full agent pipeline and score results
    status: planned
    acceptance_criteria:
    - description: 'Can run a benchmark task end-to-end and produce a score'
      validation: 'python3 quality_bench.py run --task bug-fix-001'
      met: false
    tasks:
    - id: p61.d2.t1
      title: Create benchmark runner in quality_bench.py
      status: planned
      description: 'Create quality_bench.py run command: (1) load task definition from YAML, (2) create isolated workspace with task setup files, (3) execute task through the DAG pipeline from phase 5 (plan
        -> implement -> test -> review), (4) score results: correctness (all acceptance tests pass = 100%, partial pass = proportional), style (linters pass = bonus points), review_score (from phase 9 sensor
        if available), efficiency (fewer tokens/turns = bonus), (5) capture full execution for forensic analysis (phase 58), (6) output structured results as JSON, (7) support --save to store results in
        ~/.orchestrator/benchmarks/results/{task_id}/{timestamp}.json, (8) support --baseline to compare against a previous run.'
      files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
      dependencies:
      - p61.d1.t1
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
  - name: Regression detection
    description: Detect quality regressions by comparing benchmark results over time
    status: planned
    acceptance_criteria:
    - description: Alerts when benchmark scores drop below configurable thresholds
      validation: 'deliberately degrade a benchmark, run regression check, verify alert'
      met: false
    tasks:
    - id: p61.d3.t1
      title: Add regression detection to quality_bench.py
      status: planned
      description: 'Add regress command: (1) load historical benchmark results, (2) compare latest run against baseline (previous run or N-run average), (3) regression criteria: score dropped by >10% (configurable
        per task), new test failures, linter failures, (4) output regression report: which tasks regressed, by how much, possible causes (config changes, model version), (5) support --threshold to set custom
        regression sensitivity, (6) exit code 1 on regression (CI-friendly), (7) suggest investigation actions: "review phase 58 forensic analysis for regressed task".'
      files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
      dependencies:
      - p61.d2.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
  - name: Quality trend visualization
    description: Track and visualize agent quality trends over time across configurations
    status: planned
    acceptance_criteria:
    - description: Can generate a trend report showing quality over time
      validation: 'python3 quality_bench.py trends --days 30'
      met: false
    tasks:
    - id: p61.d4.t1
      title: Add trend tracking to quality_bench.py
      status: planned
      description: 'Add trends command: (1) aggregate benchmark results by day/week, (2) compute quality trend: overall score trajectory, per-category scores, per-role scores, (3) detect statistically significant
        changes (moving average crossover), (4) correlate quality with: model version, config changes (from git log), token budget (from phase 32), (5) output as markdown table with trend arrows, (6) identify
        "best configuration" per task type based on historical data, (7) feed insights into self-improvement loop (phase 19) and A/B testing (phase 29). This answers: "is our harness getting better or worse
        over time?"'
      files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
      dependencies:
      - p61.d3.t1
      scope_lines: 110
      scope_files:
      - '~/zion/projects/agent-orchestration/quality_bench.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-61'
    type: soft
    reason: DAG executor from phase 5 is used to run benchmark tasks through the full pipeline
  - source: 'phase-7'
    target: 'phase-61'
    type: soft
    reason: Test infrastructure from phase 7 ensures the orchestrator code itself is reliable before benchmarking
  - source: 'phase-9'
    target: 'phase-61'
    type: soft
    reason: Review sensor from phase 9 provides quality scores for benchmark results
  - source: 'phase-19'
    target: 'phase-61'
    type: soft
    reason: 'Self-improvement from phase 19 consumes benchmark results to identify improvement opportunities'
  - source: 'phase-29'
    target: 'phase-61'
    type: soft
    reason: A/B testing from phase 29 generates the comparison data that benchmarks validate
  - source: 'phase-32'
    target: 'phase-61'
    type: soft
    reason: Cost tracking from phase 32 provides token efficiency data for benchmark scoring
  technical_notes: 'Benchmarks must be deterministic: same task definition should produce comparable results across runs. The key challenge is task design: tasks must be self-contained (no external dependencies),
    have clear acceptance criteria, and cover a representative range of real-world work. Start with 10 tasks, grow to 30+. Benchmark results are the "source of truth" for agent quality -- they should be
    version-controlled alongside the orchestrator config.'
  risks:
  - 'Benchmark tasks may not represent real-world complexity -- include diverse task types and定期 update'
  - 'Agent performance varies between runs (non-deterministic) -- use median of 3 runs for stability'
  - 'Benchmark execution is expensive (uses real tokens) -- run weekly, not on every commit'
  - 'Task setup/teardown may leave residual state -- use isolated workspaces with cleanup'
  scope_lines_total: 510
