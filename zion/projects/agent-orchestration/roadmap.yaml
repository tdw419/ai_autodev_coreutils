- id: 'phase-40'
  title: 'Multi-Model Agent Backend Abstraction'
  status: planned
  goal: 'Abstract the AI execution layer so the orchestrator can route work to different models and providers based on task type, cost, and quality requirements'
  description: 'The Harness Engineering research describes the Inner Harness as "infrastructure inside developer tools (Cursor, Claude Code, Codex)" and notes it is "increasingly commoditized as providers
    converge on similar execution primitives." The current orchestrator is tightly coupled to a single model/provider via delegate_task. This phase adds a backend abstraction layer that: (1) defines a uniform
    interface for AI execution, (2) supports multiple backends (Claude, GPT, local models, Codex), (3) routes tasks to the optimal backend based on task type and cost, (4) enables fallback when a backend
    is unavailable. This is the Inner Harness abstraction that Symphony treats as a pluggable component, and it unlocks cost optimization by routing simple tasks to cheaper models while preserving quality
    for complex ones.'
  deliverables:
  - name: Backend abstraction interface
    description: Python interface defining the uniform contract for all AI execution backends
    status: planned
    acceptance_criteria:
    - description: 'Interface defines execute(prompt, context, tools) -> result with structured output'
