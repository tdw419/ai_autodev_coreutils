      status: planned
      description: 'Create a workflow_policy_schema.yaml that defines the structure of workflow policy files.
        Fields: system_prompt (agent persona override), tools (allowed/restricted tool list), pipeline
        (which pipeline template to use), quality_gates (minimum test coverage, max lint violations, required
        checks), env (environment variables for the workspace), limits (max turns, max files, timeout), labels
        (auto-apply labels based on issue type), hooks (pre/post pipeline shell commands). Support per-label
        overrides so bug issues get different policies than feature issues. Document the schema with examples.'
