      description: 'Create a weekly Hermes cron that runs chaos.py --score in a test environment. The cron: (1) runs all chaos tests, (2) computes resilience score, (3) if score drops below 80%, create
        a GitHub Issue warning about resilience regression, (4) store results for trend tracking, (5) output a summary: overall score, per-fault-type scores, regressions detected, recommended actions. Keep
