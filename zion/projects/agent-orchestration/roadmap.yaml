      validation: read pipeline YAML, trace nodes
      met: false
    tasks:
    - id: p13.d2.t1
      title: Add PR step to pipeline templates
      status: planned
      description: 'Add a conditional bash node to standard-pipeline.yaml and team-pipeline.yaml
        that calls pr_creator.py after commit. The step should be gated by a pipeline env var
        (CREATE_PR=true) so it can be toggled. Include the PR body template as a pipeline env
        variable.'
      dependencies:
