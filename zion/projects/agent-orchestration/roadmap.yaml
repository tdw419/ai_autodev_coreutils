      title: Create pr_creator.py module
      status: planned
      description: 'Python module that: (1) reads workspace metadata (issue number, role, pipeline,
        duration from meta.json), (2) creates a feature branch from workspace changes, (3) pushes
        to remote, (4) creates a GitHub PR via gh CLI with structured body (issue link, role used,
        pipeline name, duration, test results), (5) labels the PR and links it to the issue. Include
        --draft flag for draft PRs.'
      files:
      - ~/zion/projects/agent-orchestration/pr_creator.py
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/pr_creator.py
