      title: Create drain mode tests and documentation
      status: planned
      description: 'Create test_drain.py: (1) test_drain_signal: create/cancel drain, verify is_draining, (2) test_drain_blocks_new_workers: verify no spawn during drain, (3) test_active_worker_tracking:
        create mock workspace states, verify tracking, (4) test_state_snapshot_restore: save state, modify, restore, verify recovery, (5) test_drain_timeout: workers not completing within timeout are marked
        timed-out, (6) test_crash_recovery: kill orchestrator mid-drain, restart, verify drain state detected.'
