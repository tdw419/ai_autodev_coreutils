- id: 'phase-56'
  title: Symphony Spec Compliance Adapter
  status: planned
  goal: 'Make Hermes a compatible implementation of the OpenAI Symphony specification, enabling drop-in replacement for teams already using Symphony configs'
  description: 'The research describes Symphony as "an open-source framework designed to solve the critical operational bottlenecks that arise when human engineers attempt to supervise autonomous agents
    at scale" with a SPEC.md that defines the contract between issue trackers, workspace managers, workflow loaders, and agent runners. Phase 45 covers WORKFLOW.md parsing, but does not aim for full Symphony
    spec compliance. This phase creates a Symphony compatibility layer: (1) a SPEC.md parser that reads Symphony-formatted configs and translates them to Hermes equivalents, (2) a Linear-to-GitHub Issues
    adapter (Symphony uses Linear as its reference tracker), (3) Codex App Server JSON-RPC compatibility for agent communication, (4) a compliance test suite that verifies Hermes behaves according to Symphony
    spec. This positions Hermes as a Symphony-compatible orchestrator, enabling teams to migrate from Symphony''s Elixir implementation to Hermes without rewriting their configs. The research emphasizes
    that Symphony is "the first major step" in orchestration standards -- compatibility with the spec is strategically valuable.'
  deliverables:
  - name: Symphony SPEC.md parser
    description: 'Parse Symphony-formatted configuration files and translate to Hermes equivalents'
    status: planned
    acceptance_criteria:
    - description: Can parse a Symphony SPEC.md and extract all config parameters
      validation: python3 symphony_compat.py parse SPEC.md
      met: false
    - description: Translates Symphony config to Hermes orchestrator.yaml format
      validation: 'python3 symphony_compat.py translate SPEC.md --output orchestrator.yaml'
      met: false
    tasks:
    - id: p56.d1.t1
      title: Create symphony_compat.py parser
      status: planned
      description: 'Create symphony_compat.py: (1) parse Symphony SPEC.md format: tracker.kind (linear/github), polling.interval_ms, agent.max_turns, agent.max_concurrent, codex.approval_policy, workspace.base_path,
        (2) map to Hermes equivalents: tracker.kind -> repo config, polling.interval_ms -> cron schedule, agent.max_turns -> pipeline max_steps, agent.max_concurrent -> max_concurrent, codex.approval_policy
        -> safety policy, (3) handle Symphony workspace path conventions (issue-ID-based isolation), (4) output a valid orchestrator.yaml, (5) validate that all required Symphony params have Hermes equivalents
        (report gaps). CLI: python3 symphony_compat.py parse SPEC.md, translate SPEC.md --output orchestrator.yaml, validate SPEC.md.'
      files:
      - '~/zion/projects/agent-orchestration/symphony_compat.py'
      scope_lines: 180
      scope_files:
      - '~/zion/projects/agent-orchestration/symphony_compat.py'
  - name: 'Linear-to-GitHub Issues adapter'
    description: Translate Linear issue states to GitHub Issue states for Symphony compatibility
    status: planned
    acceptance_criteria:
    - description: 'Can map Linear issue states (Todo, In Progress, Done) to GitHub equivalents'
      validation: 'python3 symphony_compat.py linear-sync --project PROJ_ID'
      met: false
    tasks:
    - id: p56.d2.t1
      title: Add Linear adapter to symphony_compat.py
      status: planned
      description: 'Add linear_adapter module: (1) map Linear states: Todo -> agent-ready label, In Progress -> in-progress label, Done -> close issue, (2) use Linear API (via token) to poll issues, (3)
        create/update corresponding GitHub Issues with state sync, (4) bidirectional sync: changes in GitHub reflect back to Linear, (5) handle Linear-specific fields (cycle, project, priority) by mapping
        to GitHub labels/milestones. CLI: python3 symphony_compat.py linear-sync --token TOKEN --project PROJ_ID --repo owner/repo. The adapter enables teams using Linear (Symphony default) to use Hermes
        without switching issue trackers.'
      files:
