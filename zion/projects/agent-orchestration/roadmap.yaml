- id: 'phase-76'
  title: Agent Output Deduplication and Work Conflict Prevention
  status: planned
  goal: 'Detect and prevent duplicate or overlapping work when multiple agents operate on the same codebase, ensuring efficient resource usage and avoiding merge conflicts'
  description: 'The Gas Town research describes 20-30 Claude Code instances working concurrently on the same codebase, coordinated by the Refinery role managing merge queues. Phase 21 (merge queue) handles
    post-completion conflict resolution, and phase 30 (inter-agent communication) handles pre-completion coordination, but neither detects duplicate work before it starts. When multiple agents pick up similar
    issues (e.g., "fix null pointer in auth module" and "handle missing user in auth flow"), they may produce overlapping changes that waste tokens and create merge conflicts. This phase creates: (1) a
    work similarity analyzer that computes semantic similarity between issue descriptions and planned approaches, (2) a conflict predictor that identifies likely file-level overlaps before work begins,
    (3) a deduplication gate that blocks new work if highly similar work is already in progress, (4) work grouping that merges related issues into a single work unit, and (5) integration with the priority
    queue (phase 41) to deprioritize duplicate work. The research''s Beads system tracks every "molecule of work" in a dependency graph -- this phase brings that concept to the issue-to-agent assignment
    layer.'
  deliverables:
  - name: Work similarity analyzer
    description: Compute semantic similarity between issues to detect duplicate or overlapping work
    status: planned
    acceptance_criteria:
    - description: Can compute similarity score between two issue descriptions
      validation: 'python3 work_dedup.py similarity --issue-a 42 --issue-b 43'
      met: false
    - description: 'Issues with >80% similarity are flagged as potential duplicates'
      validation: 'create two similar issues, verify flag'
      met: false
    tasks:
    - id: p76.d1.t1
      title: Create work_dedup.py module
      status: planned
      description: 'Create work_dedup.py: (1) similarity(issue_a, issue_b) -> float 0-1 score using: a) title token overlap (Jaccard similarity on significant words, ignoring stop words), b) body keyword
        overlap, c) label overlap bonus, d) file path prediction overlap (extract mentioned files from issue body), (2) predict_files(issue) -> list of file paths likely touched by the issue (from mentions
        in body, labels, prior similar issues), (3) file_overlap(issue_a, issue_b) -> float 0-1 score based on predicted file overlap, (4) conflict_risk(issue_a, issue_b) -> combined score: 0.5 * similarity
        + 0.5 * file_overlap, (5) find_duplicates(issue, active_issues) -> list of (issue, score) pairs above threshold, sorted by score, (6) persist similarity cache to ~/.orchestrator/dedup/cache.json
        (avoid recomputing), (7) CLI: similarity, predict-files, find-duplicates, check (check single issue against all active work). No LLM calls needed -- purely lexical/structural similarity.'
      files:
      - '~/zion/projects/agent-orchestration/work_dedup.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/work_dedup.py'
  - name: Deduplication gate in orchestrator
    description: Block or defer work assignment when duplicate or conflicting work is detected
    status: planned
    acceptance_criteria:
    - description: Orchestrator checks for duplicates before assigning work
      validation: 'submit two similar issues, verify second is deferred'
      met: false
    - description: Duplicate detection results are logged
      validation: check execution logs for dedup events
      met: false
    tasks:
    - id: p76.d2.t1
      title: Integrate deduplication into orchestrator.py
      status: planned
      description: 'Modify orchestrator.py: (1) after polling issues but before spawning workers, run work_dedup.find_duplicates() for each new issue against all currently in-progress issues, (2) if conflict_risk
        > 0.8 (configurable), skip the issue and add comment "Deferred: similar work in progress on issue #N", (3) if conflict_risk > 0.5 but < 0.8, assign but with warning flag (lower priority, safety.py
        extra scrutiny), (4) log dedup decisions to execution history: dedup_checked, dedup_blocked, dedup_warned events, (5) add dedup config section to orchestrator.yaml: enabled (bool), similarity_threshold
        (default 0.8), warn_threshold (default 0.5), check_file_overlap (bool), auto_comment (bool), (6) add dedup section to status.sh showing blocked/warned issues.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      dependencies:
      - p76.d1.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
  - name: Work grouping for related issues
    description: 'Group related issues into unified work units to prevent fragment-related changes across multiple agents'
    status: planned
    acceptance_criteria:
    - description: Can group related issues into a single work unit
      validation: 'python3 work_dedup.py group --issues 42,43,44'
      met: false
    - description: Grouped issues are assigned to a single agent
      validation: 'submit grouped issues, verify single assignment'
      met: false
    tasks:
    - id: p76.d3.t1
      title: Add work grouping to work_dedup.py
      status: planned
      description: 'Extend work_dedup.py: (1) cluster(issues) -> list of issue groups using similarity-based clustering (simple greedy: start with highest-similarity pair, add issues that are similar to
        any group member above threshold), (2) group_metadata(group) -> combined description, file predictions, priority (highest in group), (3) CLI: group --issues (comma-separated), group --all-active,
        (4) integrate with orchestrator.py: when multiple issues form a group, assign the group as a single work unit to one agent with a combined prompt, (5) after completion, close all issues in the group
        with references to the single PR. This prevents the common pattern where 3 agents each fix 1/3 of a bug, creating 3 PRs that conflict with each other.'
      files:
      - '~/zion/projects/agent-orchestration/work_dedup.py'
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      dependencies:
      - p76.d2.t1
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/work_dedup.py'
    - '~/zion/projects/agent-orchestration/orchestrator.py'
  - name: Deduplication tests
    description: 'Test similarity computation, dedup gate, and work grouping'
    status: planned
    acceptance_criteria:
    - description: 'Tests verify similarity scoring with known-similar and known-different issues'
      validation: 'python3 -m pytest test_work_dedup.py -v'
      met: false
    tasks:
    - id: p76.d4.t1
      title: Create test_work_dedup.py
      status: planned
      description: 'Create test_work_dedup.py: (1) test similarity with identical titles (score ~1.0), (2) test similarity with completely unrelated issues (score ~0), (3) test similarity with same-area
        but different bugs (score 0.3-0.7), (4) test file prediction from issue body mentions, (5) test conflict risk combines similarity and file overlap, (6) test find_duplicates returns sorted results,
        (7) test dedup gate blocks high-similarity issues, (8) test dedup gate warns medium-similarity issues, (9) test work grouping clusters related issues, (10) test cache persistence and invalidation.'
      files:
      - '~/zion/projects/agent-orchestration/test_work_dedup.py'
      dependencies:
      - p76.d3.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/test_work_dedup.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-76'
    type: soft
    reason: 'Deduplication gate modifies the orchestrator poll-spawn loop from phase 4'
  - source: 'phase-21'
    target: 'phase-76'
    type: soft
    reason: 'Merge queue from phase 21 handles post-completion conflicts; dedup prevents pre-completion duplicates'
  - source: 'phase-30'
    target: 'phase-76'
    type: soft
    reason: 'Inter-agent communication from phase 30 provides the notification channel for dedup warnings'
  - source: 'phase-41'
    target: 'phase-76'
    type: soft
    reason: Priority queue from phase 41 deprioritizes duplicate work
  technical_notes: 'Lexical similarity (token overlap, Jaccard) is intentionally chosen over LLM-based semantic similarity to avoid token costs on every issue assignment. The dedup check should be fast
    (<100ms per issue pair) since it runs on every polling cycle. File prediction from issue body is a heuristic: extract paths mentioned in backticks, after "in file", "in module", etc. For higher accuracy,
    could optionally use embeddings (phase 38 cross-project knowledge) but that adds latency. Start with lexical, add optional embedding upgrade later.'
  risks:
  - Lexical similarity may produce false positives (different bugs in same module flagged as duplicates)
  - 'Over-aggressive dedup could block legitimate parallel work on the same module'
  - 'Work grouping may produce combined prompts too large for context window -- respect context budget (phase 20)'
  - 'Greedy clustering may not find optimal groupings -- acceptable trade-off for speed'
