      status: planned
      description: 'Modify spawner.py: (1) replace hardcoded delegate_task call with inner_harness.BackendRegistry.get_default(), (2) backend selection logic: a) check issue labels for backend preference
        (e.g., backend:claude, backend:codex, backend:shell), b) check role config for preferred backend, c) fall back to default backend from orchestrator.yaml, (3) pass backend-specific config from BackendConfig
        to the backend, (4) log backend selection in execution history (phase 8): which backend was used and why, (5) add backend section to status.sh showing available backends and their health status.
        The spawner becomes backend-agnostic -- it prepares the workspace and prompt, then delegates execution to whatever backend the registry provides.'
