- id: 'phase-14'
  title: Agent Health Monitoring (Deacon Pattern)
  status: complete
  goal: 'Implement the Gas Town Deacon pattern -- a health supervision daemon that monitors running workers, detects stuck agents, and manages resource usage'
  description: |
    Gas Town's Deacon role is a "daemon beacon; central health supervisor" that monitors the health of all running agents. Currently the orchestrator can spawn workers but has no way to detect if a worker is stuck, consuming excessive resources, or has silently failed. This phase adds health monitoring: periodic checks on workspace activity, disk usage tracking, timeout detection, and auto-recovery or escalation for unhealthy workers. This is essential for running the orchestrator in production where workers may run for hours.
  deliverables:
  - name: Health check module
    description: Python module that checks the health of active worker workspaces
    status: done
    acceptance_criteria:
    - description: Module can scan all active workspaces and report health status per worker
      validation: 'python3 health_check.py --all'
      met: true
    - description: Detects stuck workers (no file changes in N minutes)
      validation: 'create a stale workspace, run health check'
      met: true
    tasks:
    - id: p14.d1.t1
      title: Create health_check.py module
      status: done
      description: 'Python module that: (1) scans all workspaces with status "in-progress", (2) checks last file modification time (stuck detection), (3) measures disk usage per workspace, (4) checks for
        zombie processes (optional, via ps), (5) reports health as JSON with per-worker status (healthy, stale, oversized, unknown). Configurable thresholds: stale_after_minutes (default 30), max_disk_mb
        (default 500). Support --watch flag for continuous monitoring.'
      files:
      - '~/zion/projects/agent-orchestration/health_check.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/health_check.py'
  - name: 'Auto-recovery for stuck workers'
    description: 'Automatically detect and handle stuck workers (timeout, escalation, or restart)'
    status: done
    acceptance_criteria:
    - description: Stuck workers are detected and marked as failed after timeout
      validation: 'simulate stuck worker, verify detection'
      met: true
    tasks:
    - id: p14.d2.t1
      title: 'Add auto-recovery logic to health_check.py'
      status: done
      description: 'Add to health_check.py: (1) when a worker is stale beyond threshold, update its meta.json status to "failed", (2) post a comment on the GitHub issue explaining the timeout, (3) optionally
        archive the workspace, (4) log the recovery event. Support --auto-recover flag and --escalate flag (create a new issue for human review). Recovery modes: mark-failed (default), archive, retry (re-spawn
        with reduced max_turns).'
      dependencies:
      - p14.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/health_check.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/health_check.py'
  - name: Health monitoring cron job
    description: 'Scheduled cron job that runs health checks and auto-recovers unhealthy workers'
    status: done
    acceptance_criteria:
    - description: Cron job runs health checks every 15 minutes
      validation: cronjob list
      met: true
    tasks:
    - id: p14.d3.t1
      title: Create health monitoring cron job
      status: done
      description: 'Create a Hermes cron job that runs health_check.py --auto-recover every 15 minutes. Include config for thresholds, notification on failure, and escalation. The cron prompt should read
        health_config.yaml for settings.'
      dependencies:
      - p14.d2.t1
      files: []
    scope_lines: 20
    scope_files: []
  - name: Health dashboard in status.sh
    description: Show worker health status alongside the existing status dashboard
    status: done
    acceptance_criteria:
    - description: status.sh shows health status per active worker
      validation: 'run status.sh, check for health section'
      met: true
    tasks:
    - id: p14.d4.t1
      title: Add health section to status.sh
      status: done
      description: 'Add a "Worker Health" section to status.sh that calls health_check.py and displays: per-worker status (healthy/stale/oversized), disk usage, last activity time, time since spawn. Use
        color coding if terminal supports it (green=healthy, yellow=stale, red=failed).'
      dependencies:
      - p14.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/status.sh'
    scope_lines: 40
    scope_files:
    - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-11'
    target: 'phase-14'
    type: soft
    reason: Workspace lifecycle from phase 11 provides the state tracking that health monitoring depends on
  technical_notes: 'Health checks are filesystem-based (no need for process monitoring). Stuck detection uses file modification timestamps. Disk usage via du -sb. The Deacon pattern is complementary to
    the Dog pattern (phase 11): Dog cleans up completed workspaces, Deacon monitors active ones.'
  risks:
  - 'Stuck detection threshold is tricky -- too short and you kill slow workers, too long and stuck workers waste resources'
  - 'Auto-recovery could lose work if a worker was actually making progress on a long task'
  - File modification time may not accurately reflect agent activity (agent might be "thinking")
