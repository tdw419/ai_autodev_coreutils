      title: Create invariant_checker.py module
      status: done
      description: 'Python module that: (1) reads invariants.yaml defining project-specific architectural rules, (2) uses AST parsing to check import statements against forbidden_imports rules, (3) verifies
        layer_order (e.g., types -> config -> repo -> service), (4) checks dependency_direction (higher layers cannot import from lower), (5) detects circular dependencies via import graph, (6) outputs
        structured JSON report with file:line:violation:severity. Support --fix flag for auto-fixable violations (reorder imports).'
      files:
      - '~/zion/projects/agent-orchestration/invariant_checker.py'
    scope_lines: 150
