- id: 'phase-113'
  title: 'Cognitive Forgetting and Skill Quality Lifecycle'
  status: planned
  goal: 'Score accumulated skills, context, and knowledge by utility, and prune low-value entries to maintain agent cognitive performance over time'
  description: |
    The Hermes Bots research doc describes a "Dynamic Forgetting Layer" that identifies and prunes
    "unpriced memory" -- outdated skills or noisy data that no longer provide value but consume
    computational resources. As agents operate continuously, their accumulated knowledge can become
    bloated, leading to high latency, cost, and context noise. Phase 101 (Data Lifecycle and Retention)
    handles storage-level retention (log rotation, file cleanup) but does NOT score knowledge or skills
    by QUALITY. The Dynamic Forgetting Layer is distinct from storage cleanup -- it prunes based on
    cognitive utility, not age. This phase implements: (1) skill quality scoring based on usage frequency,
    success rate, and relevance decay curves, (2) context quality assessment that detects when accumulated
    context is adding noise rather than signal, (3) automatic pruning of low-utility entries before they
    are injected into agent prompts, (4) quality metrics reporting to the health scorecard (phase 44).
    Without this, long-running orchestrators accumulate stale knowledge that degrades agent performance
    -- the "Red Queen effect" where the system must continuously prune just to maintain quality.
  deliverables:
  - name: Skill quality scoring engine
    description: 'Score each accumulated skill/context entry by utility metrics (usage frequency, success rate, recency, relevance)'
    status: planned
    acceptance_criteria:
    - description: 'Each skill in the registry (phase 57) has an associated quality score'
      validation: query skill registry, verify quality_score field exists
      met: false
    - description: 'Quality scores decay over time based on configurable decay curves'
      validation: 'check score after simulated time passage'
      met: false
    tasks:
    - id: p113.d1.t1
      title: Create skill quality scorer module
      status: planned
      description: 'Python module that computes quality scores for skills/context entries. Score = f(usage_count, success_rate, recency_decay, relevance_to_current_work). Support configurable decay curves (linear, exponential, step-function). Store scores alongside skill metadata.'
      files:
      - '~/zion/projects/agent-orchestration/skill_quality.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/skill_quality.py'
  - name: Context noise detection
    description: 'Detect when accumulated context is adding noise rather than signal to agent prompts'
    status: planned
    acceptance_criteria:
    - description: 'System can identify context entries that have negative utility (add noise)'
      validation: 'inject known-noisy context, verify detection'
      met: false
    - description: 'Context injection (phase 82) respects quality thresholds'
      validation: check context seeding integration
      met: false
    tasks:
    - id: p113.d2.t1
      title: Create context noise detector
      status: planned
      description: 'Module that analyzes context entries before injection and flags low-utility entries. Uses skill quality scores + heuristic rules (stale references, superseded patterns, conflicting advice). Output: filtered context list with quality annotations.'
      dependencies:
      - p113.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/context_noise.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/context_noise.py'
  - name: Automatic pruning pipeline
    description: 'Automatically prune low-utility skills and context entries based on configurable thresholds'
    status: planned
    acceptance_criteria:
    - description: 'Entries below quality threshold are archived (not deleted) after review period'
      validation: run pruning, check archive
      met: false
    - description: 'Pruning runs as part of periodic maintenance (phase 66)'
      validation: check maintenance cron integration
      met: false
    tasks:
    - id: p113.d3.t1
      title: Create pruning pipeline
      status: planned
      description: 'Module that runs periodically: (1) score all skills/context, (2) identify entries below threshold, (3) archive to ~/.orchestrator/pruned/ with metadata, (4) report pruning stats. Support --dry-run. Integrate with maintenance automation (phase 66).'
      dependencies:
      - p113.d1.t1
      - p113.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/pruning.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/pruning.py'
  - name: Quality metrics integration
    description: 'Report skill/context quality metrics to health scorecard and self-improvement analysis'
    status: planned
    acceptance_criteria:
    - description: 'Health scorecard (phase 44) includes knowledge quality trend'
      validation: check health scorecard output
      met: false
    - description: 'Self-improvement loop (phase 19) consumes quality trends'
      validation: check improvement analysis input
      met: false
    tasks:
    - id: p113.d4.t1
      title: Integrate quality metrics with health scorecard
      status: planned
      description: 'Add knowledge quality section to health scorecard: total skills, average quality, pruned count, noise ratio trend. Feed into self-improvement loop (phase 19) for analysis.'
      dependencies:
      - p113.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/skill_quality.py'
    scope_lines: 40
    scope_files:
    - '~/zion/projects/agent-orchestration/skill_quality.py'
  dependencies:
  - source: 'phase-57'
    target: 'phase-113'
    type: soft
    reason: 'Skill registry from phase 57 provides the skills that quality scoring evaluates'
  - source: 'phase-82'
    target: 'phase-113'
    type: soft
    reason: 'Context seeding from phase 82 is the injection point where quality filtering applies'
  - source: 'phase-101'
    target: 'phase-113'
    type: soft
    reason: 'Data lifecycle from phase 101 handles storage cleanup; this phase handles cognitive quality pruning'
  technical_notes: 'The Dynamic Forgetting Layer is complementary to Phase 101 (storage lifecycle). Phase 101 deletes old files; this phase scores knowledge quality and archives low-utility entries. The distinction is cognitive vs. storage: a skill can be "old" but still highly useful (e.g., a rarely-used but critical security check), or "new" but low-quality (e.g., a recently created but buggy tool).'
  risks:
  - 'Pruning useful skills is worse than keeping useless ones -- default thresholds should be conservative'
  - 'Quality scoring requires execution history data -- cold start problem for new skills'
  - 'Different task types may have different quality criteria -- one-size-fits-all scoring may not work'
  scope_lines_total: 300
  test_target: 8
- id: 'phase-114'
  title: 'Multi-Platform Control Plane Adapters'
  status: planned
  goal: 'Abstract the orchestrator poller to support multiple issue tracker backends (GitHub, Linear, Jira, GitLab) via pluggable adapters'
  description: |
    The OpenAI Symphony spec defines tracker.kind as a configuration parameter supporting multiple
    issue tracker types (currently Linear). The Issue Trackers research doc emphasizes that "any
    enterprise application with a clear data model is a candidate for an agent substrate," citing
    Jira, Linear, GitHub, and even CRMs/ERPs as potential control planes. The current orchestrator
    (phase 4) is hardcoded to GitHub Issues via the gh CLI. This phase abstracts the poller into
    a pluggable adapter interface, enabling the orchestrator to consume work from any issue tracker
    that implements the adapter protocol. This directly supports the Symphony spec's tracker.kind
    parameter and makes the orchestrator applicable to teams that use Jira, Linear, or GitLab instead
    of GitHub. Each adapter implements: list_issues(filter), get_issue(id), update_status(id, status),
    add_comment(id, body), and create_issue(data). The orchestrator calls the adapter interface
    instead of gh CLI directly. Phase 56 (Symphony Spec Compliance Adapter) already references
    Linear support but focuses on Symphony compliance, not generic multi-platform support.
