- id: phase-16
  title: Multi-Repo Orchestration
  status: planned
  goal: Extend the orchestrator to manage tasks across multiple GitHub repositories with per-repo configuration
  description: 'Symphony and Gas Town both manage multiple repositories simultaneously. The current Hermes
    orchestrator is hardcoded to a single repo (ORCH_REPO). This phase extends it to support multiple repos
    with per-repo configuration: different pipelines, roles, AI_GUIDE.md files, approval policies, and
    cost budgets. Workspaces are organized by repo. The orchestrator polls all configured repos and routes
    tasks to the appropriate worker configuration. This is the scaling phase that transforms the orchestrator
    from a single-project tool into a fleet manager.

    '
  deliverables:
  - name: Multi-repo configuration
    description: Extend orchestrator.yaml to support multiple repos with per-repo settings
    status: planned
    acceptance_criteria:
    - description: Config supports repos as a list with per-repo pipeline, roles, labels, and policies
      validation: read config YAML
      met: false
    tasks:
    - id: p16.d1.t1
      title: Extend orchestrator.yaml for multi-repo support
      status: planned
      description: 'Redesign orchestrator.yaml to support: repos (list of repo configs), each with:
        name, url, labels, pipeline, roles_dir, ai_guide_path, approval_mode, max_concurrent, budget_daily.
        Keep backward compatibility: if "repo" (singular) is set, treat as single-repo mode. Add a
        validate_config() function to orchestrator.py that checks all repo configs are valid and accessible.'
      files:
      - ~/zion/projects/agent-orchestration/orchestrator.yaml
      - ~/zion/projects/agent-orchestration/orchestrator.py
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/orchestrator.yaml
    - ~/zion/projects/agent-orchestration/orchestrator.py
  - name: Per-repo workspace organization
    description: Organize workspaces by repo to avoid collisions and enable repo-specific cleanup
    status: planned
    acceptance_criteria:
    - description: Workspaces are organized as workspaces/{repo_name}/{issue_number}
      validation: spawn a worker, check workspace path
      met: false
    tasks:
    - id: p16.d2.t1
      title: Update spawner.py for per-repo workspace layout
      status: planned
      description: 'Change workspace path from workspaces/{issue_number} to workspaces/{repo_name}/{issue_number}.
        Update spawner.py spawn_worker() to accept repo_name parameter. Update orchestrator.py to
        pass repo_name when spawning. Update status.sh, health_check.py, and workspace_manager.py
        to handle the new layout. Add a migration function that moves existing workspaces to the new
        layout.'
      dependencies:
      - p16.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/spawner.py
      - ~/zion/projects/agent-orchestration/orchestrator.py
      - ~/zion/projects/agent-orchestration/status.sh
    scope_lines: 60
    scope_files:
    - ~/zion/projects/agent-orchestration/spawner.py
    - ~/zion/projects/agent-orchestration/orchestrator.py
    - ~/zion/projects/agent-orchestration/status.sh
  - name: Multi-repo poller
    description: Poll all configured repos and aggregate results into a unified task queue
    status: planned
    acceptance_criteria:
    - description: Single orchestrator loop polls all repos and reports per-repo task counts
      validation: run orchestrator with multi-repo config
      met: false
    tasks:
    - id: p16.d3.t1
      title: Add multi-repo polling to orchestrator.py
      status: planned
      description: 'Update orchestrator.py run_loop() to iterate over all configured repos, poll
        each, and aggregate results. Apply per-repo max_concurrent limits. Report per-repo stats
        in the summary output. Handle repo-specific errors gracefully (one repo failing shouldn''t
        block others). Add --repo flag to filter to a single repo for debugging.'
      dependencies:
      - p16.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/orchestrator.py
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/orchestrator.py
  - name: Per-repo cost tracking
    description: Track estimated costs per repo and alert when approaching budget limits
    status: planned
    acceptance_criteria:
    - description: Cost report shows per-repo estimated spend with daily totals
      validation: run cost report command
      met: false
    tasks:
    - id: p16.d4.t1
      title: Add cost tracking to orchestrator
      status: planned
      description: 'Create cost_tracker.py module: (1) estimate token usage per pipeline execution
        based on node types and turns (AI nodes cost ~10K tokens/turn, bash nodes are free), (2)
        accumulate daily costs per repo, (3) compare against per-repo budget_daily limit, (4) alert
        (print warning) when approaching 80% of budget, (5) stop spawning workers when budget is
        exceeded. Store daily costs in ~/.orchestrator/costs/{repo}/{date}.json. CLI: python3
        cost_tracker.py report --period week.'
      dependencies:
      - p16.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/cost_tracker.py
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/cost_tracker.py
  dependencies:
  - source: phase-4
    target: phase-16
    type: soft
    reason: Multi-repo support extends the base orchestrator from phase 4
  - source: phase-13
    target: phase-16
    type: soft
    reason: PR creation from phase 13 should work across multiple repos
  - source: phase-14
    target: phase-16
    type: soft
    reason: Health monitoring from phase 14 should cover workers across all repos
  - source: phase-15
    target: phase-16
    type: soft
    reason: Approval policies from phase 15 may vary per repo
  technical_notes: 'Multi-repo is primarily a configuration and routing change, not a fundamental architecture
    change. The poller already accepts a repo parameter. The spawner already supports per-task configuration.
    The main work is in the orchestrator loop (iterate over repos) and workspace layout (add repo prefix).
    Backward compatibility is important: single-repo mode must continue to work with no config changes.'
  risks:
  - More repos means more GitHub API calls -- need to respect rate limits across all repos
  - Per-repo configuration drift -- different repos may need different orchestrator versions
  - Cost tracking is estimates only -- actual token usage depends on the LLM provider and model
  - Workspace migration from flat layout to repo-prefixed layout could break existing workspaces
  scope_lines_total: 320
  test_target: 10
global_risks:
- Symphony/Gas Town/Archon are all rapidly evolving -- this roadmap may need updates as those projects change
- delegate_task sessions are synchronous and bounded by parent turn -- long-running orchestrator tasks need careful design (background terminals or chained cron)
- GitHub Issues as control plane requires a public or accessible repo -- private repo token management adds complexity
- Token costs for autonomous loops can escalate quickly (Symphony team uses 1B tokens/day) -- need cost awareness in the orchestrator
conventions:
- Python scripts use python3 (no bare python command on this system)
- GitHub API via gh CLI, not raw curl
- All new code goes to ~/zion/projects/agent-orchestration/
- Skills go to ~/.hermes/skills/ following existing category structure
- Wiki pages follow SCHEMA.md conventions (frontmatter, wikilinks, tag taxonomy)
