      title: Create confidence.py module
      status: planned
      description: 'Create confidence.py: (1) evaluate_run(run_id) -- compute composite confidence from:
        test pass rate (phase 7), review sensor score (phase 9), structural invariant compliance (phase 17),
        legibility score (phase 33), cost efficiency (phase 32), historical success rate for similar tasks.
        (2) weighted_score(signals) -- configurable weights for each signal, (3) trust_level(score) --
        map score to trust tier: auto-merge (95+), draft-PR (80+), human-review (60+), block (<60).
        Store confidence history for trend analysis.'
      files:
      - ~/zion/projects/agent-orchestration/confidence.py
      - ~/zion/projects/agent-orchestration/confidence_config.yaml
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/confidence.py
    - ~/zion/projects/agent-orchestration/confidence_config.yaml
  - name: Progressive trust escalation
    description: System that gradually increases autonomy as the orchestrator demonstrates reliability
    status: planned
    acceptance_criteria:
    - description: Trust level increases after consecutive successful runs
      validation: simulate 10 successful runs, check trust level escalation
      met: false
    tasks:
    - id: p35.d2.t1
      title: Add trust escalation to confidence.py
      status: planned
      description: 'Add trust escalation logic: (1) track rolling success rate (last N runs), (2) escalate
        trust tier after sustained high confidence (e.g., 10 consecutive auto-merge quality runs -> upgrade
        from draft-PR to auto-merge), (3) de-escalate on failures (any blocked run -> drop one tier), (4)
        trust_levels.yaml stores current trust level per repo/pipeline. Include --trust-status and --trust-reset
        commands. Trust escalation is the mechanism that enables the Dark Factory: start conservative,
        earn autonomy through consistent quality.'
      files:
      - ~/zion/projects/agent-orchestration/confidence.py
      dependencies:
      - p35.d1.t1
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/confidence.py
