    maximizes the human''s throughput: better ticket templates reduce filing time, better review queues reduce triage time, better summaries reduce per-PR review time. The triage classifier is deliberately
    heuristic (keyword-based), not LLM-based, to keep it fast and deterministic.'
  risks:
