        refactoring, testing, etc.), (3) store_pattern(pattern) -- save to ~/.orchestrator/knowledge/patterns.jsonl with: hash, category, source_repo, source_issue, created_at, effectiveness (derived from
        test results). Patterns are deduplicated by content hash to avoid storing identical solutions.'
