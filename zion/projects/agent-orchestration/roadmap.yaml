      title: Add synthesis engine to ensemble_review.py
      status: planned
      description: 'Add to ensemble_review.py: (1) synthesize(reviews): merge findings from all perspectives into unified report, (2) dedup: merge findings that describe the same issue from different perspectives
        (e.g., "naming" from style and "readability" from architecture), use location overlap as dedup signal, (3) conflict_detection: flag when reviewers disagree (e.g., performance reviewer says "use
        caching" but architecture reviewer says "premature optimization"), (4) conflict_resolution: use severity weights and perspective relevance to resolve conflicts, or flag for human review, (5) prioritization:
        rank all findings by combined severity (product of severity and reviewer confidence), (6) output format: unified review with sections: Critical, High, Medium, Low, each with location, description,
        suggestion, originating perspective, confidence. CLI: python3 ensemble_review.py review --diff-file changes.patch --perspectives security,performance,architecture.'
      dependencies:
