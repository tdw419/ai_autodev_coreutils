    description: 'Use TOON format for task lists, results, and state payloads in agent prompts'
    status: planned
    acceptance_criteria:
    - description: 'Agent prompts use TOON for task lists and results instead of JSON'
      validation: inspect prompt construction
    - description: 'Token savings are logged as metrics'
      validation: check metrics endpoint
    tasks:
    - id: p150.d2.t1
      title: Integrate TOON with prompt builder
      status: planned
      description: 'Modify prompt_builder.py: (1) add to_dtoon() calls for task list serialization, (2) add to_dtoon() calls for execution result summaries, (3) add to_dtoon() calls for state payloads in session handoff, (4) Log token count comparison (JSON vs TOON) to metrics, (5) Fallback to JSON if TOON serialization fails.'
      dependencies:
