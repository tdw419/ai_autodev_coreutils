- id: phase-34
  title: Agent-Generated Tooling
  status: planned
  goal: Enable the orchestrator to generate its own quality tools (linters, tests, validators) as part
    of the development pipeline -- the "structural tests and custom linters often generated by agents"
    pattern from Harness Engineering
  description: 'The Harness Engineering research notes that "structural tests and custom linters (often
    generated by agents)" enforce application legibility mechanically. This is a powerful meta-pattern:
    agents not only write code but also create the tools that verify code quality. Currently, our orchestrator
    runs pre-defined pipelines with fixed test/lint commands. This phase adds the ability for the orchestrator
    to: (1) detect when a project needs custom validation rules, (2) generate linters/tests/checks for those
    rules, (3) integrate the generated tools into subsequent pipeline runs. This creates a self-improving
    quality loop where the harness gets better as the codebase grows.'
  deliverables:
  - name: Tool generation module
    description: Module that generates custom linters, tests, and validators from project patterns
    status: planned
    acceptance_criteria:
    - description: Module can analyze a project and generate a custom linter
      validation: python3 tool_gen.py --analyze /path/to/project --generate linter
      met: false
    tasks:
    - id: p34.d1.t1
      title: Create tool_gen.py module
      status: planned
      description: 'Create tool_gen.py: (1) detect_patterns(project_dir) -- analyze codebase for recurring
