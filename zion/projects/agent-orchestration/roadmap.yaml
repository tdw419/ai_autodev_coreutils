      status: planned
      description: 'Create data_lifecycle.py with: (1) DATA_TYPES registry mapping each data source to its retention policy: execution_logs (hot 7d, warm 30d, archive 90d, delete 365d), workspace_state
        (hot while active, warm 7d after completion, delete 30d), merge_queue (hot while pending, delete 30d after merge), cost_tracking (warm 90d, archive 365d), health_history (warm 30d, archive 365d),
        knowledge_base (hot, never delete), session_recordings (warm 7d, archive 90d), audit_trail (hot 30d, archive 3650d, never delete), (2) RetentionPolicy dataclass, (3) load_policies(config_path) loads
        from data-lifecycle.yaml.'
