- id: 'phase-158'
  title: Metric-Driven Requirement Generation (Feedback Agent)
  status: planned
  goal: 'Automatically generate new requirements when runtime metrics deviate from spec-defined success criteria, closing the governance feedback loop'
  description: |
    The "Spec-Driven Autonomous Pipeline" research (187 lines, 8 citations) describes a
    "Feedback Agent" that continuously compares runtime performance metrics against the
    objective success criteria defined in the technical specification. When a deviation
    is detected (e.g., latency exceeds target, test coverage drops below threshold), the
    Feedback Agent automatically generates a new requirement document that becomes input
    for the next planning cycle. This creates a closed-loop governance system where the
    orchestrator not only executes tasks but also identifies when outcomes don't meet
    specifications and files new work to address the gap. Phase 44 (Health Scorecard)
    tracks KPIs. Phase 19 (Self-Improvement) optimizes strategies. Phase 104 (Governance
    Reporting) generates compliance reports. But no existing phase automatically
    TRANSFORMS metric deviations into new actionable requirements. The feedback loop
    currently ends at "reporting" -- this phase closes the loop at "action."
  deliverables:
  - name: Metric deviation detector
    description: 'Compare runtime metrics against spec-defined thresholds and flag deviations'
    status: planned
    acceptance_criteria:
    - description: 'Metric values are compared against spec-defined targets with configurable tolerance'
      validation: test threshold comparison
    - description: 'Deviations are classified as drift (gradual) or breach (sudden)'
      validation: test deviation classification
    tasks:
    - id: p158.d1.t1
      title: Create metric deviation detector
      status: planned
      description: 'Create metric_deviation.py: (1) MetricDeviationDetector class that takes a metric name, current value, target value, and tolerance, (2) Deviation types: drift (gradual trend away from target over N measurements), breach (single value exceeds threshold), improvement (value moving toward target), (3) Trend detection using simple linear regression on last N measurements, (4) Severity levels: info (within tolerance), warning (approaching threshold), critical (exceeding threshold), (5) Configurable per-metric thresholds and tolerances, (6) Store deviation events with timestamp, metric, severity, direction (improving/worsening).'
      files:
      - '~/zion/projects/agent-orchestration/metric_deviation.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/metric_deviation.py'
  - name: Requirement generator from deviations
    description: 'Transform detected metric deviations into structured requirement documents for the next planning cycle'
    status: planned
    acceptance_criteria:
    - description: 'Metric deviations are converted to requirement documents with clear problem statement and success criteria'
      validation: test requirement generation
    - description: 'Generated requirements are filed as issues in the control plane'
      validation: test issue filing
    tasks:
    - id: p158.d2.t1
      title: Create requirement generator
      status: planned
      description: "Create feedback_agent.py: (1) FeedbackAgent class that consumes deviation events and generates requirements, (2) Requirement template: title (metric name + deviation type), description (current value, target value, trend analysis), acceptance_criteria (metric must return to within tolerance), suggested_approach (based on deviation type), priority (critical for breaches, normal for drift), (3) Deduplication: don't file duplicate requirements for the same metric deviation, (4) Auto-close: when a metric returns to within tolerance, close the generated requirement, (5) Rate limiting: max N requirements per day to prevent issue spam, (6) Integration with poller: requirements are filed via the same issue-tracker-as-control-plane mechanism."
      dependencies:
      - p158.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/feedback_agent.py'
    - id: p158.d3.t1
      title: Write feedback agent tests
      status: planned
      description: 'Test cases: (1) Drift is detected from trend analysis, (2) Breach is detected from single value, (3) Deviation severity levels are correctly assigned, (4) Requirements are generated with correct template, (5) Duplicate requirements are not filed, (6) Requirements are auto-closed when metric recovers, (7) Rate limiting prevents excessive issue filing, (8) Integration with issue tracker works end-to-end.'
      dependencies:
      - p158.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_feedback_agent.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_feedback_agent.py'
  dependencies:
  - source: 'phase-44'
    target: 'phase-158'
    type: hard
    reason: Health scorecard provides the metrics that the feedback agent monitors
  - source: 'phase-104'
    target: 'phase-158'
    type: soft
    reason: Governance reporting provides the reporting infrastructure that feedback agent extends to action
  technical_notes: "The research describes the Feedback Agent as the component that \"compares runtime performance against the objective criteria defined in the specification and generates the input for the next cycle's Planning phase.\" This is fundamentally different from alerting (phase 106) which notifies humans, or governance reporting (phase 104) which aggregates data for stakeholders. The Feedback Agent autonomously GENERATES new work items based on metric deviations, closing the governance loop from monitoring to action. The deduplication and rate limiting are essential to prevent the system from flooding the issue tracker with requirements during sustained metric degradation."
  risks:
  - 'Auto-generated requirements could create a feedback loop of infinite work -- rate limiting and manual review gate are essential'
  - 'Metric deviations may have external causes (infrastructure, third-party) that filing a requirement cannot fix -- add root cause classification'
