  - name: Cron mutex tests
    description: 'Test mutex acquisition, stale detection, and orchestrator integration'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover mutex lifecycle, stale cleanup, and concurrent access'
      validation: 'python3 -m pytest test_cron_mutex.py -v'
      met: false
    tasks:
