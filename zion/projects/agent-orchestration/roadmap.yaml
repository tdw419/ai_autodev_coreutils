- id: 'phase-15'
  title: Safety Policies and Approval Gates
  status: complete
  goal: Add configurable safety policies modeled on Symphony's approval_policy to control when human approval is required before agent actions proceed
  description: |
    Symphony supports three approval modes: untrusted (every action requires approval), on-failure (only failed actions require approval), and never (fully autonomous). The current Hermes orchestrator runs in "never" mode exclusively -- no human checkpoints exist. This is fine for trusted pipelines but risky for production repos, sensitive changes, or new team members. This phase adds configurable approval gates at the pipeline level, node level, and orchestrator level, enabling a spectrum from fully autonomous to fully supervised operation. This is the "Outer Harness" safety layer from Harness Engineering applied to the Hermes orchestrator.
  deliverables:
  - name: Approval policy engine
    description: Configurable approval modes that gate pipeline execution at defined checkpoints
    status: done
    acceptance_criteria:
    - description: 'Support for untrusted, on-failure, and never approval modes'
      validation: 'configure each mode, verify behavior'
      met: true
    tasks:
    - id: p15.d1.t1
      title: Create approval.py module
      status: done
      description: 'Python module implementing approval policies: (1) ApprovalMode enum (untrusted, on-failure, never), (2) check_approval() function that takes mode, node result, and policy config, returns
        (approved: bool, reason: str), (3) untrusted mode: every AI node requires approval before proceeding, (4) on-failure mode: only failed bash/test nodes require approval before retry, (5) never mode:
        no approval needed (current behavior). Include approval_context that captures what needs approval (diff, test output, prompt).'
      files:
      - '~/zion/projects/agent-orchestration/approval.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/approval.py'
  - name: APPROVAL node type for DAG
    description: Add an APPROVAL node type that pauses pipeline execution until human approval
    status: done
    acceptance_criteria:
    - description: Pipeline YAML can include approval nodes that block until approved
      validation: 'create pipeline with approval node, execute it'
      met: true
    tasks:
    - id: p15.d2.t1
      title: Add APPROVAL node type to DAG executor
      status: done
      description: 'Add NodeType.APPROVAL to dag.py. The approval node takes: prompt (what the human is approving), timeout (how long to wait before failing), and on_timeout (fail or skip). In executor.py:
        when an approval node is reached, write a pending approval file to the workspace, post a GitHub comment requesting approval, and poll for an approval file or comment. If approval is granted, continue.
        If timeout, apply on_timeout behavior. Support --auto-approve flag to bypass for CI.'
      dependencies:
      - p15.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/dag.py'
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/dag.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: 'Approval-safe pipeline template'
    description: Pipeline YAML that includes approval gates at critical checkpoints
    status: done
    acceptance_criteria:
    - description: Pipeline template has approval nodes before commit and PR creation
      validation: read pipeline YAML
      met: true
    tasks:
    - id: p15.d3.t1
      title: 'Create safe-pipeline.yaml with approval gates'
      status: done
      description: 'Create pipelines/safe-pipeline.yaml based on standard-pipeline.yaml but with APPROVAL nodes inserted: (1) after implement (approve code changes before testing), (2) after review (approve
        before commit). The approval nodes include context about what changed (file list, diff summary) so the approver can make an informed decision. Include a --mode flag that switches between untrusted
        and on-failure by changing which approval nodes are active.'
      dependencies:
      - p15.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/pipelines/safe-pipeline.yaml'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/pipelines/safe-pipeline.yaml'
  - name: Approval audit trail
    description: 'Log all approval decisions with who approved, when, and why'
    status: done
    acceptance_criteria:
    - description: 'Approval events are logged with timestamp, approver, decision, and context'
      validation: check log files after approval
      met: true
    tasks:
    - id: p15.d4.t1
      title: Add approval logging to approval.py
      status: done
      description: 'Append approval events to ~/.orchestrator/logs/approvals.jsonl. Each entry: timestamp, pipeline, node_id, issue_number, decision (approved/rejected/timeout), approver (auto or github_username),
        reason, context_snapshot (files changed, test results). Add a CLI subcommand to approval.py: audit (show recent approvals), stats (approval rate, average wait time).'
      dependencies:
      - p15.d1.t1
      - p8.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/approval.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/approval.py'
  dependencies:
  - source: 'phase-7'
    target: 'phase-15'
    type: soft
    reason: Approval logic should be tested before deployment
  - source: 'phase-8'
    target: 'phase-15'
    type: soft
    reason: Approval events should be logged to the execution history from phase 8
  technical_notes: 'Approval is filesystem-based for simplicity: pending approvals are JSON files in the workspace. For GitHub integration, approvals can be triggered by comments with "/approve" or "/reject"
    on the issue. The APPROVAL node type is the key innovation -- it makes safety a first-class concept in the DAG, not an external wrapper.'
  risks:
  - 'Approval nodes can stall pipelines indefinitely if no one approves -- need timeout and escalation'
  - Different approval modes for different repos/tasks adds configuration complexity
  - 'Human approval defeats the purpose of autonomous orchestration -- needs to be optional and off by default'
