      title: Create outcome evaluator module
      status: planned
      description: 'Create evaluator.py module: (1) read execution logs from all speculative runs for an issue, (2) compute quality score per run based on: test pass rate, lint violations, code coverage
        delta, execution time, pipeline completion (did all nodes succeed), (3) weight factors configurable in strategies.yaml, (4) output ranked list of runs with scores, (5) select winner and mark its
        workspace as the primary result, (6) archive non-winning workspaces. Add --compare flag to compare two specific runs.'
