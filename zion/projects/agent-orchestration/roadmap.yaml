    current task. Simple keyword matching is a good starting point; future work could use embeddings for semantic similarity. The knowledge base is stored as flat JSONL files for simplicity -- no database
    needed for the expected scale (hundreds to low thousands of patterns). Patterns from failed runs are NOT stored (only successful runs contribute to knowledge), which keeps quality high by default.'
