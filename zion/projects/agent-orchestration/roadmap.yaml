      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
  - name: ROI report generator
    description: Generate weekly/monthly reports summarizing orchestrator business impact
    status: planned
    acceptance_criteria:
    - description: Can generate a structured report with key metrics and trends
      validation: 'python3 velocity_metrics.py report --period weekly'
      met: false
    tasks:
