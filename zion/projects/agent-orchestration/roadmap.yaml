        broken code block, (3) test auto-fix: inject mismatch, run fix, verify docstring matches signature after fix, (4) test stub generation for undocumented function, (5) test coverage computation with
        mock project (some documented, some not), (6) test trend tracking with injected history, (7) test edge cases: no docstrings at all, all perfect, binary files, mixed languages.'
