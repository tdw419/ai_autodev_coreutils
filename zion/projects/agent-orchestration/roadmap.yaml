  - source: 'phase-41'
    target: 'phase-54'
    type: soft
    reason: Priority queuing from phase 41 can prioritize within the set of ready graph items
  technical_notes: 'The work graph is deliberately file-based (YAML), not database-backed. This makes it version-controllable alongside the codebase -- a key insight from Beads/Dolt. The pull model is simpler
    than push: agents don''t need to register for notifications, they just ask "what''s ready?" The graph handles dependency resolution, blocking, and critical path calculation. For multi-instance coordination
    (phase 51), the pull model with file locking is naturally compatible with the federation approach.'
  risks:
  - 'Circular dependencies could deadlock the graph -- cycle detection is critical'
  - 'File-based locking may not work well across NFS/S3 -- document limitations'
  - 'Graph sync with GitHub could be slow for repos with many issues -- batch and cache'
