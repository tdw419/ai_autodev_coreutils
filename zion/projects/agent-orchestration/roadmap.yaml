- id: phase-46
  title: Golden Principles Registry and Evolution
  status: planned
  goal: Create a formal, evolving registry of "golden principles" and "taste invariants" that GC
    loops and agents measure against
  description: 'The research describes "Garbage Collection Loops" scanning for deviations from "golden
    principles" and the human role as defining "taste invariants" (security, performance, user experience).
    Phase 10 implements convention scanning against AI_GUIDE.md rules, but there is no formal concept
    of golden principles as a separate, evolving entity. Golden principles are higher-level than code
    conventions -- they represent architectural and qualitative goals that persist across refactors
    and evolve over time. This phase creates a principles.yaml registry where Jericho (or an LLM)
    defines these principles, the GC scanner measures codebases against them, and the self-improvement
    loop tracks principle compliance over time. This is the bridge between "human defines taste" and
    "agents implement taste" from the research.'
  deliverables:
  - name: Principles registry schema and storage
    description: YAML schema for defining golden principles with categories, severity, and evolution
      metadata
    status: planned
    acceptance_criteria:
    - description: principles.yaml schema supports categories (security, performance, readability,
        architecture), severity levels, and deprecation metadata
      validation: read schema, verify structure
      met: false
    tasks:
    - id: p46.d1.t1
      title: Create principles.yaml schema and default registry
      status: planned
      description: 'Define principles.yaml schema with: (1) principles list, each with: id, name,
        category (security/performance/readability/architecture/testability), description, severity
        (critical/high/medium/low), check_type (structural/convention/semantic), created_at,
        created_by (human/agent), status (active/deprecated/superseded), superseded_by (if replaced),
        (2) global settings: scan_frequency, evolution_mode (manual/auto-suggest), compliance_threshold.
        Create a default principles.yaml with 10-15 common principles: "no circular dependencies",
        "all public APIs have type annotations", "test coverage above 80%", "no secrets in code",
        "functions under 50 lines", "no god classes", "error handling at boundaries", etc.'
      files:
      - ~/zion/projects/agent-orchestration/principles.yaml
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/principles.yaml
  - name: Principles compliance checker
    description: Module that measures a codebase against the principles registry and produces a compliance
      score
    status: planned
    acceptance_criteria:
    - description: Can scan a codebase and produce per-principle compliance scores and an overall
        score
      validation: python3 principles_checker.py --scan . --principles principles.yaml
      met: false
    - description: Supports both structural checks (AST-based) and semantic checks (LLM-based)
      validation: run with mixed check types
      met: false
    tasks:
    - id: p46.d2.t1
      title: Create principles_checker.py module
      status: planned
      description: 'Python module that: (1) loads principles.yaml, (2) for each active principle,
        runs the appropriate check: structural (AST analysis, import graph, line counting) or
        semantic (LLM assessment via delegate_task for qualitative principles like "good error
        messages"), (3) outputs a compliance report with per-principle score (0-100), overall
        score (weighted average), and violations list, (4) supports --format json|markdown|terminal,
        (5) supports --baseline to store current scores and --diff to compare against baseline.
        Structural checks use existing tools from invariant_checker.py and gc_scanner.py. Semantic
        checks use a focused LLM prompt per principle.'
      files:
      - ~/zion/projects/agent-orchestration/principles_checker.py
    dependencies:
      - p46.d1.t1
      - p17.d1.t1
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/principles_checker.py
  - name: Principles evolution workflow
    description: Enable principles to be added, deprecated, and evolved over time with full audit
      trail
    status: planned
    acceptance_criteria:
    - description: Can add a new principle, deprecate an old one, and track the evolution history
      validation: python3 principles_checker.py --add-principle --evolve
      met: false
    tasks:
    - id: p46.d3.t1
      title: Add principle lifecycle management to principles_checker.py
      status: planned
      description: 'Add to principles_checker.py: (1) --add-principle mode: interactive prompt
        to define a new principle (name, category, description, check_type), append to principles.yaml,
        (2) --deprecate mode: mark a principle as deprecated with reason and replacement, (3)
        --evolve mode: LLM analyzes compliance history and suggests new principles based on
        recurring violations that are not covered by existing principles, (4) --history mode:
        show evolution timeline of all principle changes, (5) store evolution history in
        ~/.orchestrator/principles/history.jsonl. The evolution mode is the key innovation --
        the system learns what principles it needs based on what it keeps finding wrong.'
      files:
      - ~/zion/projects/agent-orchestration/principles_checker.py
    dependencies:
      - p46.d2.t1
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/principles_checker.py
  - name: Principles integration with GC and self-improvement
    description: Wire principles compliance into the garbage collection loop and self-improvement
      analysis
    status: planned
    acceptance_criteria:
    - description: GC loop includes principles compliance in its scan output
      validation: run GC scan, check output includes principles scores
      met: false
    - description: Self-improvement analyzer tracks principle compliance trends over time
      validation: run self-improve analysis, check for principles section
      met: false
    tasks:
    - id: p46.d4.t1
      title: Integrate principles into GC and self-improvement
      status: planned
      description: 'Modify garbage_collector.py to include principles_checker as a scan step
        (after convention scanning), reporting principle violations alongside convention violations.
        Modify self_improve.py (phase 19) to track principle compliance scores over time and include
        them in the improvement report. Add a principles compliance section to the health scorecard
        (phase 44). This creates a closed loop: principles define quality -> GC measures compliance
        -> self-improvement tracks trends -> evolution suggests new principles.'
      files:
      - ~/zion/projects/agent-orchestration/garbage_collector.py
    dependencies:
      - p46.d2.t1
      - p10.d1.t1
    scope_lines: 60
    scope_files:
    - ~/zion/projects/agent-orchestration/garbage_collector.py
  dependencies:
  - source: phase-10
    target: phase-46
    type: soft
    reason: GC scanning from phase 10 is extended to include principles compliance checks
  - source: phase-17
    target: phase-46
    type: soft
    reason: Structural invariants from phase 17 provide the AST analysis that structural principle
      checks build on
  - source: phase-19
    target: phase-46
    type: soft
    reason: Self-improvement from phase 19 tracks principle compliance trends
  - source: phase-44
    target: phase-46
    type: soft
    reason: Health scorecard from phase 44 includes principles compliance as a quality signal
  technical_notes: 'The key distinction from existing phases: conventions (phase 10) are style rules
    (naming, imports), invariants (phase 17) are architectural rules (layering, dependencies), and
    principles (this phase) are qualitative goals (readability, testability, security posture). Principles
    are the "taste invariants" from the research -- they require human judgment to define but can be
    mechanically measured once defined. The evolution workflow is what makes this phase unique: the
    system suggests new principles based on what it observes.'
  risks:
  - Semantic checks (LLM-based) are expensive and inconsistent -- use sparingly, only for high-value
      principles
  - Too many principles creates noise -- start with 10-15 and grow slowly
  - Principle evolution could drift from original intent -- human review required for all new principles
  scope_lines_total: 410
  test_target: 10
- id: phase-47
  title: Cattle vs Pets Worker Model (Session Identity and Disposability)
  status: planned
  goal: Implement the Symphony/Gas Town pattern of treating agent sessions as disposable "cattle"
    while maintaining persistent identity and project knowledge as "pets"
  description: 'The research describes the orchestrator treating "individual agent sessions as ephemeral
    cattle, while treating the agent''s identity and the project''s state as persistent pets." This
    architectural pattern is fundamental to the Dark Factory model: workers are thrown away after
    each task, but knowledge accumulates. Currently, the Hermes orchestrator creates workspaces but
    has no concept of worker identity (each worker is anonymous), no knowledge persistence between
    sessions (each pipeline run starts fresh), and no explicit disposability model (workspaces persist
    indefinitely). This phase adds: (1) worker identity cards that track what each worker "learned"
    during its session, (2) a knowledge carry-forward system that injects relevant past-learnings
    into new worker sessions, (3) explicit session lifecycle (spawn -> work -> harvest -> dispose)
    with knowledge extraction at harvest time, (4) a "pet" store for persistent project-level knowledge
    that survives across all worker sessions.'
  deliverables:
  - name: Worker identity and session tracking
    description: Assign unique identities to worker sessions and track what each worker learns
    status: planned
    acceptance_criteria:
    - description: Each worker session has a unique ID, role, and learns log
      validation: spawn a worker, check session metadata
      met: false
    tasks:
    - id: p47.d1.t1
      title: Add worker identity system to spawner.py
      status: planned
      description: 'Modify spawner.py to: (1) generate a unique worker_id (UUID) for each session,
        (2) create a session card at workspace/.orchestrator/session.json with: worker_id, role,
        spawned_at, issue_number, pipeline, status, (3) during pipeline execution, append "learnings"
        to the session card: files_created, files_modified, errors_encountered, solutions_applied,
        (4) on completion, write a session_summary with: total duration, nodes executed, files
        changed, success/failure, key_insights (extracted from AI node outputs). This makes each
        worker traceable and its session inspectable after disposal.'
      files:
      - ~/zion/projects/agent-orchestration/spawner.py
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/spawner.py
  - name: Knowledge carry-forward system
    description: Extract and persist learnings from completed sessions for injection into future sessions
    status: planned
    acceptance_criteria:
    - description: Learnings from past sessions are available for injection into new worker prompts
      validation: complete a session, start a new one on similar task, check prompt includes past
        learnings
      met: false
    tasks:
    - id: p47.d2.t1
      title: Create knowledge_store.py module
      status: planned
      description: 'Python module that: (1) on session completion (harvest), extracts key learnings
        from session.json: what worked, what failed, what files were involved, (2) stores learnings
        in a per-repo knowledge base at ~/.orchestrator/knowledge/{repo}/ as JSONL files indexed
        by topic (file paths, error types, task types), (3) on new session spawn, queries the
        knowledge base for relevant past learnings based on: files involved in the current issue,
        labels, similar issue titles, (4) formats relevant learnings as a compact context block
        (<500 tokens) for injection into the AI node prompt, (5) supports --query to manually
        search the knowledge base and --prune to remove stale entries. The carry-forward is
        the "pet" -- knowledge persists even though the "cattle" (worker) is disposed.'
      files:
      - ~/zion/projects/agent-orchestration/knowledge_store.py
    dependencies:
      - p47.d1.t1
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/knowledge_store.py
  - name: Session harvest and disposal pipeline
    description: Formalize the worker lifecycle with knowledge extraction at harvest time
    status: planned
    acceptance_criteria:
    - description: Completed sessions are harvested (learnings extracted) before disposal (workspace
        archived)
      validation: complete a pipeline, verify harvest step runs before archival
      met: false
    tasks:
    - id: p47.d3.t1
      title: Add harvest step to orchestrator session lifecycle
      status: planned
      description: 'Modify orchestrator.py and workspace_manager.py to: (1) after pipeline
        completion (success or failure), run a "harvest" step that calls knowledge_store.py
        extract(), (2) harvest extracts: files changed (from git diff), errors encountered
        (from execution log), solutions that worked (from AI node outputs), (3) write harvested
        knowledge to the knowledge base, (4) then proceed to workspace archival (existing
        cleanup from phase 11), (5) add a HARVEST node type to dag.py that can be included
        in pipelines to trigger mid-session knowledge extraction (useful for long-running
        pipelines). The harvest step is what transforms disposable sessions into persistent
        organizational knowledge.'
      files:
      - ~/zion/projects/agent-orchestration/orchestrator.py
      - ~/zion/projects/agent-orchestration/workspace_manager.py
      - ~/zion/projects/agent-orchestration/dag.py
    dependencies:
      - p47.d2.t1
      - p11.d1.t1
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/orchestrator.py
    - ~/zion/projects/agent-orchestration/workspace_manager.py
    - ~/zion/projects/agent-orchestration/dag.py
  - name: Persistent project knowledge ("pets")
    description: Maintain a project-level knowledge store that accumulates across all worker sessions
    status: planned
    acceptance_criteria:
    - description: Project knowledge grows over time as more sessions complete
      validation: run 3 sessions, check knowledge base has entries from all 3
      met: false
    - description: Knowledge can be queried to understand what the system has learned about a project
      validation: python3 knowledge_store.py --project-summary --repo owner/repo
      met: false
    tasks:
    - id: p47.d4.t1
      title: Add project knowledge summary and analytics to knowledge_store.py
      status: planned
      description: 'Add to knowledge_store.py: (1) --project-summary mode that outputs: total
        sessions, total learnings, most-modified files, common error patterns, successful
        solution patterns, knowledge coverage (which files/areas have accumulated the most
        knowledge), (2) --knowledge-graph mode that shows relationships between learnings
        (file A and file B are often modified together, error X is usually caused by pattern Y),
        (3) integrate with the executor prompt builder so project knowledge is automatically
        injected into AI node prompts when available, (4) add a knowledge retention policy:
        learnings older than N days with no re-use are pruned, keeping the knowledge base
        fresh and relevant. The project knowledge is the ultimate "pet" -- it outlives every
        individual worker session.'
      files:
      - ~/zion/projects/agent-orchestration/knowledge_store.py
    dependencies:
      - p47.d2.t1
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/knowledge_store.py
  dependencies:
  - source: phase-4
    target: phase-47
    type: soft
    reason: Worker identity modifies the spawner from phase 4
  - source: phase-8
    target: phase-47
    type: soft
    reason: Knowledge extraction reads from execution logs created by phase 8
  - source: phase-11
    target: phase-47
    type: soft
    reason: Session disposal integrates with workspace lifecycle from phase 11
  - source: phase-20
    target: phase-47
    type: soft
    reason: Knowledge injection must respect context budget limits from phase 20
  - source: phase-38
    target: phase-47
    type: soft
    reason: Cross-project knowledge transfer from phase 38 benefits from the knowledge store
  technical_notes: 'The "cattle vs pets" metaphor is the core architectural insight. Workers (cattle)
    are created, do work, and are destroyed. Knowledge (pets) persists and grows. The knowledge store
    is the "organizational memory" of the orchestrator. Keep learnings compact -- store patterns,
    not raw outputs. The harvest step is critical: it is the moment where disposable session state
    becomes persistent organizational knowledge. Without harvest, every session starts from zero.'
  risks:
  - Knowledge extraction quality depends on the session summary -- poorly summarized sessions add
      noise
  - Knowledge base could grow large -- need retention policies and pruning
  - Injecting past knowledge into prompts adds context tokens -- must respect budget limits
  - Knowledge relevance scoring may be inaccurate for novel tasks -- don't let stale knowledge mislead
  scope_lines_total: 430
  test_target: 10
global_risks:
- Symphony/Gas Town/Archon are all rapidly evolving -- this roadmap may need updates as those projects change
- delegate_task sessions are synchronous and bounded by parent turn -- long-running orchestrator tasks need careful design (background terminals or chained cron)
- GitHub Issues as control plane requires a public or accessible repo -- private repo token management adds complexity
- Token costs for autonomous loops can escalate quickly (Symphony team uses 1B tokens/day) -- need cost awareness in the orchestrator
- Speculative execution (phase 28) can multiply costs if not carefully budgeted
- Inter-agent coordination (phase 30) adds complexity that may not be needed at low concurrency levels
- Dark factory mode (phase 35) should only be enabled for well-tested projects with comprehensive safety gates
- Token budget enforcement (phase 32) relies on estimates -- actual costs may differ significantly
- Webhook server (phase 37) requires network exposure -- needs security review for production use
- Cross-project knowledge (phase 38) could leak proprietary patterns between repos -- need per-repo knowledge isolation controls
- Browser automation (phase 39) requires Chrome/Chromium -- adds a heavy runtime dependency and may not work in all CI environments
- Multi-model routing (phase 40) could route complex tasks to underpowered models if scoring is wrong -- need conservative defaults
- Priority scheduling (phase 41) could starve complex tasks if urgency weights favor simple fast completions -- need starvation prevention
- External observability (phase 42) could expose sensitive data from logs -- need PII/secrets filtering before injecting into agent context
- Automated refactoring (phase 43) could make incorrect fixes that pass tests but change semantics -- always require human review for refactoring PRs
- Health scorecard (phase 44) KPIs may not capture what matters initially -- need iteration based on real usage patterns
- WORKFLOW.md format (phase 45) may evolve as Symphony matures -- parser needs version tolerance
- Per-project WORKFLOW.md files (phase 45) could conflict with orchestrator.yaml global settings -- need clear precedence rules
- Symphony-to-Hermes translation (phase 45) may lose information for Symphony features with no Hermes equivalent
- Semantic principle checks (phase 46) are expensive and inconsistent -- use sparingly, only for high-value principles
- Too many principles (phase 46) creates noise -- start with 10-15 and grow slowly
- Principle evolution (phase 46) could drift from original intent -- human review required for all new principles
- Knowledge extraction quality (phase 47) depends on session summary -- poorly summarized sessions add noise
- Knowledge base (phase 47) could grow large -- need retention policies and pruning
- Injecting past knowledge (phase 47) into prompts adds context tokens -- must respect budget limits
- Knowledge relevance scoring (phase 47) may be inaccurate for novel tasks -- don't let stale knowledge mislead
- Aggressive cost optimization (phase 48) could reduce quality -- always measure success rate impact
- Model tier recommendations (phase 48) require sufficient historical data (50+ runs per task type)
- Parameter tuning (phase 48) could make some edge cases worse while improving the average case
- Feedback categorization (phase 49) may be inaccurate -- need human validation of categories
- Auto-generated suggestions (phase 49) could conflict with existing rules -- need deduplication
- Reviewer comments may be subjective or wrong -- the system should not blindly follow all feedback
- Fault injection (phase 50) could leak into production if safe-mode is disabled -- always use test workspaces
- Resilience scoring (phase 50) may not capture all failure modes -- supplement with manual testing
- Chaos tests (phase 50) may be flaky if they depend on timing -- use deterministic fault injection where possible
- Distributed locking (phase 51) adds latency to every issue assignment
- Stale locks (phase 51) could prevent work from being picked up -- TTL expiry handles this but adds delay
- Federation status (phase 51) could become a bottleneck if too many instances publish frequently
- Work stealing (phase 51) could cause thrashing if instances constantly redistribute work
- No consensus protocol (phase 51) -- federation is eventually consistent, not strongly consistent
conventions:
- Python scripts use python3 (no bare python command on this system)
- GitHub API via gh CLI, not raw curl
- All new code goes to ~/zion/projects/agent-orchestration/
- Skills go to ~/.hermes/skills/ following existing category structure
- Wiki pages follow SCHEMA.md conventions (frontmatter, wikilinks, tag taxonomy)
- id: phase-48
  title: Cost Optimization and Intelligent Model Routing
  status: planned
  goal: Analyze token spending patterns and automatically suggest or apply cost optimizations across
    the orchestrator
  description: 'Phase 32 tracks costs but does not optimize them. The research describes the
    OpenAI team spending $2-3K/day with 1B+ output tokens, treating code as disposable. At
    this scale, cost optimization becomes a first-class concern. This phase goes beyond tracking
    to actively identifying wasteful patterns: retries that consume more tokens than the original
    attempt, AI nodes using expensive models for trivial tasks, loop nodes hitting max iterations
    on unsolvable problems, and context budgets that are too large for simple issues. The optimizer
    suggests cheaper model alternatives, flags wasteful pipelines, and can auto-apply cost-saving
    parameter changes. This is the "attention is scarce" principle from Harness Engineering
    applied to token economics.'
  deliverables:
  - name: Cost pattern analyzer
    description: Module that identifies wasteful token spending patterns from execution history
    status: planned
    acceptance_criteria:
    - description: Can identify top 5 most expensive pipeline patterns (by average token cost
        per run)
      validation: python3 cost_optimizer.py --analyze --last 50
      met: false
    - description: 'Detects specific waste patterns: excessive retries, oversized context, wrong
        model tier'
