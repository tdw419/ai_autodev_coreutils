- id: 'phase-22'
  title: 'Config Hot-Reload and Live Tuning'
  status: complete
  goal: 'Enable the orchestrator to pick up config changes without restart, supporting live parameter tuning'
  description: 'Symphony''s Elixir implementation features hot code reloading, allowing system updates without interrupting active agent sessions. The Hermes orchestrator reads its config (orchestrator.yaml,
    role profiles, pipeline YAMLs) once at startup. If you change max_concurrent or swap a pipeline template, you must restart the cron job. This phase adds file-watching that detects config changes and
    reloads them on the fly. Combined with the self-improvement loop (phase 19) and context budgeting (phase 20), this enables the orchestrator to be tuned in real-time -- adjust parameters, swap pipelines,
    modify role prompts -- all without interrupting running workers. This is a small but critical operational improvement that makes the orchestrator production-ready for continuous operation.'
