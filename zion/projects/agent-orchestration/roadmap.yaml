        (union of all gates), (4) outputs a composite role YAML compatible with roles.py from phase 6, (5) handles variable conflicts (prompt variables with same name must have compatible types), (6) supports
        skill layers (base skill + overrides). Example: "full-stack" = python-skill + testing-skill + review-skill. This enables building complex roles from simple, reusable components.'
