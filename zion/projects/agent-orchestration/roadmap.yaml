  test_target: 10
- id: 'phase-77'
  title: Pipeline Template Library and Marketplace
  status: planned
  goal: 'Create a library of reusable pipeline templates for common software engineering tasks, enabling rapid orchestration setup for new projects and consistent workflow patterns across repos'
  description: 'The Symphony research describes WORKFLOW.md as a shareable policy file that defines how agents should approach tasks. Phase 45 implements a WORKFLOW.md engine and phase 5 implements the
    DAG executor, but no phase provides a library of ready-to-use pipeline templates. Currently, every new project must define its pipelines from scratch. The Harness Engineering research notes that "the
    team focused on building the harness" -- reusable pipeline templates are the harness building blocks. This phase creates: (1) a template library with 8-10 common pipeline patterns (bug fix, feature
    implementation, refactoring, test writing, documentation, dependency update, security audit, performance optimization), (2) each template as a versioned YAML file with configurable parameters, (3) a
    template CLI for listing, instantiating, and customizing templates, (4) template validation that ensures templates follow DAG best practices (phase 5), (5) integration with project onboarding (phase
    24) to auto-select appropriate templates, and (6) a simple "marketplace" format where templates can be shared between projects via git repos or directories.'
  deliverables:
  - name: Pipeline template library
    description: Create reusable pipeline YAML templates for common software engineering tasks
    status: planned
    acceptance_criteria:
    - description: At least 8 templates cover common task types
      validation: python3 template_lib.py list
      met: false
    - description: Each template is a valid pipeline YAML that the executor can run
      validation: 'instantiate template, run through executor'
      met: false
    tasks:
    - id: p77.d1.t1
      title: Create template_lib.py and template library
      status: planned
      description: 'Create templates/ directory with pipeline YAML templates. Create template_lib.py: (1) Template dataclass: name, description, version, tags, parameters (with defaults and descriptions),
        pipeline_yaml (with {{parameter}} placeholders), (2) list_templates() -> available templates with metadata, (3) instantiate(template_name, params) -> rendered pipeline YAML with parameters filled
        in, (4) validate(template_name) -> check template follows DAG schema (phase 5) and best practices (no AI-only pipelines, at least one test step), (5) templates: a) bug-fix: analyze(bash: git log)
        -> plan(AI) -> implement(AI) -> test(bash) -> review(AI) -> PR(bash), b) feature: plan(AI) -> implement(AI) -> test(bash) -> lint(bash) -> review(AI) -> PR(bash), c) refactor: analyze(AI) -> plan(AI)
        -> implement(AI) -> test(bash) -> invariant-check(bash) -> review(AI) -> PR(bash), d) test-writing: analyze(AI: find untested code) -> generate-tests(AI) -> run-tests(bash) -> fix(bash: loop until
        green) -> commit(bash), e) docs: analyze(AI) -> generate(AI) -> validate-links(bash) -> commit(bash), f) dep-update: update(bash: dependabot/pip) -> test(bash) -> fix(bash: loop) -> PR(bash), g)
        security-audit: scan(bash: bandit/safety) -> analyze(AI) -> fix(AI) -> test(bash) -> PR(bash), h) perf-optimize: profile(bash) -> analyze(AI) -> implement(AI) -> benchmark(bash) -> PR(bash). Each
        template has configurable parameters (e.g., test_command, lint_command, max_loop_iterations).'
