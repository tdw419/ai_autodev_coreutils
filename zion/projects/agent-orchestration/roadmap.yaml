    learn taste." Key design decisions: (1) only capture feedback on agent-generated PRs to
    avoid noise, (2) categorize feedback using simple keyword matching first, upgrade to LLM
    classification if needed, (3) never auto-apply suggestions without human review -- the
    system suggests, the human decides. The improvement cycle: human rejects PR -> system captures
    feedback -> pattern identified -> rule suggested -> human approves rule -> agent behavior
    improves -> fewer rejections.'
