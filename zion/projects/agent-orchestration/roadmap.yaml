    reason: 'Cost tracking from phase 32 provides token cost data for cost-per-PR computation'
  - source: 'phase-44'
    target: 'phase-59'
    type: soft
    reason: Health scorecard from phase 44 provides system metrics that complement business metrics
  - source: 'phase-9'
    target: 'phase-59'
    type: soft
    reason: Review sensor scores from phase 9 provide quality signals for trend analysis
  technical_notes: 'This is the "prove the ROI" phase. The research claims 500% PR increase -- this phase builds the infrastructure to measure that claim for Hermes. The key design decision: metrics are
    collected passively (no extra agent calls), only from gh CLI and existing execution logs. The report format should be shareable -- this is what gets shown to stakeholders to justify the orchestrator.
    Cost-per-PR is the single most important metric: it directly answers "is this worth it?"'
