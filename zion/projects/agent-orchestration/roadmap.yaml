- id: 'phase-60'
  title: 'Human-Agent Workflow Optimization'
  status: planned
  goal: 'Build tooling that optimizes the human side of the orchestrator workflow -- streamlined ticket filing, PR review queues, triage automation, and the human''s "command center" experience'
  description: 'The research describes a fundamental role transformation: "engineers shift their role from supervising execution to filing speculative tickets and reviewing completed work at the end of
    the pipeline." Phase 49 captures human feedback, but no phase builds the tooling to make this new workflow efficient. The human''s experience is the bottleneck the research identifies: "the human-as-a-bottleneck
    problem, where a developer could only effectively manage a limited number of concurrent AI interactions." This phase builds: (1) smart ticket templates that auto-populate from codebase context (the
    "speculative ticket" pattern), (2) a PR review queue that prioritizes and summarizes agent-created PRs for efficient human review, (3) triage automation that classifies incoming issues and suggests
    agent-readiness, (4) a lightweight "command center" CLI that gives humans a single interface for all orchestrator interactions (file tickets, review PRs, check status, adjust config). This is the "from
    coder to architect" transformation made practical.'
  deliverables:
  - name: Smart ticket filing with codebase context
    description: 'Auto-populate ticket templates with relevant codebase context for efficient issue creation'
    status: planned
    acceptance_criteria:
    - description: 'Can create a ticket with auto-detected codebase context'
      validation: 'python3 human_workflow.py ticket --title "Add logging" --repo OWNER/REPO'
      met: false
    tasks:
    - id: p60.d1.t1
      title: Create human_workflow.py with smart ticket filing
      status: planned
      description: 'Create human_workflow.py: (1) ticket command that creates GitHub Issues via gh CLI, (2) auto-detect relevant files from issue title using grep/search, (3) auto-detect affected tests
        from file paths, (4) suggest appropriate labels based on issue content (bug, feature, refactor, agent-ready), (5) suggest appropriate agent role based on issue type, (6) include a "complexity estimate"
        based on affected files and test coverage, (7) output the issue body in markdown for review before creation, (8) support --dry-run to preview without creating. The goal: a human should be able to
        file a well-structured, agent-ready ticket in under 60 seconds.'
      files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
      scope_lines: 140
      scope_files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
  - name: PR review queue and summarizer
    description: 'Prioritized queue of agent-created PRs with AI-generated summaries for efficient human review'
    status: planned
    acceptance_criteria:
    - description: 'Can list pending agent-created PRs sorted by priority'
      validation: 'python3 human_workflow.py review-queue --repo OWNER/REPO'
      met: false
    tasks:
    - id: p60.d2.t1
      title: Add PR review queue to human_workflow.py
      status: planned
      description: 'Add review-queue command: (1) fetch open PRs via gh CLI, (2) filter to agent-created PRs (by author or label), (3) generate a one-line summary of each PR (title + files changed + test
        status), (4) sort by priority: blocking PRs first (other PRs depend on them), then by age (oldest first), then by review_score (lowest score = needs most attention), (5) show review sensor scores
        from phase 9, (6) batch mode: show 5 PRs at a time for review marathon sessions, (7) approve/merge shortcuts via gh CLI, (8) track human review time to feed back into velocity metrics (phase 59).'
      files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
      dependencies:
      - p60.d1.t1
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
  - name: Issue triage automation
    description: 'Classify incoming issues and suggest agent-readiness with confidence scores'
    status: planned
    acceptance_criteria:
    - description: 'Can classify issues and suggest agent-readiness'
      validation: 'python3 human_workflow.py triage --repo OWNER/REPO'
      met: false
    tasks:
    - id: p60.d3.t1
      title: Add issue triage to human_workflow.py
      status: planned
      description: 'Add triage command: (1) fetch open untriaged issues via gh CLI, (2) classify each issue: bug/feature/refactor/docs/test, using keyword heuristics from title and body, (3) estimate complexity:
        small (1-2 files), medium (3-5 files, existing tests), large (6+ files or new modules), (4) assess agent-readiness: ready (clear requirements, existing tests), needs-refinement (ambiguous scope),
        not-suitable (requires human judgment, security implications), (5) auto-label issues: agent-ready, needs-human, blocked, (6) estimate effort in agent turns based on complexity, (7) output as a triage
        table with recommendations. This automates the "filing speculative tickets" workflow from the research.'
      files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
      dependencies:
      - p60.d1.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
  - name: Command center CLI
    description: 'Single unified CLI for all human-orchestrator interactions'
    status: planned
    acceptance_criteria:
    - description: Can perform all common human workflows from a single CLI
      validation: 'python3 human_workflow.py status && python3 human_workflow.py ticket --help && python3 human_workflow.py review-queue --help'
      met: false
    tasks:
