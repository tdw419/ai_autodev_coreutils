    description: Add an APPROVAL node type that pauses pipeline execution until human approval
    status: planned
    acceptance_criteria:
    - description: Pipeline YAML can include approval nodes that block until approved
      validation: create pipeline with approval node, execute it
      met: false
    tasks:
    - id: p15.d2.t1
      title: Add APPROVAL node type to DAG executor
      status: planned
      description: 'Add NodeType.APPROVAL to dag.py. The approval node takes: prompt (what the human
        is approving), timeout (how long to wait before failing), and on_timeout (fail or skip).
        In executor.py: when an approval node is reached, write a pending approval file to the workspace,
        post a GitHub comment requesting approval, and poll for an approval file or comment. If approval
        is granted, continue. If timeout, apply on_timeout behavior. Support --auto-approve flag to
        bypass for CI.'
      dependencies:
      - p15.d1.t1
