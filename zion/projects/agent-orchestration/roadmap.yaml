      title: Add scaling history to autoscaler
      status: planned
      description: 'Append scaling events to ~/.orchestrator/logs/scaling.jsonl (timestamp, action, old_workers, new_workers, queue_depth, reason, resource_snapshot). Add history subcommand that shows:
        scaling events timeline, avg/max/min workforce size over a period, queue depth vs workforce correlation, resource utilization during peak. Feed this data into the health scorecard (phase 44) for
        the "resource efficiency" signal.'
      files:
      - '~/zion/projects/agent-orchestration/autoscaler.py'
      dependencies:
      - p53.d2.t1
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/autoscaler.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-53'
    type: soft
    reason: Autoscaling modifies the orchestrator loop from phase 4
  - source: 'phase-14'
    target: 'phase-53'
    type: soft
    reason: Health monitoring from phase 14 provides resource metrics that autoscaling uses
  - source: 'phase-32'
    target: 'phase-53'
    type: soft
    reason: Token budget tracking from phase 32 provides cost constraint for scaling decisions
  - source: 'phase-41'
    target: 'phase-53'
    type: soft
    reason: Priority queuing from phase 41 determines which work is queued (input to scaling decisions)
  - source: 'phase-44'
    target: 'phase-53'
    type: soft
    reason: Health scorecard from phase 44 includes resource efficiency metrics from autoscaling
  technical_notes: 'Autoscaling should be conservative by default -- scale up slowly, scale down faster (to save resources). Cooldown periods prevent thrashing. The resource checks are optional guards;
    the primary signal is queue depth. The scaling formula is deliberately simple: no ML-based prediction, just reactive scaling based on current state. This is the "cattle" pattern applied to worker count.'
  risks:
  - 'Aggressive autoscaling could overwhelm the system -- default to conservative settings'
  - 'Scaling down too fast could kill workers mid-task -- only scale down by not replacing finished workers'
  - 'Token budget estimation is imprecise -- use conservative estimates and hard floor'
  - 'Autoscaling adds complexity to the orchestrator loop -- must be easily disableable'
