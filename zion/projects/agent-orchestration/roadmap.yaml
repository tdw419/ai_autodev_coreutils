- id: 'phase-70'
  title: Backpressure and Rate Limit Management
  status: planned
  goal: 'Protect the orchestrator and external APIs from overload by implementing backpressure mechanisms, rate limit tracking, and graceful degradation when limits are approached'
  description: 'The research describes Gas Town managing "20 to 30 Claude Code instances working concurrently on the same codebase" and the Symphony reference implementation''s max_concurrent parameter.
    However, none of the existing phases address what happens when the orchestrator approaches external API rate limits (GitHub API, model provider APIs), when system resources are constrained, or when
    downstream dependencies become slow. Without backpressure, the orchestrator can overwhelm APIs (causing rate-limit bans), exhaust system resources (causing OOM kills), or cascade failures across workers.
    This phase implements: (1) a rate limit tracker that monitors API usage and predicts when limits will be hit, (2) backpressure signals that throttle worker spawning when limits approach, (3) graceful
    degradation strategies (queue work instead of failing, reduce parallelism instead of stopping), (4) circuit breakers that temporarily stop calling flaky APIs, and (5) a rate limit budget allocator that
    distributes API capacity across workers fairly. This is the "traffic cop" pattern that prevents the orchestrator from being its own worst enemy at scale.'
  deliverables:
  - name: Rate limit tracker module
    description: 'Python module that tracks API usage rates, predicts limit exhaustion, and provides usage budgets'
    status: planned
    acceptance_criteria:
    - description: 'Tracks GitHub API rate limit (requests remaining, reset time) via gh CLI headers'
      validation: 'python3 rate_limiter.py status --api github'
      met: false
    - description: Predicts time until rate limit exhaustion based on current usage rate
      validation: 'set high usage rate, verify prediction matches actual limit hit'
      met: false
    tasks:
    - id: p70.d1.t1
      title: Create rate_limiter.py module
      status: planned
      description: 'Create rate_limiter.py: (1) RateLimitTracker class that monitors API usage: GitHub (5000 req/hour for auth, 60/hour for search), model API (tokens per minute, requests per minute), (2)
        track usage by recording each API call timestamp in a sliding window, (3) predict exhaustion: remaining_limit / usage_rate = time_until_exhaustion, (4) allocate budget: given N workers, distribute
        available capacity evenly or by priority, (5) CLI: status --api github|model, predict --workers N --duration M, budget --workers N. Store rate limit state in ~/.orchestrator/rate_limits/. Use gh
        api rate_limit for GitHub limits.'
      files:
      - '~/zion/projects/agent-orchestration/rate_limiter.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/rate_limiter.py'
  - name: Backpressure controller
    description: Throttle orchestrator behavior when rate limits or resource constraints are approached
    status: planned
    acceptance_criteria:
    - description: Orchestrator reduces worker spawning when rate limit is near exhaustion
      validation: 'simulate near-limit, verify throttling'
      met: false
    - description: Backpressure is gradual (not binary) — scales down smoothly
      validation: check spawn rate decreases proportionally as limit approaches
      met: false
    tasks:
    - id: p70.d2.t1
      title: Create backpressure.py module
      status: planned
      description: 'Create backpressure.py: (1) BackpressureController class with signal levels: GREEN (full speed), YELLOW (reduce by 50%), RED (stop spawning, queue only), (2) inputs: rate limit tracker
        (p70.d1.t1), system metrics (CPU, memory, disk from health_monitor.py), active worker count, (3) throttling strategies: reduce_max_concurrent (lower the cap), delay_spawn (add wait time between
        spawns), queue_only (accept work but don''t start workers), (4) configurable thresholds: yellow_at (default 70% of limit), red_at (default 90% of limit), recovery_cooldown (default 60s), (5) each
        signal change is logged with reason, (6) CLI: python3 backpressure.py status, --simulate --api github --workers 10'
      files:
      - '~/zion/projects/agent-orchestration/backpressure.py'
      dependencies:
      - p70.d1.t1
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/backpressure.py'
  - name: Circuit breaker for flaky APIs
    description: 'Temporarily stop calling APIs that are failing repeatedly, with automatic recovery'
    status: planned
    acceptance_criteria:
    - description: API that fails 5 consecutive times triggers circuit breaker (stop calling for cooldown period)
      validation: 'simulate failures, verify circuit opens'
      met: false
    - description: 'Circuit breaker auto-recovers after cooldown and tests with a single request'
      validation: 'wait for cooldown, verify half-open state and recovery'
      met: false
    tasks:
    - id: p70.d3.t1
      title: Add circuit breaker to backpressure.py
      status: planned
      description: 'Add CircuitBreaker class to backpressure.py: (1) states: CLOSED (normal), OPEN (rejecting calls), HALF_OPEN (testing recovery), (2) config: failure_threshold (default 5), recovery_timeout
        (default 60s), half_open_max_calls (default 1), (3) on each call: if CLOSED, track success/failure; if failure_count >= threshold, transition to OPEN; if OPEN and timeout elapsed, transition to
        HALF_OPEN; if HALF_OPEN and test call succeeds, transition to CLOSED, (4) per-API circuit breakers (GitHub, model API), (5) CLI: python3 backpressure.py circuits --show, --reset API. This prevents
        cascading failures when an API is down — instead of N workers all hitting a broken API and getting rate-limited or timed out, the circuit breaker stops all calls immediately.'
      files:
      - '~/zion/projects/agent-orchestration/backpressure.py'
      dependencies:
      - p70.d2.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/backpressure.py'
  - name: Backpressure integration with orchestrator
    description: Hook backpressure controller into the orchestrator main loop
    status: planned
    acceptance_criteria:
    - description: Orchestrator checks backpressure before each spawn decision
      validation: 'run orchestrator with backpressure enabled, verify throttling on rate limit approach'
      met: false
    - description: Backpressure status visible in status.sh
      validation: check status.sh output for backpressure signal
      met: false
    tasks:
    - id: p70.d4.t1
      title: Integrate backpressure into orchestrator.py
      status: planned
      description: 'Modify orchestrator.py run_loop(): (1) add backpressure section to orchestrator.yaml: enabled (bool), yellow_threshold, red_threshold, circuit_breaker_enabled, (2) at the start of each
        loop iteration, check backpressure controller signal, (3) if YELLOW: reduce max_concurrent by 50% for this iteration, log warning, (4) if RED: skip spawning entirely, just poll and queue, log critical,
        (5) after each API call (poll, PR creation, label update), feed result to circuit breaker, (6) add backpressure section to status.sh showing: signal level, active circuit breakers, rate limit budgets,
        suggested actions. Backpressure is disabled by default (backward compatible).'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/orchestrator.yaml'
      - '~/zion/projects/agent-orchestration/status.sh'
      dependencies:
      - p70.d2.t1
      - p70.d3.t1
      - p4.d3.t1
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/orchestrator.yaml'
    - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-4'
    target: 'phase-70'
    type: soft
    reason: Backpressure modifies the orchestrator loop from phase 4
  - source: 'phase-14'
    target: 'phase-70'
    type: soft
    reason: Health monitoring from phase 14 provides system resource metrics that backpressure uses
  - source: 'phase-32'
    target: 'phase-70'
    type: soft
    reason: Cost tracker from phase 32 provides token usage data for model API rate limiting
  - source: 'phase-53'
    target: 'phase-70'
    type: soft
    reason: Autoscaler from phase 53 should respect backpressure signals when scaling decisions
  technical_notes: 'Backpressure is the missing piece for production orchestrator operation. The research describes 20-30 concurrent agents but doesn''t address the operational reality: GitHub has hard
    rate limits (5000/hour), model APIs have TPM/RPM limits, and system resources are finite. Without backpressure, the orchestrator will hit these limits and either fail loudly or get temporarily banned.
    The circuit breaker pattern (from Netflix Hystrix) is well-established for this use case. The key insight: it''s better to slow down than to fail. Queue work, reduce parallelism, wait for limits to
    reset.'
  risks:
  - Rate limit tracking adds overhead to every API call
  - Circuit breaker recovery timeout may be too short or too long — needs tuning per API
  - Backpressure could cause work to pile up if limits are sustained — need queue depth monitoring
  - GitHub rate limit headers may not be available via gh CLI in all configurations
  - Model API rate limits vary by provider and plan — need configurable limits per provider
  scope_lines_total: 450
  test_target: 12
- id: 'phase-71'
  title: Orchestrator Configuration Validation and Drift Detection
  status: planned
  goal: 'Validate orchestrator configuration files for correctness, detect configuration drift across instances, and alert on misconfigurations before they cause production issues'
  description: 'The Harness Engineering research emphasizes that "the team focused on building the harness" as their competitive advantage — the quality of the harness directly determines agent output quality.
    Phase 17 validates structural invariants in application code, and Phase 22 covers config hot-reload, but neither validates the orchestrator''s own configuration. As the orchestrator grows more complex
    (69+ phases, multi-repo, federation, backpressure, safety policies), misconfiguration becomes a significant risk: a typo in orchestrator.yaml could disable safety gates, a stale role profile could route
    critical work to the wrong agent, or a federation config mismatch could cause duplicate work. This phase creates: (1) a config schema validator that checks all orchestrator YAML files against known
    schemas, (2) cross-config consistency checks (role referenced in pipeline exists, pipeline referenced in orchestrator config exists, approval policy matches safety gates), (3) drift detection that compares
    configs across instances (federation) or against a git-tracked baseline, (4) a config linting CLI that runs as part of CI and before orchestrator startup, and (5) automatic config migration when schema
    versions change. This is the "meta-harness": using the same validation rigor on the orchestrator itself that the orchestrator applies to agent code.'
  deliverables:
  - name: Config schema validator
    description: Validate all orchestrator YAML configs against defined schemas
    status: planned
    acceptance_criteria:
    - description: 'Validates orchestrator.yaml, role YAMLs, pipeline YAMLs, and invariants.yaml'
      validation: 'python3 config_validator.py validate --all'
      met: false
    - description: Reports specific errors with line numbers and fix suggestions
      validation: 'introduce a deliberate config error, verify error message is actionable'
      met: false
    tasks:
    - id: p71.d1.t1
      title: Create config_validator.py module
      status: planned
      description: 'Create config_validator.py: (1) define JSON schemas for: orchestrator.yaml (repo, labels, max_concurrent, polling, safety, backpressure, federation, autoscaling sections), role YAMLs
        (name, description, system_prompt, tools, quality_gates), pipeline YAMLs (nodes, edges, node types), invariants.yaml (rules, severity, patterns), (2) validate() function: load YAML, check against
        schema, report errors, (3) cross-reference checks: role files referenced in orchestrator.yaml exist, pipeline files referenced in config exist, labels referenced in poller are valid GitHub label
        format, approval policy values match safety.py supported policies, (4) CLI: validate --all, validate --file orchestrator.yaml, validate --schema orchestrator|role|pipeline|invariant, (5) exit code
        0 on success, 1 on validation error (CI-friendly), (6) support --fix for auto-fixable issues (missing default values, deprecated field names).'
      files:
      - '~/zion/projects/agent-orchestration/config_validator.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/config_validator.py'
  - name: Configuration drift detection
    description: Detect and report configuration drift between instances or against a git baseline
    status: planned
    acceptance_criteria:
    - description: 'Can compare running config against git-tracked baseline and report differences'
      validation: 'modify running config, run drift check, verify diff reported'
      met: false
    - description: Can compare configs across federation instances
      validation: 'simulate two instances with different configs, verify drift reported'
      met: false
    tasks:
    - id: p71.d2.t1
      title: Add drift detection to config_validator.py
      status: planned
      description: 'Add drift detection: (1) baseline mode: compare current config files against git HEAD (or a specified commit), report any uncommitted changes, (2) instance mode: compare config files
        between federation instances (via federation_status.py from phase 51 or direct file comparison), (3) drift types: added_keys (new config not in baseline), removed_keys (baseline config missing in
        current), changed_values (same key, different value), type_changes (value type changed, e.g. int to string), (4) severity: critical (safety gates disabled, approval policy changed), warning (max_concurrent
        changed, polling interval changed), info (cosmetic changes), (5) CLI: drift --baseline HEAD, drift --instance other-instance, (6) support --ignore for known acceptable drifts (stored in .driftignore).
        Drift detection is critical for federation (phase 51) where config consistency across instances prevents duplicate work.'
      files:
      - '~/zion/projects/agent-orchestration/config_validator.py'
      dependencies:
      - p71.d1.t1
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/config_validator.py'
  - name: Config migration framework
    description: Automatically migrate config files when schema versions change
    status: planned
    acceptance_criteria:
    - description: Can migrate old config format to new format without data loss
      validation: 'provide v1 config, run migrate, verify v2 config is valid'
      met: false
    tasks:
    - id: p71.d3.t1
      title: Add config migration to config_validator.py
      status: planned
      description: 'Add migration framework: (1) each config type has a version field (default v1), (2) migration registry: map (config_type, from_version, to_version) -> migration_function, (3) migration_function:
        transforms old format to new format, preserving all data, adding new defaults for new fields, (4) migrate command: detect current version, apply all migrations up to latest, validate result, (5)
        --dry-run to preview changes without modifying files, (6) auto-backup: save pre-migration config as .bak before modifying, (7) CLI: migrate --all, migrate --config orchestrator.yaml, migrate --dry-run.
        Example migration: when approval_policy changes from boolean to enum (true -> "on-failure", false -> "never").'
      files:
      - '~/zion/projects/agent-orchestration/config_validator.py'
      dependencies:
      - p71.d1.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/config_validator.py'
  - name: 'Pre-flight config check in orchestrator startup'
    description: 'Run config validation before orchestrator starts, preventing misconfigurations from reaching production'
    status: planned
    acceptance_criteria:
    - description: Orchestrator refuses to start if config validation fails
      validation: 'introduce config error, start orchestrator, verify startup fails with clear message'
      met: false
    tasks:
    - id: p71.d4.t1
      title: Integrate config validation into orchestrator startup
      status: planned
      description: 'Modify orchestrator.py: (1) on startup, run config_validator.py validate --all before entering main loop, (2) if validation fails, print errors and exit with code 1 (don''t start with
        bad config), (3) add --skip-validation flag for emergency bypass (logs a warning), (4) if drift detected against git baseline, print warning but continue (drift is not a blocking error), (5) add
        preflight section to status.sh showing last validation result and any drift, (6) add validation to the DAG executor startup (phase 5) to validate pipeline YAMLs before execution. This ensures the
        orchestrator never runs with a configuration that would violate safety gates or produce incorrect behavior.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/executor.py'
      dependencies:
      - p71.d1.t1
      - p4.d3.t1
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-71'
    type: soft
    reason: Config validation protects the orchestrator from phase 4
  - source: 'phase-5'
    target: 'phase-71'
    type: soft
    reason: Pipeline YAMLs from phase 5 need schema validation
  - source: 'phase-6'
    target: 'phase-71'
    type: soft
    reason: Role profiles from phase 6 need schema validation
  - source: 'phase-17'
    target: 'phase-71'
    type: soft
    reason: Invariants from phase 17 are a form of config that needs validation
  - source: 'phase-22'
    target: 'phase-71'
    type: soft
    reason: 'Config hot-reload from phase 22 should validate before applying new config'
  - source: 'phase-51'
    target: 'phase-71'
    type: soft
    reason: Federation from phase 51 needs config consistency across instances
  technical_notes: 'Config validation is the "structural invariants for the orchestrator itself." The same rigor applied to application code in phase 17 should apply to orchestrator configuration. As the
    system grows, config files become the most common source of bugs: a misplaced YAML indent, a renamed field, a changed enum value. The migration framework ensures config evolution doesn''t break existing
    deployments. Drift detection is especially important for federation (phase 51) where two instances with different max_concurrent settings could race for the same issues.'
  risks:
  - Schema definitions may lag behind new features — need discipline to update schemas with every config change
  - Migration could corrupt configs if migration functions have bugs — always backup before migrating
  - 'Drift detection may produce false positives for intentionally different per-instance configs'
  - 'Validation on every startup adds latency — should be fast (<1 second for typical configs)'
  - 'Overly strict validation could prevent legitimate config experiments — support --skip-validation'
  scope_lines_total: 460
  test_target: 12
- id: 'phase-72'
  title: Structured Metrics and External Telemetry Pipeline
  status: planned
  goal: 'Expose orchestrator metrics in standard formats (Prometheus, StatsD, JSON) for integration with external monitoring systems, completing the research''''s "Status Surface" component'
  description: 'The research describes Symphony''s "Status Surface" as a component that "provides real-time visibility into agent turns and workspace state" using a Phoenix-based live dashboard. Phase 8
    covers execution history logging, Phase 14 covers health monitoring, and Phase 27 covers a live terminal dashboard, but none of these produce structured metrics in standard formats that external monitoring
    systems (Prometheus, Grafana, Datadog, CloudWatch) can consume. Without structured metrics, the orchestrator is a black box to existing DevOps infrastructure. This phase creates: (1) a metrics collector
    that tracks orchestrator KPIs (queue depth, active workers, success rate, latency, token usage) as time-series data, (2) exporters for standard formats (Prometheus /metrics endpoint, StatsD, JSON),
    (3) a lightweight HTTP metrics server that serves the /metrics endpoint, (4) metric definitions aligned with the health scorecard (phase 44) for consistency, and (5) pre-built Grafana dashboard templates
    for common orchestrator views. This completes the observability stack: logs (phase 8), health checks (phase 14), dashboard (phase 27), and now structured metrics for external systems.'
  deliverables:
  - name: Metrics collector module
    description: 'Track orchestrator KPIs as time-series metrics with labels'
    status: planned
    acceptance_criteria:
    - description: Tracks at least 15 metrics across orchestrator operations
      validation: python3 metrics.py list
      met: false
    - description: 'Metrics support labels for dimensional analysis (per-repo, per-role, per-pipeline)'
      validation: query metrics with label filters
      met: false
    tasks:
    - id: p72.d1.t1
      title: Create metrics.py module
      status: planned
      description: 'Create metrics.py with: (1) Counter metric type: monotonic increasing (total_issues_processed, total_prs_created, total_tokens_used, total_errors), (2) Gauge metric type: current value
        (active_workers, queue_depth, pending_prs, health_score, backpressure_signal), (3) Histogram metric type: distribution (issue_latency_seconds, pipeline_duration_seconds, tokens_per_issue), (4) all
        metrics support labels: repo, role, pipeline, status (success/failure), (5) metrics are stored in memory with configurable retention (default 1 hour of high-res, 7 days of aggregated), (6) thread-safe
        (atomic increments), (7) CLI: list, snapshot, query --metric active_workers --label repo=owner/repo. Metric definitions: orch_queue_depth{repo}, orch_active_workers{repo}, orch_issues_total{repo,status},
        orch_prs_total{repo,status}, orch_pipeline_duration_seconds{repo,pipeline}, orch_tokens_total{repo,role}, orch_errors_total{repo,type}, orch_health_score{repo}, orch_backpressure_signal{repo}, orch_worker_spawn_latency_seconds{repo}.'
      files:
      - '~/zion/projects/agent-orchestration/metrics.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/metrics.py'
