      title: Add checkpoint management and cleanup
      status: planned
      description: 'Extend checkpoint.py: (1) inspect(workspace, step_id) -> show detailed checkpoint metadata: files changed, disk usage, agent context at checkpoint time, (2) diff(workspace, step_id_1,
        step_id_2) -> show what changed between two checkpoints, (3) cleanup cron: weekly job that prunes checkpoints older than 7 days, keeps last 3 per workspace, removes orphaned checkpoints (workspace
        deleted but checkpoints remain), (4) disk usage report: total checkpoint storage, per-workspace breakdown, (5) add checkpoint management section to status.sh. Create a cron job (or add to phase
        66 maintenance automation) that runs checkpoint cleanup weekly.'
      files:
