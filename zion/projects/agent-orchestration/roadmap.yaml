- id: 'phase-39'
  title: 'Browser-Based UI Verification (Chrome DevTools Protocol)'
  status: planned
  goal: 'Enable agents to drive a headless browser to visually verify UI changes, reproduce bugs, and validate end-to-end user flows before submitting PRs'
  description: 'The Harness Engineering research explicitly calls out "Direct UI Manipulation: Wiring tools like Chrome DevTools Protocol into the agent''s runtime, allowing it to reproduce bugs and verify
    UI fixes autonomously." Phase 31 (Self-Verifying Agent Toolkit) covers assertion-based verification but not browser/visual verification. This phase adds a headless browser integration layer that agents
    can call from pipeline nodes to: (1) navigate to pages and check rendering, (2) fill forms and validate submissions, (3) take screenshots for visual regression, (4) reproduce reported bugs by following
    reproduction steps. This closes the Application Legibility gap for UI-focused projects.'
