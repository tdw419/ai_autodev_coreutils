      status: planned
      description: 'Add registry operations: (1) list [--installed|--available|--tag TAG] -- show skills in registry, (2) install SKILL [--global|--project] -- copy skill to local registry, (3) uninstall
        SKILL -- remove from local registry, (4) search QUERY -- search by name/description/tags, (5) info SKILL -- show detailed skill metadata, (6) update SKILL -- pull latest version from source. Registry
        locations: global: ~/.orchestrator/skills/, project: ./skills/. Project-local skills override global ones (same pattern as .gitignore vs global gitignore).'
      files:
      - '~/zion/projects/agent-orchestration/skill_registry.py'
      dependencies:
