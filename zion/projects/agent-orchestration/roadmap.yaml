- id: 'phase-143'
  title: Recursive Self-Aggregation and Multi-Candidate Solution Consensus
  status: planned
  goal: 'Implement a system that maintains multiple candidate solutions, iteratively aggregates the best parts of each, and produces a consensus solution higher quality than any individual candidate'
  description: |
    The "Recursive LLM Planning for Agents" research (248 lines, 51 citations) describes Recursive
    Self-Aggregation (RSA) where N candidate solutions are maintained and iteratively refined over T
    steps. The key insight is "aggregation-aware" processing: a reasoning trace with an incorrect final
    answer may still contain correct intermediate steps that can be "rescued" and combined with other
    correct fragments. Phase 28 (Speculative Execution) runs parallel explorations but each is
    independent -- there is no aggregation step. Phase 94 (Ensemble Review) has multiple reviewers
    but for review, not solution generation. RSA is fundamentally different: it bootstraps from
    partially correct solutions to produce a better consensus.
  deliverables:
  - name: Multi-candidate solution manager
    description: 'Maintain a population of N candidate solutions with metadata tracking'
    status: planned
    acceptance_criteria:
    - description: 'Supports configurable population size (default N=3)'
      validation: check config
    - description: 'Tracks quality score and provenance for each candidate'
      validation: check metadata schema
    tasks:
    - id: p143.d1.t1
      title: Create candidate solution manager
      status: planned
      description: 'Create solution_pool.py with: (1) CandidateSolution dataclass (id, content, quality_score, generation_step, parent_ids), (2) SolutionPool class managing population of N candidates, (3) add_candidate() with quality scoring, (4) select_for_aggregation(K) that picks K diverse high-quality candidates, (5) get_best() returning the highest-scoring solution.'
      files:
      - '~/zion/projects/agent-orchestration/solution_pool.py'
    scope_lines: 90
    scope_files:
    - '~/zion/projects/agent-orchestration/solution_pool.py'
  - name: Aggregation engine
    description: 'Aggregate multiple candidate solutions into an improved consensus'
    status: planned
    acceptance_criteria:
    - description: 'Combines correct parts from multiple candidates'
      validation: test with mock solutions
    - description: 'Produces single output superior to any individual input'
      validation: quality comparison test
    tasks:
    - id: p143.d2.t1
      title: Create aggregation engine
      status: planned
      description: 'Create aggregator.py with: (1) aggregate(candidates, task_description) that sends K candidates to an LLM with instruction to extract correct intermediate steps and combine into an improved solution, (2) quality_score(solution, test_results) that scores output based on test pass rate and code quality metrics, (3) iterate(pool, task, T_steps) that runs T rounds of selection-aggregation-scoring.'
      dependencies:
