- id: 'phase-53'
  title: Dynamic Workforce Autoscaling
  status: planned
  goal: Automatically scale the worker pool up and down based on queue depth and system resources
  description: 'The research describes Symphony''s max_concurrent config and Gas Town managing 20-30 Claude Code instances. The current orchestrator has a static max_concurrent limit (phase 4) and priority
    queuing (phase 41), but the pool size never changes based on demand. This is analogous to running Kubernetes with a fixed replica count. This phase adds autoscaling: monitor queue depth and system resources
    (CPU, memory, token budget), dynamically adjust max_concurrent up/down within configured bounds, and implement cooldown periods to prevent thrashing. The scaling decisions are logged for analysis and
    feed into the cost optimization (phase 48) and health monitoring (phase 14) systems. This enables the "elastic workforce" pattern where the orchestrator naturally handles burst workloads (many issues
    filed at once) without manual config changes, and conserves resources during quiet periods.'
  deliverables:
  - name: Workforce autoscaler module
    description: 'Python module that monitors queue depth and resources, adjusts max_concurrent accordingly'
    status: planned
    acceptance_criteria:
    - description: Autoscaler increases workers when queue depth exceeds threshold
      validation: 'simulate queue backlog, verify worker count increases'
      met: false
    - description: Autoscaler decreases workers when queue is empty and resources are idle
      validation: 'simulate empty queue, verify worker count decreases'
      met: false
    - description: Scaling respects configured min/max bounds
      validation: 'set min=1 max=5, verify autoscaler stays within bounds'
      met: false
    tasks:
    - id: p53.d1.t1
      title: Create autoscaler.py module
      status: planned
      description: 'Create autoscaler.py that: (1) takes current queue depth (from poller), active worker count, and system metrics (CPU%, memory%, token budget remaining from phase 32), (2) applies scaling
        rules: scale_up when queue_depth > (active_workers * scale_up_threshold) and resources available, scale_down when queue_depth == 0 and idle_time > cooldown_period, (3) respects bounds: min_workers
        (default 1), max_workers (default 10), scale_step (default 1), cooldown_seconds (default 300), (4) returns new_target_workers count, (5) logs every scaling decision with reason, (6) supports --dry-run
        mode for simulation. Scaling formula: target = min(max(queue_depth * aggressiveness, min_workers), max_workers) where aggressiveness is configurable (default 0.5 = conservative).'
      files:
      - '~/zion/projects/agent-orchestration/autoscaler.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/autoscaler.py'
  - name: Autoscaler integration with orchestrator
    description: Hook autoscaler into the orchestrator main loop
    status: planned
    acceptance_criteria:
    - description: Orchestrator calls autoscaler each loop iteration and adjusts spawn behavior
      validation: 'run orchestrator with autoscaling enabled, check logs for scaling events'
      met: false
    tasks:
    - id: p53.d2.t1
      title: Integrate autoscaler into orchestrator.py
      status: planned
      description: 'Modify orchestrator.py run_loop(): (1) add autoscaling section to orchestrator.yaml: enabled (bool), min_workers, max_workers, scale_up_threshold, scale_down_cooldown, aggressiveness,
        resource_checks (cpu, memory, token_budget), (2) at the start of each loop iteration, call autoscaler.calculate_target(queue_depth, active_workers, system_metrics), (3) use the returned target as
        the effective max_concurrent for this iteration (instead of the static config value), (4) log scaling events, (5) add --no-autoscale flag to disable (default: use static max_concurrent as before).'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/orchestrator.yaml'
      dependencies:
      - p53.d1.t1
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/orchestrator.yaml'
  - name: 'Resource-aware scaling policies'
    description: 'Use system resources (CPU, memory, token budget) as additional scaling signals'
    status: planned
    acceptance_criteria:
    - description: Scaling is blocked or reversed when system resources are constrained
      validation: 'simulate high CPU, verify no scale-up'
      met: false
    - description: Token budget from phase 32 is used as a scaling constraint
      validation: 'set low token budget, verify scale-down'
      met: false
    tasks:
    - id: p53.d3.t1
      title: 'Add resource-aware policies to autoscaler'
      status: planned
      description: 'Extend autoscaler.py with resource checks: (1) CPU check: read /proc/loadavg or use psutil, don''t scale up if CPU > 80%, (2) Memory check: don''t scale up if available memory < 2GB,
        (3) Token budget check: integrate with cost_tracker.py (phase 32), don''t scale up if remaining budget < cost_per_worker_estimate * scale_duration, (4) Disk check: don''t scale up if disk < 1GB
        free (workspace isolation needs disk), (5) Each check is optional and configurable in orchestrator.yaml.'
      files:
      - '~/zion/projects/agent-orchestration/autoscaler.py'
      dependencies:
      - p53.d1.t1
      - p32.d1.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/autoscaler.py'
  - name: Scaling history and analytics
    description: Track scaling events and provide analytics on workforce utilization
    status: planned
