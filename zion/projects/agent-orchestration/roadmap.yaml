- id: phase-39
  title: Browser-Based UI Verification (Chrome DevTools Protocol)
  status: planned
  goal: Enable agents to drive a headless browser to visually verify UI changes, reproduce bugs,
    and validate end-to-end user flows before submitting PRs
  description: 'The Harness Engineering research explicitly calls out "Direct UI Manipulation:
    Wiring tools like Chrome DevTools Protocol into the agent''s runtime, allowing it to reproduce
    bugs and verify UI fixes autonomously." Phase 31 (Self-Verifying Agent Toolkit) covers
    assertion-based verification but not browser/visual verification. This phase adds a headless
    browser integration layer that agents can call from pipeline nodes to: (1) navigate to pages
    and check rendering, (2) fill forms and validate submissions, (3) take screenshots for visual
    regression, (4) reproduce reported bugs by following reproduction steps. This closes the
    Application Legibility gap for UI-focused projects.'
  deliverables:
  - name: Browser automation module
    description: Python module that wraps Chrome DevTools Protocol for agent-driven browser
      interactions
    status: planned
    acceptance_criteria:
    - description: Module can launch headless Chrome, navigate to a URL, and return page content
      validation: python3 browser_verify.py --navigate http://localhost:3000
      met: false
    - description: Supports form filling, click, scroll, and screenshot capture
      validation: run through a form submission test
      met: false
    tasks:
    - id: p39.d1.t1
      title: Create browser_verify.py module
      status: planned
      description: 'Python module using playwright or CDP directly: (1) launch_headless(url)
        -- start Chrome in headless mode, return a BrowserSession, (2) session.navigate(url),
        session.fill(selector, value), session.click(selector), session.screenshot(path),
        (3) session.get_page_text() -- extract visible text for assertion, (4) session.wait_for(selector,
        timeout) -- wait for element to appear, (5) session.close(). Use subprocess to manage
        Chrome process. Fall back gracefully if Chrome is not installed. Include --mode headed
        for debugging.'
      files:
      - ~/zion/projects/agent-orchestration/browser_verify.py
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/browser_verify.py
