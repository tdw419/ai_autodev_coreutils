  - name: Symphony compliance test suite
    description: Test suite verifying Hermes behaves according to Symphony spec requirements
    status: planned
    acceptance_criteria:
    - description: Test suite covers all Symphony spec requirements
      validation: 'python3 -m pytest test_symphony_compat.py -v'
      met: false
