    technical_notes: 'The research describes the "retraction phenomenon" where agents stream initial hypotheses that get replaced by better solutions as the agentic loop concludes. Progressive disclosure solves this by hiding thinking tokens behind a toggle, so users only see the final output and milestone updates. The proxy streaming pattern uses the agent-to-agent communication protocol to forward partial_result events, reducing the "sequential bottleneck" in multi-agent workflows where the main agent waits for all sub-agents to complete before reporting.'
