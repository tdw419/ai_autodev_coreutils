- id: 'phase-137'
  title: Agent-Driven TDD Pipeline Enforcement (Red-Green-Refactor)
  status: planned
  goal: 'Implement a DAG-level TDD enforcement pipeline where the orchestrator requires agents to write failing tests before implementation, then implement minimum code to pass, then audit and refactor'
  description: |
    The "AI Workflow Orchestration and Improvement" research (216 lines, 19 citations) describes
    an Agent-Driven TDD cycle as a concrete goalpost system for autonomous agents. The orchestrator
    enforces three phases: Red (generate and run failing test), Green (implement minimum code to pass),
    Refactor (audit and optimize). This is fundamentally different from phase 7 (testing individual
    modules) because it enforces test-first ORDERING in the agent pipeline itself, not just running
    tests after the fact. The research emphasizes that "the agent cannot diagnose failure based on a
    generic Test Failed message" -- the orchestrator must feed the ReflectorAgent the full stack trace,
    assertion failure, and relevant code context.
  deliverables:
  - name: TDD enforcement DAG template
    description: 'Create a red_green_refactor.yaml pipeline template that enforces test-first ordering'
    status: planned
    acceptance_criteria:
    - description: 'Template has three mandatory stages: test generation, implementation, refactoring'
      validation: read YAML template
    - description: 'Implementation stage receives test failure output as context'
      validation: check template variable passing
    tasks:
    - id: p137.d1.t1
      title: Create TDD pipeline template
      status: planned
      description: 'Create red_green_refactor.yaml with three sequential stages. Stage 1 (Red): AI node generates unit test from spec, Bash node runs test (expects failure). Stage 2 (Green): AI node receives test output + spec, generates minimal implementation. Stage 3 (Refactor): AI node reviews code for elegance, Bash node re-runs all tests.'
      files:
      - '~/zion/projects/agent-orchestration/pipelines/red_green_refactor.yaml'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/pipelines/red_green_refactor.yaml'
  - name: TDD context injection for test failures
    description: 'Ensure that when tests fail in the Green stage, the full stack trace and assertion output is injected into the implementation agent prompt'
    status: planned
    acceptance_criteria:
    - description: 'Test failure output is captured and passed to the next AI node'
      validation: check executor context passing
    - description: 'Includes assertion failure message, not just exit code'
      validation: inspect prompt template
    tasks:
    - id: p137.d2.t1
      title: Implement TDD context injection
      status: planned
      description: 'Modify the executor to capture structured test output (stdout, stderr, exit code, assertion messages) from Bash nodes and inject it into subsequent AI node prompts as structured context for the ReflectorAgent pattern.'
      dependencies:
      - p137.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: TDD pipeline integration tests
    description: 'Tests verifying the TDD pipeline enforces ordering correctly'
    status: planned
    acceptance_criteria:
    - description: 'Test verifies Red stage failure does not skip Green stage'
      validation: run tests
    - description: 'Test verifies Green stage success triggers Refactor stage'
      validation: run tests
    tasks:
    - id: p137.d3.t1
      title: Write TDD pipeline tests
      status: planned
      description: 'Write tests that validate: (1) Red stage runs first, (2) Green stage receives test output, (3) Refactor stage runs after Green succeeds, (4) full regression runs after Refactor.'
      dependencies:
      - p137.d1.t1
      - p137.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_tdd_pipeline.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_tdd_pipeline.py'
  - name: Pre-execution file backup and rollback
    description: 'Before any implementation stage modifies files, automatically snapshot target files for rollback on test failure'
    status: planned
    acceptance_criteria:
    - description: 'Files are backed up before modification'
      validation: check backup logic
    - description: 'Rollback restores files on test failure'
      validation: test rollback scenario
    tasks:
    - id: p137.d4.t1
      title: Implement file backup and rollback for TDD stages
      status: planned
      description: 'Add pre-execution backup to the executor: before AI nodes modify files in the Green stage, snapshot affected files. If the subsequent test run fails, restore from backup. Log failure details to episodic memory for the reflection prompt.'
      dependencies:
      - p137.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 70
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  dependencies:
