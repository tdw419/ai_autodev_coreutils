        or forbidden edges, (3) generated tests use AST parsing (ast module) for import analysis, (4) each test file has header comment "AUTO-GENERATED from invariants.yaml -- do not edit manually", (5)
        CLI: generate, regenerate (update existing), list (show what would be generated without writing), (6) template system: Jinja2-style templates for each invariant type in templates/ directory.'
