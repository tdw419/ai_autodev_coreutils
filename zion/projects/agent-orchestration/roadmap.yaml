  - name: Trust scoring tests
    description: 'Test trust computation, escalation logic, and orchestrator integration'
    status: planned
    acceptance_criteria:
    - description: Unit tests cover trust score computation with various execution histories
      validation: 'python3 -m pytest test_trust_score.py -v'
      met: false
    - description: Tests verify promotion and demotion thresholds work correctly
      validation: 'python3 -m pytest test_trust_score.py -v -k escalation'
      met: false
    tasks:
    - id: p74.d4.t1
      title: Create test_trust_score.py
      status: planned
      description: 'Create test_trust_score.py: (1) test compute with empty history (should return untrusted), (2) test compute with all successes (should return never at threshold), (3) test incremental
        update correctness, (4) test escalation promotion at exact threshold, (5) test demotion after consecutive failures, (6) test cooldown period prevents immediate re-promotion, (7) test manual override,
        (8) test per-task-type different thresholds, (9) test integration with safety.py (trust_level overrides static policy). Use tmp_path for trust score storage.'
      files:
      - '~/zion/projects/agent-orchestration/test_trust_score.py'
      dependencies:
      - p74.d3.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/test_trust_score.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-74'
    type: soft
    reason: Trust scores are computed from execution history logs created by phase 8
  - source: 'phase-15'
    target: 'phase-74'
    type: soft
    reason: 'Safety approval gates from phase 15 are enhanced with trust-level-based policies'
  - source: 'phase-9'
    target: 'phase-74'
    type: soft
    reason: Review sensor rejection rates from phase 9 feed into trust score computation
  - source: 'phase-17'
    target: 'phase-74'
    type: soft
    reason: Invariant violation rates from phase 17 feed into trust score computation
  - source: 'phase-35'
    target: 'phase-74'
    type: soft
    reason: Dark factory mode from phase 35 is the target state that trust escalation enables safely
  - source: 'phase-32'
    target: 'phase-74'
    type: soft
    reason: Cost efficiency data from phase 32 feeds into trust score computation
  technical_notes: 'Trust scoring is the bridge between phase 15 (static safety gates) and phase 35 (dark factory mode). Without trust scoring, dark factory mode is a binary switch -- either you trust the
    agent or you don''t. With trust scoring, it becomes a gradual, measurable progression. The key design decision: trust is per-(agent, role, task_type) tuple, not per-agent alone. An agent trusted for
    simple bug fixes should not automatically be trusted for database migrations. Trust scores should be recalculated after each pipeline run (incremental update, not batch recompute). Consider trust score
    decay: old successes should count less than recent ones (exponential decay on the rolling window).'
  risks:
  - 'Trust scoring could create unfair bias against agents that tackle harder tasks -- normalize by task difficulty'
  - 'Automatic promotion could grant too much autonomy too fast -- use conservative default thresholds'
  - Trust score gaming: 'agents could optimize for trust score rather than quality -- measure quality independently'
  - 'Cooldown period too short could cause thrashing between levels -- default to 24h minimum'
  - 'Manual override abuse could undermine trust system -- log all overrides with justification'
