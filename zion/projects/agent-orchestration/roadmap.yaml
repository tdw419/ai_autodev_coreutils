- id: phase-37
  title: Event-Driven Trigger Mode
  status: planned
  goal: Complement cron-based polling with webhook/event-driven triggers for faster issue response times
  description: 'Symphony''s polling daemon reads work every 30 seconds. Hermes uses cron-based scheduling
    (typically 5-15 minute intervals). For time-sensitive workflows, this polling delay is suboptimal. This
    phase adds an event-driven trigger mode: a lightweight HTTP server (using Python''s built-in http.server)
    that receives GitHub webhooks and immediately queues matching issues for processing. The event mode runs
    alongside the existing cron mode -- cron handles the steady-state polling while events handle immediate
    triggers. This is not about replacing cron (cron is proven and reliable) but about adding a fast-path
    for urgent work. The webhook server writes trigger events to a shared queue file that the next cron
    iteration picks up, or can be configured to spawn an immediate orchestrator run.'
  deliverables:
  - name: Webhook receiver server
    description: Lightweight HTTP server that receives GitHub webhooks and triggers orchestrator runs
    status: planned
    acceptance_criteria:
    - description: Server receives issue events via webhook and writes them to the trigger queue
      validation: send test webhook, verify trigger event created
      met: false
    tasks:
    - id: p37.d1.t1
      title: Create webhook_server.py
      status: planned
      description: 'Create webhook_server.py: (1) HTTP server on configurable port (default 8471) using
        Python''s http.server, (2) POST /webhook endpoint that validates GitHub webhook signature (X-Hub-Signature-256),
        (3) filter events: only process "issues" events with action "opened" or "labeled", (4) check if the
        issue has the agent-ready label, (5) write trigger event to ~/.orchestrator/triggers/pending.jsonl
        with: issue_number, repo, timestamp, webhook_id, (6) health endpoint GET /health returning server
        status, (7) graceful shutdown on SIGTERM. Use threading for concurrent request handling. Log all
        received webhooks for auditability.'
      files:
      - ~/zion/projects/agent-orchestration/webhook_server.py
    scope_lines: 150
    scope_files:
    - ~/zion/projects/agent-orchestration/webhook_server.py
  - name: Trigger queue consumer
    description: Module that reads pending trigger events and integrates with the orchestrator poller
    status: planned
    acceptance_criteria:
    - description: Orchestrator checks trigger queue before polling GitHub API
      validation: create trigger event, run orchestrator, verify it processes the triggered issue first
      met: false
    tasks:
    - id: p37.d2.t1
      title: Add trigger queue to orchestrator.py
      status: planned
      description: 'Modify orchestrator.py run_loop() to: (1) before calling the poller, check for pending
        trigger events in ~/.orchestrator/triggers/pending.jsonl, (2) if triggers exist, prioritize those
        issues (add them to the front of the work queue), (3) mark processed triggers as done by moving them
        to ~/.orchestrator/triggers/processed.jsonl, (4) deduplicate triggers (same issue triggered multiple
        times), (5) expire stale triggers (older than N minutes, since cron will pick them up anyway).
        This means webhook-triggered issues get processed immediately on the next cron cycle rather than
        waiting for the poller to discover them.'
      files:
      - ~/zion/projects/agent-orchestration/orchestrator.py
    dependencies:
