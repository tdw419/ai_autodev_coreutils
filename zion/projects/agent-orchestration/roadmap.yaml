  technical_notes: 'The research emphasizes "transactional execution" -- code generation and execution should be atomic, verifiable transactions. This aligns with the keep-or-revert pattern already in Hermes.'
  risks:
  - 'TDD enforcement may add latency for simple tasks -- make it a template option, not mandatory for all pipelines'
