- id: 'phase-46'
  title: Golden Principles Registry and Evolution
  status: planned
  goal: 'Create a formal, evolving registry of "golden principles" and "taste invariants" that GC loops and agents measure against'
  description: 'The research describes "Garbage Collection Loops" scanning for deviations from "golden principles" and the human role as defining "taste invariants" (security, performance, user experience).
    Phase 10 implements convention scanning against AI_GUIDE.md rules, but there is no formal concept of golden principles as a separate, evolving entity. Golden principles are higher-level than code conventions
    -- they represent architectural and qualitative goals that persist across refactors and evolve over time. This phase creates a principles.yaml registry where Jericho (or an LLM) defines these principles,
    the GC scanner measures codebases against them, and the self-improvement loop tracks principle compliance over time. This is the bridge between "human defines taste" and "agents implement taste" from
    the research.'
  deliverables:
  - name: Principles registry schema and storage
    description: 'YAML schema for defining golden principles with categories, severity, and evolution metadata'
    status: planned
    acceptance_criteria:
    - description: 'principles.yaml schema supports categories (security, performance, readability, architecture), severity levels, and deprecation metadata'
      validation: 'read schema, verify structure'
      met: false
    tasks:
    - id: p46.d1.t1
      title: Create principles.yaml schema and default registry
      status: planned
      description: 'Define principles.yaml schema with: (1) principles list, each with: id, name, category (security/performance/readability/architecture/testability), description, severity (critical/high/medium/low),
        check_type (structural/convention/semantic), created_at, created_by (human/agent), status (active/deprecated/superseded), superseded_by (if replaced), (2) global settings: scan_frequency, evolution_mode
        (manual/auto-suggest), compliance_threshold. Create a default principles.yaml with 10-15 common principles: "no circular dependencies", "all public APIs have type annotations", "test coverage above
        80%", "no secrets in code", "functions under 50 lines", "no god classes", "error handling at boundaries", etc.'
      files:
      - '~/zion/projects/agent-orchestration/principles.yaml'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/principles.yaml'
  - name: Principles compliance checker
    description: Module that measures a codebase against the principles registry and produces a compliance score
    status: planned
    acceptance_criteria:
    - description: 'Can scan a codebase and produce per-principle compliance scores and an overall score'
      validation: 'python3 principles_checker.py --scan . --principles principles.yaml'
      met: false
    - description: 'Supports both structural checks (AST-based) and semantic checks (LLM-based)'
      validation: run with mixed check types
      met: false
    tasks:
    - id: p46.d2.t1
      title: Create principles_checker.py module
      status: planned
      description: 'Python module that: (1) loads principles.yaml, (2) for each active principle, runs the appropriate check: structural (AST analysis, import graph, line counting) or semantic (LLM assessment
        via delegate_task for qualitative principles like "good error messages"), (3) outputs a compliance report with per-principle score (0-100), overall score (weighted average), and violations list,
        (4) supports --format json|markdown|terminal, (5) supports --baseline to store current scores and --diff to compare against baseline. Structural checks use existing tools from invariant_checker.py
        and gc_scanner.py. Semantic checks use a focused LLM prompt per principle.'
      files:
      - '~/zion/projects/agent-orchestration/principles_checker.py'
    dependencies:
    - p46.d1.t1
    - p17.d1.t1
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/principles_checker.py'
  - name: Principles evolution workflow
    description: 'Enable principles to be added, deprecated, and evolved over time with full audit trail'
    status: planned
    acceptance_criteria:
    - description: 'Can add a new principle, deprecate an old one, and track the evolution history'
      validation: 'python3 principles_checker.py --add-principle --evolve'
      met: false
    tasks:
    - id: p46.d3.t1
      title: Add principle lifecycle management to principles_checker.py
      status: planned
      description: 'Add to principles_checker.py: (1) --add-principle mode: interactive prompt to define a new principle (name, category, description, check_type), append to principles.yaml, (2) --deprecate
        mode: mark a principle as deprecated with reason and replacement, (3) --evolve mode: LLM analyzes compliance history and suggests new principles based on recurring violations that are not covered
        by existing principles, (4) --history mode: show evolution timeline of all principle changes, (5) store evolution history in ~/.orchestrator/principles/history.jsonl. The evolution mode is the key
        innovation -- the system learns what principles it needs based on what it keeps finding wrong.'
      files:
      - '~/zion/projects/agent-orchestration/principles_checker.py'
    dependencies:
    - p46.d2.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/principles_checker.py'
  - name: 'Principles integration with GC and self-improvement'
    description: 'Wire principles compliance into the garbage collection loop and self-improvement analysis'
    status: planned
    acceptance_criteria:
    - description: GC loop includes principles compliance in its scan output
      validation: 'run GC scan, check output includes principles scores'
      met: false
    - description: 'Self-improvement analyzer tracks principle compliance trends over time'
      validation: 'run self-improve analysis, check for principles section'
      met: false
    tasks:
