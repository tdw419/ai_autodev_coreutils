  technical_notes: 'Team policies are a layer on top of global config, not a replacement. The resolution order is: team override -> repo-specific config -> global default. Teams are identified by label on the issue (e.g., team:platform) or by repo mapping (all repos in org/platform use Team A policies). The default is a single "default" team that uses global config, so existing single-team setups require no changes.'
  risks:
  - 'Policy complexity grows with team count -- keep team config simple (YAML file per team)'
  - 'Budget enforcement could block urgent work -- allow emergency budget override with approval'
