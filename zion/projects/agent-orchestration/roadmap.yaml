- id: 'phase-176'
  title: 'Harness Gap Feedback Loop (Analyze Environment, Not Prompts)'
  status: planned
  goal: 'Systematically analyze agent failures to identify missing harness capabilities and feed improvements back into guides, invariants, and tooling'
  description: |
    The Harness Engineering research core insight: "When agents failed, the team analyzed the environment for missing
    capabilities rather than refining prompts." Phase 18 (Self-Improvement) focuses on prompt optimization and strategy
    adaptation. This phase is different: it treats agent failures as signals about harness gaps. When an agent repeatedly
    fails at a category of tasks, the system should identify that the failure is caused by a missing guide, an incomplete
    invariant, a missing tool, or insufficient context -- and automatically propose or create harness improvements. This
    closes the feedback loop from agent execution failures to harness evolution.
  deliverables:
  - name: Failure taxonomy and harness gap classifier
    description: 'Module that classifies agent failures by root cause category (missing guide, missing invariant, missing tool, insufficient context, bad prompt, external dependency)'
    status: planned
    acceptance_criteria:
    - description: 'Classifier categorizes failures into at least 6 root cause categories with evidence'
      validation: test with sample failure logs
    - description: 'Harness-gap failures (guide, invariant, tool, context) are distinguished from agent-gap failures (prompt, model limitation)'
      validation: check classification accuracy on labeled failures
    tasks:
    - id: p176.d1.t1
      title: Create harness_gap_classifier.py module
      status: planned
      description: 'Python module: (1) FailureClassifier class with classify(execution_record) -> GapReport, (2) GapReport: failure_id, category (missing_guide|missing_invariant|missing_tool|insufficient_context|bad_prompt|external_dependency|model_limitation), confidence, evidence (which logs/patterns led to classification), recommended_action, (3) classify() logic: parse execution_log records, look for patterns: repeated failures on same file type -> missing guide, structural violations not caught -> missing invariant, tool-not-found errors -> missing tool, context-exceeded errors -> insufficient context, fix-attempt loops that never converge -> bad prompt or model limitation, dependency/install errors -> external dependency, (4) batch_classify() -- analyze a window of recent failures, produce summary of gap categories with frequency counts, (5) persist gap reports to execution history (phase 8) for trending.'
      dependencies:
      - p8.d1.t1
      - p18.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/harness_gap_classifier.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/harness_gap_classifier.py'
  - name: Automatic harness improvement proposals
    description: 'When a harness gap is identified, automatically propose specific improvements (new invariant, guide section, tool config)'
    status: planned
    acceptance_criteria:
    - description: 'System generates concrete improvement proposals: new invariant rules, guide sections to add, tools to install'
      validation: test with classified failures
    - description: 'Proposals are written as actionable items that can be reviewed and applied'
      validation: inspect proposal format
    tasks:
    - id: p176.d2.t1
      title: Add improvement proposal generation to harness_gap_classifier.py
      status: planned
      description: 'Extend harness_gap_classifier.py: (1) propose_improvement(gap_report) -> ImprovementProposal, (2) For missing_guide: analyze which file types/patterns caused failures, propose specific AGENT.md sections with example commands, (3) For missing_invariant: analyze what structural violation occurred, propose invariant rule in invariants.yaml format, (4) For missing_tool: identify which tool was needed, propose tool installation step or alternative approach, (5) For insufficient_context: identify what context was missing, propose context_budget.py configuration change, (6) ImprovementProposal: category, title, description, artifact (the actual YAML/markdown to add), target_file (which file to modify), priority (based on failure frequency), (7) review_queue: store proposals in a review file, human can accept/reject/modify before application.'
      dependencies:
      - p176.d1.t1
      - p17.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/harness_gap_classifier.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/harness_gap_classifier.py'
  - name: Weekly harness gap report
    description: 'Cron job that generates a weekly report of harness gaps with improvement proposals'
    status: planned
    acceptance_criteria:
    - description: 'Weekly cron generates gap report with top gaps and proposed fixes'
      validation: check cron output
    - description: 'Report shows trend: are gaps shrinking over time as improvements are applied?'
