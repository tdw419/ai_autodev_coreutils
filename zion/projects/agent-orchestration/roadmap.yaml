      status: planned
      description: 'Create pipelines/auto-refactor-pipeline.yaml: OBSERVE(scan logs for context)
        -> AI(analyze GC findings, plan fixes) -> Loop(fix violations, max=5 per iteration) ->
        Bash(run tests) -> Loop(retry on test failure, max=3) -> REVIEW(LLM judge for fix quality)
        -> Bash(create branch, commit fixes) -> Bash(create PR with detailed description of what
        was fixed and why). The pipeline is designed to be run by the orchestrator as a cron job,
        creating refactoring PRs that humans can review and merge.'
      dependencies:
