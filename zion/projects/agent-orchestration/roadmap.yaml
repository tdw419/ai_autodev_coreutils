  - name: Failure detection and classification engine
    description: Detect common orchestrator failure modes and classify them for automated remediation
    status: planned
    acceptance_criteria:
    - description: 'Can detect stuck workers, workspace corruption, config drift, and dependency failures'
      validation: 'simulate each failure, verify detection'
      met: false
    - description: Each failure type has a confidence score and remediation recommendation
      validation: check detection output for classification details
      met: false
    tasks:
    - id: p95.d1.t1
      title: Create failure_detector.py module
      status: planned
      description: 'Python module: (1) FailureDetector class that periodically checks orchestrator health, (2) detect_stuck_workers(): check workspace modification times, execution log last activity, if
        no progress for >N minutes (configurable, default 15), classify as STUCK, (3) detect_workspace_corruption(): run git status in workspace, if unresolvable merge conflicts or broken HEAD, classify
        as CORRUPTED, (4) detect_config_drift(): compare current orchestrator.yaml against known-good hash from last successful run, if changed, classify as DRIFTED, (5) detect_dependency_breakage(): check
        for common failure patterns in execution log (pip install failures, npm errors, compilation failures), classify as DEP_BROKEN, (6) detect_recurring_failure(): count failures per issue type in last
        24h, if >3 for same type, classify as RECURRING, (7) output: {failure_type, confidence, affected_resources, suggested_remediation, timestamp}. CLI: python3 failure_detector.py check --all.'
