        (2) parse_logs(log_path, format="auto") -- detect format (JSON, key=value, common frameworks
        like Django/Flask/Express), return structured list of log entries, (3) search_logs(entries,
        query) -- filter by level (ERROR, WARN), time range, message pattern, (4) tail_logs(log_path,
