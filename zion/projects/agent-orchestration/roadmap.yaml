        and stats, (5) get_history(agent_id): list all tasks completed by this agent, (6) get_stats(agent_id): performance statistics (success rate, avg duration, preferred task types), (7) identity file
        format: YAML with full identity record, (8) CLI: python3 agent_identity.py --list, --show ID, --stats ID, --history ID, --retire ID'
