    description: 'Tests for package installation, profiles, and entry points'
    status: planned
    acceptance_criteria:
    - description: Tests cover package install, profile loading, and CLI entry point
      validation: 'python3 -m pytest tests/test_package.py -v'
      met: false
    tasks:
    - id: p105.d4.t1
      title: Create test_package.py
      status: planned
      description: 'Create tests/test_package.py: (1) test_package_install: verify import orchestrator works, (2) test_entry_point: verify orch CLI is callable, (3) test_profile_loading: load each profile YAML and verify expected modules are enabled/disabled, (4) test_profile_custom: load custom profile from file path, (5) test_backward_compat: verify deprecated top-level scripts still work with deprecation warning.'
      dependencies:
      - p105.d2.t1
