- id: 'phase-163'
  title: 'Unified Agent Memory Architecture'
  status: planned
  goal: 'Formalize the 4-tier memory hierarchy as a coherent architecture with explicit data flow, promotion/demotion policies, and cross-tier consistency'
  description: |
    The "Issue Trackers as AI Agent Control Planes" research (211 lines, 44 citations)
    describes a formal 4-tier memory hierarchy for agent systems: (1) Working Context
    (transient, prompt buffer, single-turn tokens), (2) Session State (mid-term, structured
    event log, message/tool-call/control-signal history), (3) Durable Memory (long-term,
    SQL/Vector DB, searchable knowledge that outlives sessions), (4) Artifact Layer
    (persistent, filesystem/git, shared workspaces for code, data, documentation).

    The research emphasizes that the issue tracker occupies a unique position as
    "control-plane state" that stores task history, permissions, and recovery checkpoints.
    Without this record, debugging agentic decisions becomes guesswork, as the "reasoning
    path" is often lost once a context window resets. The harness, rather than the model,
    is responsible for deciding what prior work enters the context window and how the agent
    resumes after a crash.

    Hermes has 6+ modules that address memory concerns but no unified architecture:
    phase 20 (context_budget.py for working context sizing), phase 47 (knowledge extraction
    for durable memory), phase 93 (long-term memory with semantic retrieval), phase 97
    (session chaining for cross-session state), phase 113 (cognitive forgetting for quality
    pruning), phase 118 (memory consolidation for deduplication). These modules operate
    independently with no shared interface, no formal data flow between tiers, no promotion/
    demotion policies, and no cross-tier consistency checking. Phase 163 closes this gap
    with a unified memory manager that provides a single interface, tier-aware routing,
    promotion/demotion policies, and cross-tier consistency validation.
  deliverables:
  - name: Unified memory manager
    description: 'Single interface for all memory tiers with tier-aware routing and promotion/demotion policies'
    status: planned
    acceptance_criteria:
    - description: 'Unified MemoryManager class provides read/write/search across all 4 tiers'
      validation: test cross-tier operations
    - description: 'Memory promotion policy moves data from transient to persistent tiers based on access patterns'
      validation: test promotion triggers
    - description: 'Cross-tier consistency check detects stale references between tiers'
      validation: test consistency validation
    tasks:
    - id: p163.d1.t1
      title: Create memory_manager.py module
      status: planned
      description: 'Create memory_manager.py: (1) MemoryTier enum: WORKING_CONTEXT, SESSION_STATE, DURABLE_MEMORY, ARTIFACT_LAYER, (2) MemoryEntry dataclass: id, tier, content, metadata, created_at, accessed_at, access_count, source_session, vector_key, (3) MemoryManager class with: store(entry, tier) that routes to appropriate backend, retrieve(query, tier, limit) that searches specified tier, promote(entry_id, from_tier, to_tier) that moves data up the hierarchy, demote(entry_id, from_tier, to_tier) that moves data down, search(query, tiers=None) that searches across specified tiers, (4) PromotionPolicy class with rules: access_count_threshold (promote after N accesses), age_threshold (demote after N days without access), session_boundary (promote session state to durable on session end), (5) ConsistencyChecker that validates: no dangling references across tiers, artifact layer files referenced in durable memory still exist, working context entries reference valid session state, (6) Integrates with existing modules: context_budget.py for working context sizing, execution_log.py for session state, knowledge extraction for durable memory, filesystem for artifact layer, (7) CLI: python3 memory_manager.py --store, --retrieve, --promote, --consistency-check.'
      files:
      - '~/zion/projects/agent-orchestration/memory_manager.py'
    - id: p163.d1.t2
      title: Add cross-tier data flow to orchestrator lifecycle
      status: planned
      description: 'Modify orchestrator.py to use MemoryManager for lifecycle events: (1) On task start: load context from durable memory and session state into working context, (2) On task tick: store intermediate results to session state, promote important findings to durable memory, (3) On task complete: promote session state to durable memory, demote working context, (4) On session chain: carry forward promoted durable memory into new working context, (5) On consolidation cycle: run consistency check and demote stale entries.'
      dependencies:
      - p163.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
    scope_lines: 160
    scope_files:
    - '~/zion/projects/agent-orchestration/memory_manager.py'
    - '~/zion/projects/agent-orchestration/orchestrator.py'
  - name: Memory architecture tests
    description: 'Test tier-aware routing, promotion/demotion, and cross-tier consistency'
    status: planned
    acceptance_criteria:
    - description: 'Data flows correctly between tiers via promotion/demotion'
      validation: test promotion and demotion
    - description: 'Consistency checker detects all defined inconsistency types'
      validation: test consistency scenarios
    tasks:
    - id: p163.d2.t1
      title: Write memory manager tests
      status: planned
      description: 'Test cases: (1) Store and retrieve entries across all 4 tiers, (2) Search across specified tiers returns ranked results, (3) Promotion policy triggers after access_count threshold, (4) Promotion policy triggers on session boundary, (5) Demotion policy triggers after age threshold, (6) Cross-tier consistency detects dangling artifact references, (7) Cross-tier consistency detects stale session state references, (8) Orchestrator lifecycle correctly promotes/demotes on task events, (9) Session chaining correctly carries forward promoted memory, (10) Integration with existing modules (context_budget, execution_log) works correctly.'
      dependencies:
      - p163.d1.t1
      - p163.d1.t2
      files:
      - '~/zion/projects/agent-orchestration/test_memory_manager.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/test_memory_manager.py'
  dependencies:
  - source: 'phase-20'
    target: 'phase-163'
    type: soft
    reason: Context budget system defines working context sizing that the unified manager integrates
  - source: 'phase-47'
    target: 'phase-163'
    type: soft
    reason: Knowledge extraction provides the durable memory backend that the unified manager wraps
  - source: 'phase-93'
    target: 'phase-163'
    type: soft
    reason: Long-term memory provides semantic retrieval that the unified manager extends across tiers
  - source: 'phase-97'
    target: 'phase-163'
    type: soft
    reason: Session chaining provides cross-session state transfer that the unified memory architecture formalizes
  - source: 'phase-118'
    target: 'phase-163'
    type: soft
    reason: Memory consolidation provides deduplication that the unified manager schedules via promotion policies
  technical_notes: 'The key architectural insight from the research is that memory tiers should have EXPLICIT data flow, not implicit ad-hoc storage. Each tier has different durability, latency, and cost characteristics. Working context is fast but volatile (in-memory). Session state is mid-durability (JSONL files). Durable memory is persistent but slower (SQLite/vector DB). Artifact layer is the most persistent but least searchable (filesystem). The unified manager provides a single interface that abstracts these differences while making tier boundaries explicit and auditable.'
  risks:
  - 'Unified interface may add abstraction overhead -- keep it thin and delegate to existing modules'
  - 'Promotion/demotion policies may promote too aggressively, filling durable memory -- tune thresholds carefully'
  - 'Cross-tier consistency checks may be expensive at scale -- run them periodically, not on every operation'
  - 'Existing memory modules have different data formats -- the unified manager must handle format translation'
