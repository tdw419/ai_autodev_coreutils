        backward compatibility: if "repo" (singular) is set, treat as single-repo mode. Add a validate_config() function to orchestrator.py that checks all repo configs are valid and accessible.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.yaml'
      - '~/zion/projects/agent-orchestration/orchestrator.py'
    scope_lines: 80
