      title: Create rework loop pipeline templates
      status: planned
      description: 'Create rework_templates.py: (1) implement_test_fix_loop() template: implement -> test -> (on failure) -> fix -> test, (2) review_fix_resubmit() template: implement -> review -> (on rejection) -> fix -> review, (3) Each template includes max reroute depth, timeout per cycle, and escalation on exhaustion, (4) Templates use the extended DAG executor from p157.d1.t1.'
      dependencies:
      - p157.d1.t1
      files:
