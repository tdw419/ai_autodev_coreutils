- id: 'phase-20'
  title: Context Window Optimization (Smart Zone)
  status: complete
  goal: Implement context budget management for AI nodes so agents stay in the 'smart zone' and avoid reasoning decay
  description: 'The Ralph Wiggum pattern from the research emphasizes that AI models exhibit reasoning quality decay after reaching 30-60% of their context window. The current DAG executor constructs prompts
    for AI nodes without any awareness of context budget -- a large issue body + AI_GUIDE.md + pipeline context could easily exceed the optimal range. This phase adds a context_budget module that: (1) estimates
    token count for prompt components, (2) prioritizes which context to include when budget is tight, (3) truncates or summarizes context that exceeds budget, (4) tracks actual context usage per AI node
    run for tuning. This ensures agents always operate in the "smart zone" for maximum reasoning quality, directly applying the research''s key insight about context management.'
  deliverables:
  - name: Context budget estimator
    description: Python module that estimates token counts for prompt components and manages context budgets
    status: done
    acceptance_criteria:
    - description: 'Module can estimate token count for a string with reasonable accuracy (within 10%)'
