        (not full conversation), (3) workspace snapshot: save workspace state at end of each iteration for rollback, (4) progressive context: iteration N gets summary of iterations 1..N-1 (not full history),
        (5) smart zone enforcement: use context_budget.py from phase 20 to ensure summaries fit in budget, (6) failure context: if previous iteration failed, include error analysis in next iteration prompt,
        (7) test results carry over: include test output from previous iteration to help agent fix failures'
