- id: 'phase-144'
  title: Transaction Closure and Commitment Lifecycle Manager
  status: planned
  goal: 'Implement a formal framework for managing externally binding commitments that agents create, ensuring commitments can be tracked, reversed, and repaired with full auditability'
  description: |
    The "Issue Trackers as AI Agent Control Planes" research (211 lines, 44 citations)
    introduces the Theory of Transaction Closure: a formal framework arguing that task
    completion is insufficient for delegated AI -- agents must be evaluated on their ability
    to create, reverse, and repair externally binding commitments. The research defines
    four requirements for transaction closure: (1) typed mandates representing principal
    authority, (2) reversible lifecycle states for commitments, (3) receipt graphs linking
    authorization, payment, and outcome, and (4) recovery mechanisms including refunds
    and disputes. It also describes "split-state" detection -- when one part of a
    transaction succeeds but another fails (e.g., payment succeeds but reservation fails).
    Phase 112 (Coordination Failure Detection) detects and recovers from coordination
    failures BETWEEN agents, but does NOT manage the lifecycle of externally binding
    commitments that agents create WITH external systems. Phase 15 (Safety) approves
    actions but does not track commitment state after approval. No existing phase
    implements transaction-aware state management or split-state detection.
  deliverables:
  - name: Commitment lifecycle state machine
    description: 'Typed mandates, lifecycle states (created/active/completed/reversed/disputed), and state transitions'
    status: planned
    acceptance_criteria:
    - description: 'Defines Commitment dataclass with mandate_type, principal, scope, lifecycle_state, created_at, completed_at'
      validation: read dataclass definition
    - description: 'Supports state transitions: created -> active -> completed, active -> reversed, any -> disputed'
      validation: test state machine
    tasks:
    - id: p144.d1.t1
      title: Create commitment state machine
      status: planned
      description: 'Create commitment.py with: (1) Commitment dataclass with fields: id, mandate_type, principal, scope, lifecycle_state, created_at, updated_at, receipt_ref, (2) CommitmentManager class that creates, transitions, and queries commitments, (3) StateMachine validator that enforces valid transitions, (4) TypedMandate enum for authority types (read, write, execute, financial, deploy).'
      files:
      - '~/zion/projects/agent-orchestration/commitment.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/commitment.py'
  - name: Receipt graph and split-state detection
    description: 'Track linked actions in a receipt graph and detect split-state failures'
    status: planned
    acceptance_criteria:
    - description: 'Receipt graph links authorization, action, and outcome nodes'
      validation: test graph construction
    - description: 'Split-state detector identifies when linked actions have inconsistent outcomes'
      validation: test split-state detection
    tasks:
    - id: p144.d2.t1
      title: Implement receipt graph and split-state detection
      status: planned
      description: 'Extend commitment.py: (1) ReceiptGraph class that links commitments into a directed graph (authorization -> action -> outcome), (2) detect_split_states() method that traverses the graph and flags inconsistencies (e.g., payment succeeded but deployment failed), (3) generate_recovery_plan() that suggests remediation actions for detected split states, (4) persist receipt graph to JSON for auditability.'
      dependencies:
      - p144.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/commitment.py'
    scope_lines: 90
    scope_files:
    - '~/zion/projects/agent-orchestration/commitment.py'
  - name: Integration with executor and tests
    description: 'Wire commitment tracking into the DAG executor and write tests'
    status: planned
    acceptance_criteria:
    - description: 'Bash nodes that modify external state create commitments automatically'
      validation: test executor integration
    - description: 'Tests verify split-state detection and recovery planning'
      validation: run tests
    tasks:
    - id: p144.d3.t1
      title: Integrate commitments with executor
      status: planned
      description: 'Modify executor.py: when a Bash node executes a command tagged with "external_commitment: true", create a Commitment entry. After execution, update the commitment lifecycle state. Run split-state detection after each pipeline completion.'
      dependencies:
      - p144.d2.t1
