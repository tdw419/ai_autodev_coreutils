  - name: 'Graph-aware orchestrator scheduling'
    description: 'Replace the flat issue queue with graph-aware scheduling in the orchestrator'
    status: planned
    acceptance_criteria:
    - description: Orchestrator uses work graph for scheduling instead of flat issue list
      validation: 'enable graph mode in orchestrator, check that dependency order is respected'
      met: false
    - description: Graph can be enabled/disabled via config (backward compatible)
      validation: 'set scheduling.mode: flat, verify old behavior'
      met: false
    tasks:
    - id: p54.d4.t1
      title: Integrate work graph into orchestrator.py
      status: planned
      description: 'Modify orchestrator.py: (1) add scheduling section to orchestrator.yaml: mode (flat|graph), graph_file (path to work_graph.yaml), auto_sync (bool), (2) in graph mode: instead of poller
        -> spawner, do: sync issues to graph -> pull ready items -> spawn workers for pulled items -> on completion, mark graph items done (which may unblock dependents), (3) the graph mode respects dependency
        ordering -- an issue blocked by an open dependency will not be scheduled even if it has the agent-ready label, (4) add status.sh section showing graph state: ready items, blocked items, critical
        path, dependency chains. Flat mode remains the default for backward compatibility.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/orchestrator.yaml'
      - '~/zion/projects/agent-orchestration/status.sh'
      dependencies:
      - p54.d2.t1
      - p54.d3.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/orchestrator.yaml'
    - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-4'
    target: 'phase-54'
    type: soft
    reason: 'Work graph replaces the flat issue queue from phase 4 with dependency-aware scheduling'
  - source: 'phase-6'
    target: 'phase-54'
    type: soft
    reason: 'Role specialization from phase 6 is used for role-based work pulling'
  - source: 'phase-26'
    target: 'phase-54'
    type: soft
    reason: Work decomposition from phase 26 (Mayor pattern) creates the work items that the graph tracks
  - source: 'phase-30'
    target: 'phase-54'
    type: soft
    reason: 'Inter-agent communication from phase 30 provides the notification channel for dependency resolution'
  - source: 'phase-41'
    target: 'phase-54'
    type: soft
    reason: Priority queuing from phase 41 can prioritize within the set of ready graph items
  technical_notes: 'The work graph is deliberately file-based (YAML), not database-backed. This makes it version-controllable alongside the codebase -- a key insight from Beads/Dolt. The pull model is simpler
    than push: agents don''t need to register for notifications, they just ask "what''s ready?" The graph handles dependency resolution, blocking, and critical path calculation. For multi-instance coordination
    (phase 51), the pull model with file locking is naturally compatible with the federation approach.'
  risks:
  - 'Circular dependencies could deadlock the graph -- cycle detection is critical'
  - 'File-based locking may not work well across NFS/S3 -- document limitations'
  - 'Graph sync with GitHub could be slow for repos with many issues -- batch and cache'
  - 'The graph adds complexity compared to the flat queue -- must be optional and well-tested'
  - 'Dependency parsing from issue body is fragile -- provide structured syntax (e.g. Depends-On #42)'
