      status: done
      description: 'Python module that: (1) estimates token count using tiktoken or a simple word*1.3 heuristic, (2) accepts a list of prompt components with priorities (issue_body=high, ai_guide=medium,
        previous_context=low), (3) when total exceeds budget, truncates lowest-priority components first, (4) supports summarize mode that extracts key points from truncated sections, (5) logs actual vs
        estimated token usage per run. Default budget: 80% of model context window (leaving 20% for response).'
