- id: 'phase-64'
  title: 'Workspace Sandboxing and OS-Level Isolation'
  status: planned
  goal: 'Add OS-level sandboxing to agent workspaces -- filesystem restrictions, network policies, and resource limits to prevent agents from causing unintended side effects'
  description: 'The research describes Symphony''s approach to workspace isolation: "strict safety invariants are enforced to ensure path normalization and sanitization, preventing agents from escaping
    their assigned boundaries." Phase 11 (Workspace Lifecycle) manages workspace creation/cleanup but provides only directory-level isolation. In the Dark Factory model (phase 35) where agents run fully
    autonomously with no human review, stronger isolation is essential. This phase builds: (1) filesystem sandboxing using Linux namespaces or chroot to restrict agent file access to their workspace, (2)
    network policy enforcement (allow/deny specific hosts/ports), (3) resource limits (CPU, memory, disk, wall-clock time) using cgroups or ulimit, (4) capability auditing -- log all system calls that agents
    attempt, flagging suspicious ones, (5) a "sandbox policy" YAML that defines per-role isolation levels (implementer gets full network, reviewer gets none). This makes the "high-trust environment" from
    the research actually trustworthy.'
  deliverables:
  - name: Filesystem sandboxing module
    description: Restrict agent file access to their workspace directory
    status: planned
    acceptance_criteria:
    - description: Agent cannot access files outside their workspace
      validation: 'run agent in sandbox, attempt to read /etc/passwd, verify blocked'
      met: false
    tasks:
    - id: p64.d1.t1
      title: Create sandbox.py filesystem isolation module
      status: planned
      description: 'Create sandbox.py: (1) SandboxContext class that sets up filesystem isolation for a workspace, (2) support multiple isolation levels: none (current behavior), soft (warning on escape
        attempts), hard (block escape attempts), (3) soft mode: use a custom file opener that logs but allows access outside workspace, (4) hard mode: use chroot or mount namespace to restrict filesystem
        access to workspace directory, (5) allowlist for read-only access outside workspace (e.g., /usr/lib for Python packages, system PATH), (6) path sanitization: normalize all paths, reject symlinks
        that escape workspace, (7) integration with workspace_manager.py from phase 11 -- sandbox setup as part of workspace initialization, (8) detect and log escape attempts even in soft mode. Start with
        soft mode as default -- hard mode requires root.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
  - name: Network policy enforcement
    description: Control which network hosts and ports agents can access
    status: planned
    acceptance_criteria:
    - description: Agent network access is restricted per policy
      validation: 'configure deny-all policy, run agent, verify network calls blocked'
      met: false
    tasks:
    - id: p64.d2.t1
      title: Add network policy to sandbox.py
      status: planned
      description: 'Add network policy to SandboxContext: (1) network_policy in sandbox YAML: allowlist (hosts, ports, protocols), denylist, default_deny, (2) preset policies: open (no restrictions -- for
        implementer role), restricted (allow github.com, pypi.org, npmjs.org -- for dependency installation), locked (deny all -- for reviewer role), (3) enforcement via iptables rules (requires root) or
        LD_PRELOAD socket interceptor (user-space, no root needed), (4) DNS resolution filtering, (5) log all connection attempts (allowed and denied), (6) per-role default policies in roles/ directory.
        The LD_PRELOAD approach is preferred for zero-root deployment.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      dependencies:
      - p64.d1.t1
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
  - name: Resource limits and timeouts
