- id: 'phase-56'
  title: Symphony Spec Compliance Adapter
  status: planned
  goal: 'Make Hermes a compatible implementation of the OpenAI Symphony specification, enabling drop-in replacement for teams already using Symphony configs'
  description: 'The research describes Symphony as "an open-source framework designed to solve the critical operational bottlenecks that arise when human engineers attempt to supervise autonomous agents
    at scale" with a SPEC.md that defines the contract between issue trackers, workspace managers, workflow loaders, and agent runners. Phase 45 covers WORKFLOW.md parsing, but does not aim for full Symphony
    spec compliance. This phase creates a Symphony compatibility layer: (1) a SPEC.md parser that reads Symphony-formatted configs and translates them to Hermes equivalents, (2) a Linear-to-GitHub Issues
    adapter (Symphony uses Linear as its reference tracker), (3) Codex App Server JSON-RPC compatibility for agent communication, (4) a compliance test suite that verifies Hermes behaves according to Symphony
    spec. This positions Hermes as a Symphony-compatible orchestrator, enabling teams to migrate from Symphony''s Elixir implementation to Hermes without rewriting their configs. The research emphasizes
    that Symphony is "the first major step" in orchestration standards -- compatibility with the spec is strategically valuable.'
