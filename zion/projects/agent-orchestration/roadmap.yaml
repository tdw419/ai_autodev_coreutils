        the auto-refactor pipeline, (4) creates PRs for each batch, (5) reports summary (violations found, fixes attempted, fixes succeeded, PRs created). Include budget check: skip refactoring if weekly
        token budget is nearly exhausted (from phase 32). Respect safety policies from phase 15 (no auto-merge for refactoring PRs -- always human review).'
