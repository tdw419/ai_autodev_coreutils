        -- parse Prometheus exposition format into structured metrics, (3) extract_key_metrics(metrics) -- pull out common signals: request_total, error_total, latency_p50/p95/p99, up status, (4) diff_metrics(before,
        after) -- compare metric snapshots before and after a code change to detect regressions, (5) --wait-for-ready flag to poll until an endpoint responds (useful after starting a dev server). Timeout
