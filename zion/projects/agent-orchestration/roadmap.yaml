  technical_notes: 'The research describes the on_failure_reroute_task_id as a pointer in the task schema that enables the orchestrator to manage rework cycles as part of the DAG structure rather than external retry logic. This is fundamentally different from retry (same task again) -- reroute executes a DIFFERENT task (e.g., a fix task) that addresses the failure. The max depth enforcement is critical: without it, a buggy fix task could create an infinite loop. The conditional rerouting by error type enables sophisticated patterns like "on timeout -> reduce scope, on test failure -> fix bugs, on review rejection -> address feedback."'
