        template that the orchestrator uses as a blueprint: (1) select applicable strategies, (2) spawn parallel workers, (3) wait for all to complete, (4) run evaluator, (5) commit winner, (6) archive
        losers, (7) post summary to issue. Include cost estimate per speculative run.'
