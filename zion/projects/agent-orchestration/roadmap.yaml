    - id: p157.d3.t1
      title: Write failure reroute tests
      status: planned
      description: 'Test cases: (1) Failed task with reroute executes the reroute target, (2) After reroute succeeds, original task is re-executed, (3) Max reroute depth prevents infinite loops, (4) Reroute history is logged, (5) Conditional rerouting by error type works, (6) implement_test_fix_loop template cycles correctly, (7) review_fix_resubmit template handles rejection, (8) Reroute exhaustion marks DAG as failed with clear error.'
