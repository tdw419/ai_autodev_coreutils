- id: phase-30
  title: Inter-Agent Communication and Shared State (Beads Pattern)
  status: planned
  goal: Implement lightweight shared state between concurrent workers so agents can coordinate on related tasks
  description: 'Gas Town''s Beads database enables agents to share state -- when one worker
    modifies a file that another worker depends on, the system coordinates. The current
    orchestrator runs workers in complete isolation with no awareness of each other.
    This phase adds a lightweight coordination layer: a shared state file that tracks
    which files each worker is modifying, a notification mechanism so workers can learn
    about related changes, and conflict-aware scheduling that prevents workers from
    stepping on each other. This is a simpler alternative to Gas Town''s full Dolt-based
    Beads system, using filesystem-based coordination instead of a version-controlled
    SQL database. This enables the "pull-based" work distribution pattern where workers
    can react to each other''s progress rather than operating in silos.

    '
  deliverables:
  - name: Shared state registry
    description: File-backed registry that tracks which files are being modified by which workers
    status: planned
    acceptance_criteria:
    - description: Workers can register and unregister file locks; other workers can query active locks
      validation: python3 shared_state.py register --worker 42 --files src/main.py
      met: false
    tasks:
    - id: p30.d1.t1
      title: Create shared_state.py module
      status: planned
      description: 'Create shared_state.py: (1) maintain a JSON-backed registry at ~/.orchestrator/state/shared-state.json,
        (2) register(worker_id, files_list) -- claim files for a worker, (3) unregister(worker_id)
        -- release all claimed files, (4) query(file_path) -- check if a file is locked
        and by whom, (5) query_conflicts(worker_id, files_list) -- check if any of the
        proposed files conflict with existing locks, (6) auto-expire locks after configurable
        timeout (default 2 hours) to handle crashed workers. Use file locking (fcntl.flock)
        for concurrent access safety.'
      files:
      - ~/zion/projects/agent-orchestration/shared_state.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/shared_state.py
  - name: Conflict-aware scheduling
    description: Modify orchestrator to check shared state before spawning workers and skip file-conflicting tasks
    status: planned
    acceptance_criteria:
    - description: Orchestrator delays spawning a worker if its target files conflict with an active worker
      validation: create two issues touching the same file, verify second is delayed
      met: false
    tasks:
    - id: p30.d2.t1
      title: Add conflict checking to orchestrator spawner
      status: planned
      description: 'Modify orchestrator.py and spawner.py: (1) before spawning a worker, estimate
        which files the issue will touch (parse issue body for file mentions, check
        issue labels for component hints), (2) call shared_state.query_conflicts() to
        check for active locks, (3) if conflicts found, skip this issue and log "deferred
        due to file conflict with worker N", (4) on next loop iteration, re-check deferred
        issues. Add conflict_strategy config: skip (default), queue (wait until clear),
        warn (proceed but log warning).'
      files:
      - ~/zion/projects/agent-orchestration/orchestrator.py
      - ~/zion/projects/agent-orchestration/spawner.py
    dependencies:
