- id: 'phase-50'
  title: Orchestrator Chaos Engineering and Fault Injection Testing
  status: planned
  goal: Test the orchestrator''s resilience under failure conditions by injecting faults and verifying recovery behavior
  description: 'The research emphasizes the Elixir/BEAM runtime''s fault tolerance: hot code reloading, supervisor trees, and "let it crash" philosophy. The Hermes orchestrator has been built with various
    failure handling mechanisms (health checks, auto-recovery, workspace archival, approval timeouts) but none of these have been tested under actual failure conditions. This phase creates a chaos engineering
    toolkit that deliberately injects faults (worker crash, API timeout, disk full, network failure, config corruption) and verifies that the orchestrator recovers gracefully. This is the "Dark Factory"
    reliability prerequisite: before running fully autonomous, verify the system handles failures without human intervention. Modeled on chaos engineering practices (Netflix Chaos Monkey, Gremlin) but adapted
    for agent orchestration.'
  deliverables:
  - name: Fault injection framework
    description: Python module that can inject various fault types into orchestrator components during testing
    status: planned
    acceptance_criteria:
    - description: 'Can inject at least 5 fault types: worker crash, API timeout, disk full, config corruption, process kill'
      validation: 'python3 chaos.py --inject worker_crash --target test_workspace'
      met: false
    - description: Faults can be injected programmatically (for test integration) and via CLI (for manual testing)
      validation: run injection from CLI and from test code
      met: false
    tasks:
    - id: p50.d1.t1
      title: Create chaos.py fault injection module
      status: planned
      description: 'Python module that: (1) defines fault types: worker_crash (kill delegate_task process), api_timeout (delay gh CLI responses), disk_full (fill workspace to limit), config_corrupt (inject
        invalid YAML into config files), network_failure (block GitHub API endpoints), process_kill (kill orchestrator mid-loop), (2) each fault has: inject() and restore() methods, severity level, and
        expected recovery behavior, (3) support --inject FAULT --target TARGET and --restore for manual use, (4) provide a Python API for programmatic use in tests: with chaos.inject("api_timeout"): ...
        , (5) log all fault injections and recovery attempts. Include a --safe-mode flag that only injects faults in test workspaces.'
      files:
      - '~/zion/projects/agent-orchestration/chaos.py'
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/chaos.py'
  - name: Recovery verification tests
    description: Test suite that injects faults and verifies the orchestrator recovers correctly
    status: planned
    acceptance_criteria:
    - description: Test suite covers all major fault types with pass/fail recovery verification
      validation: 'python3 -m pytest test_chaos.py -v'
      met: false
    - description: Each test verifies specific recovery behavior (not just "no crash")
      validation: read test assertions
      met: false
    tasks:
    - id: p50.d2.t1
      title: Create test_chaos.py with fault injection tests
      status: planned
      description: 'Create pytest test suite: (1) test_worker_crash_recovery: inject worker crash, verify orchestrator marks workspace as failed and does not spawn replacement without human approval, (2)
        test_api_timeout_recovery: inject API timeout, verify poller retries and eventually skips the repo, (3) test_disk_full_recovery: fill workspace, verify workspace_manager detects and archives, (4)
        test_config_corrupt_recovery: corrupt YAML, verify config validation catches it and falls back to defaults, (5) test_process_kill_recovery: kill orchestrator, verify it resumes cleanly on restart
        (state recovery), (6) test_concurrent_faults: inject multiple faults simultaneously, verify no cascading failures. Use tmp_path fixtures for isolation.'
      files:
