    status: planned
    acceptance_criteria:
    - description: Orchestrator checks trigger queue before polling GitHub API
      validation: 'create trigger event, run orchestrator, verify it processes the triggered issue first'
      met: false
    tasks:
    - id: p37.d2.t1
      title: Add trigger queue to orchestrator.py
      status: planned
      description: 'Modify orchestrator.py run_loop() to: (1) before calling the poller, check for pending trigger events in ~/.orchestrator/triggers/pending.jsonl, (2) if triggers exist, prioritize those
        issues (add them to the front of the work queue), (3) mark processed triggers as done by moving them to ~/.orchestrator/triggers/processed.jsonl, (4) deduplicate triggers (same issue triggered multiple
        times), (5) expire stale triggers (older than N minutes, since cron will pick them up anyway). This means webhook-triggered issues get processed immediately on the next cron cycle rather than waiting
        for the poller to discover them.'
