- id: 'phase-165'
  title: 'Frustration Signals and Cognitive Damping for Adaptive Task Switching'
  status: planned
  goal: 'Track success/failure ratio across tool calls within tasks and force strategy switching when frustration exceeds threshold'
  description: |
    The ACE Framework research describes a "frustration signal" that tracks the
    ratio of successes to failures during task execution. When frustration exceeds a
    threshold, "cognitive damping" progressively reduces persistence, forcing the
    agent to switch strategies or re-evaluate its plan. This prevents agents from
    burning tokens on unproductive loops.

    Phase 116 (Commit Stagnation Circuit Breaker) detects commit stalls via git SHA
    tracking. Phase 133 (Plateau Breaker) triggers strategy reset after N consecutive
    task-level failures. But neither tracks frustration at the TOOL CALL level within
    a task, nor implements the progressive damping mechanism. An agent may succeed at
    the task level (producing commits) while burning excessive tokens on failed tool
    calls within each attempt. Phase 165 closes this gap.
  deliverables:
  - name: Frustration tracking module
    description: 'Track success/failure ratio per tool call within tasks, compute frustration signal, and trigger adaptive switching'
    status: planned
    acceptance_criteria:
    - description: 'Frustration signal increases on tool call failures and decreases on successes'
      validation: test signal computation
    - description: 'Cognitive damping triggers strategy switch when frustration exceeds configurable threshold'
      validation: test damping trigger
    tasks:
    - id: p165.d1.t1
      title: Create frustration.py module
      status: planned
      description: 'Create frustration.py: (1) ToolCallResult dataclass: tool_name, success, duration_ms, error_type, error_message, timestamp, (2) FrustrationTracker class with: record_result(result) that updates signal, get_frustration() returns current signal (0.0-1.0), get_tool_failure_counts() returns per-tool failure map, get_cognitive_damping() returns damping factor (1.0 at low frustration, 0.0 at max), (3) FrustrationSignal computed as: exponential moving average of recent failures with decay factor, weighted by tool importance, (4) CognitiveDamping function: when frustration > threshold_low, reduce max_turns by damping%; when frustration > threshold_high, force strategy_switch; when frustration > threshold_critical, halt task and escalate, (5) StrategySwitchRecommendation with: reason, suggested_alternatives (from past solutions in memory), frustration_history, (6) Integration points: record_result called by executor after each tool call, frustration checked between DAG nodes, (7) CLI: python3 frustration.py --signal --history --reset.'
      files:
      - '~/zion/projects/agent-orchestration/frustration.py'
    - id: p165.d1.t2
      title: Integrate frustration tracking into DAG executor
      status: planned
      description: 'Modify executor.py to: (1) Record tool call results to FrustrationTracker, (2) Check frustration signal between DAG nodes, (3) Apply cognitive damping to max_turns, (4) Trigger strategy switch on high frustration, (5) Halt and escalate on critical frustration, (6) Log frustration events to execution history with signal value, damping factor, and action taken.'
      dependencies:
      - p165.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 120
