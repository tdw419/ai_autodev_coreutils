- id: phase-22
  title: Config Hot-Reload and Live Tuning
  status: planned
  goal: Enable the orchestrator to pick up config changes without restart, supporting live parameter tuning
  description: 'Symphony''s Elixir implementation features hot code reloading, allowing system updates without
    interrupting active agent sessions. The Hermes orchestrator reads its config (orchestrator.yaml, role
    profiles, pipeline YAMLs) once at startup. If you change max_concurrent or swap a pipeline template, you
    must restart the cron job. This phase adds file-watching that detects config changes and reloads them
    on the fly. Combined with the self-improvement loop (phase 19) and context budgeting (phase 20), this
    enables the orchestrator to be tuned in real-time -- adjust parameters, swap pipelines, modify role
    prompts -- all without interrupting running workers. This is a small but critical operational improvement
    that makes the orchestrator production-ready for continuous operation.'
  deliverables:
  - name: Config watcher module
    description: Python module that watches config files for changes and triggers reload
    status: planned
    acceptance_criteria:
    - description: Module detects changes to YAML config files within 5 seconds
      validation: modify config file, check reload is triggered
      met: false
    - description: Supports watching orchestrator.yaml, role profiles, and pipeline YAMLs
      validation: modify each type, verify detection
      met: false
    tasks:
    - id: p22.d1.t1
      title: Create config_watcher.py module
      status: planned
      description: 'Python module that: (1) watches specified config files using filesystem modification
        time (polling every 5s, no inotify dependency), (2) on change, reloads the config and validates it,
        (3) calls registered callbacks for each config type (on_orchestrator_config_change, on_role_change,
        on_pipeline_change), (4) logs all config reloads with before/after diff, (5) supports --watch flag
        for standalone operation and programmatic API for integration. Use file hashing to avoid spurious
        reloads.'
      files:
      - ~/zion/projects/agent-orchestration/config_watcher.py
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/config_watcher.py
