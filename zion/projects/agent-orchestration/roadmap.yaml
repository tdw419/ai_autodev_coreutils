- id: 'phase-75'
  title: Deterministic Test Generation from Structural Invariants
  status: planned
  goal: 'Automatically generate test cases from structural invariant rules, ensuring that architectural constraints are continuously verified by the test suite'
  description: 'Phase 17 implements structural invariants (layer ordering, import restrictions, naming conventions) that check architecture at pipeline-gate time. However, these checks only run when the
    pipeline executes -- they are not part of the project''s persistent test suite. The Harness Engineering research emphasizes that structural constraints should be "enforced mechanically through structural
    tests and custom linters, which were themselves often generated by agents." This phase creates: (1) a test generator that reads invariant rules from invariants.yaml and produces pytest test files that
    assert those invariants as unit tests, (2) generated tests that can be committed to the project repo and run in CI alongside hand-written tests, (3) automatic regeneration when invariants change (integrated
    with config hot-reload from phase 22), (4) test templates for common invariant patterns (layer ordering, forbidden imports, naming conventions, file structure), (5) a CLI to generate, update, and manage
    generated tests. This bridges the gap between "check at pipeline time" and "continuously enforced in CI" -- generated tests ensure invariants are always verified, even when code is changed outside the
    orchestrator pipeline.'
  deliverables:
  - name: 'Invariant-to-test generator'
    description: Generate pytest test files from structural invariant rules
    status: planned
    acceptance_criteria:
    - description: Can generate test files from invariants.yaml
      validation: 'python3 test_generator.py generate --invariants invariants.yaml --output tests/generated/'
      met: false
    - description: Generated tests are valid pytest files that run and pass on compliant code
      validation: 'python3 -m pytest tests/generated/ -v'
