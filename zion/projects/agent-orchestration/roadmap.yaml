- id: 'phase-17'
  title: Structural Invariants Engine
  status: complete
  goal: 'Build custom structural tests that enforce architectural constraints (layering, dependency direction, module boundaries) beyond code style'
  description: 'The Harness Engineering research emphasizes "Rigid Architecture" as a key pillar: enforcing a strict layering model that limits the agent''s search space. Phase 10''s convention scanner
    handles naming and style conventions. This phase goes deeper: enforcing architectural rules like "no UI code importing from database layer," "service modules must depend on repo interfaces not implementations,"
    and "all public APIs must have type annotations." These invariants are mechanically checked and can be run as pipeline gates, catching architectural drift before it accumulates.'
  deliverables:
  - name: Architecture invariant checker
    description: Python module that reads an invariants.yaml config and checks a codebase for architectural violations
    status: done
    acceptance_criteria:
    - description: 'Module parses invariants.yaml with rule definitions (forbidden_imports, required_interfaces, layer_order, dependency_direction)'
      validation: read config and checker code
      met: true
    - description: 'Checker detects at least 4 violation types (forbidden imports, layer violations, missing type annotations, circular dependencies)'
      validation: run checker on test fixtures with known violations
      met: true
    tasks:
