  - source: 'phase-40'
    target: 'phase-79'
    type: soft
    reason: 'Multi-model routing from phase 40 complements inner harness at the LLM API level'
  - source: 'phase-25'
    target: 'phase-79'
    type: soft
    reason: State recovery from phase 25 benefits from knowing which backend was used for each task
  technical_notes: 'The inner harness abstraction is the most architecturally significant of the new phases. It decouples the orchestrator from any specific coding agent, enabling: (1) easy addition of
    new backends (Cursor, Windsurf, Aider, etc.), (2) backend-specific optimization (Codex for large codebases, Claude for complex reasoning, shell for simple tasks), (3) A/B testing across backends (phase
    29), (4) graceful degradation when a backend is down. The key design decision: the interface should be synchronous (execute blocks until done) matching the current delegate_task model, not async. Background
    execution is handled at the orchestrator level, not the backend level.'
  risks:
  - 'Backend abstraction may leak implementation details -- keep the interface minimal'
  - 'Different backends have very different capabilities -- BackendCapabilities must accurately reflect limits'
  - 'Failover may produce different results (Codex vs Claude approach the same task differently) -- log which backend produced which result for provenance (phase 52)'
  - 'Backend health checks consume tokens/resources -- use minimal test prompts and cache results'
