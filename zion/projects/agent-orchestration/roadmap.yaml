- id: 'phase-60'
  title: 'Human-Agent Workflow Optimization'
  status: planned
  goal: 'Build tooling that optimizes the human side of the orchestrator workflow -- streamlined ticket filing, PR review queues, triage automation, and the human''s "command center" experience'
  description: 'The research describes a fundamental role transformation: "engineers shift their role from supervising execution to filing speculative tickets and reviewing completed work at the end of
    the pipeline." Phase 49 captures human feedback, but no phase builds the tooling to make this new workflow efficient. The human''s experience is the bottleneck the research identifies: "the human-as-a-bottleneck
    problem, where a developer could only effectively manage a limited number of concurrent AI interactions." This phase builds: (1) smart ticket templates that auto-populate from codebase context (the
    "speculative ticket" pattern), (2) a PR review queue that prioritizes and summarizes agent-created PRs for efficient human review, (3) triage automation that classifies incoming issues and suggests
    agent-readiness, (4) a lightweight "command center" CLI that gives humans a single interface for all orchestrator interactions (file tickets, review PRs, check status, adjust config). This is the "from
    coder to architect" transformation made practical.'
  deliverables:
  - name: Smart ticket filing with codebase context
    description: 'Auto-populate ticket templates with relevant codebase context for efficient issue creation'
    status: planned
    acceptance_criteria:
    - description: 'Can create a ticket with auto-detected codebase context'
      validation: 'python3 human_workflow.py ticket --title "Add logging" --repo OWNER/REPO'
      met: false
    tasks:
    - id: p60.d1.t1
      title: Create human_workflow.py with smart ticket filing
      status: planned
      description: 'Create human_workflow.py: (1) ticket command that creates GitHub Issues via gh CLI, (2) auto-detect relevant files from issue title using grep/search, (3) auto-detect affected tests
        from file paths, (4) suggest appropriate labels based on issue content (bug, feature, refactor, agent-ready), (5) suggest appropriate agent role based on issue type, (6) include a "complexity estimate"
        based on affected files and test coverage, (7) output the issue body in markdown for review before creation, (8) support --dry-run to preview without creating. The goal: a human should be able to
        file a well-structured, agent-ready ticket in under 60 seconds.'
      files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
      scope_lines: 140
      scope_files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
