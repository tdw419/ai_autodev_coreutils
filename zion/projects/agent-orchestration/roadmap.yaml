  phases_added_from: 'Phase 59-64: Six new phases derived from gap analysis of the research document against the existing 58-phase roadmap. Phase 59 (PR Velocity Metrics) addresses the "500% PR increase"
    claim with a dedicated ROI measurement layer -- the research opens with this metric but no phase measured it. Phase 60 (Human-Agent Workflow Optimization) builds tooling for the "from coder to architect"
    transformation described in the research, optimizing the human bottleneck (ticket filing, PR review queues, triage). Phase 61 (Agent Quality Regression Testing) creates a benchmarking framework to catch
    agent quality degradation over time -- the research emphasizes harness quality but no phase systematically measured agent output quality. Phase 62 (Prompt Engineering as Infrastructure) treats the "Guides"
    layer of the outer harness as version-controlled, testable code artifacts. Phase 63 (Orchestrator REST API) exposes the orchestrator as a platform for external integration, addressing the research''s
    vision of Symphony as an "open specification." Phase 64 (Workspace Sandboxing) adds OS-level isolation to implement the "strict safety invariants" and "path normalization" described in the research,
    making dark factory mode (phase 35) safe. Phase 65-69: Five new phases derived from a second gap analysis pass. Phase 65 (Stop Hooks and Agent Loop Control) implements the "stop hooks" mechanism from
    the Ralph Wiggum pattern -- intercepting agent termination, checking completion tags, and re-feeding prompts when work remains. Phase 66 (Scheduled Periodic Maintenance Automation) implements the "weekly
    garbage collection loops" the research describes as background tasks scanning for deviations from golden principles. Phase 67 (Pre-PR Self-Verification Gate) combines deterministic and inferential checks
    into a single pipeline gate that agents must pass before PR submission, implementing the research''s "agents verify their own work before submitting" concept. Phase 68 (Agent Session Identity and Continuity)
    implements persistent agent identity across restarts -- the "cattle sessions, pet identity" pattern where sessions are ephemeral but agent identity and project state persist. Phase 69 (Orchestrator
    Integration Test Suite) creates a comprehensive end-to-end test harness that exercises the full orchestrator stack against real GitHub issues, replacing ad-hoc testing with a deterministic validation
    framework. Phase 70-73: Four new phases derived from a third gap analysis pass focused on production readiness gaps. Phase 70 (Backpressure and Rate Limit Management) addresses the operational reality
    of managing 20-30 concurrent agents (Gas Town scale) -- the research describes this scale but no phase handles API rate limits, resource exhaustion, or cascading failures when the orchestrator overwhelms
    external services. Phase 71 (Orchestrator Configuration Validation and Drift Detection) applies the "structural invariants" concept (phase 17) to the orchestrator''s own configuration -- as the system
    grows to 73 phases, misconfiguration becomes a critical risk. Phase 72 (Structured Metrics and External Telemetry Pipeline) completes the research''s "Status Surface" component by exposing orchestrator
    KPIs in standard formats (Prometheus, StatsD) for integration with existing DevOps monitoring infrastructure. Phase 73 (Agent Workspace Checkpoint and Incremental Restore) fills the gap between orchestrator-level
    resilience (phase 25) and the workspace-level crash recovery needed for long-running Ralph Wiggum loops -- when an agent crashes at 80% completion, checkpoints enable resumption instead of restart from
    scratch. Phase 74-80: Seven new phases derived from a fourth gap analysis pass focused on agent autonomy, operational tooling, and research concepts with no phase coverage. Phase 74 (Agent Trust Scoring
    and Gradual Autonomy Escalation) implements the research''s approval_policy spectrum (untrusted/on-failure/never) as a continuous trust scoring system -- agents earn autonomy through proven reliability,
    enabling a safe path to dark factory mode. Phase 75 (Deterministic Test Generation from Structural Invariants) implements the research''s claim that "structural tests and custom linters were themselves
    often generated by agents" -- auto-generating pytest tests from invariant rules for continuous CI enforcement. Phase 76 (Agent Output Deduplication and Work Conflict Prevention) addresses the Gas Town
    scale problem of 20-30 concurrent agents producing duplicate work -- detecting overlap before assignment prevents wasted tokens and merge conflicts. Phase 77 (Pipeline Template Library and Marketplace)
    provides reusable pipeline YAML templates for 8 common task types, implementing the research''s vision of WORKFLOW.md as shareable policy. Phase 78 (Orchestrator Interactive Debug Console) provides
    a kubectl-like REPL for real-time orchestrator inspection and manipulation, addressing the research''s "live observability dashboard" and Witness role concepts. Phase 79 (Inner Harness Backend Abstraction
    SDK) abstracts the boundary between Hermes and underlying coding agents (Claude Code, Codex, Cursor), enabling multi-vendor execution and backend failover -- the research notes the inner harness is
    "increasingly commoditized." Phase 80 (Agent-Legible Error Messages and Self-Healing Hints) transforms raw test failures and stack traces into agent-optimized summaries with fix suggestions, implementing
    the research''s "application legibility" concept at the most immediate level -- the error messages agents consume when self-correcting. Phase 81-86: Six new phases derived from a fifth gap analysis
    pass focused on extensibility, context intelligence, operational maturity, and compliance. The research emphasizes that the outer harness is "the DNA of the organization" and that harness engineering
    should be organization-specific. However, all 80 existing phases add monolithic modules to the orchestrator -- no phase provides a plugin architecture for extensibility. Phase 81 (Orchestrator Plugin
    System) addresses this by defining plugin interfaces for custom node types, sensors, approval gates, and spawner behaviors, enabling org-specific customization without forking. Phase 82 (Agent Context
    Seeding and Warm-Start) implements the research''s "Guides" concept at a higher level -- automatically discovering and injecting relevant context (similar past issues, prior solutions, relevant code
    patterns) before an agent starts work on a new task. While phase 38 transfers knowledge across projects, no phase handles within-project context discovery for specific tasks. Phase 83 (Orchestrator
    State Persistence and Migration Layer) implements the research''s "Beads" concept of a version-controlled persistent state layer -- the current system uses file-backed JSON but has no schema versioning,
    migration support, or backup/restore. Phase 84 (Agent Capability Registry and Gap Detection) directly implements the research''s key insight that "when agents failed, the team analyzed the environment
    to identify missing capabilities or structures" -- systematically discovering missing tools and suggesting their creation based on failure patterns. Phase 85 (Orchestrator Security Audit Trail) addresses
    the compliance requirements of dark factory mode (phase 35) by creating a tamper-proof, append-only audit log of all agent actions with reporting capabilities. Phase 86 (Orchestrator Feature Flags and
    Gradual Rollout) extends the research''s Elixir hot code reloading concept with feature flags for safely rolling out new orchestrator behaviors with automatic rollback. Phase 87-90: Four new phases
    derived from a sixth gap analysis pass focused on operational maturity gaps that emerge when the orchestrator runs at production scale for extended periods. The research describes the end-state as "Agent-Legible
    Software" where "code, tests, documentation, and infrastructure are all optimized for high-speed, autonomous iteration." However, after 86 phases, no phase tracks code quality trends over time (complexity
    growth, duplication accumulation, test coverage decay) -- the metrics that tell you whether agent-legibility is improving or eroding. Phase 87 (Code Quality Metrics and Technical Debt Tracking) fills
    this gap by measuring cyclomatic complexity, duplication, dead code, and test coverage trends on every PR, producing a "code health dashboard" that the self-improvement loop (phase 19) and health scorecard
    (phase 44) can consume. Phase 88 (Automated Documentation Synchronization) addresses the research''s emphasis on making software "directly understandable and verifiable by agents" -- when agents modify
    code, they should also update documentation. No phase currently ensures docs stay in sync with code changes. Phase 88 creates a post-commit hook that detects documentation drift and auto-updates affected
    docs (README, API docs, inline comments) as part of the pipeline. Phase 89 (Release Engineering Automation) extends the agent lifecycle from code-to-PR (phase 13) to code-to-release: version bumping,
    changelog generation, release notes, git tags, and GitHub release creation. The research describes the full development lifecycle but no phase covers what happens after merge. Phase 90 (Agent Performance
    Profiling and Prompt Optimization) directly implements the Dark Factory experiment''s insight that "when an agent failed, the team analyzed the environment" -- this phase profiles which prompts, roles,
    and strategies produce the best outcomes, creating a feedback loop that optimizes agent configuration over time based on actual performance data rather than intuition. Phase 91-95: Five new phases derived
    from a seventh gap analysis pass focused on operational visibility, safe testing infrastructure, agent intelligence, review quality, and self-healing. Phase 91 (Orchestrator Web Dashboard) addresses
    the research''s "live observability dashboard" concept -- phase 27 provides a terminal dashboard but the research describes a Phoenix-stack web UI for team-wide visibility. Phase 92 (Agent Simulation
    and Dry-Run Testing) fills a critical safety gap: the orchestrator has no way to test itself without consuming API tokens. Mock agent backends enable zero-cost pipeline validation, configuration testing,
    and regression reproduction. Phase 93 (Agent Long-Term Memory and Semantic Retrieval) upgrades the file-based knowledge extraction from phase 47 to semantic vector search using sentence-transformers,
    enabling agents to find conceptually similar past solutions even when terminology differs. Phase 94 (Ensemble Multi-Agent Code Review) applies Gas Town''s specialized role concept to code review: instead
    of a single reviewer, multiple specialized reviewers (security, performance, architecture, style, testing) analyze the same diff in parallel and synthesize their feedback with conflict resolution. Phase
    95 (Orchestrator Auto-Remediation and Self-Healing) implements the research''s "self-correcting codebase" vision at the orchestrator level: detecting stuck workers, corrupted workspaces, config drift,
    and recurring failures, then automatically fixing them with verification and escalation. Phase 96-97: Two new phases derived from an eighth gap analysis pass -- a systematic cross-reference of all 51
    concepts extracted from the research document against all 95 existing phases. This analysis found that 49/51 concepts (96.1%) are already covered by existing phases, confirming the roadmap is extremely
    comprehensive. The 2 remaining gaps are: (1) agent.md validation/linting -- the research emphasizes agent.md as a standardized AAIF spec, with analysis of 2,500+ repos identifying 4 required sections,
    but phase 55 only generates agent.md files without validating them. Phase 96 closes this gap with a deterministic sensor that checks agent.md files against the spec, analogous to having a code formatter
    without a linter. (2) Multi-session task chaining -- the research describes the Ralph Wiggum pattern where agents persist across sessions via externalized artifacts, and specifically calls out "large-scale
    refactors or complex migrations" as the target use case. While phase 20 handles context budgeting and phase 65 handles stop hooks for single-session loops, nothing implements the CHAINING pattern where
    one session''s output becomes the next session''s input with automatic context marshaling. Phase 97 closes this gap with a session chain manager that detects when tasks need multi-session execution.'
  phases_added_from: |2

    Phase 98-102: Five new phases derived from a ninth gap analysis pass focused on operational readiness, compositional integration, and operator experience gaps that emerge at the 97-phase scale. The previous eight passes achieved 96.1% research concept coverage (49/51), but concept coverage does not equal operational readiness. This pass analyzed the actual implemented codebase (30+ modules, 15+ independent scripts) and identified gaps in how the system operates as a whole rather than as individual components. Phase 98 (End-to-End Scenario Test Harness) addresses the critical gap that while phase 69 tests individual modules, no test validates the full issue-to-merge lifecycle as a coherent scenario. Phase 99 (Unified Orchestrator CLI) addresses the operator experience gap: 15+ independent Python scripts with different invocation patterns make the system unnecessarily hard to operate. Phase 100 (Agent PR Quality Standards) addresses application legibility at the PR level -- agents create PRs (phase 13) but no phase defines what a good agent-authored PR looks like. Phase 101 (Data Lifecycle and Retention) addresses the storage growth problem: with 20+ data-producing modules, storage grows unboundedly and no phase handles retention or cleanup. Phase 102 (Graceful Shutdown and Drain Mode) addresses operational safety: no phase handles stopping the orchestrator without losing active work or corrupting state.
    Phase 103-104: Two new phases derived from a tenth gap analysis pass focused on the operator experience and organizational governance gaps that emerge at production scale. Previous passes comprehensively covered the research document concepts (51/51 = 100%) and the operational lifecycle of individual components. This pass analyzed the workflow from the OPERATOR's perspective: (1) how does an operator efficiently feed work into the orchestrator, and (2) how does an organization maintain accountability when the orchestrator runs autonomously? Phase 103 (Agent-Ready Issue Filing and Speculative Ticket CLI) addresses the "input side" of the issue-tracker-as-control-plane pattern. The research's key insight for the 500% PR increase is that "engineers shifted from supervising single tasks to filing speculative tickets and reviewing completed work." While the orchestrator consumes issues (phase 4 poller), no phase helps operators create them efficiently. This phase provides a CLI with templates, validation, and bulk filing for speculative exploration. Phase 104 (Orchestrator Governance and Compliance Reporting) addresses the accountability gap in dark factory mode. The research describes 0% human review with 1B tokens/day spend. Phase 85 (audit trail) logs actions, Phase 44 (health scorecard) tracks health, and Phase 59 (PR velocity) measures throughput, but no phase synthesizes these into a stakeholder-facing governance report. This phase creates periodic compliance reports with trend analysis and anomaly detection, making dark factory mode defensible to engineering leadership.
