- id: 'phase-41'
  title: Intelligent Scheduling and Priority Queuing (GUPP Enforcement)
  status: planned
  goal: 'Replace simple cron polling with an intelligent scheduler that prioritizes work, enforces urgency, and optimizes throughput'
  description: 'The Gas Town research describes the "Gastown Universal Propulsion Principle" (GUPP): "if an agent has work on its hook, it must run it immediately." The current orchestrator uses simple
    cron-based polling that processes issues in GitHub API order with no concept of priority, urgency, or strategic scheduling. This phase adds: (1) a priority queue that ranks issues by urgency, complexity,
    dependencies, and strategic value, (2) urgency scoring based on issue age, labels, and dependencies, (3) GUPP-style enforcement that ensures ready work is processed immediately rather than waiting for
    the next cron cycle, (4) scheduling policies that balance throughput (many simple issues) with progress (complex issues don''t starve). This transforms the orchestrator from a passive poller into an
    active scheduler that maximizes the value of every agent-hour.'
  deliverables:
  - name: Priority queue system
    description: Ordered work queue with configurable priority scoring for issues
    status: planned
    acceptance_criteria:
    - description: Issues are scored and ranked by configurable priority criteria
      validation: 'queue 5 issues with different labels/ages, verify ordering'
      met: false
    - description: Queue persists across orchestrator restarts
      validation: 'restart orchestrator, check queue is restored'
      met: false
    tasks:
    - id: p41.d1.t1
      title: Create priority_queue.py module
      status: planned
      description: 'Create priority_queue.py: (1) score_issue(issue) -- compute priority score from: urgency (age-based: older issues score higher), labels (bug > feature > chore), complexity (simple issues
        first for throughput), dependencies (blocked issues deprioritized), strategic_value (from issue metadata or label), (2) enqueue(issue, score) -- add to priority queue backed by ~/.orchestrator/state/priority-queue.jsonl,
        (3) dequeue() -- return highest-priority issue, (4) reprioritize(issue_number, new_score) -- adjust priority after external events, (5) --dump to inspect queue state, --clear to reset.'
      files:
      - '~/zion/projects/agent-orchestration/priority_queue.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/priority_queue.py'
  - name: Urgency scoring engine
    description: 'Module that calculates urgency scores based on issue age, SLA targets, and dependency chains'
    status: planned
    acceptance_criteria:
    - description: Issues that have been open longer get higher urgency scores
      validation: 'create issues of different ages, check scoring'
      met: false
    - description: Issues blocking other issues get boosted priority
      validation: 'create dependency chain, check parent issue priority'
      met: false
    tasks:
    - id: p41.d2.t1
      title: Add urgency scoring to priority_queue.py
      status: planned
      description: 'Add urgency scoring to priority_queue.py: (1) age_factor -- linear ramp from creation date, configurable half_life (issues double in urgency every N days), (2) dependency_boost -- if
        an issue has sub-issues waiting on it, boost its priority (detect via gh CLI issue references), (3) SLA_targets (from priority_config.yaml) -- define target resolution times per label (P0: 1 hour,
        P1: 1 day, P2: 1 week), urgency spikes as SLA approaches, (4) starvation_prevention -- ensure complex issues don''t get perpetually skipped by simple ones (aging factor that guarantees eventual
        processing). Output urgency breakdown per issue for transparency.'
      dependencies:
      - p41.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/priority_queue.py'
      - '~/zion/projects/agent-orchestration/priority_config.yaml'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/priority_queue.py'
    - '~/zion/projects/agent-orchestration/priority_config.yaml'
  - name: GUPP enforcement in orchestrator loop
    description: 'Modify the orchestrator to use the priority queue instead of raw poller order, processing high-priority work immediately'
    status: planned
    acceptance_criteria:
    - description: Orchestrator processes issues by priority score rather than API order
      validation: 'file 3 issues, verify highest-priority is processed first'
      met: false
    - description: 'When webhook triggers arrive (phase 37), they jump the queue'
      validation: 'trigger webhook, verify issue is processed before lower-priority queued items'
      met: false
    tasks:
    - id: p41.d3.t1
      title: Integrate priority queue into orchestrator loop
      status: planned
      description: 'Modify orchestrator.py run_loop() to: (1) poll issues as before, but instead of processing in API order, add all to priority queue with scores, (2) dequeue the highest-priority issue,
        spawn worker for it, (3) re-score remaining issues on each iteration (urgency increases with time), (4) when webhook triggers arrive (from phase 37), add them to queue with elevated priority, (5)
        log scheduling decisions: "Skipped issue #42 (priority 3.2) in favor of issue #38 (priority 8.7, SLA in 2h)".'
      dependencies:
      - p41.d1.t1
      - p41.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
  - name: Scheduling analytics and SLA tracking
    description: 'Track scheduling performance: time-to-first-response, SLA compliance, queue depth trends'
    status: planned
    acceptance_criteria:
    - description: Can report average time from issue creation to worker spawn
      validation: 'python3 priority_queue.py --analytics --period week'
      met: false
    - description: SLA breach rate is tracked and reported
      validation: check analytics output for SLA metrics
      met: false
    tasks:
    - id: p41.d4.t1
      title: Add scheduling analytics to priority_queue.py
      status: planned
      description: 'Add --analytics mode to priority_queue.py: (1) compute avg_time_to_spawn (from issue creation to worker start), (2) SLA compliance rate (% of issues processed within target time), (3)
        queue_depth trends (average, peak, growth rate), (4) throughput (issues processed per day/week), (5) starvation detection (issues that have been in queue > N times without being selected). Store
        historical analytics in ~/.orchestrator/logs/scheduling/ for trend analysis.'
      dependencies:
      - p41.d1.t1
      - p8.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/priority_queue.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/priority_queue.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-41'
    type: soft
    reason: 'Priority queue modifies the orchestrator poller-spawner loop from phase 4'
  - source: 'phase-6'
    target: 'phase-41'
    type: soft
    reason: Role specialization from phase 6 affects which issues get which workers
  - source: 'phase-14'
    target: 'phase-41'
    type: soft
    reason: Health monitoring from phase 14 should track scheduling latency
  - source: 'phase-37'
    target: 'phase-41'
    type: soft
    reason: Webhook triggers from phase 37 should jump the priority queue
  technical_notes: 'The priority queue is the scheduling brain of the orchestrator. The key insight from Gas Town''s GUPP is that work should flow immediately, not wait for polling cycles. The queue is
    file-backed (JSONL) for persistence. Urgency scoring uses simple heuristics (age, labels, dependencies) rather than ML -- keep it transparent and debuggable. Starvation prevention is critical: without
    it, a constant stream of simple issues could permanently block complex ones.'
  risks:
  - 'Priority scoring heuristics may not match actual business priorities -- need configurable weights'
  - Urgency scoring could lead to thrashing if priorities change rapidly between iterations
  - 'Queue persistence adds I/O overhead on every loop iteration -- keep it lightweight'
  - 'GUPP enforcement could overwhelm the system if too many high-priority issues arrive at once -- need backpressure'
