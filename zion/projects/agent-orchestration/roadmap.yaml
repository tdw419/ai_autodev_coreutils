- id: 'phase-92'
  title: 'Agent Simulation and Dry-Run Testing'
  status: planned
  goal: 'Enable safe testing of pipeline configurations, orchestrator changes, and agent strategies using mock agent execution instead of real API calls'
  description: 'The research describes the Dark Factory model where "the team analyzed the environment to identify missing capabilities" when agents failed. But testing the orchestrator itself currently
    requires real agent execution (phase 69 integration tests use actual delegate_task). This is expensive, slow, and non-deterministic. No phase provides a simulation mode where the orchestrator runs end-to-end
    with mock agents that return configurable responses. This is critical for: (1) testing new pipeline YAML templates safely, (2) validating orchestrator configuration changes before deployment, (3) reproducing
    and debugging orchestrator bugs deterministically, (4) what-if analysis for scheduling and priority decisions, (5) CI testing of the orchestrator itself without consuming API tokens. This phase creates
    a mock agent backend and dry-run orchestrator mode that exercises the full stack with deterministic, configurable responses.'
  deliverables:
  - name: Mock agent backend
    description: Configurable mock agent that returns predefined responses instead of calling real LLM APIs
    status: planned
    acceptance_criteria:
    - description: 'Mock agent can be configured to return success, failure, or specific text responses'
      validation: 'configure mock to return "done", run pipeline, verify completion'
      met: false
    - description: Mock agent simulates realistic timing (configurable delay per turn)
      validation: 'set delay to 2s, verify pipeline takes expected time'
      met: false
    tasks:
    - id: p92.d1.t1
      title: Create mock_agent.py module
      status: planned
      description: 'Python module implementing a mock agent backend: (1) MockAgent class with configurable behavior: response_text (what the agent "says"), should_succeed (pass/fail), delay_seconds (simulate
        processing time), fail_after_n_turns (simulate multi-turn failure), response_file (load responses from JSON for complex scenarios), (2) Response modes: "always_succeed", "always_fail", "fail_then_succeed"
        (fails first N turns, succeeds after), "random" (configurable success rate), "scripted" (sequence of responses from file), (3) Turn tracking: records all prompts received, all responses given, total
        turns used, total tokens simulated, (4) Integration: implements the same interface as the real agent backend so executor.py can swap between real and mock without code changes. CLI: python3 mock_agent.py
        --mode fail_then_succeed --fail-count 2 --delay 1.0.'
      files:
      - '~/zion/projects/agent-orchestration/mock_agent.py'
