- id: 'phase-159'
  title: WebMCP Tool Contract Integration for Agent Web Verification
  status: planned
  goal: 'Replace visual browser automation with structured WebMCP tool contracts for token-efficient, reliable web-based verification'
  description: |
    The "WebMCP: AI-Web Interaction Standard" research (375 lines, 47 citations) describes
    a paradigm shift from visual browser automation (Chrome DevTools, screenshotting) to
    structured tool contracts where websites expose functionality as typed API calls. The
    research quantifies the improvement: traditional vision-based web interaction consumes
    70-90% of context window on HTML/screenshots, while WebMCP uses only 15-25%, achieving
    65-89% token reduction. WebMCP introduces three pillars: Context (session state and
    history), Capabilities (published tool contracts with JSON Schema), and Coordination
    (human-in-the-loop consent via requestUserInteraction()). Phase 39 (Browser-Based UI
    Verification) uses Chrome DevTools Protocol for visual verification. Phase 111 (MCP
    Integration) adds MCP server/client support but focuses on general tool discovery,
    not web-specific tool contracts. No existing phase implements WebMCP-style structured
    web interaction that could replace expensive visual browser automation with direct
    function calls.
  deliverables:
  - name: WebMCP tool contract adapter
    description: 'Discover and invoke WebMCP tool contracts from agent execution context'
    status: planned
    acceptance_criteria:
    - description: 'WebMCP tool contracts are discovered from target websites'
      validation: test tool discovery
    - description: 'Tool invocations use structured input/output instead of visual interaction'
      validation: test tool invocation
    tasks:
    - id: p159.d1.t1
      title: Create WebMCP adapter
      status: planned
      description: 'Create webmcp_adapter.py: (1) WebMCPClient class that connects to WebMCP-enabled websites via navigator.modelContext, (2) discover_tools(url) method that retrieves published tool contracts (name, description, inputSchema, readOnlyHint), (3) invoke_tool(url, tool_name, params) method that executes tool calls and returns structured results, (4) Session context management: track web session state across multiple tool invocations, (5) Fallback to visual automation when WebMCP is not available on target site, (6) Tool contract caching: cache discovered tools per domain to avoid repeated discovery, (7) Token savings estimation: compare tool-call token cost vs equivalent visual interaction.'
      files:
      - '~/zion/projects/agent-orchestration/webmcp_adapter.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/webmcp_adapter.py'
  - name: WebMCP-based verification pipeline node
    description: 'DAG node type that uses WebMCP for web verification instead of visual browser automation'
    status: planned
    acceptance_criteria:
    - description: 'Verification DAG node uses WebMCP when available, falls back to CDP'
      validation: test node execution
    - description: 'Token usage is reduced by 50%+ compared to visual verification'
      validation: compare token counts
    tasks:
    - id: p159.d2.t1
      title: Create WebMCP verification node
      status: planned
      description: 'Extend dag.py with WebMCP verification node: (1) webmcp_verify node type that takes URL and verification criteria, (2) Auto-discover available tools on target page, (3) Map verification criteria to tool invocations (e.g., "check form submission" -> invoke submit tool), (4) Compare structured results against expected outcomes, (5) Fall back to CDP-based visual verification if WebMCP unavailable, (6) Report token savings in execution log, (7) Support readOnlyHint for safe pre-PR verification (no state modification).'
