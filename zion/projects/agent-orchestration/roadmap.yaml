- id: 'phase-146'
  title: Fencing Tokens and Zombie Write Prevention
  status: planned
  goal: 'Prevent stale or crashed workers from corrupting state by using monotonically increasing fencing tokens that validate write authority'
  description: |
    The "Geometry OS Autodev Loop" research (259 lines, 47 citations) describes "Fencing
    Tokens" as a distributed systems pattern where a monotonically increasing number is
    associated with each lock. When a worker claims a task, it receives the current token.
    If it tries to commit work but the token has been incremented (due to a timeout or
    stale steal), the commit is rejected. This prevents the "Zombie Write" problem where
    a paused process wakes up and overwrites newer, valid data. Phase 117 (Cron Mutex)
    handles mutual exclusion via lock files but does NOT implement fencing tokens for
    write validation. Phase 83 (State Persistence) provides schema versioning but NOT
    per-operation fencing. Phase 145 (Stale Claim Stealing) increments a fencing token
    on steal but does not implement the full validation and rejection logic. Fencing
    tokens are a fundamental distributed systems primitive for correctness in concurrent
    systems where workers may become stale.
  deliverables:
  - name: Fencing token manager
    description: 'Monotonically increasing version tokens for all state mutations'
    status: planned
    acceptance_criteria:
    - description: 'Each state mutation is associated with a fencing token'
      validation: check token assignment
    - description: 'Tokens are monotonically increasing and never reused'
      validation: test token generation
    tasks:
    - id: p146.d1.t1
      title: Create fencing token manager
      status: planned
      description: 'Create fencing.py with: (1) FencingTokenManager class with get_token(resource_id) that returns current token, (2) increment_token(resource_id) that increments and returns new token, (3) validate_token(resource_id, held_token) that returns True if held_token matches current token, (4) TokenStore backed by JSON file with atomic write, (5) Configurable token namespace for different resource types (task, workspace, config).'
      files:
      - '~/zion/projects/agent-orchestration/fencing.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/fencing.py'
  - name: Zombie write prevention
    description: 'Reject writes from workers holding stale tokens'
    status: planned
    acceptance_criteria:
    - description: 'Write attempt with stale token is rejected with clear error'
      validation: test write rejection
    - description: 'Rejection is logged with worker ID and token mismatch details'
      validation: check rejection log
    tasks:
    - id: p146.d2.t1
      title: Implement zombie write prevention
      status: planned
      description: 'Extend fencing.py: (1) WriteGuard class that wraps state mutations with token validation, (2) guarded_write(resource_id, held_token, write_fn) that validates token before executing write_fn, (3) raises StaleTokenError if validation fails, (4) logs all rejections with: resource_id, held_token, current_token, worker_id, timestamp.'
      dependencies:
      - p146.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/fencing.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/fencing.py'
  - name: Integration and tests
    description: 'Wire fencing tokens into the executor and stale claim stealing, write tests'
    status: planned
