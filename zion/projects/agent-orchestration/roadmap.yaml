      status: planned
      description: 'Create metrics_server.py: (1) lightweight HTTP server using http.server (stdlib, no dependencies), (2) endpoints: /metrics (Prometheus format), /health (health check), /metrics/json
        (JSON format), (3) configurable port (default 9090), (4) optional basic auth (for non-local access), (5) runs as a background thread within the orchestrator process (no separate service), (6) graceful
        shutdown on orchestrator exit, (7) CLI: python3 metrics_server.py --port 9090 --auth user:pass. The server is intentionally minimal — no Flask/FastAPI dependency, just stdlib http.server. For production,
