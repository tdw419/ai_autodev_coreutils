- id: 'phase-38'
  title: 'Cross-Project Knowledge Transfer'
  status: planned
  goal: 'Enable agents to share learned patterns, solutions, and conventions across multiple repositories'
  description: 'When the orchestrator works across multiple repos (phase 16), each project is treated independently. But agents often encounter the same patterns across projects: similar error handling
    approaches, shared architectural patterns, common library usage. Gas Town''s Beads system enables shared state between agents. This phase adds a knowledge base that captures patterns learned from successful
    pipeline runs and makes them available to agents working on other projects. When an agent encounters a similar problem that was solved in another repo, it gets the previous solution as context. This
    creates a "learning organization" effect where the orchestrator gets more effective over time across all projects, not just within a single repo.'
  deliverables:
  - name: Pattern extraction module
    description: Module that extracts reusable patterns from successful pipeline runs
    status: planned
    acceptance_criteria:
    - description: 'Can analyze a completed run and extract patterns (solution approach, files changed, commands used)'
      validation: 'python3 knowledge.py extract --run RUN_ID'
      met: false
    tasks:
    - id: p38.d1.t1
      title: Create knowledge.py pattern extraction module
      status: planned
      description: 'Create knowledge.py: (1) extract_patterns(run_id) -- analyze a successful execution log to extract: issue type (from labels/title), solution_approach (from AI node prompts and outputs),
        files_changed (from git diff in workspace), commands_used (from bash nodes), test_strategy (from test node), (2) classify_pattern(pattern) -- categorize the pattern (error-handling, api-design,
        refactoring, testing, etc.), (3) store_pattern(pattern) -- save to ~/.orchestrator/knowledge/patterns.jsonl with: hash, category, source_repo, source_issue, created_at, effectiveness (derived from
        test results). Patterns are deduplicated by content hash to avoid storing identical solutions.'
      files:
