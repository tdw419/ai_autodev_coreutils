- id: 'phase-88'
  title: Automated Documentation Synchronization
  status: planned
  goal: 'Keep project documentation in sync with code changes by auto-detecting documentation drift and updating affected docs as part of the agent pipeline'
  description: 'The research emphasizes "Application Legibility" -- making software "directly understandable and verifiable by agents." Documentation is a core component of legibility: README, API docs,
    inline comments, and code examples should reflect the current state of the codebase. Phase 12 (agent self-documentation) generates AI_GUIDE.md but does not keep other docs in sync. When agents modify
    functions, rename classes, add parameters, or change behavior, the documentation often becomes stale. This phase creates a documentation synchronization system that: (1) detects documentation drift
    (docstrings that don''t match signatures, README examples that don''t work, changelog gaps), (2) auto-updates affected documentation as a pipeline step, (3) tracks documentation coverage over time (which
    files have docs, which don''t), (4) integrates with the garbage collection loop (phase 10) for periodic doc freshness checks. This directly supports the research''s vision of "Agent-Legible Software."'
  deliverables:
  - name: Documentation drift detector
    description: Module that detects when documentation is out of sync with code
    status: planned
    acceptance_criteria:
    - description: Detects docstrings that don't match function signatures
      validation: 'modify a function signature, verify drift detected'
      met: false
    - description: Detects stale code examples in README files
      validation: 'change an API, verify README example flagged'
      met: false
    tasks:
    - id: p88.d1.t1
      title: Create doc_sync.py module
      status: planned
      description: 'Python module implementing documentation drift detection: (1) Python docstring check: parse function/method signatures with AST, compare parameter names in docstring (Google/Sphinx/numpy
        style) against actual parameters, flag mismatches, (2) README example check: extract code blocks from README.md, attempt to parse/run them (syntax check at minimum, execution if safe), flag broken
        examples, (3) module doc check: verify each Python module has a docstring, (4) API doc check: if sphinx/mkdocs config exists, check that all public symbols are documented, (5) changelog check: compare
        git log since last changelog entry, flag unreleased changes. CLI: python3 doc_sync.py check --scope pr --base main. Output: list of drift items with file, line, type, description, suggested fix.'
      files:
      - '~/zion/projects/agent-orchestration/doc_sync.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/doc_sync.py'
  - name: 'Auto-documentation updater'
    description: Automatically update stale documentation based on code changes
    status: planned
    acceptance_criteria:
    - description: 'Can auto-fix docstring parameter mismatches'
      validation: 'inject mismatch, run updater, verify fix'
      met: false
    - description: Generates docstring stubs for undocumented functions
      validation: 'add undocumented function, run updater, verify stub created'
      met: false
    tasks:
