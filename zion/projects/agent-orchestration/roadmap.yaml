      status: planned
      description: 'Python module implementing capability registry: (1) scan project for capabilities: scripts in bin/, Makefile targets, linter configs (.eslintrc, pyproject.toml), CI configs (.github/workflows/),
        custom tools in tools/, (2) catalog each capability with: name, type (linter, test_runner, formatter, build_tool, custom_tool, template), language, file_path, description (extracted from comments
        or shebang), last_used (from execution history), usage_count. (3) store registry in ~/.orchestrator/capabilities.json, (4) provide CLI: python3 capability_registry.py scan, list, info <name>, stats.
        Support per-project registries.'
      files:
