- id: phase-26
  title: Work Item Decomposition (Mayor Pattern)
  status: planned
  goal: Enable the orchestrator to break down large or complex issues into smaller, independently executable sub-tasks
  description: 'Gas Town''s Mayor role acts as a concierge that distributes work, often decomposing
    complex tasks into sub-tasks for specialized workers. The current orchestrator treats
    each issue as a single unit of work -- a large feature request or refactoring issue
    gets assigned to one worker that must handle everything. This phase adds issue decomposition:
    an AI-powered analysis step that breaks complex issues into sub-tasks, creates
    sub-issues on GitHub, and orchestrates them through the pipeline. This directly
    implements the Mayor pattern and enables the "speculative ticket filing" workflow
    described in the research where engineers file high-level intent and the system
    decomposes into executable units.

    '
  deliverables:
  - name: Issue complexity analyzer
    description: Python module that analyzes an issue and determines if it needs decomposition
    status: planned
    acceptance_criteria:
    - description: Can classify issues as simple (single task) or complex (needs decomposition)
      validation: python3 decomposer.py --analyze ISSUE_NUM
      met: false
    tasks:
    - id: p26.d1.t1
      title: Create decomposer.py complexity analyzer
      status: planned
      description: 'Python module that: (1) reads an issue''s title, body, labels, and comments
        via gh CLI, (2) estimates complexity based on heuristics (body length, mentions
        of multiple files/components, keywords like "refactor", "migration", "redesign"),
        (3) uses a lightweight LLM call (via delegate_task) to assess if the issue
        spans multiple concerns, (4) outputs a classification: simple (pass through
        as-is) or complex (needs decomposition) with a confidence score. Threshold
        configurable in orchestrator.yaml.'
      files:
      - ~/zion/projects/agent-orchestration/decomposer.py
    scope_lines: 120
    scope_files:
