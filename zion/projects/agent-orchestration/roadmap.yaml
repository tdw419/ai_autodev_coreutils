- id: 'phase-89'
  title: Release Engineering Automation
  status: planned
  goal: 'Extend the agent lifecycle from code-to-PR to code-to-release with automated version bumping, changelog generation, and release publishing'
  description: 'The research describes the full development lifecycle as: "Plan, Implement, Run Tests, Review, and PR" (Archon) with engineers "filing speculative tickets and reviewing completed work at
    the end of the pipeline." But the pipeline stops at PR merge. No phase covers what happens after merge: version bumping, changelog generation, release notes, git tags, and GitHub release creation. In
    the Dark Factory model where agents handle the entire lifecycle autonomously, the release process must also be automated. This phase creates a release engineering system that: (1) detects when a release
    is warranted (based on merged PRs since last release), (2) generates a changelog from conventional commit messages, (3) bumps version following semver rules, (4) creates a git tag and GitHub release,
    (5) updates any downstream references (dependency versions, API version constants). This completes the "code to production" pipeline that the research implies but does not explicitly describe.'
  deliverables:
  - name: Release readiness detector
    description: Determine when a release is warranted and what version bump is needed
    status: planned
    acceptance_criteria:
    - description: Detects merged PRs since last release and classifies them by type
      validation: 'merge test PRs, verify classification'
      met: false
    - description: Recommends semver bump based on PR types (major/minor/patch)
      validation: 'merge breaking change PR, verify major bump recommended'
      met: false
    tasks:
    - id: p89.d1.t1
      title: Create release_detect.py module
      status: planned
      description: 'Python module implementing release detection: (1) get_last_release(repo): use gh CLI to find latest git tag or GitHub release, (2) get_merged_prs(repo, since_tag): list merged PRs since
        last release using gh CLI, (3) classify_prs(prs): parse PR titles/labels for conventional commit prefixes (feat:, fix:, breaking:, chore:), map to semver impact: breaking -> major, feat -> minor,
        fix -> patch, chore -> none, (4) recommend_version(current, prs): compute next version based on semver rules, (5) release_summary(prs): generate human-readable summary of changes grouped by type.
        CLI: python3 release_detect.py check --repo owner/repo. Output: current version, recommended next version, PR count by type, release summary.'
      files:
      - '~/zion/projects/agent-orchestration/release_detect.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/release_detect.py'
  - name: Automated release executor
    description: 'Perform the release: version bump, changelog, tag, GitHub release'
    status: planned
    acceptance_criteria:
    - description: 'Can bump version in common config files (package.json, pyproject.toml, Cargo.toml)'
      validation: 'run release on test project, verify version bumped'
      met: false
    - description: Creates changelog entry and GitHub release
      validation: check CHANGELOG.md and GitHub releases after run
      met: false
    tasks:
    - id: p89.d2.t1
      title: Create release_exec.py module
      status: planned
      description: 'Python module implementing release execution: (1) bump_version(project_dir, new_version): detect project type from config files (pyproject.toml, package.json, Cargo.toml, setup.py),
        update version field, (2) generate_changelog: create/update CHANGELOG.md with sections for each version (Features, Bug Fixes, Breaking Changes, Other), entries from PR titles with links, (3) create_tag(new_version):
        git tag -a with changelog as message, (4) create_github_release: gh release create with changelog body, auto-generated release notes, (5) update_downstream: check for API version constants (e.g.,
        __version__ in __init__.py, VERSION in config), update them. CLI: python3 release_exec.py release --version 1.2.0 --repo owner/repo. Safety: --dry-run flag, confirm prompt, require clean working
        tree.'
      dependencies:
      - p89.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/release_exec.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/release_exec.py'
  - name: Release pipeline template
    description: Create a DAG pipeline template for the full release workflow
    status: planned
    acceptance_criteria:
    - description: 'Pipeline template exists that runs detect -> generate -> publish'
      validation: 'inspect pipeline YAML, verify node chain'
      met: false
    tasks:
    - id: p89.d3.t1
      title: 'Create release-pipeline.yaml'
      status: planned
      description: 'Create pipelines/release-pipeline.yaml: BASH(check clean tree) -> BASH(detect release readiness) -> CONDITIONAL(release needed: BASH(bump version) -> BASH(generate changelog) -> BASH(create
        tag) -> BASH(push) -> BASH(create GitHub release) : BASH(no release needed, exit)). Include config for: conventional commit prefixes, version file locations, changelog format, prerelease flag. The
        release pipeline should be triggerable from the orchestrator as a post-merge action or via a dedicated cron schedule.'
      dependencies:
      - p89.d2.t1
      - p5.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/pipelines/release-pipeline.yaml'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/pipelines/release-pipeline.yaml'
  - name: Release engineering tests
    description: 'Test release detection, execution, and pipeline'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover version bumping, changelog generation, and safety checks'
      validation: 'python3 -m pytest test_release.py -v'
      met: false
    tasks:
    - id: p89.d4.t1
      title: Create test_release.py
      status: planned
      description: 'Create test_release.py: (1) test PR classification with mock PR titles (feat, fix, breaking, chore), (2) test semver recommendation (breaking -> major, feat -> minor, fix -> patch, mixed
        -> highest), (3) test version bump for pyproject.toml and package.json using temp files, (4) test changelog generation with mock PRs, (5) test safety checks (dirty tree rejected, dry-run produces
        no changes), (6) test edge cases: no PRs since last release, only chore PRs (no release needed), first release (no previous tag).'
      dependencies:
      - p89.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_release.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/test_release.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-89'
    type: soft
    reason: Release pipeline is a DAG pipeline that extends the executor from phase 5
  - source: 'phase-13'
    target: 'phase-89'
    type: soft
    reason: 'PR automation from phase 13 is the precursor -- releases happen after PRs merge'
  - source: 'phase-15'
    target: 'phase-89'
    type: soft
    reason: 'Safety policies from phase 15 should gate release actions (releases are high-impact)'
  - source: 'phase-43'
    target: 'phase-89'
    type: soft
    reason: Automated refactoring from phase 43 may trigger releases if combined with release pipeline
  technical_notes: 'Release automation is the natural completion of the agent lifecycle. The research describes engineers "reviewing completed work at the end of the pipeline" -- in the Dark Factory, even
    the release should be automated. Use conventional commits (feat:, fix:, breaking:) as the primary signal for version bumping. Support prerelease versions (1.2.0-rc.1) for staging releases. The release
    pipeline should be the simplest DAG: mostly bash nodes with a single conditional branch.'
  risks:
  - 'Automated releases could publish breaking changes prematurely -- require human approval for major version bumps'
  - 'Version bumping could fail on unusual project structures -- support common formats, skip unknown with warning'
  - 'Changelog generation quality depends on PR title quality -- the smart ticket filing (phase 60) helps here'
