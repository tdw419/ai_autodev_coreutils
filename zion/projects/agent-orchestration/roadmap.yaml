  dependencies:
  - source: 'phase-5'
    target: 'phase-180'
    type: soft
    reason: Change budget integrates into the DAG executor from phase 5
  - source: 'phase-6'
    target: 'phase-180'
    type: soft
    reason: Budget limits are role-specific, using role profiles from phase 6
  - source: 'phase-8'
    target: 'phase-180'
    type: soft
