- id: 'phase-96'
  title: agent.md Spec Validation and Compliance Linting
  status: planned
  goal: 'Create a deterministic sensor that validates agent.md files against the AAIF specification, ensuring machine-readability and structural completeness'
  description: 'The research emphasizes agent.md as a standardized format adopted by the Agentic AI Foundation (AAIF), with analysis of 2,500+ repositories identifying four required sections: tech stack
    definition, executable commands, code examples, and three-tier boundaries. Phase 55 generates agent.md files but nothing validates them. This phase creates a linting tool that checks agent.md files
    against the spec, runs as a deterministic sensor in DAG pipelines, and integrates with the garbage collector (phase 10) for periodic compliance scanning. This closes the gap between agent.md generation
    and agent.md quality assurance -- analogous to having a code formatter (phase 55) without a linter (this phase).'
  deliverables:
  - name: agent.md spec parser and validator
    description: Python module that parses agent.md files and validates them against the AAIF specification
    status: planned
    acceptance_criteria:
    - description: Parses agent.md frontmatter and body sections
      validation: 'python3 -c "from agent_md_validator import validate; print(validate(''test_agent.md''))"'
      met: false
    - description: 'Checks for all 4 required sections (tech_stack, commands, examples, boundaries)'
      validation: validate agent.md missing a section returns violations list
      met: false
    - description: 'Validates three-tier boundaries format (always/ask_first/never)'
      validation: invalid boundary format returns specific violation
      met: false
    tasks:
    - id: p96.d1.t1
      title: Create agent_md_validator.py
      status: planned
      description: 'Create agent_md_validator.py with: (1) parse_agent_md(filepath): parse frontmatter (yaml) and body (markdown), extract sections, (2) validate_structure(parsed): check for required sections
        -- tech_stack (language versions, framework versions, package manager), commands (build, test, lint, format with exact flags), examples (at least 2 code snippets showing project patterns), boundaries
