  - source: 'phase-5'
    target: 'phase-73'
    type: soft
    reason: Checkpoints integrate with the DAG executor from phase 5
  - source: 'phase-11'
    target: 'phase-73'
    type: soft
    reason: Workspace lifecycle from phase 11 manages the workspaces that checkpoints protect
  - source: 'phase-25'
    target: 'phase-73'
    type: soft
    reason: 'State recovery from phase 25 complements workspace-level checkpointing'
  - source: 'phase-65'
    target: 'phase-73'
    type: soft
    reason: Stop hooks from phase 65 trigger checkpoints before agent loop termination
  - source: 'phase-8'
    target: 'phase-73'
    type: soft
    reason: Execution logs from phase 8 record checkpoint events
  technical_notes: 'rsync --link-dest is the ideal mechanism for incremental checkpoints: it creates a full directory tree where unchanged files are hardlinks to the previous snapshot. This means: (1) incremental
    snapshots use almost no extra disk for small changes, (2) each checkpoint is a fully usable directory (no reconstruction needed), (3) cleanup is simple (rm -rf the checkpoint dir; hardlinked files are
    preserved by other checkpoints). The trade-off: hardlinks don''t work across filesystems, so checkpoints must be on the same filesystem as the workspace. For large workspaces (>1GB), consider tar-based
    incremental snapshots as an alternative.'
  risks:
  - Checkpoints consume disk space — need aggressive pruning for large workspaces
  - 'rsync --link-dest may be slow on very large directories — consider tracking changed files via inotify instead'
  - Restoring a checkpoint while another process is writing to the workspace could corrupt state — use file locking
  - Checkpoint metadata may include sensitive agent context — consider redaction
  - 'Incremental restore may not perfectly reproduce state (file permissions, symlinks) — test edge cases'
