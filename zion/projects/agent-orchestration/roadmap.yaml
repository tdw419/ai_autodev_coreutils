      description: 'Modify garbage_collector.py to include principles_checker as a scan step (after convention scanning), reporting principle violations alongside convention violations. Modify self_improve.py
        (phase 19) to track principle compliance scores over time and include them in the improvement report. Add a principles compliance section to the health scorecard (phase 44). This creates a closed
        loop: principles define quality -> GC measures compliance -> self-improvement tracks trends -> evolution suggests new principles.'
