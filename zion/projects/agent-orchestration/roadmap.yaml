  test_target: 10
- id: 'phase-108'
  title: 'Orchestrator Self-Upgrade Pipeline'
  status: planned
  goal: 'Enable the orchestrator to monitor its own git repository, pull updates, run its test suite, validate configuration, and hot-reload -- treating itself as a target project and closing the meta-level self-improvement loop'
  description: |
    The orchestrator can improve its strategies (phase 19), auto-remediate issues (phase 95), and hot-reload
    configuration (phase 22), but it cannot upgrade its own code. The research describes the end-state as a
    "self-correcting codebase" where the system maintains itself. Currently, when a new phase adds a module or
    fixes a bug, a human must git pull, run tests, and restart the orchestrator. This phase closes the loop by
    making the orchestrator treat its own codebase as a target project: it monitors its git repo for new commits,
    pulls updates, runs its full test suite, validates configuration compatibility, and hot-reloads the updated
    modules. If anything fails, it auto-reverts and alerts. This is the ultimate expression of the Dark Factory
    principle applied to the orchestrator itself.
  deliverables:
  - name: Self-upgrade monitor
    description: 'Monitor the orchestrator git repo for new commits and trigger upgrade process'
    status: planned
    acceptance_criteria:
    - description: Detects new commits on the orchestrator repo
      validation: 'push a commit, verify orchestrator detects it within polling interval'
      met: false
    tasks:
    - id: p108.d1.t1
      title: Create self-upgrade monitor module
      status: planned
      description: 'Create self_upgrade.py: (1) SelfUpgradeMonitor polls orchestrator git repo (~/zion/projects/agent-orchestration) for new commits on the active branch, (2) compare HEAD with last_known_commit (stored in state file), (3) on new commit: log commit details, trigger upgrade pipeline, (4) upgrade_pipeline: git stash -> git pull -> run tests -> validate config -> reload modules -> git stash pop, (5) any failure: git reset --hard to last_known_commit, log failure, alert operator, (6) CLI: orch self-upgrade status, orch self-upgrade run (manual trigger), orch self-upgrade enable|disable.'
      files:
      - '~/zion/projects/agent-orchestration/self_upgrade.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/self_upgrade.py'
  - name: Post-upgrade validation gate
    description: 'Run full test suite and config validation after pulling updates, before applying'
    status: planned
    acceptance_criteria:
    - description: Tests run after git pull and must pass before reload
      validation: 'inject failing test, verify upgrade is reverted'
      met: false
    - description: Config validation runs after test suite passes
      validation: 'inject invalid config change, verify upgrade is reverted'
      met: false
    tasks:
    - id: p108.d2.t1
      title: Implement post-upgrade validation gate
      status: planned
      description: 'Extend self_upgrade.py: (1) run_test_suite() executes python3 -m pytest tests/ --tb=short, captures exit code, (2) validate_config() runs config validation from phase 71, (3) check_imports() verifies all modules can be imported without errors, (4) validate_pipelines() loads all pipeline YAMLs through the DAG parser from phase 5, (5) validation_report() summarizes all checks, (6) all checks must pass before reload proceeds. Any single failure triggers rollback.'
      dependencies:
      - p108.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/self_upgrade.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/self_upgrade.py'
  - name: Module hot-reload after upgrade
    description: 'Reload updated Python modules without restarting the orchestrator process'
    status: planned
    acceptance_criteria:
    - description: Updated module code takes effect without process restart
      validation: 'upgrade a module, verify new behavior without restart'
      met: false
    tasks:
    - id: p108.d3.t1
      title: Implement module hot-reload
      status: planned
      description: 'Extend self_upgrade.py: (1) reload_module(name) uses importlib.reload() to reload updated modules, (2) reload_order defines dependency order (dag before executor, executor before orchestrator), (3) after_reload_verify() runs smoke tests on reloaded modules, (4) fallback: if reload causes import errors, fall back to process restart via cron respawn, (5) log all reloads with module names and timestamps for audit trail.'
      dependencies:
      - p108.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/self_upgrade.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/self_upgrade.py'
  - name: Self-upgrade tests
    description: 'Tests for the self-upgrade pipeline including rollback scenarios'
    status: planned
    acceptance_criteria:
    - description: Tests cover upgrade detection, validation gates, and rollback
      validation: 'python3 -m pytest test_self_upgrade.py -v'
      met: false
    tasks:
    - id: p108.d4.t1
      title: Create test_self_upgrade.py
      status: planned
      description: 'Create test_self_upgrade.py: (1) test_commit_detection: create a test commit, verify monitor detects it, (2) test_upgrade_success: mock git pull with passing tests, verify reload happens, (3) test_upgrade_rollback_on_test_failure: mock failing test, verify git reset and alert, (4) test_upgrade_rollback_on_config_error: mock invalid config, verify rollback, (5) test_reload_order: verify modules reload in correct dependency order, (6) test_stash_handling: verify git stash/pop works when there are uncommitted changes.'
      dependencies:
      - p108.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_self_upgrade.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_self_upgrade.py'
  dependencies:
  - source: 'phase-22'
    target: 'phase-108'
    type: soft
    reason: 'Config hot-reload (phase 22) provides the reload infrastructure that self-upgrade extends'
  - source: 'phase-71'
    target: 'phase-108'
    type: soft
    reason: 'Config validation (phase 71) is used as a post-upgrade validation gate'
  - source: 'phase-7'
    target: 'phase-108'
    type: soft
    reason: 'Test suite (phase 7) is run as a post-upgrade validation gate'
  - source: 'phase-95'
    target: 'phase-108'
    type: soft
    reason: 'Auto-remediation (phase 95) handles the rollback if upgrade causes issues'
  - source: 'phase-85'
    target: 'phase-108'
    type: soft
    reason: 'Audit trail (phase 85) must log all self-upgrade events for compliance'
  technical_notes: 'Self-upgrade runs in a separate process (forked from the orchestrator) to avoid corrupting the running process if reload fails. The upgrade monitor checks for new commits every 5 minutes (configurable). Self-upgrade is opt-in and disabled by default -- operators must explicitly enable it with orch self-upgrade enable. The orchestrator will never self-upgrade to a branch other than the currently active branch. Rollback uses git reset --hard to the last known good commit, which is simple and reliable.'
  risks:
  - 'Self-upgrade could break the orchestrator in ways that rollback cannot fix (e.g., state file format changes) -- require version compatibility checks'
  - 'Race condition if upgrade happens while orchestrator is mid-task -- only upgrade when no active workers'
  - 'importlib.reload() can cause subtle issues with module-level state -- prefer process restart as fallback'
  - 'Self-upgrade creates a bootstrapping paradox: the upgrade monitor itself could have bugs -- keep the monitor simple and external'
  scope_lines_total: 320
  test_target: 10
- id: 'phase-109'
  title: 'Multi-Team Policy Isolation and Resource Quotas'
  status: planned
  goal: 'Support multiple teams and projects with isolated policies, pipelines, approval thresholds, trust scores, and cost budgets -- enabling enterprise-scale deployment where different organizational units have different governance requirements'
  description: |
    Phase 16 handles multi-repo orchestration but all repos share the same global policies. Phase 51 handles
    federation across orchestrator instances but doesn't address policy isolation within a single instance. In a
    real organization, different teams need different governance: Team A might allow auto-merge for test projects
    (dark factory mode), while Team B requires human approval for every PR. Team A has a $100/day token budget,
    Team B has $500. Team A uses the standard pipeline, Team B adds a security review stage. The research describes
    Symphony as an enterprise orchestration layer and Gas Town as managing "20-30 concurrent agents" -- at this
    scale, policy isolation is essential to prevent one team's settings from affecting another. This phase adds
    per-team/per-project policy namespaces that overlay the global configuration.
  deliverables:
  - name: Policy namespace and override system
    description: 'Per-team/per-project policy overrides that layer on top of global configuration'
    status: planned
    acceptance_criteria:
    - description: Can define team-specific policies that override globals
      validation: 'orch config team set TEAM_A approval_policy never'
      met: false
    - description: 'Unspecified team settings fall back to global defaults'
      validation: 'orch config team get TEAM_B max_concurrent returns global default'
      met: false
    tasks:
    - id: p109.d1.t1
      title: Create policy namespace module
      status: planned
      description: 'Create policy_namespace.py: (1) PolicyNamespace(team, overrides) stores per-team config overrides, (2) resolve_config(team, key) returns team-specific value if set, else global default, (3) effective_config(team) returns full merged config for a team, (4) YAML storage: teams/ directory with one YAML per team, (5) supported overrides: approval_policy, max_concurrent, max_turns, model_tier, pipeline, trust_threshold, cost_budget_daily, labels_filter, repo_list, (6) CLI: orch config team list, orch config team set TEAM KEY VALUE, orch config team get TEAM KEY.'
      files:
