    type: soft
    reason: Workspace checkpoints from phase 73 are the restore points for corruption remediation
  technical_notes: 'Auto-remediation is the highest-risk phase because it takes autonomous action. Every remediation must be: (1) logged in the audit trail (phase 85), (2) rate-limited to prevent runaway
    fixes, (3) verified after execution, (4) escapable via a global kill switch. Start with the safest remediations first (stuck worker restart, config rollback) and add riskier ones (workspace reset, dependency
    repair) only after the verification loop is proven reliable. The research describes the self-correcting codebase as the end-state -- this phase is a significant step toward that vision.'
  risks:
  - 'Auto-remediation could make things worse (kill the wrong worker, reset the wrong workspace) -- extensive testing required'
  - Remediation rate limits could prevent fixing legitimate issues during outage storms
  - 'Workspace reset could lose uncommitted work -- always checkpoint before remediation'
  - 'Config rollback could undo intentional changes -- require config_drift_tolerance setting'
  - 'Remediation history could grow large -- implement retention and archival'
