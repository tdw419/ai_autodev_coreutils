  technical_notes: 'Stop hooks are the missing implementation piece for the Ralph Wiggum pattern. The research describes them as essential but no existing module implements them. The key insight is that
    stop hooks check for MACHINE-VERIFIABLE completion criteria, not agent self-assessment. This makes them deterministic and reliable. The fresh-context-per-iteration approach keeps agents in the "smart
    zone" (30-60% of context window) throughout long-running tasks.'
  risks:
  - 'Completion tag detection could have false positives (tag in comments, docs) -- use specific tag formats'
  - Stuck detection (no changes) could trigger too early on legitimate debugging sessions
  - Context summaries could lose important details from previous iterations
  - 'Infinite loop prevention relies on max_iterations -- if set too high, wastes tokens'
  - 'Stop hooks add complexity to the agent execution path -- must be optional and default-off'
  scope_lines_total: 420
  test_target: 10
