  description: 'The orchestrator, DAG executor, poller, spawner, and role system have no tests. This phase adds unit tests for each module, an integration test that exercises a full pipeline end-to-end,
    and fixes any bugs discovered during testing. This is a prerequisite for relying on the orchestrator in production.'
