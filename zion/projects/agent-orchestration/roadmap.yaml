  technical_notes: 'Chaos engineering for orchestrators is different from traditional chaos engineering. The "system under test" is the orchestration logic (poll, spawn, recover), not the application code.
    Faults should target the orchestration layer: gh CLI failures, delegate_task crashes, filesystem issues. The key insight: an orchestrator that cannot handle its own failures will cascade those failures
    to all workers. Resilience score is the gate for dark factory mode.'
