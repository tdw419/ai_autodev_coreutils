- id: phase-42
  title: External Application Observability Integration
  status: planned
  goal: Enable agents to access target application logs, metrics, and traces during pipeline
    execution for effective debugging and verification
  description: 'The Harness Engineering research explicitly identifies "Integrated Observability:
    Providing agents with local access to logs, metrics, and traces so they can reason about
    the behavior of the code they have just written" as a core pillar of Application Legibility.
    Currently, agents can run tests and lint but cannot inspect the target application''s runtime
    behavior. This creates a significant blind spot: agents can write code that passes unit tests
    but fails in production due to runtime issues they cannot observe. This phase adds an observability
    bridge that: (1) discovers and reads application log files from the target project, (2) parses
    common log formats (structured JSON, unstructured text, common frameworks), (3) surfaces relevant
    log entries as context in AI node prompts when debugging or verifying changes, (4) supports
    reading metrics from local metrics endpoints (Prometheus, /health, /metrics), (5) adds an OBSERVE
    node type to the DAG executor for explicit observability checks. This closes the Application
    Legibility gap for runtime behavior.'
  deliverables:
  - name: Log discovery and parsing module
    description: Python module that discovers, reads, and parses application log files from target
      projects
    status: planned
    acceptance_criteria:
    - description: Module can discover log files in common locations (logs/, var/log, stdout captures)
      validation: python3 observability.py discover --project /path/to/project
