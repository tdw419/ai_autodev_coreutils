- id: 'phase-99'
  title: Unified Orchestrator CLI
  status: planned
  goal: Create a single orch command that provides a consistent interface to all orchestrator modules
  description: 'The current orchestrator consists of 15+ independent Python scripts (poller.py, spawner.py, executor.py, merge_queue.py, health_monitor.py, garbage_collector.py, etc.), each with its own
    invocation pattern, argument parsing, and output format. The research describes Symphony as a long-running automation service with a unified interface. While Hermes uses cron scheduling rather than
    a daemon, the operator experience of running 15 separate scripts with different flags is unnecessarily complex. This phase creates a unified orch CLI that: (1) provides a single entry point with subcommands,
