  goal: 'Implement persistent agent identity across restarts, following the research''s "cattle sessions, pet identity" pattern'
  description: 'The research describes treating "individual agent sessions as ephemeral cattle, while treating the agent''s identity and the project''s state as persistent pets." Currently, each agent session
    is anonymous -- there is no way to correlate work across sessions, track an agent''s history, or resume interrupted work. This phase adds a session identity layer that persists across restarts, enabling
    work continuity and historical tracking.'
