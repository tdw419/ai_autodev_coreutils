- id: 'phase-106'
  title: 'Real-Time Alerting and Notification System'
  status: planned
  goal: 'Implement push-based alerting that proactively notifies operators when orchestrator metrics breach configurable thresholds, bridging the gap between observability data and operator awareness'
  description: |
    The orchestrator has extensive observability infrastructure (execution logs phase 8, health monitoring phase 14,
    terminal dashboard phase 27, health scorecard phase 44, metrics pipeline phase 72) but ALL of it is pull-based:
    operators must check the dashboard, query metrics, or read reports to discover problems. The research describes
    Symphony's "Status Surface" as providing "real-time visibility" which implies proactive notification, not passive
    monitoring. When a worker gets stuck, costs spike, approval rates drop, or test failures cluster, operators
    should be notified immediately. This phase creates an alerting system with configurable rules and multiple
    notification channels (GitHub issue comments, log markers, webhook POST, stdout).
  deliverables:
  - name: Alert rule engine
    description: 'Configurable alert rules that evaluate conditions against orchestrator metrics and trigger notifications'
    status: planned
    acceptance_criteria:
    - description: Can define alert rules in YAML with metric conditions and notification channels
      validation: 'orch alerts list shows configured rules'
      met: false
    - description: Alert fires when a configured threshold is breached
      validation: 'inject metric breach, verify notification sent'
      met: false
    tasks:
    - id: p106.d1.t1
      title: Create alerting engine module
      status: planned
      description: 'Create alerting.py: (1) AlertRule dataclass (name, metric_path, condition [gt/lt/eq/change_pct], threshold, channel, cooldown_minutes, severity [info/warning/critical]), (2) AlertEngine evaluates rules against live metrics from health_monitor, cost_tracker, execution_log, (3) built-in rules: worker_stuck >30min, cost_spike >2x daily_avg, approval_rejection_rate >20%, test_failure_rate >50%, trust_score_drop >10%, (4) per-rule cooldown prevents alert fatigue, (5) CLI: orch alerts list, orch alerts test RULE_NAME.'
      files:
      - '~/zion/projects/agent-orchestration/alerting.py'
      - '~/zion/projects/agent-orchestration/alerts/default-rules.yaml'
    scope_lines: 120
