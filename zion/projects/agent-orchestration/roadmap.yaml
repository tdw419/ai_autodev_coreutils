  - name: Pipeline template library
    description: Create reusable pipeline YAML templates for common software engineering tasks
    status: planned
    acceptance_criteria:
    - description: At least 8 templates cover common task types
      validation: python3 template_lib.py list
      met: false
    - description: Each template is a valid pipeline YAML that the executor can run
      validation: 'instantiate template, run through executor'
      met: false
    tasks:
