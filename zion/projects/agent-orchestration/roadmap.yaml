        3 reviews with overlapping findings, verify dedup produces unified list, (4) test conflict resolution: security says "reject" but style says "approve", verify conflict flagged, (5) test prioritization:
        mix of critical/high/low findings, verify sorted correctly, (6) test adaptive selection: auth file change includes security, SQL change includes performance, small change uses fewer reviewers, (7)
        test cost-aware reduction: tight budget reduces to 2 reviewers, (8) test edge cases: empty diff, single-line change, massive diff.'
      dependencies:
