      status: planned
      description: 'Extend inner_harness.py: (1) BackendHealth dataclass: backend_name, is_healthy, last_check, consecutive_failures, error_message, (2) health_check(backend) -> BackendHealth: run a simple
        test prompt, check response time and validity, (3) health_checker cron: periodic health checks (every 5 min), persist results to ~/.orchestrator/backends/health.json, (4) failover logic: if primary
        backend fails, try fallback backends in priority order, (5) circuit breaker: if a backend fails 3 consecutive times, disable it for 10 minutes (configurable), (6) integrate with health monitor (phase
        14): backend health as a monitored metric, (7) backend recovery: re-enable disabled backends after cooldown period, (8) log failover events to execution history.'
