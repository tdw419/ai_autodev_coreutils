      validation: 'simulate failed task, verify attempt recorded and retry scheduled'
      met: false
    - description: Retry prompts include failure history context
      validation: 'check retry prompt contains "Previous Attempts" section'
      met: false
    tasks:
    - id: p131.d2.t1
      title: Integrate attempt_tracker into orchestrator.py
      status: planned
      description: |-
        Update orchestrator.py: (1) after a worker completes with failure (review rejection,
