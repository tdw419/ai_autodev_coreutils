  technical_notes: 'True AVM requires language-specific instrumentation (e.g., Python sys.monitor, Node.js --inspect). The Hermes implementation uses subprocess-level monitoring: capturing command arguments, environment variables, file access patterns, and exit codes. This is less precise than in-process instrumentation but language-agnostic and requires no code modification. The key insight from the research is that static scanning catches only ~60% of vulnerabilities -- runtime monitoring catches the behavioral patterns that static analysis misses (e.g., a function that reads a file path from user input and opens it without validation).'
