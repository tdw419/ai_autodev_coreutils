  - source: 'phase-16'
    target: 'phase-30'
    type: soft
    reason: 'Multi-repo orchestration from phase 16 needs cross-repo coordination'
  technical_notes: 'This is a deliberately simple implementation of Beads -- filesystem-based rather than database-backed. The shared state JSON file is the coordination point. File locking (fcntl.flock
    on Linux) ensures safe concurrent access. For production scale, this could be upgraded to SQLite or Dolt, but JSON files are sufficient for the Hermes orchestrator''s expected workload (10-20 concurrent
    workers).'
  risks:
