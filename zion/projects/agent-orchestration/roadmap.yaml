  technical_notes: 'The key insight from the research: the human bottleneck is the real constraint, not the agents. The orchestrator can run 24/7, but humans can only review so many PRs per day. This phase
    maximizes the human''s throughput: better ticket templates reduce filing time, better review queues reduce triage time, better summaries reduce per-PR review time. The triage classifier is deliberately
    heuristic (keyword-based), not LLM-based, to keep it fast and deterministic.'
  risks:
  - 'Auto-classification may mislabel issues -- always require human confirmation before labeling'
  - 'Review summaries may miss important context -- show full PR details on demand, don''''t rely solely on summaries'
  - 'Command center CLI could become bloated -- keep it focused on the top 5 human workflows'
