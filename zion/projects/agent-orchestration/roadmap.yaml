- id: 'phase-78'
  title: Orchestrator Interactive Debug Console
  status: planned
  goal: 'Provide an interactive REPL for inspecting and manipulating orchestrator state in real-time, enabling rapid debugging of orchestration issues without restarting the system'
  description: 'Phase 18 provides trace formatting tools and phase 8 provides execution logs, but debugging live orchestrator issues (stuck workers, stale locks, incorrect scheduling decisions) requires
    reading log files and running CLI commands manually. The Symphony research describes a "live observability dashboard" via Phoenix, and the Gas Town research describes the Witness role as an "observation
    and logging agent." This phase creates a Python REPL (using cmd or readline) that provides: (1) real-time inspection of orchestrator state (active workers, queue, trust scores, health status), (2) interactive
    commands to manipulate state (cancel worker, retry issue, force-promote trust level, clear queue), (3) query capabilities (search execution history, filter by status/time, drill into specific pipeline
    runs), (4) live mode that auto-refreshes state display, (5) connection to the health monitor (phase 14) for real-time alerts, and (6) a scriptable mode for cron/debug automation. This is the operator''s
    console -- the equivalent of kubectl for the orchestrator.'
  deliverables:
  - name: Debug console REPL
    description: 'Interactive command-line interface for orchestrator inspection and manipulation'
    status: planned
    acceptance_criteria:
    - description: Can start the debug console and see orchestrator state
      validation: python3 debug_console.py
      met: false
    - description: 'Core commands work: workers, queue, history, cancel, retry'
      validation: test each command in REPL
      met: false
    tasks:
    - id: p78.d1.t1
      title: Create debug_console.py REPL
