        nodes use <40% of budget, recommend reducing budget (saves input tokens), (3) analyze retry patterns: if retry success rate is <30%, recommend reducing retry count (saves wasted tokens), (4) output
        parameter recommendations with estimated savings and success rate impact. Support --apply flag to write changes to pipeline YAML files. Keep a tuning log with before/after comparisons.'
