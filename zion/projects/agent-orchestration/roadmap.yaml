    description: 'Test grammar validation, delimiter switching, and recovery strategies'
    status: planned
    acceptance_criteria:
    - description: 'Valid JSON/YAML/structured output passes validation'
      validation: run tests
    - description: 'Malformed output triggers recovery strategy'
      validation: test recovery scenarios
