  - source: 'phase-64'
    target: 'phase-180'
    type: soft
    reason: OS-level sandboxing (phase-64) and application-level budgets (phase-180) are complementary safety layers
  - source: 'phase-15'
    target: 'phase-180'
    type: soft
    reason: Safety policies (phase-15) define what operations need approval; budgets define how MUCH change is allowed
  technical_notes: "Change budgets complement rather than replace other safety mechanisms. OS sandboxing prevents accessing files outside the workspace. Approval gates prevent sensitive operations. Change budgets prevent excessive modification WITHIN the workspace. All three layers together create defense-in-depth for autonomous operation. Budgets are intentionally coarse-grained (file counts, line counts) rather than semantic (no \"don't delete the auth module\" rules) -- semantic rules belong in safety policies (phase-15). The budget system answers \"how much did you change?\" while safety policies answer \"what did you change?"
  risks:
  - 'Budget thresholds may be too tight for legitimate large-scale refactors -- allow per-task budget overrides'
  - 'Line counting from git diff may be inaccurate for generated files or whitespace changes -- normalize before counting'
  - 'Budget tracking adds overhead to each pipeline step -- keep diff parsing lightweight'
  - 'Agents may learn to work around budgets by making many small sessions -- this is actually desirable behavior (smaller, more focused changes)'
