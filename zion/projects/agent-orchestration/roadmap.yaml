      title: Add knowledge management CLI to knowledge.py
      status: planned
      description: 'Add management subcommands to knowledge.py: (1) list (--category, --repo, --since,
        --top N) -- browse stored patterns, (2) prune (--older-than, --min-effectiveness) -- remove
        low-quality or stale patterns, (3) export (--format json/markdown, --output file) -- export
        patterns for sharing between orchestrator instances, (4) import (--input file) -- import patterns
