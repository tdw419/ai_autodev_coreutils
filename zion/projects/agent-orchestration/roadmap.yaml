- id: 'phase-52'
  title: Agent Output Provenance Tracking
  status: planned
  goal: 'Track which agent, role, session, and pipeline produced each line of code for full auditability and attribution'
  description: 'The research describes the Dark Factory experiment where "every line of the million-line codebase was authored by Codex agents." This level of provenance is essential for auditing, debugging,
    and understanding agent contributions over time. The current orchestrator records pipeline-level results in execution logs (phase 8) but has no code-level provenance. This phase adds git-based provenance:
    each agent commit is tagged with metadata (agent role, pipeline name, run ID, issue number), a provenance CLI can query which agent modified any given file or line range, and a summary report shows
    per-agent contribution stats. This enables the "who wrote what" question that is critical for the Dark Factory model and for understanding agent productivity patterns. The research emphasizes that "when
    agents failed, the team analyzed the environment" -- provenance data makes this analysis possible at the code level.'
