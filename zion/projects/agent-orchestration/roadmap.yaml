      description: 'Create a weekly Hermes cron that runs cost_optimizer.py --analyze --period week --recommend-models --tune-params and outputs a structured report. The report includes: total spend for
        the period, top waste patterns, model tier recommendations, parameter tuning suggestions, and estimated total savings if all recommendations are applied. Store reports in ~/.orchestrator/reports/cost/
        for historical comparison. Optionally create GitHub Issues for high-impact savings opportunities (>$50/week estimated).'
