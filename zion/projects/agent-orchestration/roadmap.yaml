      description: 'Test cases: (1) SQL injection detection with parameterized vs non-parameterized queries, (2) Command injection detection with shell metacharacters, (3) Path traversal detection with ../ and encoded variants, (4) Secret exposure detection in environment variables and subprocess args, (5) False negative test: safe code produces no findings, (6) False positive rate check: well-written code with similar patterns produces minimal findings, (7) Findings output format matches review sensor input schema, (8) Critical findings trigger safety policy violation, (9) Executor integration wraps test execution correctly.'
