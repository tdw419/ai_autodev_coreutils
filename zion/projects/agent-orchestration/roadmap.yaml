  goal: 'Align the Hermes orchestrator with the OpenAI Symphony SPEC.md format, implementing WORKFLOW.md as a per-project policy engine'
  description: 'The research doc details Symphony''s SPEC.md with specific config parameters (tracker.kind, polling.interval_ms, agent.max_turns, agent.max_concurrent, codex.approval_policy) and the WORKFLOW.md
    concept as a per-project policy engine that defines prompt templates and runtime settings. Phase 36 (Dynamic Policy Engine) covers general policy loading, but does not implement the specific WORKFLOW.md
    format or Symphony spec parameter alignment. This phase makes the orchestrator directly compatible with the Symphony specification format, enabling projects that define WORKFLOW.md files to be picked
    up automatically -- just like Symphony does. It also maps Symphony''s config params to Hermes equivalents so teams migrating from Symphony to Hermes have a clear translation path.'
