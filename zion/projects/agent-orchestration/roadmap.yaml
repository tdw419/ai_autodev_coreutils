    description: 'Test classifier, proposal generation, and reporting'
    status: planned
    acceptance_criteria:
    - description: 'Test file covers all 6 failure categories, proposal generation, and batch analysis'
      validation: 'python3 -m pytest test_harness_gap.py -v'
    tasks:
    - id: p176.d4.t1
      title: Create test_harness_gap.py
      status: planned
      description: 'Test cases: (1) Missing guide: agent fails on unfamiliar file type, classifier identifies guide gap, (2) Missing invariant: agent violates structure not in invariants.yaml, classifier identifies invariant gap, (3) Missing tool: agent tries to run tool that is not installed, classifier identifies tool gap, (4) Insufficient context: context budget exceeded, classifier identifies context gap, (5) Bad prompt: fix loop converges to wrong solution, classifier identifies prompt gap, (6) External dependency: install/build fails, classifier identifies dependency gap, (7) Batch classify produces correct frequency counts, (8) Improvement proposals are specific and actionable, (9) Weekly report generates correct markdown, (10) Trend calculation is accurate.'
