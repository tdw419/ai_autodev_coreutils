      status: planned
      description: 'Add sync_from_github(repo, labels) to work_graph.py: (1) uses gh CLI to list issues with specified labels, (2) creates/updates WorkItems for each issue, (3) parses dependency references
        from issue body (e.g. "Depends on #42" or "Blocked by #43"), (4) adds dependency edges for referenced issues, (5) marks issues as done if they are closed on GitHub, (6) handles merge conflicts (local
        graph changes vs GitHub state -- GitHub wins for issue state, local graph wins for dependency edges). Also add a --watch mode that syncs periodically.'
      files:
      - '~/zion/projects/agent-orchestration/work_graph.py'
      dependencies:
      - p54.d1.t1
    scope_lines: 100
