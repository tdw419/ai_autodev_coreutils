    - id: p159.d3.t1
      title: Write WebMCP adapter tests
      status: planned
      description: 'Test cases: (1) Tool discovery returns published contracts, (2) Tool invocation with valid params succeeds, (3) Tool invocation with invalid params returns schema error, (4) Fallback to CDP when WebMCP unavailable, (5) Session context persists across invocations, (6) Token savings estimation is calculated, (7) readOnlyHint is respected in verification mode, (8) Verification node produces pass/fail result.'
      dependencies:
      - p159.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_webmcp.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_webmcp.py'
  dependencies:
  - source: 'phase-39'
    target: 'phase-159'
    type: soft
    reason: Browser verification provides the fallback when WebMCP is not available
  - source: 'phase-111'
    target: 'phase-159'
    type: soft
    reason: MCP integration provides the protocol framework that WebMCP extends for web
  technical_notes: 'The research describes WebMCP as an extension of MCP specifically adapted for the web browser security model. The key innovation is the Declarative API where HTML forms can become tools with minimal markup changes (semantic attributes), and the Imperative API for dynamic JavaScript-driven tool registration. The three-pillar design (Context, Capabilities, Coordination) maps well to the orchestrator pattern: Context maps to session state management, Capabilities maps to tool discovery, and Coordination maps to safety approval gates. The 65-89% token reduction makes this a high-value optimization for dark factory mode where agents verify their own work via web UIs.'
  risks:
  - 'WebMCP is a proposed W3C standard with limited adoption -- treat as optional enhancement, not required'
  - 'WebMCP tool contracts may not be available on most websites in the near term -- fallback to CDP is essential'
