- id: 'phase-79'
  title: Inner Harness Backend Abstraction SDK
  status: planned
  goal: 'Abstract the interface between the Hermes orchestrator and underlying coding agents (Claude Code, Codex CLI, Cursor), enabling seamless backend switching and multi-vendor agent execution'
  description: 'The research describes three layers of agent architecture: Inner Harness (execution, tool calls, reasoning), Outer Harness (governance, policy, sensors), and Orchestrator (coordination).
    Phase 40 covers multi-model backend routing for LLM API calls, but no phase abstracts the inner harness -- the boundary between the Hermes orchestrator and the actual coding agent that executes tasks.
    Currently, the spawner (phase 4) hardcodes delegate_task with acp_command=claude. The research notes the inner harness is "increasingly commoditized as providers converge on similar execution primitives,"
    implying easy backend switching should be possible. This phase creates: (1) an InnerHarness abstract interface defining the contract between orchestrator and coding agent, (2) concrete implementations
    for Claude Code (via delegate_task), Codex CLI (via subprocess), and a generic shell agent, (3) a backend registry that maps task types to optimal backends, (4) backend health checking and automatic
    failover, (5) per-backend configuration (max turns, approval policy, tool sets, context window size), and (6) a backend benchmarking framework to compare performance across backends for the same task.'
  deliverables:
  - name: Inner harness abstract interface
    description: Define the contract between orchestrator and coding agent backends
    status: planned
    acceptance_criteria:
    - description: 'Abstract interface defines: execute, cancel, status, get_output methods'
