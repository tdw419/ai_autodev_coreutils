- id: 'phase-145'
  title: Stale Claim Stealing and Task Reclamation
  status: planned
  goal: 'Enable workers to reclaim tasks that have been held too long by stalled agents, implementing lease-based ownership with automatic reclamation'
  description: |
    The "Geometry OS Autodev Loop" research (259 lines, 47 citations) describes "Stale
    Claim Stealing" where if a phase remains in the in_progress state for more than
    30 minutes, it is considered stale. The next worker to run can "steal" the phase,
    resetting its state or re-claiming it for a fresh session. This acts as a reactive
    garbage collector for the developmental queue. Phase 116 (Stagnation Circuit Breaker)
    detects commit stalls and HALTS execution, but does NOT implement reclamation where
    another worker picks up the stalled task. Phase 14 (Health Monitor) detects stuck
    workspaces but only alerts -- it does not release the task for reassignment. Phase 112
    (Coordination Failure) covers Token Holding as a failure mode but focuses on detection,
    not active reclamation. The key difference is that stale claim stealing is a RECOVERY
    mechanism, not just a detection mechanism -- it enables the system to self-heal from
    stalled workers without human intervention.
  deliverables:
  - name: Lease-based task ownership tracker
    description: 'Track task ownership with configurable TTL, enabling automatic stale detection'
    status: planned
    acceptance_criteria:
    - description: 'Each task claim records owner_id, claimed_at timestamp, and TTL'
      validation: read tracker data
    - description: 'is_stale() returns true when claimed_at + TTL < now'
      validation: test stale detection
    tasks:
    - id: p145.d1.t1
      title: Create lease-based task ownership tracker
      status: planned
      description: 'Create lease_tracker.py with: (1) TaskLease dataclass with fields: task_id, owner_id, claimed_at, ttl_seconds, fencing_token, (2) LeaseTracker class that manages leases: claim(task_id, owner_id, ttl), release(task_id), is_stale(task_id), steal(task_id, new_owner_id), (3) Configurable default TTL (default 1800 seconds = 30 minutes), (4) JSON persistence for lease state across restarts.'
      files:
      - '~/zion/projects/agent-orchestration/lease_tracker.py'
    scope_lines: 90
    scope_files:
    - '~/zion/projects/agent-orchestration/lease_tracker.py'
  - name: Task reclamation and owner handoff
    description: 'Enable workers to steal stale tasks with proper context transfer'
    status: planned
    acceptance_criteria:
    - description: 'Stealing a task transfers ownership and increments fencing token'
      validation: test steal operation
    - description: 'New owner receives summary of previous owner progress'
      validation: check handoff data
    tasks:
    - id: p145.d2.t1
      title: Implement task reclamation protocol
      status: planned
      description: 'Extend lease_tracker.py: (1) steal() method that validates staleness, transfers ownership, increments fencing token, (2) get_handoff_context(task_id) that returns: previous owner ID, duration of previous ownership, execution history summary, workspace state snapshot, (3) Integration with execution_history (phase 8) to gather progress data for the new owner.'
      dependencies:
      - p145.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/lease_tracker.py'
    scope_lines: 70
    scope_files:
    - '~/zion/projects/agent-orchestration/lease_tracker.py'
  - name: Integration with orchestrator and tests
    description: 'Wire stale claim stealing into the poller/spawner and write tests'
    status: planned
    acceptance_criteria:
    - description: 'Poller skips stale-claimed tasks and marks them for reclamation'
      validation: test poller integration
    - description: 'Spawner injects handoff context when claiming a reclaimed task'
      validation: test spawner integration
    tasks:
    - id: p145.d3.t1
      title: Integrate lease tracking with orchestrator
      status: planned
      description: 'Modify poller.py: before assigning a task, check lease_tracker.is_stale(). If stale, call steal() to reclaim. Modify spawner.py: when spawning a worker for a reclaimed task, call get_handoff_context() and inject into the initial prompt. Log reclamation events to execution_history.'
      dependencies:
      - p145.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/poller.py'
      - '~/zion/projects/agent-orchestration/spawner.py'
    - id: p145.d4.t1
      title: Write stale claim stealing tests
      status: planned
      description: 'Test cases: (1) claim and release lifecycle, (2) stale detection after TTL expiry, (3) steal transfers ownership, (4) steal increments fencing token, (5) handoff context includes progress data, (6) poller reclaims stale tasks, (7) spawner injects handoff context.'
      dependencies:
      - p145.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_lease_tracker.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_lease_tracker.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-145'
    type: soft
    reason: Lease tracking modifies the poller-spawner loop from phase 4
  - source: 'phase-8'
    target: 'phase-145'
    type: soft
    reason: Handoff context reads from execution history created by phase 8
  - source: 'phase-14'
    target: 'phase-145'
    type: soft
    reason: Health monitor can proactively detect stale claims before TTL expires
  - source: 'phase-116'
    target: 'phase-145'
    type: soft
    reason: Stagnation circuit breaker detects commit stalls; stale claim stealing handles the recovery
  technical_notes: 'The Geometry OS research uses a 30-minute TTL as the default. This should be configurable per-task based on complexity scoring from phase 107. The fencing token (phase 146) prevents zombie writes from stale workers.'
  risks:
  - 'Aggressive TTL may reclaim tasks from legitimately slow agents -- use complexity-based TTL scaling'
  - 'Handoff context may be too large for the context window -- use the context budget from phase 20'
