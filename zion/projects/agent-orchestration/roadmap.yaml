  - source: 'phase-6'
    target: 'phase-94'
    type: soft
    reason: Role specialization from phase 6 provides the reviewer role profiles that ensemble review extends
  - source: 'phase-9'
    target: 'phase-94'
    type: soft
    reason: 'Ensemble review extends the single-agent LLM review sensor from phase 9 with multi-perspective analysis'
  - source: 'phase-32'
    target: 'phase-94'
    type: soft
    reason: 'Cost-aware reviewer selection requires token budget data from phase 32'
  technical_notes: 'The ensemble approach is a key differentiator from single-reviewer systems. The research describes Gas Town''s specialized roles as the "functional division of a traditional engineering
    organization but at the speed of silicon." Ensemble review applies this same principle: instead of one reviewer trying to cover all concerns, multiple specialized reviewers each focus on what they''re
    best at. The synthesis step is critical -- without it, developers would need to read 5 separate review reports. The conflict resolution is the hardest part: when reviewers disagree, the system should
    surface the disagreement rather than silently picking one side.'
  risks:
  - 'Ensemble review uses N times more tokens than single review -- cost-aware selection (phase 32) is essential'
  - 'Reviewer prompts could be biased toward finding problems -- include positive feedback too (what was done well)'
  - 'Synthesis quality depends on reviewer agreement -- high conflict rates may indicate poorly calibrated perspectives'
  - 'Adding more reviewers has diminishing returns -- 3-5 is the sweet spot, more adds cost without proportional value'
