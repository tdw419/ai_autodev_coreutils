- id: 'phase-54'
  title: 'Version-Controlled Work Graph (Beads Pattern)'
  status: planned
  goal: 'Implement a dependency-aware work graph that tracks work items, their relationships, and state transitions with full history, inspired by Gas Town''s Beads/Dolt state management'
  description: 'Gas Town''s Beads is described as "a version-controlled SQL database built on Dolt" that "replaces messy markdown plans with a dependency-aware graph that tracks every molecule of work."
    It enables a pull-based execution model where agents pull work from their hooks as soon as it becomes available, rather than relying on a central scheduler. Phase 30 covers inter-agent communication
    (message passing between agents), but does not address the work graph itself -- the structured representation of work items, their dependencies, and state transitions. This phase implements a lightweight
    work graph: (1) work items are nodes in a directed graph with dependency edges, (2) state transitions (pending -> ready -> in_progress -> done -> blocked) are tracked with timestamps and provenance,
    (3) agents pull ready work items (no central push), (4) the graph is persisted as YAML/JSON (version-controllable alongside the codebase), and (5) the graph enables intelligent scheduling -- an item
    only becomes ready when all its dependencies are satisfied. This transforms the flat issue queue into a dependency-aware work graph that Gas Town calls the "pull-based execution model."'
  deliverables:
  - name: Work graph data model and persistence
    description: 'Define the work graph schema (nodes, edges, states) and persist it as version-controllable YAML/JSON'
    status: planned
    acceptance_criteria:
    - description: Work items can be created with dependencies on other items
      validation: 'python3 work_graph.py add --id W1 --depends-on W0'
      met: false
    - description: State transitions are tracked with timestamps
      validation: 'python3 work_graph.py show W1, check state history'
      met: false
    - description: 'Graph is persisted as YAML (version-controllable)'
      validation: check work_graph.yaml exists and is valid
      met: false
    tasks:
    - id: p54.d1.t1
      title: Create work_graph.py module
      status: planned
      description: 'Create work_graph.py with: (1) WorkItem dataclass: id, title, description, state (pending/ready/in_progress/done/blocked/failed), dependencies (list of IDs), assignee, role, created_at,
        started_at, completed_at, provenance (issue_number, pipeline, run_id), metadata (arbitrary key-value), (2) WorkGraph class: add_item, add_dependency, get_ready_items (items whose deps are all done),
        transition_state, topological_order, get_critical_path, detect_cycles, (3) Persistence: save/load as YAML to work_graph.yaml (version-controllable), auto-save on every mutation, (4) CLI: add, remove,
        depends-on, show, ready, transition, graph (ASCII art of dependency graph), critical-path. States follow the Beads model: pending (deps not met), ready (deps met, not started), in_progress (agent
        working), done (completed), blocked (dep failed).'
      files:
      - '~/zion/projects/agent-orchestration/work_graph.py'
    scope_lines: 200
    scope_files:
    - '~/zion/projects/agent-orchestration/work_graph.py'
  - name: 'Pull-based work assignment'
    description: Agents pull ready work items instead of being pushed by the orchestrator
    status: planned
    acceptance_criteria:
    - description: Agent can query for and claim the next ready work item
      validation: 'python3 work_graph.py pull --role implementer'
      met: false
    - description: 'Claiming an item transitions it to in_progress and blocks re-claim'
      validation: two agents pulling simultaneously results in one getting the item
      met: false
    tasks:
    - id: p54.d2.t1
      title: 'Add pull-based assignment to work_graph.py'
      status: planned
      description: 'Add to work_graph.py: (1) pull_ready(role=None) -> WorkItem: atomically claims the next ready item matching the optional role filter, transitions to in_progress, sets started_at and
        assignee, returns the item, (2) release(item_id, state="pending"): releases a claimed item back to ready or pending, (3) complete(item_id): transitions to done, checks if any blocked items become
        ready (dependency resolution), (4) fail(item_id, reason): transitions to failed, marks all downstream dependents as blocked, (5) File-based locking for atomic claim (use fcntl or lockfile). The
        pull model means no central scheduler decides what to work on -- agents ask "what can I do?" and the graph answers based on dependency state. This is the GUPP principle applied to work assignment.'
      files:
      - '~/zion/projects/agent-orchestration/work_graph.py'
      dependencies:
      - p54.d1.t1
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/work_graph.py'
  - name: 'Issue-to-graph synchronization'
    description: 'Sync GitHub Issues into the work graph, maintaining the issue tracker as control plane'
    status: planned
    acceptance_criteria:
    - description: GitHub Issues are automatically imported as work graph items
      validation: 'python3 work_graph.py sync --repo owner/repo'
      met: false
    - description: 'Issue dependencies (blocked-by) are preserved as graph edges'
      validation: 'sync issues with dependencies, check graph edges'
      met: false
    tasks:
