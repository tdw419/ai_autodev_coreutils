        (2) compare_periods(current, previous) -- compute week-over-week or month-over-month changes
        for each KPI, (3) detect_anomalies(kpis) -- flag KPIs that deviate significantly from
        historical baseline (>2 standard deviations), (4) --format table|json|markdown for different
