        runs its strategy''s pipeline independently, (4) track speculative runs in workspace metadata (strategy_name, parent_issue, is_speculative=true), (5) report speculative run status alongside normal
        runs. Add max_speculative config option (default 3) to prevent resource exhaustion.'
