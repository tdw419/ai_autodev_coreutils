  technical_notes: 'The key distinction from existing phases: conventions (phase 10) are style rules (naming, imports), invariants (phase 17) are architectural rules (layering, dependencies), and principles
    (this phase) are qualitative goals (readability, testability, security posture). Principles are the "taste invariants" from the research -- they require human judgment to define but can be mechanically
    measured once defined. The evolution workflow is what makes this phase unique: the system suggests new principles based on what it observes.'
  risks:
  - 'Semantic checks (LLM-based) are expensive and inconsistent -- use sparingly, only for high-value principles'
