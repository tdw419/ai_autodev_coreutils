- id: phase-17
  title: Structural Invariants Engine
  status: done
  goal: Build custom structural tests that enforce architectural constraints (layering, dependency direction, module boundaries) beyond code style
  description: 'The Harness Engineering research emphasizes "Rigid Architecture" as a key pillar:
    enforcing a strict layering model that limits the agent''s search space. Phase 10''s
    convention scanner handles naming and style conventions. This phase goes deeper: enforcing
    architectural rules like "no UI code importing from database layer," "service modules
    must depend on repo interfaces not implementations," and "all public APIs must have type
    annotations." These invariants are mechanically checked and can be run as pipeline gates,
    catching architectural drift before it accumulates.'
  deliverables:
  - name: Architecture invariant checker
    description: Python module that reads an invariants.yaml config and checks a codebase for architectural violations
    status: done
