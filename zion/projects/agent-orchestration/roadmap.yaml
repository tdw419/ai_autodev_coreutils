- id: 'phase-102'
  title: Graceful Shutdown and Drain Mode
  status: planned
  goal: 'Enable the orchestrator to shut down gracefully, draining active workers and saving state for clean resume'
  description: 'The orchestrator runs as a Hermes cron job that executes periodically. However, no phase handles what happens when the operator needs to stop the system: a deploy, a config change, a vacation,
    or a system migration. The research describes Symphony as using Elixir hot code reloading for updates without interrupting active agent sessions. While Hermes does not use Elixir, the principle applies:
    active work should not be lost when the orchestrator is paused or reconfigured. This phase implements drain mode: (1) a signal file that tells the orchestrator to stop accepting new work, (2) active
    workers are allowed to complete, (3) queue state and workspace state are saved, (4) on resume, the orchestrator picks up where it left off. This is essential for operational safety.'
  deliverables:
  - name: Drain mode signal and state preservation
    description: Signal file mechanism that triggers drain mode and saves orchestrator state
    status: planned
    acceptance_criteria:
    - description: Creating a drain signal file prevents new workers from being spawned
      validation: 'create ~/.orchestrator/drain, run orchestrator, verify no new workers'
      met: false
    - description: Active workers are tracked and allowed to complete during drain
      validation: 'start workers, enter drain mode, verify they complete'
      met: false
    tasks:
    - id: p102.d1.t1
      title: Implement drain mode core
      status: planned
      description: 'Create drain.py with: (1) is_draining() checks for ~/.orchestrator/drain signal file, (2) start_drain(reason) creates signal file with timestamp and reason, (3) cancel_drain() removes
        signal file, (4) get_drain_status() returns drain start time, reason, active worker count, (5) save_state() serializes current state to snapshot JSON, (6) load_state(snapshot_path) restores state
        from snapshot, (7) CLI: orch drain start/status/cancel/save-state. Integrate is_draining() check into orchestrator.py main loop.'
      files:
      - '~/zion/projects/agent-orchestration/drain.py'
      - '~/zion/projects/agent-orchestration/orchestrator.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/drain.py'
    - '~/zion/projects/agent-orchestration/orchestrator.py'
  - name: Worker completion tracking during drain
    description: Monitor active workers during drain and report when all have completed
    status: planned
    acceptance_criteria:
    - description: Can list active workers and their progress during drain
      validation: 'enter drain mode with active workers, check status'
      met: false
    - description: Provides notification when all workers complete (drain finished)
      validation: 'wait for workers to finish, verify drain-complete state'
      met: false
    tasks:
    - id: p102.d2.t1
      title: Add worker tracking during drain
      status: planned
      description: 'Extend drain.py: (1) track_active_workers() reads workspace state files to find running workers, (2) poll_worker_status() checks each active workspace for completion, (3) wait_for_drain_complete(timeout)
        blocks until all workers complete or timeout, (4) generate_drain_report() produces summary of completed/failed/timed-out workers, (5) integrate with health_monitor.py for drain status reporting.'
      dependencies:
      - p102.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/drain.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/drain.py'
  - name: State snapshot and restore for resume
    description: Save and restore full orchestrator state for clean resume after drain
    status: planned
    acceptance_criteria:
    - description: 'State snapshot captures all queue entries, workspace states, and pending issues'
      validation: 'create snapshot, inspect JSON, verify all data present'
      met: false
    - description: 'Resume from snapshot restores orchestrator to pre-drain state'
      validation: 'drain, save, cancel drain, restore, verify queue and workers resumed'
      met: false
    tasks:
    - id: p102.d3.t1
      title: Implement state snapshot and restore
      status: planned
      description: 'Extend drain.py: (1) save_state() serializes merge queue, workspace states, cost accumulator, health history, config, (2) restore_state(snapshot) deserializes and applies all state,
        (3) verify_state_consistency(snapshot) checks that referenced workspaces exist and queue entries are valid, (4) CLI: orch drain save/restore [--snapshot PATH], (5) auto-snapshot before entering
        drain mode.'
      dependencies:
