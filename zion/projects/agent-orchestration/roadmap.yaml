- id: 'phase-18'
  title: 'Agent Self-Debugging and Trace Tools'
  status: complete
  goal: 'Give agents the ability to read their own execution traces, inspect logs, and debug failures during pipeline execution'
  description: 'Phase 8 adds execution history for humans to review after runs. The Harness Engineering research emphasizes "Application Legibility" -- agents should have local access to logs, metrics,
    and traces so they can reason about code they just wrote. This phase builds tools that make execution traces agent-readable, letting an AI node in a pipeline inspect its own (or a previous run''s) output,
    understand what failed, and adjust its approach. This is the difference between "a human reviews the log" and "the agent reviews its own trace and self-corrects."'
  deliverables:
  - name: 'Agent-readable trace formatter'
    description: 'Module that converts execution logs into a concise, agent-optimized format suitable for inclusion in prompts'
    status: done
    acceptance_criteria:
    - description: 'Can format a pipeline run trace into a compact summary (node status, error messages, key outputs) under 2000 tokens'
