- id: 'phase-138'
  title: Signature-Based Loop Detection and Prevention
  status: planned
  goal: 'Detect agent loops by monitoring tool call SIGNATURES (function name + normalized arguments) rather than relying on plan-level deduplication'
  description: |
    The "Autonomous Agent Design: Orchestrator-Worker" research (183 lines, 40 citations) describes
    three loop detection heuristics: duplicate-chain detection, no-progress heuristic, and critically,
    signature-based detection where the controller monitors the sequence of tool CALLS (not plans).
    The research states that "comparing the last N tool call signatures (function name + normalized
    arguments) is more effective than analyzing the LLM's natural language plans, as it catches loops
    that plan-level deduplication misses." Phase 116 detects commit stagnation but only monitors
    git state, not tool call patterns. Phase 50 does chaos testing but not real-time loop detection.
  deliverables:
  - name: Tool call signature tracker
    description: 'Module that records function name + normalized arguments for every tool call in a sliding window'
    status: planned
    acceptance_criteria:
    - description: 'Captures tool call signatures with timestamp and normalized args'
      validation: inspect tracker output
    - description: 'Maintains configurable sliding window (default N=10 calls)'
      validation: check window parameter
    tasks:
    - id: p138.d1.t1
      title: Create tool call signature tracker
      status: planned
      description: 'Create signature_tracker.py that: (1) intercepts tool calls from the executor, (2) normalizes arguments (strip values, keep types and structure), (3) stores signatures in a ring buffer of size N, (4) exposes a check_loop() method that compares recent signatures.'
      files:
      - '~/zion/projects/agent-orchestration/signature_tracker.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/signature_tracker.py'
  - name: Loop detection and soft/hard stop
    description: 'Detect repeated tool call patterns and trigger soft warnings or hard stops'
    status: planned
    acceptance_criteria:
    - description: 'Detects exact signature repetition (same function + args 3+ times)'
      validation: test with loop scenario
    - description: 'Triggers soft warning at 3 repetitions, hard stop at 5'
      validation: check threshold config
    tasks:
    - id: p138.d2.t1
      title: Implement loop detection logic
      status: planned
      description: 'Implement detection: (1) exact match -- same function + same normalized args, (2) pattern match -- same function with cycling args (e.g., retry with different values but same pattern), (3) configurable thresholds for soft/hard stop. On soft stop, inject a "you may be looping" warning. On hard stop, terminate the agent session.'
      dependencies:
      - p138.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/signature_tracker.py'
    scope_lines: 90
    scope_files:
    - '~/zion/projects/agent-orchestration/signature_tracker.py'
  - name: Executor integration
    description: 'Wire signature tracker into the executor so all tool calls are monitored'
    status: planned
    acceptance_criteria:
    - description: 'All Bash and AI node tool calls pass through tracker'
      validation: check executor code
    - description: 'Loop detection result is logged to execution history'
      validation: check log output
    tasks:
    - id: p138.d3.t1
      title: Integrate tracker with executor
      status: planned
      description: 'Hook the signature tracker into executor.py: before each Bash/AI node execution, record the tool call. After execution, check for loops. If loop detected, log to execution_history and trigger appropriate stop level.'
      dependencies:
      - p138.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 40
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Loop detection tests
    description: 'Tests for various loop detection scenarios'
    status: planned
    acceptance_criteria:
    - description: 'Test detects exact repetition loops'
      validation: run tests
    - description: 'Test detects cyclic argument patterns'
      validation: run tests
    tasks:
    - id: p138.d4.t1
      title: Write loop detection tests
      status: planned
      description: 'Test cases: (1) no loop -- 10 different calls, (2) exact repetition -- same call 5 times, (3) cycling args -- same function with rotating values, (4) soft then hard stop escalation, (5) window boundary behavior.'
      dependencies:
      - p138.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_signature_tracker.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_signature_tracker.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-138'
    type: soft
    reason: Loop detection monitors tool calls in the DAG executor
  - source: 'phase-116'
    target: 'phase-138'
    type: soft
    reason: Complements commit-based stagnation detection with tool-level loop detection
  technical_notes: 'The research emphasizes that plan-level dedup misses loops where the agent generates "novel" natural language plans but makes identical tool calls. This is the key insight -- monitor actions, not intentions.'
  risks:
  - 'False positives on legitimate retry patterns (e.g., running the same test command after fixing code) -- exclude common safe-repeat patterns'
  scope_lines_total: 290
  test_target: 10
- id: 'phase-139'
  title: Mission Briefing Generator for Session Handoff
  status: planned
  goal: 'Generate structured "Mission Briefing" documents when handing off between agent sessions, capturing the delta between current state and ultimate goal'
  description: |
    The "Autonomous Agent Design: Orchestrator-Worker" research (183 lines, 40 citations) describes
    a structured handoff lifecycle: session termination, state capture, judgment phase, context assembly
    (Mission Briefing), and initialization. The Mission Briefing is a "Goldilocks zone" of context:
    enough to be informed but not so much that the agent becomes distracted. The research specifies
    it should include: current state, recent failures, immediate task goal, and the delta between
    where we are and where we need to be. Phase 97 (Session Chaining) marshals context between
    sessions but does not generate a structured briefing document with the specific delta analysis.
  deliverables:
  - name: Mission briefing schema and generator
    description: 'Structured schema for mission briefings with auto-generation from execution state'
    status: planned
    acceptance_criteria:
    - description: 'Schema includes: goal, current state, delta analysis, recent failures, next action'
      validation: read schema definition
    - description: 'Generator reads execution history and workspace state to produce briefing'
      validation: test with mock data
    tasks:
    - id: p139.d1.t1
      title: Create mission briefing generator
      status: planned
      description: 'Create briefing_generator.py with: (1) MissionBriefing dataclass with fields: ultimate_goal, current_phase, completed_steps, remaining_steps, recent_failures (last 5), workspace_state_summary, delta_analysis (what changed since last session), next_action_recommendation. (2) generate() method that reads execution_history and workspace state to populate the briefing. (3) format_for_prompt() that renders the briefing as a concise prompt section.'
      files:
      - '~/zion/projects/agent-orchestration/briefing_generator.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/briefing_generator.py'
