    tasks:
    - id: p60.d3.t1
      title: Add issue triage to human_workflow.py
      status: planned
      description: 'Add triage command: (1) fetch open untriaged issues via gh CLI, (2) classify each issue: bug/feature/refactor/docs/test, using keyword heuristics from title and body, (3) estimate complexity:
        small (1-2 files), medium (3-5 files, existing tests), large (6+ files or new modules), (4) assess agent-readiness: ready (clear requirements, existing tests), needs-refinement (ambiguous scope),
        not-suitable (requires human judgment, security implications), (5) auto-label issues: agent-ready, needs-human, blocked, (6) estimate effort in agent turns based on complexity, (7) output as a triage
        table with recommendations. This automates the "filing speculative tickets" workflow from the research.'
      files:
