        to generate 384-dim embeddings, cache embeddings to avoid recomputation, (3) store(entry): accept {id, text, metadata, tags, timestamp}, embed text, append to vector index, (4) search(query, top_k=5,
        filters=None): embed query, compute cosine similarity against all stored vectors, return top_k entries with similarity scores, optional metadata/tag filters, (5) delete(id): remove entry from store,
        (6) stats(): return count, size_on_disk, last_updated, (7) compact(): remove entries older than retention_period or with similarity below threshold (memory decay). Storage: ~/.orchestrator/memory/vectors.npy
        + metadata.jsonl. CLI: python3 memory_store.py search "how to fix authentication" --top 5.'
