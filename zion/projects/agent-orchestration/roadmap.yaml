      description: 'Add review-queue command: (1) fetch open PRs via gh CLI, (2) filter to agent-created PRs (by author or label), (3) generate a one-line summary of each PR (title + files changed + test
        status), (4) sort by priority: blocking PRs first (other PRs depend on them), then by age (oldest first), then by review_score (lowest score = needs most attention), (5) show review sensor scores
        from phase 9, (6) batch mode: show 5 PRs at a time for review marathon sessions, (7) approve/merge shortcuts via gh CLI, (8) track human review time to feed back into velocity metrics (phase 59).'
      files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
