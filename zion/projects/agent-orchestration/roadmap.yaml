- id: 'phase-49'
  title: Human Feedback Capture and Agent Behavior Tuning
  status: planned
  goal: 'Capture human review decisions from PRs and issues, analyze patterns, and feed them back to improve agent behavior'
  description: 'The research describes humans moving "up-stack" from writing code to "designing invariants," "tuning scaffolds," and defining "taste." But there is no mechanism for capturing the human''s
    review decisions and using them to improve agent behavior. When a human rejects a PR, leaves an inline comment, or reopens a closed issue, that feedback is currently lost. This phase creates a feedback
    loop: (1) capture human review actions (approve, reject, comment) on agent-generated PRs, (2) analyze feedback patterns to identify recurring rejection reasons, (3) feed patterns back into the orchestrator
    as new rules, prompts, or safety policies, (4) track improvement over time as rejection rate decreases. This is the "outer harness guide" concept made adaptive -- instead of static AI_GUIDE.md rules,
    the system learns from human corrections.'
  deliverables:
  - name: Feedback capture module
    description: 'Module that reads GitHub review comments and PR actions on agent-generated PRs and structures them as feedback signals'
    status: planned
    acceptance_criteria:
    - description: 'Can read PR review comments and categorize them (approval, rejection, suggestion, question)'
