- id: 'phase-94'
  title: 'Ensemble Multi-Agent Code Review'
  status: planned
  goal: 'Implement multi-perspective code review where multiple specialized reviewers analyze the same changes and synthesize their feedback, implementing the Gas Town concept of specialized agent roles
    applied to review'
  description: 'The research describes Gas Town''s specialized agent roles where "agents are assigned specialized roles that divide the labor of software engineering." Phase 9 implements single-agent LLM-as-judge
    review and phase 6 defines role profiles, but no phase applies the ensemble concept to code review: having multiple reviewers with different perspectives (security, performance, architecture, style,
    testing) review the same code and synthesize their feedback into a unified report. Single-reviewer systems have blind spots -- a security-focused reviewer catches SQL injection that a style-focused
    reviewer misses, and vice versa. The research''s "inferential sensors" concept is strongest when multiple sensors provide complementary signals. This phase creates an ensemble review system that: (1)
    runs multiple specialized reviewers in parallel on the same diff, (2) synthesizes feedback with conflict resolution, (3) weights reviewer expertise by task relevance, (4) produces a unified review with
    categorized findings.'
  deliverables:
  - name: 'Multi-perspective review orchestrator'
    description: Run multiple specialized reviewers on the same code changes and collect their feedback
    status: planned
    acceptance_criteria:
    - description: Can run 3+ reviewers in parallel on the same diff
      validation: 'submit diff, verify 3+ review reports generated'
      met: false
    - description: 'Each reviewer has a distinct perspective (security, performance, style, etc.)'
      validation: 'check review reports for perspective-specific findings'
      met: false
    tasks:
    - id: p94.d1.t1
      title: Create ensemble_review.py module
      status: planned
      description: 'Python module: (1) ReviewPerspective class: name (e.g., "security", "performance", "architecture", "style", "testing"), system_prompt (specialized instructions for this perspective),
        severity_weights (which severity levels this perspective emphasizes), (2) built-in perspectives: security (focuses on input validation, auth, injection, secrets), performance (focuses on algorithms,
        N+1 queries, memory), architecture (focuses on coupling, layering, patterns), style (focuses on naming, readability, conventions), testing (focuses on coverage, edge cases, test quality), (3) EnsembleReviewer
        class: given a diff and list of perspectives, run each reviewer via delegate_task in parallel, collect results, (4) result format: {perspective, findings: [{severity, location, description, suggestion}],
        confidence, tokens_used}.'
      files:
      - '~/zion/projects/agent-orchestration/ensemble_review.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/ensemble_review.py'
  - name: Feedback synthesis and conflict resolution
    description: 'Merge multiple review reports into a unified report, resolving conflicts between reviewers'
    status: planned
    acceptance_criteria:
    - description: Can merge 3+ review reports into a single unified report
      validation: 'merge reports, verify unified output'
      met: false
    - description: Conflicting findings are flagged and resolved with reasoning
      validation: 'create conflicting reviews, verify resolution in output'
      met: false
    tasks:
