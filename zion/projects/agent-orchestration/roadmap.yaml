- id: phase-44
  title: System Health Scorecard and Effectiveness Trends
  status: planned
  goal: Track and report the orchestrator''s overall effectiveness over time with historical trend
    analysis and a health scorecard
  description: 'The research cites specific effectiveness metrics: "500% increase in landed pull
    requests within the first three weeks" and "10x increase in development velocity." These are
    system-level metrics that measure the orchestrator''s overall impact, not just individual run
    outcomes. Phase 8 (execution history) logs individual pipeline runs. Phase 27 (live dashboard)
    shows real-time state. But no phase aggregates historical data into effectiveness trends or
    produces a health scorecard that answers: "Is the orchestrator getting better or worse over
    time?" This phase adds: (1) a metrics aggregation engine that computes weekly/monthly KPIs
    from execution logs, (2) a health scorecard that summarizes system health in a single score
    (0-100), (3) trend analysis that detects improvements and regressions in orchestrator effectiveness,
    (4) automated reporting that surfaces actionable insights. This is essential for the Dark Factory
    model (phase 35) -- you cannot trust an autonomous system without measuring its effectiveness.'
  deliverables:
  - name: Metrics aggregation engine
    description: Module that computes KPIs from execution history logs
    status: planned
    acceptance_criteria:
