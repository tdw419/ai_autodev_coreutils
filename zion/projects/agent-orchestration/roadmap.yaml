        or created by the orchestrator, (3) categorizes each comment: approval ("looks good", "lgtm"), rejection ("this approach is wrong", "please revert"), suggestion ("use X instead of Y", "consider
        Z"), question ("why did you..."), (4) extracts the file and line each comment refers to, (5) stores feedback in ~/.orchestrator/feedback/{repo}/YYYY-MM-DD.jsonl with: pr_number, issue_number, comment_text,
