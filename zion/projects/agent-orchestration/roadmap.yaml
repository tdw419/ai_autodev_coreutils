- id: phase-21
  title: Merge Queue and Conflict Prevention (Refinery Pattern)
  status: planned
  goal: Implement Gas Town''s Refinery pattern to manage concurrent agent PRs and prevent merge conflicts
  description: 'Gas Town''s Refinery role "manages merge queues to prevent collisions" -- when multiple
    agents work on the same codebase simultaneously, their PRs can conflict. The current orchestrator
    can spawn multiple workers but has no merge coordination. This phase adds a merge queue system that:
    (1) sequences PR merges to avoid conflicts, (2) detects potential conflicts before agents start work,
    (3) rebases branches when the base has moved, (4) provides merge order recommendations. This is essential
    for running the orchestrator at scale with concurrent workers, directly implementing the Refinery pattern
    from the research.'
