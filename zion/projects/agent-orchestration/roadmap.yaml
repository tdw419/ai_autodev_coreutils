- id: 'phase-58'
  title: Agent Session Replay and Forensic Analysis
  status: planned
  goal: 'Enable full replay and forensic analysis of agent sessions for debugging, learning, and quality assurance'
  description: 'The Harness Engineering research emphasizes that "when agents failed, the team analyzed the environment to identify missing capabilities or structures." The current system records execution
    logs (phase 8) and provides trace formatting (phase 18), but neither supports full session replay. In the Dark Factory model where humans never review code, understanding WHY an agent made specific
    decisions is critical. This phase creates a session replay system: (1) record every agent action (tool calls, file reads/writes, shell commands) with full context, (2) a replay CLI that steps through
    a session action-by-action showing the agent''s context at each point, (3) forensic analysis that identifies decision points, dead ends, and context degradation, (4) diff-based comparison between successful
    and failed sessions to identify patterns, (5) automatic generation of "failure reports" that summarize what went wrong and suggest harness improvements. This transforms debugging from "read the log"
    to "watch the movie" and directly supports the self-improvement loop (phase 19) with richer data.'
  deliverables:
  - name: Session recording module
    description: Record every agent action with full context for later replay
    status: planned
    acceptance_criteria:
    - description: 'Agent sessions are recorded with tool calls, context, and results'
      validation: 'run an agent session, check recording file exists'
      met: false
    - description: Recordings include sufficient context to reconstruct the agent''s view at each step
      validation: 'replay recording, verify context matches original session'
      met: false
    tasks:
    - id: p58.d1.t1
      title: Create session_recorder.py module
      status: planned
      description: 'Create session_recorder.py: (1) SessionRecorder class that wraps agent execution and records: timestamp, action_type (tool_call, file_read, file_write, shell_cmd, llm_request), action_params,
        action_result, context_snapshot (files read, tokens remaining, workspace state hash), (2) recordings stored as JSONL in ~/.orchestrator/recordings/{session_id}.jsonl, (3) compact mode: store file
        diffs instead of full file contents to save space, (4) support for parallel sessions (each worker gets its own recording), (5) max_recording_size config to prevent disk exhaustion, (6) recording
        metadata: session_id, issue_number, pipeline, role, start_time, end_time, outcome (success/failure).'
      files:
      - '~/zion/projects/agent-orchestration/session_recorder.py'
      scope_lines: 180
      scope_files:
      - '~/zion/projects/agent-orchestration/session_recorder.py'
  - name: Session replay CLI
    description: 'Step through recorded sessions action-by-action with full context'
    status: planned
    acceptance_criteria:
    - description: Can replay a session showing each action and its context
      validation: python3 session_replay.py replay SESSION_ID
      met: false
    - description: 'Supports forward/backward stepping, jumping to specific actions, and filtering by type'
      validation: 'step through replay, jump to action 42, filter to shell_cmd only'
      met: false
    tasks:
    - id: p58.d2.t1
      title: Create session_replay.py CLI
      status: planned
      description: 'Create session_replay.py: (1) replay SESSION_ID -- interactive terminal replay showing each action with context, (2) step forward/backward through actions, (3) jump N -- jump to action
        number N, (4) filter --type TYPE -- show only specific action types, (5) context N -- show the full agent context at action N (files read, prompt state), (6) summary -- show session summary: total
        actions, action type breakdown, tokens used, files modified, duration, (7) export --format json/markdown -- export session for sharing or analysis. The replay is read-only: it reconstructs the agent''s
        view without executing anything.'
      files:
      - '~/zion/projects/agent-orchestration/session_replay.py'
      dependencies:
      - p58.d1.t1
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/session_replay.py'
  - name: Forensic analysis engine
    description: Analyze recorded sessions to identify failure patterns and decision quality
    status: planned
    acceptance_criteria:
    - description: 'Can identify dead ends, context degradation, and ineffective actions in a session'
      validation: python3 session_replay.py analyze SESSION_ID
      met: false
    - description: Can compare successful and failed sessions to identify patterns
      validation: python3 session_replay.py compare SESSION1 SESSION2
      met: false
    tasks:
    - id: p58.d3.t1
      title: Add forensic analysis to session_replay.py
      status: planned
      description: 'Add analyze command: (1) detect dead ends: actions that produced no useful progress (e.g., test failures followed by identical retry), (2) detect context degradation: increasing context
        usage without corresponding progress, (3) detect ineffective patterns: repeated failed approaches, excessive file reads without writes, (4) score decision quality: ratio of productive vs unproductive
        actions, (5) identify "pivot points" where the agent changed strategy, (6) compare SESSION1 SESSION2: diff two sessions highlighting divergent decisions and their outcomes, (7) generate failure
        report: summary of what went wrong, suggested harness improvements (e.g., "add a linter check after file edits" or "increase max_turns for this task type").'
      files:
      - '~/zion/projects/agent-orchestration/session_replay.py'
      dependencies:
      - p58.d2.t1
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/session_replay.py'
  - name: 'Replay-driven self-improvement'
    description: 'Feed forensic analysis results into the self-improvement loop'
    status: planned
    acceptance_criteria:
    - description: Forensic analysis results are used to generate improvement suggestions
      validation: 'run analyze on failed sessions, check suggestions are generated'
      met: false
    tasks:
    - id: p58.d4.t1
      title: 'Integrate forensic analysis with self-improvement loop'
      status: planned
      description: 'Modify self_improve.py to: (1) on session failure, run forensic analysis automatically, (2) aggregate failure patterns across sessions (e.g., "30% of failures involve context overflow"),
        (3) generate specific improvement suggestions based on failure patterns, (4) feed suggestions into the golden principles registry (phase 46) and skill registry (phase 57), (5) add a "replay" command
        to orch_history.py that launches session replay for a specific execution. This closes the loop: failures -> recordings -> analysis -> improvements -> fewer failures.'
      files:
      - '~/zion/projects/agent-orchestration/self_improve.py'
      - '~/zion/projects/agent-orchestration/orch_history.py'
      dependencies:
      - p58.d3.t1
      - p19.d1.t1
      scope_lines: 80
      scope_files:
      - '~/zion/projects/agent-orchestration/self_improve.py'
      - '~/zion/projects/agent-orchestration/orch_history.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-58'
    type: soft
    reason: Execution logs from phase 8 provide the base data that session recordings extend
  - source: 'phase-18'
    target: 'phase-58'
    type: soft
    reason: Trace tools from phase 18 are enhanced by full session replay
  - source: 'phase-19'
    target: 'phase-58'
    type: soft
    reason: 'Self-improvement loop from phase 19 consumes forensic analysis results'
  - source: 'phase-20'
    target: 'phase-58'
    type: soft
    reason: Context window optimization from phase 20 benefits from context degradation detection
  - source: 'phase-46'
    target: 'phase-58'
    type: soft
    reason: Golden principles from phase 46 can be derived from forensic analysis patterns
  technical_notes: 'Session replay is the "black box flight recorder" for agents. The key design decision: recordings should be compact (JSONL with diffs, not full file copies) to avoid disk issues. The
    forensic analysis is deliberately heuristic -- it identifies patterns, not root causes. The comparison feature is the most powerful: by diffing a successful session against a failed one, you can see
    exactly where the agent diverged and what caused the failure. This is the "analyze the environment" capability from the research made systematic.'
  risks:
  - 'Recordings could consume significant disk space -- compact mode and size limits are essential'
  - 'Session replay may expose sensitive data (secrets, credentials) -- redaction needed'
  - 'Forensic analysis heuristics may produce false positives -- treat as suggestions, not facts'
  - 'Full context snapshots may be too large for complex sessions -- use diff-based approach'
  scope_lines_total: 560
  test_target: 10
- id: 'phase-59'
  title: PR Velocity Metrics and Orchestrator ROI Tracking
  status: planned
  goal: 'Build a dedicated metrics layer that measures the orchestrator''s business impact -- PR throughput, time-to-merge, cost-per-PR, and quality trends over time'
  description: 'The research opens with a striking claim: "teams adopting this scaffolding approach saw a 500% increase in landed pull requests within the first three weeks." Yet no existing phase measures
    this. Phase 44 (Health Scorecard) covers system health (uptime, resource usage), but not business-value metrics. The economic argument is central to the research: "code is free, but attention is scarce"
    and "the primary cost center shifts from implementation to verification and infrastructure." This phase builds the measurement infrastructure to validate these claims for the Hermes orchestrator: (1)
    track PR creation rate, merge rate, time-to-merge, and cycle time, (2) compute cost-per-PR using data from phase 32 (cost tracker), (3) measure quality trends (PR revert rate, post-merge bug rate),
    (4) generate weekly/monthly ROI reports comparing agent-assisted vs manual development, (5) surface actionable insights (e.g., "role X produces 40% faster merges than role Y"). This transforms the orchestrator
    from a technical tool into a business dashboard that justifies continued investment in harness engineering.'
  deliverables:
  - name: PR velocity data collector
    description: Collect and aggregate PR lifecycle metrics from GitHub
    status: planned
    acceptance_criteria:
    - description: 'PR creation, review, merge, and revert events are tracked'
      validation: 'python3 velocity_metrics.py collect --repo OWNER/REPO --days 30'
      met: false
    - description: Data is stored in a queryable format for trend analysis
      validation: query historical data across date ranges
      met: false
    tasks:
    - id: p59.d1.t1
      title: Create velocity_metrics.py data collector
      status: planned
      description: 'Create velocity_metrics.py: (1) collect command using gh CLI to fetch PRs with timestamps (created_at, merged_at, closed_at, review_submitted_at), (2) track PR lifecycle stages: created
        -> first_review -> approved -> merged (or closed without merge), (3) compute per-PR metrics: time_to_first_review, time_to_merge, cycle_time, files_changed, lines_added, lines_removed, (4) detect
        reverts: PRs whose description or commits reference a previous PR number, (5) store metrics as JSONL in ~/.orchestrator/metrics/velocity/{repo}.jsonl, (6) support incremental collection (only fetch
        new PRs since last collection), (7) tag PRs with metadata: agent_role (from phase 6), pipeline (from phase 5), issue_labels.'
      files:
      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
      scope_lines: 140
      scope_files:
      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
  - name: 'Cost-per-PR computation'
    description: Combine PR metrics with cost tracking data to compute economic efficiency
    status: planned
    acceptance_criteria:
    - description: 'Cost-per-PR is computed and tracked over time'
      validation: 'python3 velocity_metrics.py roi --repo OWNER/REPO --days 30'
      met: false
    tasks:
    - id: p59.d2.t1
      title: 'Add cost-per-PR computation to velocity_metrics.py'
      status: planned
      description: 'Add roi command: (1) correlate PR metrics with execution_log cost data from phase 8/32, (2) compute cost_per_pr = total_tokens_cost / merged_pr_count, (3) compute cost_per_line = total_tokens_cost
        / lines_merged, (4) compute cost_efficiency_trend: rolling 7-day and 30-day averages, (5) compare agent-assisted PRs vs manually-created PRs (detect via commit messages or labels), (6) estimate
        human-hours-saved: time_to_merge_agent vs historical manual average, (7) output as table with trend arrows. This is the "token billionaire strategy" made measurable.'
      files:
      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
      dependencies:
      - p59.d1.t1
      - p32.d1.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
  - name: Quality trend analysis
    description: Track code quality metrics over time to detect improvements or regressions
    status: planned
    acceptance_criteria:
    - description: 'PR revert rate and post-merge failure rate are tracked'
      validation: 'python3 velocity_metrics.py quality --repo OWNER/REPO --days 30'
      met: false
    tasks:
    - id: p59.d3.t1
      title: Add quality trend analysis to velocity_metrics.py
      status: planned
      description: 'Add quality command: (1) compute revert_rate = reverted_prs / total_merged_prs per week, (2) compute post_merge_failure_rate using CI results from PR merge commits, (3) track review_sensor
        scores from phase 9 as quality proxy, (4) compute test_coverage_delta: change in test coverage per PR batch, (5) detect quality regressions: alert when revert_rate or failure_rate increases by >20%
        week-over-week, (6) correlate quality with agent role and pipeline to identify which configurations produce the best quality. Store results in ~/.orchestrator/metrics/quality/.'
      files:
      - '~/zion/projects/agent-orchestration/velocity_metrics.py'
      dependencies:
      - p59.d1.t1
      scope_lines: 100
