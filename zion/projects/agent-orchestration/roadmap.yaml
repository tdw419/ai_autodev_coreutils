      title: Create test_symphony_compat.py
      status: planned
      description: 'Create pytest suite: (1) test_spec_parsing: parse sample SPEC.md, verify all fields extracted, (2) test_config_translation: verify Symphony config translates to valid Hermes config,
        (3) test_workspace_isolation: verify Hermes workspace paths match Symphony conventions (deterministic issue-ID mapping), (4) test_approval_policies: verify untrusted/on-failure/never map to Hermes
        safety policies, (5) test_polling_equivalence: verify Hermes cron-based polling is equivalent to Symphony''s continuous polling, (6) test_linear_sync: mock Linear API, verify state mapping. Use
        fixtures with sample SPEC.md files.'
