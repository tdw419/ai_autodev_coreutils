  technical_notes: 'The webhook server is deliberately lightweight -- no Flask/FastAPI dependency, just
    Python''s built-in http.server. This keeps deployment simple and avoids dependency conflicts. The webhook
    server is optional -- the orchestrator works fine without it using cron-only mode. The trigger queue
    uses JSONL files (append-only) for reliability -- even if the server crashes mid-write, the file can
    be recovered. For production use, ngrok or a reverse proxy (nginx) would handle TLS termination and
    expose the webhook endpoint to GitHub.'
  risks:
  - Webhook server requires a publicly accessible URL -- may need ngrok or similar for local development
  - GitHub webhook delivery can fail and retry -- need idempotent trigger processing
  - Webhook secret management requires secure storage -- document how to configure
