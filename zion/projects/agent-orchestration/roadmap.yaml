    reason: Quality throttling and governance work together for cost control
    technical_notes: 'The research describes the "execution-based billing" model where a 50-cycle loop counts as one execution rather than 50 separate tasks -- a 500-1000% cost efficiency gap. Our governance engine treats multi-iteration tasks as single executions for billing purposes. The directional guardrails concept means spending should trend DOWN as a task progresses (the agent learns and becomes more efficient), not UP (indicating a runaway loop).'
