      files:
      - '~/zion/projects/agent-orchestration/test_governance.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_governance.py'
  dependencies:
  - source: 'phase-20'
    target: 'phase-153'
