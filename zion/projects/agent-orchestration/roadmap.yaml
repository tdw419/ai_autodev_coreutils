- id: 'phase-169'
  title: 'Mode-Based Tool Access Enforcement'
  status: planned
  goal: 'Enforce different tool access levels per operational mode (ask/plan/code/debug) implementing Principle of Least Privilege at execution time'
  description: |
    The Kilo Operator Blueprint describes mode-based tool access enforcement where
    each operational mode strictly limits available tools. The "ask" mode can only
    read files and browse; "plan" mode can read and write markdown; "code" mode has
    full tool access; "debug" mode has full access plus diagnostic tools. Mode
    discipline is enforced as a deterministic execution constraint, not a prompt
    instruction that agents may ignore.

    Phase 6 (Role Specialization) assigns roles but does NOT enforce per-mode tool
    access at execution time. Phase 15 (Safety Policies) gates high-risk actions by
    task type but NOT by operational mode. Phase 74 (Trust Scoring) scores agents
    but does NOT adjust tool access based on mode. Phase 164 (Task Contract) restricts
    tools per task but NOT per operational mode. Phase 169 closes this gap.
  deliverables:
  - name: Mode enforcement module
    description: 'Define operational modes with tool access matrices and enforce mode-based restrictions at execution time'
    status: planned
    acceptance_criteria:
    - description: 'At least 4 modes defined (ask, plan, code, debug) with different tool access levels'
      validation: test mode definitions
    - description: 'Tool access is enforced deterministically at execution time, not via prompt'
      validation: test enforcement bypass attempt
    tasks:
    - id: p169.d1.t1
      title: Create mode_enforcer.py module
      status: planned
      description: 'Create mode_enforcer.py: (1) AgentMode enum: ASK (read-only), PLAN (read + markdown write), CODE (full access), DEBUG (full + diagnostics), ORCHESTRATOR (delegation + full), (2) ToolAccess dataclass: tool_name, allowed_modes, parameters_restrictions, (3) ToolAccessMatrix class with: define_mode(mode, allowed_tools, restricted_params), check_access(mode, tool_name, params) returns AccessResult {allowed, reason}, list_tools(mode) returns available tools for mode, (4) Default tool access matrix: ASK=[read_file, search_files, gh_issue_view], PLAN=[ASK + write_file(markdown only), dag_view], CODE=[PLAN + write_file, execute_command, git_operations], DEBUG=[CODE + process_inspect, trace_read, log_tail], ORCHESTRATOR=[CODE + delegate_task, spawn_worker], (5) ModeEnforcer class that wraps executor tool calls with access checks, (6) CLI: python3 mode_enforcer.py --check <mode> <tool> --list <mode> --matrix.'
      files:
      - '~/zion/projects/agent-orchestration/mode_enforcer.py'
    - id: p169.d1.t2
      title: Integrate mode enforcement into DAG executor and spawner
      status: planned
      description: 'Modify executor.py and spawner.py to: (1) Accept mode parameter for each task, (2) Wrap every tool call with ModeEnforcer.check_access, (3) Deny tool calls that violate mode with clear error, (4) Log mode violations to execution history, (5) Auto-detect mode from task type if not specified (analysis=PLAN, implementation=CODE, debugging=DEBUG, review=ASK).'
      dependencies:
      - p169.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/mode_enforcer.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Mode enforcement tests
    description: 'Test mode definitions, tool access checks, and execution-time enforcement'
    status: planned
    acceptance_criteria:
    - description: 'ASK mode cannot execute commands or write non-markdown files'
      validation: test ASK restrictions
    - description: 'CODE mode has full access, DEBUG mode has additional diagnostics'
      validation: test CODE and DEBUG access
    tasks:
    - id: p169.d2.t1
      title: Write mode enforcement tests
      status: planned
      description: 'Test cases: (1) ASK mode allows read_file and search_files, (2) ASK mode denies write_file, execute_command, (3) PLAN mode allows markdown write_file, denies execute_command, (4) CODE mode allows all standard tools, (5) DEBUG mode allows diagnostic tools not in CODE, (6) ORCHESTRATOR mode allows delegate_task and spawn_worker, (7) Tool call with wrong mode returns AccessResult(denied=True), (8) Mode auto-detection from task type works correctly, (9) Executor integration enforces mode on every tool call, (10) Mode violations are logged to execution history, (11) Custom mode definitions work correctly, (12) Restricted parameters are enforced (e.g., PLAN write_file only allows .md files).'
      dependencies:
      - p169.d1.t1
      - p169.d1.t2
      files:
      - '~/zion/projects/agent-orchestration/test_mode_enforcer.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_mode_enforcer.py'
  dependencies:
  - source: 'phase-6'
    target: 'phase-169'
    type: soft
    reason: Role specialization assigns roles while mode enforcement restricts tool access per mode
  - source: 'phase-15'
    target: 'phase-169'
    type: soft
    reason: Safety policies gate high-risk actions while mode enforcement provides per-mode restrictions
  - source: 'phase-164'
    target: 'phase-169'
    type: soft
    reason: Task contracts restrict tools per task while mode enforcement restricts tools per operational mode
  technical_notes: 'The key innovation is that mode enforcement is DETERMINISTIC, not prompt-based. Even if an agent ignores its system prompt and attempts to use a restricted tool, the enforcement layer blocks the call at the execution boundary. This is the "infrastructure as governance" pattern from the Archon research (phase 122 pre/post hooks). The mode concept is distinct from roles (phase 6): roles define WHAT the agent does (implementer, reviewer, tester), while modes define HOW MUCH access the agent has (read-only, full, diagnostic). An implementer role in PLAN mode has different access than an implementer role in CODE mode.'
  risks:
  - 'Overly restrictive modes may prevent agents from solving legitimate problems -- support mode escalation with justification'
  - 'Mode auto-detection may misclassify tasks -- allow explicit mode override in task contracts'
  - 'File type restrictions (e.g., markdown-only in PLAN mode) may be fragile -- use extension matching with allowlist'
