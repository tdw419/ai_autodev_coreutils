        a) layer_ordering rules -> test that no file in layer X imports from layer Y (walk import tree), b) forbidden_imports rules -> test that no file imports from forbidden modules, c) naming_convention
        rules -> test that filenames/function names match regex, d) file_structure rules -> test that expected directories/files exist, e) dependency_direction rules -> test that import graph has no cycles
        or forbidden edges, (3) generated tests use AST parsing (ast module) for import analysis, (4) each test file has header comment "AUTO-GENERATED from invariants.yaml -- do not edit manually", (5)
        CLI: generate, regenerate (update existing), list (show what would be generated without writing), (6) template system: Jinja2-style templates for each invariant type in templates/ directory.'
