- id: 'phase-55'
  title: Automated agent.md Project Bootstrap Generator
  status: planned
  goal: 'Automatically generate high-quality agent.md files for any project by analyzing codebase structure, conventions, and tooling'
  description: 'The research describes agent.md as "the context file that makes AI coding agents actually useful" and notes that "analysis of over 2,500 repositories indicates that the most successful implementations
    follow a structured pattern." Phase 12 covers self-documentation for the orchestrator itself, and phase 45 covers WORKFLOW.md parsing, but neither generates agent.md files for external projects. This
    phase creates an agent.md generator that scans a target project''s codebase to produce a comprehensive agent.md: (1) detect tech stack (languages, frameworks, package managers) from config files, (2)
    extract build/test/lint commands from package.json, Makefile, pyproject.toml, etc., (3) identify code conventions from linting configs (eslint, prettier, ruff), (4) detect project structure patterns
    (monorepo layout, src/ convention), (5) generate three-tier boundaries (Always/Ask First/Never) based on common dangerous operations, (6) include code examples from the existing codebase. This is the
    "Guides" layer of the Outer Harness -- automating the creation of the feedforward controls that shape agent behavior. Without a good agent.md, agents make wrong assumptions about tech stack versions,
    build commands, and coding style.'
  deliverables:
  - name: Codebase scanner module
    description: 'Python module that scans a project directory to detect tech stack, tooling, and conventions'
    status: planned
    acceptance_criteria:
    - description: 'Can detect at least 5 tech stacks (Node.js, Python, Rust, Go, Java)'
      validation: python3 agentmd_gen.py scan ~/some/project
      met: false
    - description: 'Extracts build, test, and lint commands from project config files'
      validation: 'scan a project with package.json, verify npm commands extracted'
      met: false
    tasks:
    - id: p55.d1.t1
      title: Create agentmd_gen.py scanner module
      status: planned
      description: 'Create agentmd_gen.py with scan(project_dir) function: (1) detect languages from file extensions and config files (package.json -> Node.js, pyproject.toml -> Python, Cargo.toml -> Rust,
        go.mod -> Go, pom.xml -> Java), (2) extract versions from lock files and config, (3) detect package managers (npm/yarn/pnpm/pip/poetry/cargo/go), (4) extract scripts from package.json, Makefile
        targets, pyproject.toml [tool.xxx], (5) detect linting/formatting configs (.eslintrc, .prettierrc, ruff.toml, rustfmt.toml), (6) detect project structure (src/, lib/, cmd/, pkg/, monorepo packages/),
        (7) detect CI config (.github/workflows/, .gitlab-ci.yml) for test commands. Return a structured ProjectProfile dict.'
