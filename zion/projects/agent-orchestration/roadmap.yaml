- id: 'phase-156'
  title: Local LLM Crash Recovery with Smart Retry Taxonomy
  status: planned
  goal: 'Implement transient fault detection and recovery for local LLM backends that crash under resource pressure, distinguishing retriable from non-retriable errors'
  description: |
    The "RAG Loop Robustness Enhancements" research (247 lines, 17 citations) describes
    a critical failure mode in local LLM deployments: the "Model has unloaded or crashed"
    error that occurs when the underlying llama.cpp process exhausts VRAM/RAM. Unlike
    cloud APIs that return 503 with Retry-After headers, local LLM crashes often terminate
    communication entirely (ConnectionError, Timeout) rather than returning HTTP status
    codes. The research introduces a Transient Fault Taxonomy that classifies errors into
    retriable (ConnectionError, Timeout) vs non-retriable (4xx client errors), and implements
    exponential backoff with jitter to prevent cascading retry storms. Additionally, the
    research identifies a causal link between stateless API design and instability: as
    conversation history grows, retry payloads become heavier, increasing the probability
    of re-crashing the recovering server. Phase 70 (Backpressure) handles API rate limits
    for cloud services. Phase 119 (Preflight Doctor) validates environment readiness but
    does not handle runtime transient faults. Phase 79 (Backend Abstraction) abstracts
    backends but does not implement crash recovery logic. No existing phase handles the
    specific pattern of local LLM crash-recovery-retry cycles with payload-aware retry.
  deliverables:
  - name: Transient fault classifier
    description: 'Classify LLM API errors into retriable vs non-retriable categories using exception type hierarchy'
    status: planned
    acceptance_criteria:
    - description: 'ConnectionError and Timeout are classified as retriable with exponential backoff'
      validation: test error classification
    - description: 'HTTP 4xx errors are classified as non-retriable and raised immediately'
      validation: test non-retriable handling
    - description: 'HTTP 503 with Retry-After uses server-suggested delay'
      validation: test retry-after parsing
    tasks:
    - id: p156.d1.t1
      title: Create transient fault classifier
      status: planned
      description: 'Create local_llm_retry.py: (1) FaultClassifier class that takes an exception and returns a RetryDecision (retry=True/False, delay_seconds, max_retries), (2) Classification hierarchy: requests.exceptions.ConnectionError -> retriable (high priority), requests.exceptions.Timeout -> retriable (high priority), HTTP 503 -> conditional retry with Retry-After header parsing, HTTP 4xx -> non-retriable (raise immediately), (3) Exponential backoff with jitter: delay = base_factor * 2^(attempt-1) + random_jitter, (4) Maximum retry count (configurable, default 5), (5) Retry budget awareness: track total retry time and abort if budget exceeded.'
      files:
      - '~/zion/projects/agent-orchestration/local_llm_retry.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/local_llm_retry.py'
  - name: Payload-aware retry with context reduction
    description: 'Reduce retry payload size when re-attempting after crash to prevent re-crashing the recovering server'
    status: planned
    acceptance_criteria:
    - description: 'Retry payloads are progressively reduced on consecutive failures'
      validation: test payload reduction
    - description: 'Oldest messages are pruned first when reducing payload'
      validation: test pruning order
