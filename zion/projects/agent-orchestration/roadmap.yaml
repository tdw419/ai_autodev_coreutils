        test backend selection logic (labels, role config, default), (5) test health_check with healthy and unhealthy backends, (6) test failover: primary fails, fallback succeeds, (7) test circuit breaker:
        3 failures -> disabled, cooldown -> re-enabled, (8) test BackendConfig serialization/deserialization. Use mock subprocess for backend execution tests.'
