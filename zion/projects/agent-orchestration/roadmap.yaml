      title: Add exporters to metrics.py
      status: planned
      description: 'Add exporter functions to metrics.py: (1) Prometheus exporter: output in Prometheus text exposition format (TYPE, HELP, metric lines with labels), support /metrics HTTP endpoint format,
        include process metrics (uptime, memory, goroutine-equivalent thread count), (2) StatsD exporter: format as StatsD protocol (metric_name:value|type|@sample_rate), support both UDP and TCP transport,
        (3) JSON exporter: output as structured JSON with timestamps, suitable for custom dashboards or API consumption, (4) CLI: export --format prometheus|statsd|json [--output FILE], (5) each exporter
        is a separate function/class for easy extension (future: OpenTelemetry, CloudWatch).'
      files:
      - '~/zion/projects/agent-orchestration/metrics.py'
      dependencies:
      - p72.d1.t1
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/metrics.py'
