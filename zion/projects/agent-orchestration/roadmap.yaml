- id: 'phase-157'
  title: DAG Failure Rerouting and Rework Loops
  status: planned
  goal: 'Extend the DAG executor to support failure reroute pointers that enable automatic rework cycles when tasks fail'
  description: |
    The "Spec-Driven Autonomous Pipeline" research (187 lines, 8 citations) describes
    an executable task schema that includes an `on_failure_reroute_task_id` field. This
    enables DAGs that support rework cycles (A -> Test -> A if test fails) rather than
    just linear progression (A -> B -> C). The research argues that standard DAG modeling
    is insufficient for iterative software development, which inherently includes cycles
    of rework and debugging. The failure reroute pointer transforms the DAG from a
    purely sequential execution graph into a state machine capable of handling iterative
    improvement. Phase 5 (DAG Executor) handles dependency ordering and conditional
    branching but does NOT support failure-triggered rerouting. Phase 131 (Attempt
    Pattern) preserves failure history across attempts but operates at the task level,
    not within the DAG structure. No existing phase enables the DAG itself to route
    execution to a different node when a task fails.
  deliverables:
  - name: Failure reroute extension to DAG executor
    description: 'Add on_failure_reroute_task_id support to the DAG execution engine'
    status: planned
    acceptance_criteria:
    - description: 'Tasks can specify a reroute target that executes when the task fails'
      validation: test failure reroute execution
    - description: 'Maximum reroute depth is enforced to prevent infinite loops'
      validation: test max depth enforcement
    - description: 'Reroute history is tracked in execution logs'
      validation: check log output
    tasks:
    - id: p157.d1.t1
      title: Extend DAG executor with failure rerouting
      status: planned
      description: 'Modify dag.py: (1) Add optional `on_failure_reroute_task_id` field to node definitions, (2) When a node execution fails and reroute is specified, execute the target node instead of marking the DAG as failed, (3) Track reroute depth per node: increment each time execution is rerouted to a node, (4) Enforce maximum reroute depth (configurable, default 3) to prevent infinite loops, (5) After reroute target succeeds, re-execute the original failed node, (6) Log all reroute events with: source_node, target_node, failure_reason, reroute_depth, (7) Support conditional rerouting: `on_failure_reroute_task_id` can be a dict mapping error types to targets.'
      dependencies: []
      files:
      - '~/zion/projects/agent-orchestration/dag.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/dag.py'
  - name: Rework loop pipeline templates
    description: 'Create pre-built DAG templates with failure rerouting for common rework patterns'
    status: planned
    acceptance_criteria:
    - description: 'Implement-test-fix template re-routes failed tests to a fix task'
      validation: test template execution
    - description: 'Review-fix-resubmit template handles review rejection gracefully'
      validation: test review reroute
    tasks:
