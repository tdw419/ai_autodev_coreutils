    acceptance_criteria:
    - description: 'Test file covers feasible, needs-prereqs, and infeasible scenarios'
      validation: 'python3 -m pytest test_feasibility.py -v'
      met: false
    - description: 'Tests use mock codebases with controlled states (missing modules, missing deps, etc.)'
      validation: inspect test setup
      met: false
    tasks:
