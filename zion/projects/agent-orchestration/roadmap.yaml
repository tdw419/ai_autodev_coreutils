- id: 'phase-83'
  title: Orchestrator State Persistence and Migration Layer
  status: planned
  goal: 'Create a version-controlled persistence layer for all orchestrator state with schema migration support'
  description: 'The research describes "Beads, a version-controlled SQL database built on Dolt" as the persistent source of truth for Gas Town''s work coordination. The current orchestrator uses file-backed
    JSON Lines for state (merge queue, workspaces, execution logs, etc.) but has no schema versioning, migration support, or backup/restore. As the system grows to 80+ modules with multiple state files,
    the risk of incompatible state format changes increases. This phase creates a unified persistence layer that: (1) defines schemas for all orchestrator state, (2) supports versioned migrations when schemas
    change, (3) provides backup and restore, (4) ensures atomic writes to prevent corruption, (5) provides a single CLI for state management.'
