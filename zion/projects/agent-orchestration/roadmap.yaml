  technical_notes: 'Alert evaluation is lightweight (just threshold checks against cached metrics) so it adds negligible overhead to the orchestrator loop. Webhook channel uses urllib.request to avoid adding requests as a dependency. GitHub comments use gh CLI for auth. Cooldown prevents the same alert from firing repeatedly during sustained breaches -- only the first breach and resolution trigger notifications.'
  risks:
  - 'Too many alerts could cause operator fatigue -- start with conservative thresholds and only critical severity enabled'
  - 'GitHub comment alerts could spam issue threads -- limit to one alert per issue per hour'
  - 'Webhook endpoints could be unreachable -- implement timeout and retry with backoff'
  - 'False positives from noisy metrics could erode trust in alerts -- require 2 consecutive breaches before firing'
  scope_lines_total: 340
  test_target: 10
- id: 'phase-107'
  title: 'Task Complexity Scoring and Adaptive Resource Allocation'
  status: planned
  goal: 'Analyze issue descriptions to estimate task complexity and automatically configure model tier, max turns, context budget, and role assignment, preventing token waste on simple tasks and under-resourcing complex ones'
  description: |
    The orchestrator currently assigns identical configuration to all tasks regardless of complexity. A typo fix
    gets the same model tier, max turns, context budget, and role assignment as a multi-file architectural refactor.
    The research emphasizes that "code is free, but attention is scarce" and describes the Dark Factory team using
    1B tokens/day at $2-3K daily. Intelligent resource allocation is essential to the "token billionaire" strategy:
    trivial tasks should use fast/cheap models with few turns, while complex tasks deserve premium models with
    generous budgets. This phase adds a complexity scoring engine that analyzes issue descriptions (title, body,
    labels, affected files) and maps scores to resource configurations, optimizing token efficiency while
    maintaining quality.
  deliverables:
  - name: Task complexity scorer
    description: 'Analyze issue descriptions to produce a complexity score (1-10) with feature breakdown'
    status: planned
    acceptance_criteria:
    - description: Can score an issue and return complexity rating with reasoning
      validation: 'orch score ISSUE_URL returns score with breakdown'
      met: false
    - description: Scoring considers title length, body size, label count, affected files, and keyword patterns
      validation: 'test with varied issues, verify scores correlate with expected complexity'
      met: false
    tasks:
    - id: p107.d1.t1
      title: Create complexity scorer module
      status: planned
      description: 'Create complexity_scorer.py: (1) score_issue(issue) returns ComplexityScore(score 1-10, features dict, tier trivial|medium|complex|epic), (2) features: title_word_count, body_line_count, label_count, affected_file_count (from git diff if available), keyword_density (refactor/migrate/architect=high, fix/typo/update=low), has_test_mention, has_breaking_change_mention, (3) scoring: weighted sum of normalized features with calibrated weights, (4) tier thresholds: trivial (1-3), medium (4-6), complex (7-8), epic (9-10), (5) calibration data from historical execution logs (correlate scores with actual turns used and success rates).'
      files:
      - '~/zion/projects/agent-orchestration/complexity_scorer.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/complexity_scorer.py'
  - name: Resource allocation profiles
    description: 'Map complexity tiers to model tier, max turns, context budget, and role assignments'
    status: planned
    acceptance_criteria:
    - description: Each complexity tier has a defined resource allocation profile
      validation: 'orch config allocation list shows 4 profiles'
      met: false
    - description: Spawner uses complexity score to configure workers automatically
      validation: 'orchestrator log shows "complexity=7, tier=complex, model=premium, turns=15"'
      met: false
    tasks:
    - id: p107.d2.t1
      title: Create resource allocation profiles
      status: planned
      description: 'Create allocations module: (1) 4 YAML profiles mapping tiers to resources: trivial (model=fast, max_turns=5, context_budget=0.3, role=implementer, pipeline=test-pipeline), medium (model=standard, max_turns=10, context_budget=0.5, role=implementer, pipeline=standard-pipeline), complex (model=premium, max_turns=15, context_budget=0.7, role=implementer, pipeline=standard-pipeline+review), epic (model=premium, max_turns=20, context_budget=0.9, role=architect, pipeline=team-pipeline), (2) spawner.py integration: score issue before spawning, select profile, override defaults, (3) allow per-repo profile overrides in orchestrator.yaml.'
      dependencies:
      - p107.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/allocations/'
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/allocations/'
  - name: Historical calibration and learning
    description: 'Use execution history to calibrate scoring weights and validate allocation effectiveness'
    status: planned
    acceptance_criteria:
    - description: Can compare predicted complexity with actual resource consumption
      validation: 'orch score calibrate shows prediction vs actual for recent issues'
      met: false
    tasks:
    - id: p107.d3.t1
      title: Add calibration from execution history
      status: planned
      description: 'Extend complexity_scorer.py: (1) calibrate() reads execution_log for past issues, compares predicted complexity with actual turns/tokens used, (2) compute mean absolute error per feature weight, (3) adjust_weights() nudges weights to reduce error, (4) orch score calibrate [--issues N] runs calibration on last N completed issues, (5) orch score report shows calibration accuracy and suggests weight adjustments. This creates a feedback loop where scoring improves over time.'
      dependencies:
      - p107.d1.t1
      - p107.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/complexity_scorer.py'
    scope_lines: 70
    scope_files:
    - '~/zion/projects/agent-orchestration/complexity_scorer.py'
  - name: Complexity scoring tests
    description: 'Tests for scoring logic, allocation mapping, and calibration'
    status: planned
    acceptance_criteria:
    - description: Tests cover scoring, allocation, and calibration
      validation: 'python3 -m pytest test_complexity.py -v'
      met: false
    tasks:
    - id: p107.d4.t1
      title: Create test_complexity.py
      status: planned
      description: 'Create test_complexity.py: (1) test_scoring_trivial: simple "fix typo" issue scores 1-3, (2) test_scoring_complex: "migrate database layer to new ORM" issue scores 7-9, (3) test_scoring_epic: large architectural issue with many labels scores 9-10, (4) test_allocation_mapping: each tier maps to correct resources, (5) test_spawner_integration: mock spawner call with complexity, verify correct config, (6) test_calibration: mock execution history with known complexity, verify weights adjust correctly.'
      dependencies:
      - p107.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_complexity.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_complexity.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-107'
    type: soft
    reason: 'Spawner from phase 4 is where resource configuration is applied'
  - source: 'phase-40'
    target: 'phase-107'
    type: soft
    reason: 'Multi-model backend (phase 40) provides the model tier routing that complexity scoring configures'
  - source: 'phase-32'
    target: 'phase-107'
    type: soft
    reason: 'Cost tracking (phase 32) provides the actual consumption data for calibration'
  - source: 'phase-20'
    target: 'phase-107'
    type: soft
    reason: 'Context budget (phase 20) is one of the resources allocated by complexity tier'
  - source: 'phase-8'
    target: 'phase-107'
    type: soft
    reason: 'Execution history (phase 8) provides the data for calibration feedback loop'
  technical_notes: 'Complexity scoring uses a simple weighted-sum model rather than ML to keep it deterministic and auditable. The scoring is a heuristic -- it does not need to be perfectly accurate, just good enough to prevent obvious mismatches (trivial tasks getting premium resources). Calibration runs weekly via the maintenance cron (phase 66) and adjusts weights incrementally. The scoring can be overridden manually per-issue via labels (e.g., complexity:epic forces epic allocation).'
  risks:
  - 'Scoring could consistently misestimate for certain issue types -- calibration feedback loop mitigates this over time'
  - 'Keyword-based scoring could be gamed by issue authors -- add randomness to prevent strategic label manipulation'
  - 'Over-optimization for cost could sacrifice quality on complex tasks -- set minimum resource floors per tier'
  - 'Calibration on sparse data (few completed issues) could produce unstable weights -- require minimum 20 issues before adjusting'
