      title: Integrate federation into orchestrator.py
      status: planned
      description: 'Modify orchestrator.py: (1) add federation section to orchestrator.yaml:
        enabled (bool), instance_id (string), shared_backend (github_labels|file|http), heartbeat_interval,
        lock_ttl, (2) in run_loop(): before spawning, acquire federation lock on the issue
        (skip if lock held by another instance), (3) after each loop iteration, publish instance
        status via federation_status.py, (4) on startup, register instance; on shutdown, deregister,
        (5) add --no-federation flag to disable for single-instance mode (default behavior
        unchanged), (6) add federation section to status.sh showing all instances and their
