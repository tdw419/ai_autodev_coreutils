- id: 'phase-51'
  title: 'Orchestrator Federation and Cross-Instance Coordination'
  status: planned
  goal: 'Enable multiple Hermes orchestrator instances to coordinate work across repos, teams, or cloud regions'
  description: 'The research describes Gas Town managing 20-30 Claude Code instances simultaneously. Phase 30 covers inter-agent communication within a single orchestrator, but does not address the scenario
    where multiple Hermes orchestrator instances need to coordinate: one per organization, one per cloud region, or one per team. Without federation, multiple orchestrators could create conflicting PRs,
    duplicate work on the same issues, or waste resources on tasks already handled by another instance. This phase adds a federation layer: (1) a distributed lock service for issue assignment (preventing
    two orchestrators from working on the same issue), (2) a shared work status protocol for cross-instance visibility, (3) work stealing for load balancing between instances, and (4) a federation status
    view that shows all instances and their current workload. This is the "Kubernetes for Agents" pattern from Gas Town applied at the orchestrator level rather than the agent level.'
  deliverables:
  - name: Distributed lock service
    description: 'File-based or API-based distributed locking for issue assignment across orchestrator instances'
    status: planned
    acceptance_criteria:
    - description: Two orchestrator instances competing for the same issue results in only one acquiring the lock
      validation: 'run two instances simultaneously, verify single assignment'
      met: false
    - description: 'Lock acquisition and release is atomic and handles stale locks (timeout-based expiry)'
      validation: 'simulate stale lock, verify cleanup'
      met: false
    tasks:
    - id: p51.d1.t1
      title: Create federation_lock.py module
      status: planned
      description: 'Python module implementing distributed locking: (1) uses GitHub issue labels as the lock mechanism (add "orch-working-{instance_id}" label to claim an issue, check for existing labels
        before claiming), (2) supports optional file-based locking for non-GitHub coordination (lock files in a shared filesystem or S3), (3) lock TTL with automatic expiry (default 4 hours), (4) lock acquisition
        returns: acquired (bool), lock_holder (instance_id if locked by another), lock_expiry (when current lock expires), (5) heartbeat to extend lock TTL while work is in progress, (6) CLI: python3 federation_lock.py
        acquire --issue 42 --instance my-instance, release, status. The GitHub-label approach requires no external infrastructure.'
      files:
      - '~/zion/projects/agent-orchestration/federation_lock.py'
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/federation_lock.py'
  - name: Federation status protocol
    description: Shared status protocol that allows orchestrator instances to see each other''s workload
    status: planned
    acceptance_criteria:
    - description: 'Each orchestrator instance publishes its status (active issues, capacity, health) to a shared location'
      validation: 'run two instances, check shared status'
      met: false
    - description: Instances can query other instances'' status to avoid duplicate work
      validation: instance A checks instance B''s workload before claiming an issue
      met: false
    tasks:
    - id: p51.d2.t1
      title: Create federation_status.py module
      status: planned
      description: 'Python module for cross-instance status sharing: (1) each instance writes its status to a shared location (GitHub repo issue/label, shared JSON file, or simple HTTP endpoint), (2) status
        includes: instance_id, active_issues, capacity_remaining, health_score, last_heartbeat, repos_monitored, (3) query_all() returns status of all known instances, (4) query_capacity(repo) returns total
        capacity across all instances monitoring a repo, (5) detect_stale() identifies instances that have not heartbeated recently (possible crash), (6) CLI: python3 federation_status.py publish, query,
        detect-stale. Default shared location: a designated GitHub issue with structured comments, or a JSON file in a shared filesystem.'
      files:
      - '~/zion/projects/agent-orchestration/federation_status.py'
      dependencies:
      - p51.d1.t1
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/federation_status.py'
  - name: Work stealing for load balancing
    description: 'Enable under-loaded orchestrator instances to pick up work from over-loaded instances'
    status: planned
    acceptance_criteria:
    - description: An idle instance can detect an overloaded instance and offer to take work
      validation: 'simulate load imbalance, verify work redistribution'
      met: false
    - description: 'Work stealing respects priority and does not preempt in-progress work'
      validation: check that active issues are not stolen
      met: false
