- id: 'phase-64'
  title: 'Workspace Sandboxing and OS-Level Isolation'
  status: planned
  goal: 'Add OS-level sandboxing to agent workspaces -- filesystem restrictions, network policies, and resource limits to prevent agents from causing unintended side effects'
  description: 'The research describes Symphony''s approach to workspace isolation: "strict safety invariants are enforced to ensure path normalization and sanitization, preventing agents from escaping
    their assigned boundaries." Phase 11 (Workspace Lifecycle) manages workspace creation/cleanup but provides only directory-level isolation. In the Dark Factory model (phase 35) where agents run fully
    autonomously with no human review, stronger isolation is essential. This phase builds: (1) filesystem sandboxing using Linux namespaces or chroot to restrict agent file access to their workspace, (2)
    network policy enforcement (allow/deny specific hosts/ports), (3) resource limits (CPU, memory, disk, wall-clock time) using cgroups or ulimit, (4) capability auditing -- log all system calls that agents
    attempt, flagging suspicious ones, (5) a "sandbox policy" YAML that defines per-role isolation levels (implementer gets full network, reviewer gets none). This makes the "high-trust environment" from
    the research actually trustworthy.'
  deliverables:
  - name: Filesystem sandboxing module
    description: Restrict agent file access to their workspace directory
    status: planned
    acceptance_criteria:
    - description: Agent cannot access files outside their workspace
      validation: 'run agent in sandbox, attempt to read /etc/passwd, verify blocked'
      met: false
    tasks:
    - id: p64.d1.t1
      title: Create sandbox.py filesystem isolation module
      status: planned
      description: 'Create sandbox.py: (1) SandboxContext class that sets up filesystem isolation for a workspace, (2) support multiple isolation levels: none (current behavior), soft (warning on escape
        attempts), hard (block escape attempts), (3) soft mode: use a custom file opener that logs but allows access outside workspace, (4) hard mode: use chroot or mount namespace to restrict filesystem
        access to workspace directory, (5) allowlist for read-only access outside workspace (e.g., /usr/lib for Python packages, system PATH), (6) path sanitization: normalize all paths, reject symlinks
        that escape workspace, (7) integration with workspace_manager.py from phase 11 -- sandbox setup as part of workspace initialization, (8) detect and log escape attempts even in soft mode. Start with
        soft mode as default -- hard mode requires root.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
  - name: Network policy enforcement
    description: Control which network hosts and ports agents can access
    status: planned
    acceptance_criteria:
    - description: Agent network access is restricted per policy
      validation: 'configure deny-all policy, run agent, verify network calls blocked'
      met: false
    tasks:
    - id: p64.d2.t1
      title: Add network policy to sandbox.py
      status: planned
      description: 'Add network policy to SandboxContext: (1) network_policy in sandbox YAML: allowlist (hosts, ports, protocols), denylist, default_deny, (2) preset policies: open (no restrictions -- for
        implementer role), restricted (allow github.com, pypi.org, npmjs.org -- for dependency installation), locked (deny all -- for reviewer role), (3) enforcement via iptables rules (requires root) or
        LD_PRELOAD socket interceptor (user-space, no root needed), (4) DNS resolution filtering, (5) log all connection attempts (allowed and denied), (6) per-role default policies in roles/ directory.
        The LD_PRELOAD approach is preferred for zero-root deployment.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      dependencies:
      - p64.d1.t1
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
  - name: Resource limits and timeouts
    description: 'Enforce CPU, memory, disk, and wall-clock time limits per workspace'
    status: planned
    acceptance_criteria:
    - description: Agent processes are killed when exceeding resource limits
      validation: 'set memory limit to 100MB, run agent that allocates 500MB, verify killed'
      met: false
    tasks:
    - id: p64.d3.t1
      title: Add resource limits to sandbox.py
      status: planned
      description: 'Add resource limits to SandboxContext: (1) resource_limits in sandbox YAML: max_cpu_percent, max_memory_mb, max_disk_mb, max_wall_time_seconds, max_processes, (2) enforcement via resource
        module (Python-level) and ulimit (system-level), (3) graceful shutdown: send SIGTERM, wait grace_period, then SIGKILL, (4) track resource usage during execution: peak memory, CPU time, disk usage,
        (5) report resource usage in execution logs (phase 8), (6) per-role default limits: implementer gets more resources, reviewer gets less, (7) detect resource exhaustion before it happens: warn at
        80% of limit. Start with Python-level enforcement (resource module) which works without root.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      dependencies:
      - p64.d1.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
  - name: Capability auditing and policy configuration
    description: 'Log all privileged operations and provide per-role sandbox policies'
    status: planned
    acceptance_criteria:
    - description: All filesystem/network/privilege operations are logged
      validation: 'run agent, check audit log for all system operations'
      met: false
    tasks:
    - id: p64.d4.t1
      title: Add auditing and policy config to sandbox.py
      status: planned
      description: 'Add auditing and configuration: (1) audit log: record all sandbox events (file access outside workspace, network connections, resource limit approaches, escape attempts), (2) audit log
        stored in ~/.orchestrator/audit/{session_id}.jsonl, (3) sandbox_policy.yaml: per-role policies defining isolation_level, network_policy, resource_limits, (4) integrate with executor.py: apply sandbox
        when creating worker process, (5) integrate with safety.py from phase 15: sandbox violations trigger safety policy actions, (6) report command: summarize sandbox events for a session (operations
        attempted, blocked, allowed), (7) strict mode: any sandbox violation immediately terminates the agent and flags the execution. This is the "strict safety invariants" from the research made enforceable.'
      files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      - '~/zion/projects/agent-orchestration/sandbox_policy.yaml'
      dependencies:
      - p64.d2.t1
      - p64.d3.t1
      scope_lines: 110
      scope_files:
      - '~/zion/projects/agent-orchestration/sandbox.py'
      - '~/zion/projects/agent-orchestration/sandbox_policy.yaml'
  dependencies:
  - source: 'phase-11'
    target: 'phase-64'
    type: soft
    reason: Workspace lifecycle from phase 11 manages the workspaces that sandboxing protects
  - source: 'phase-15'
    target: 'phase-64'
    type: soft
    reason: 'Safety policies from phase 15 define what actions should be blocked -- sandboxing enforces them'
  - source: 'phase-35'
    target: 'phase-64'
    type: hard
    reason: 'Dark factory mode from phase 35 requires sandboxing as a prerequisite -- no human review means isolation must be robust'
  - source: 'phase-5'
    target: 'phase-64'
    type: soft
    reason: DAG executor from phase 5 creates the worker processes that need sandboxing
  - source: 'phase-8'
    target: 'phase-64'
    type: soft
    reason: Execution logs from phase 8 should include sandbox audit events
  technical_notes: 'Start with soft-mode filesystem restrictions and Python-level resource limits (no root required). Hard-mode isolation (chroot, namespaces, iptables) is available but optional -- it requires
    root and may not work in all environments. The LD_PRELOAD network interceptor is the key innovation: it provides network filtering without root, without containers, and without modifying agent code.
    The sandbox policy is per-role: implementers need network access (pip install), reviewers don''t. This is defense-in-depth: even if an agent goes rogue, it can''t escape its sandbox.'
  risks:
  - 'Hard-mode isolation requires root -- may not work in all deployment environments'
  - 'LD_PRELOAD may not work with statically-linked binaries or some Python builds'
  - 'Overly restrictive sandboxing could break legitimate agent operations (package installs, git operations)'
  - 'Resource limits may kill agents mid-task, losing work -- implement checkpoint before limit'
  - 'Chroot escape is possible for root processes -- never run agents as root inside sandbox'
