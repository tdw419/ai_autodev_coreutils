      title: Integrate checkpoints into workspace_manager.py
      status: planned
      description: 'Modify workspace_manager.py: (1) on workspace creation, create checkpoints/ subdirectory, (2) on workspace archival (phase 11), preserve last N checkpoints alongside the archived workspace
        (compressed), (3) on workspace cleanup, delete checkpoints too, (4) add checkpoint info to workspace metadata: last_checkpoint_id, checkpoint_count, total_checkpoint_size, (5) add checkpoint section
        to status.sh workspace view showing checkpoint count and total size. Checkpoints should be stored outside the workspace directory (in ~/.orchestrator/checkpoints/) so they survive workspace archival.'
