- id: 'phase-149'
  title: Resource-Contended Test Lock and Execution Scheduling
  status: planned
  goal: 'Prevent concurrent high-resource test execution from exhausting system memory via file-based mutex and queue-based scheduling'
  description: |
    The "Geometry OS Autodev Loop" research (259 lines, 47 citations) describes a critical
    infrastructure constraint: each execution of cargo test requires approximately 17GB of
    RAM. In a multi-worker environment, concurrent test runs would quickly exhaust the host
    memory, leading to kernel panics or OOM-killer interventions. GeOS uses a file-based
    lock at /tmp/geo_cargo_test.lock to serialize test execution. While this ensures
    stability, it introduces latency as workers idle while waiting for the lock. The
    research decomposes this latency into four phases: Prefill (100-200ms/k-tokens),
    Decode (2-5s/500 tokens), Execution (30-90s for test suite), and Wait (0-90s for
    lock acquisition). Phase 64 (Workspace Sandboxing) provides OS-level isolation but
    does NOT handle resource contention between concurrent test executions. Phase 70
    (Backpressure) manages API rate limits but NOT system resource contention. No existing
    phase implements resource-aware test scheduling or execution serialization for
    memory-intensive operations.
  deliverables:
  - name: Resource-contended execution lock
    description: 'File-based mutex for serializing high-resource operations'
    status: planned
    acceptance_criteria:
    - description: 'Only one high-resource operation executes at a time'
      validation: test concurrent access
    - description: 'Lock acquisition has configurable timeout (default 300 seconds)'
      validation: test timeout behavior
    tasks:
    - id: p149.d1.t1
      title: Create resource execution lock
      status: planned
      description: 'Create resource_lock.py with: (1) ResourceLock class that implements file-based mutex using fcntl.flock(), (2) acquire(resource_name, timeout) with blocking wait and timeout, (3) release(resource_name), (4) is_locked(resource_name) for status checking, (5) queue_position(resource_name) that returns the position in the wait queue, (6) Configurable lock directory (default /tmp/orch_locks/) and timeout per resource type.'
      files:
      - '~/zion/projects/agent-orchestration/resource_lock.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/resource_lock.py'
  - name: Execution scheduler with resource awareness
    description: 'Schedule test execution to minimize idle time while preventing resource exhaustion'
    status: planned
    acceptance_criteria:
    - description: 'Scheduler respects resource lock before launching test execution'
      validation: test scheduling
    - description: 'Workers receive estimated wait time when lock is held'
      validation: check wait time estimate
    tasks:
    - id: p149.d2.t1
      title: Create resource-aware execution scheduler
      status: planned
      description: 'Extend resource_lock.py: (1) ResourceScheduler class that manages a queue of pending executions, (2) schedule_execution(resource_name, command, callback) that adds to queue and acquires lock when available, (3) get_wait_estimate(resource_name) that returns estimated time based on average execution duration and queue depth, (4) cancel_pending(resource_name, execution_id) to remove from queue, (5) Track execution metrics: avg_duration, queue_depth_history, total_wait_time.'
      dependencies:
