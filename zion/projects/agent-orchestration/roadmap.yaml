    status: done
    acceptance_criteria:
    - description: All tests pass after fixes
      validation: 'python3 -m pytest -v (all green)'
      met: true
    tasks:
    - id: p7.d4.t1
      title: Fix bugs discovered by test suite
      status: done
      description: 'Run the full test suite. Fix any failures in dag.py, executor.py, spawner.py, roles.py, or orchestrator.py. Common areas to check: loop executor variable scoping, template rendering
        edge cases, role matching fallbacks.'
      files:
      - '~/zion/projects/agent-orchestration/dag.py'
      - '~/zion/projects/agent-orchestration/executor.py'
      - '~/zion/projects/agent-orchestration/spawner.py'
