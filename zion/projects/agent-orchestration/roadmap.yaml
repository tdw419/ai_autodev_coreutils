- id: 'phase-73'
  title: Agent Workspace Checkpoint and Incremental Restore
  status: planned
  goal: 'Enable workspace-level snapshots and incremental restore so that crashed or interrupted agents can resume from their last good state instead of starting over'
  description: 'The research describes Symphony''s workspace isolation where "for each issue, the orchestrator creates a deterministic mapping between the issue ID and a local directory." Phase 25 covers
    orchestrator-level resilience (state recovery, checkpoint pipeline state) and Phase 11 covers workspace lifecycle management (creation, archival, cleanup), but neither addresses workspace-level checkpointing.
    When an agent is 80% through a complex task and crashes (OOM, timeout, network failure), the current system either restarts from scratch (wasting tokens and time) or archives the workspace as failed.
    This phase implements workspace checkpoints: (1) snapshot the workspace filesystem state at configurable intervals (every N pipeline steps or every M minutes), (2) on agent crash, restore from the last
    checkpoint instead of starting over, (3) incremental checkpoints that only store changes since the last snapshot (efficient for large workspaces), (4) checkpoint metadata that records the agent''s context
    at checkpoint time (current pipeline step, tokens used, files modified), and (5) a checkpoint CLI for manual inspection and rollback. This directly supports the Ralph Wiggum pattern (phase 65) by making
    loop iterations truly resumable, and improves cost efficiency by avoiding re-work on long-running tasks.'
  deliverables:
  - name: Workspace checkpoint module
    description: Create and manage filesystem snapshots of agent workspaces
    status: planned
    acceptance_criteria:
    - description: Can create a checkpoint of a workspace directory
      validation: 'python3 checkpoint.py create --workspace ./workspaces/issue-42'
      met: false
    - description: Checkpoints are incremental (only store changes since last checkpoint)
      validation: 'create two checkpoints, verify second is smaller than first'
      met: false
    tasks:
    - id: p73.d1.t1
      title: Create checkpoint.py module
      status: planned
      description: 'Create checkpoint.py: (1) create(workspace, step_id, metadata) function: snapshot workspace state, (2) snapshot strategy: use rsync --link-dest for incremental snapshots (hardlinks unchanged
        files, copies changed files), store in ~/.orchestrator/checkpoints/{workspace_id}/{step_id}/, (3) metadata: step_id, pipeline_step, timestamp, files_changed (diff from previous), disk_usage, agent_context_summary
        (truncated), (4) list(workspace) -> list of checkpoints with metadata, (5) restore(workspace, step_id) -> restore workspace to checkpoint state, (6) prune(workspace, keep_last=N) -> delete old checkpoints
        to save disk, (7) estimate_size(workspace) -> predict next checkpoint size, (8) CLI: create, list, restore, prune, estimate. rsync --link-dest is the key: it creates a full directory tree appearance
        but only stores changed files, making incremental snapshots nearly free for small changes.'
      files:
      - '~/zion/projects/agent-orchestration/checkpoint.py'
    scope_lines: 150
    scope_files:
