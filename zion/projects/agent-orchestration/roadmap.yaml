- id: 'phase-47'
  title: Cattle vs Pets Worker Model (Session Identity and Disposability)
  status: planned
  goal: Implement the Symphony/Gas Town pattern of treating agent sessions as disposable "cattle" while maintaining persistent identity and project knowledge as "pets"
  description: 'The research describes the orchestrator treating "individual agent sessions as ephemeral cattle, while treating the agent''s identity and the project''s state as persistent pets." This architectural
    pattern is fundamental to the Dark Factory model: workers are thrown away after each task, but knowledge accumulates. Currently, the Hermes orchestrator creates workspaces but has no concept of worker
    identity (each worker is anonymous), no knowledge persistence between sessions (each pipeline run starts fresh), and no explicit disposability model (workspaces persist indefinitely). This phase adds:
    (1) worker identity cards that track what each worker "learned" during its session, (2) a knowledge carry-forward system that injects relevant past-learnings into new worker sessions, (3) explicit session
    lifecycle (spawn -> work -> harvest -> dispose) with knowledge extraction at harvest time, (4) a "pet" store for persistent project-level knowledge that survives across all worker sessions.'
  deliverables:
  - name: Worker identity and session tracking
    description: Assign unique identities to worker sessions and track what each worker learns
    status: planned
    acceptance_criteria:
    - description: 'Each worker session has a unique ID, role, and learns log'
      validation: 'spawn a worker, check session metadata'
      met: false
    tasks:
    - id: p47.d1.t1
      title: Add worker identity system to spawner.py
      status: planned
      description: 'Modify spawner.py to: (1) generate a unique worker_id (UUID) for each session, (2) create a session card at workspace/.orchestrator/session.json with: worker_id, role, spawned_at, issue_number,
        pipeline, status, (3) during pipeline execution, append "learnings" to the session card: files_created, files_modified, errors_encountered, solutions_applied, (4) on completion, write a session_summary
        with: total duration, nodes executed, files changed, success/failure, key_insights (extracted from AI node outputs). This makes each worker traceable and its session inspectable after disposal.'
      files:
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/spawner.py'
  - name: 'Knowledge carry-forward system'
    description: Extract and persist learnings from completed sessions for injection into future sessions
    status: planned
    acceptance_criteria:
    - description: Learnings from past sessions are available for injection into new worker prompts
      validation: 'complete a session, start a new one on similar task, check prompt includes past learnings'
      met: false
    tasks:
    - id: p47.d2.t1
      title: Create knowledge_store.py module
      status: planned
      description: 'Python module that: (1) on session completion (harvest), extracts key learnings from session.json: what worked, what failed, what files were involved, (2) stores learnings in a per-repo
        knowledge base at ~/.orchestrator/knowledge/{repo}/ as JSONL files indexed by topic (file paths, error types, task types), (3) on new session spawn, queries the knowledge base for relevant past
        learnings based on: files involved in the current issue, labels, similar issue titles, (4) formats relevant learnings as a compact context block (<500 tokens) for injection into the AI node prompt,
        (5) supports --query to manually search the knowledge base and --prune to remove stale entries. The carry-forward is the "pet" -- knowledge persists even though the "cattle" (worker) is disposed.'
      files:
      - '~/zion/projects/agent-orchestration/knowledge_store.py'
    dependencies:
    - p47.d1.t1
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/knowledge_store.py'
  - name: Session harvest and disposal pipeline
    description: Formalize the worker lifecycle with knowledge extraction at harvest time
    status: planned
    acceptance_criteria:
    - description: Completed sessions are harvested (learnings extracted) before disposal (workspace archived)
      validation: 'complete a pipeline, verify harvest step runs before archival'
      met: false
    tasks:
    - id: p47.d3.t1
      title: Add harvest step to orchestrator session lifecycle
      status: planned
      description: 'Modify orchestrator.py and workspace_manager.py to: (1) after pipeline completion (success or failure), run a "harvest" step that calls knowledge_store.py extract(), (2) harvest extracts:
        files changed (from git diff), errors encountered (from execution log), solutions that worked (from AI node outputs), (3) write harvested knowledge to the knowledge base, (4) then proceed to workspace
        archival (existing cleanup from phase 11), (5) add a HARVEST node type to dag.py that can be included in pipelines to trigger mid-session knowledge extraction (useful for long-running pipelines).
        The harvest step is what transforms disposable sessions into persistent organizational knowledge.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/workspace_manager.py'
      - '~/zion/projects/agent-orchestration/dag.py'
    dependencies:
    - p47.d2.t1
    - p11.d1.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/workspace_manager.py'
    - '~/zion/projects/agent-orchestration/dag.py'
  - name: Persistent project knowledge ("pets")
    description: 'Maintain a project-level knowledge store that accumulates across all worker sessions'
    status: planned
    acceptance_criteria:
    - description: Project knowledge grows over time as more sessions complete
      validation: 'run 3 sessions, check knowledge base has entries from all 3'
      met: false
    - description: Knowledge can be queried to understand what the system has learned about a project
      validation: 'python3 knowledge_store.py --project-summary --repo owner/repo'
      met: false
    tasks:
    - id: p47.d4.t1
      title: Add project knowledge summary and analytics to knowledge_store.py
      status: planned
      description: 'Add to knowledge_store.py: (1) --project-summary mode that outputs: total sessions, total learnings, most-modified files, common error patterns, successful solution patterns, knowledge
        coverage (which files/areas have accumulated the most knowledge), (2) --knowledge-graph mode that shows relationships between learnings (file A and file B are often modified together, error X is
        usually caused by pattern Y), (3) integrate with the executor prompt builder so project knowledge is automatically injected into AI node prompts when available, (4) add a knowledge retention policy:
        learnings older than N days with no re-use are pruned, keeping the knowledge base fresh and relevant. The project knowledge is the ultimate "pet" -- it outlives every individual worker session.'
      files:
      - '~/zion/projects/agent-orchestration/knowledge_store.py'
    dependencies:
    - p47.d2.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/knowledge_store.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-47'
    type: soft
    reason: Worker identity modifies the spawner from phase 4
  - source: 'phase-8'
    target: 'phase-47'
    type: soft
    reason: Knowledge extraction reads from execution logs created by phase 8
  - source: 'phase-11'
    target: 'phase-47'
    type: soft
    reason: Session disposal integrates with workspace lifecycle from phase 11
  - source: 'phase-20'
    target: 'phase-47'
    type: soft
    reason: Knowledge injection must respect context budget limits from phase 20
  - source: 'phase-38'
    target: 'phase-47'
    type: soft
    reason: 'Cross-project knowledge transfer from phase 38 benefits from the knowledge store'
  technical_notes: 'The "cattle vs pets" metaphor is the core architectural insight. Workers (cattle) are created, do work, and are destroyed. Knowledge (pets) persists and grows. The knowledge store is
    the "organizational memory" of the orchestrator. Keep learnings compact -- store patterns, not raw outputs. The harvest step is critical: it is the moment where disposable session state becomes persistent
    organizational knowledge. Without harvest, every session starts from zero.'
  risks:
  - 'Knowledge extraction quality depends on the session summary -- poorly summarized sessions add noise'
  - 'Knowledge base could grow large -- need retention policies and pruning'
  - 'Injecting past knowledge into prompts adds context tokens -- must respect budget limits'
  - 'Knowledge relevance scoring may be inaccurate for novel tasks -- don''t let stale knowledge mislead'
  scope_lines_total: 430
  test_target: 10
- id: 'phase-48'
  title: Cost Optimization and Intelligent Model Routing
  status: planned
  goal: Analyze token spending patterns and automatically suggest or apply cost optimizations across the orchestrator
  description: 'Phase 32 tracks costs but does not optimize them. The research describes the OpenAI team spending $2-3K/day with 1B+ output tokens, treating code as disposable. At this scale, cost optimization
    becomes a first-class concern. This phase goes beyond tracking to actively identifying wasteful patterns: retries that consume more tokens than the original attempt, AI nodes using expensive models
    for trivial tasks, loop nodes hitting max iterations on unsolvable problems, and context budgets that are too large for simple issues. The optimizer suggests cheaper model alternatives, flags wasteful
    pipelines, and can auto-apply cost-saving parameter changes. This is the "attention is scarce" principle from Harness Engineering applied to token economics.'
  deliverables:
  - name: Cost pattern analyzer
    description: Module that identifies wasteful token spending patterns from execution history
    status: planned
    acceptance_criteria:
    - description: Can identify top 5 most expensive pipeline patterns (by average token cost per run)
      validation: 'python3 cost_optimizer.py --analyze --last 50'
      met: false
    - description: 'Detects specific waste patterns: excessive retries, oversized context, wrong model tier'
      validation: run analysis on synthetic history with known waste patterns
      met: false
    tasks:
    - id: p48.d1.t1
      title: Create cost_optimizer.py analyzer module
      status: planned
      description: 'Python module that: (1) reads execution logs and cost_tracker data, (2) computes per-pipeline, per-role, per-node-type average costs, (3) identifies waste patterns: retry cost exceeding
        original cost (loop amplification), AI nodes using expensive models for tasks that completed in <3 turns, context budgets >50% unused (over-budgeted), (4) estimates savings if cheaper models were
        used for specific node types, (5) outputs structured report with: current spend, waste percentage, top savings opportunities ranked by impact. Support --period flag and --threshold to filter small
        savings.'
      files:
      - '~/zion/projects/agent-orchestration/cost_optimizer.py'
      dependencies:
      - p32.d1.t1
      scope_lines: 150
      scope_files:
      - '~/zion/projects/agent-orchestration/cost_optimizer.py'
  - name: Model tier recommendation engine
    description: Suggest cheaper model alternatives for specific task types based on historical success rates
    status: planned
    acceptance_criteria:
    - description: Can recommend model tier per node type based on historical success/failure data
      validation: 'python3 cost_optimizer.py --recommend-models'
      met: false
    - description: Recommendations include confidence scores based on historical data volume
      validation: check output includes confidence and sample size
      met: false
    tasks:
    - id: p48.d2.t1
      title: Add model tier recommendations to cost_optimizer.py
      status: planned
      description: 'Add --recommend-models mode: (1) group AI node executions by task type (based on node name, role, pipeline context), (2) for each task type, compute success rate per model used, (3)
        if a cheaper model has >=95% success rate for a task type, recommend downgrading, (4) if an expensive model is needed (success rate <80% on cheaper models), flag as "requires premium model", (5)
        output a model routing table: task_type -> recommended_model -> confidence -> estimated_savings. Store recommendations in ~/.orchestrator/model-routing.yaml for use by phase 40 (multi-model backend).'
      files:
      - '~/zion/projects/agent-orchestration/cost_optimizer.py'
      dependencies:
      - p48.d1.t1
      scope_lines: 120
      scope_files:
      - '~/zion/projects/agent-orchestration/cost_optimizer.py'
  - name: 'Cost-aware pipeline parameters'
    description: 'Auto-adjust pipeline parameters (loop max, context budget, retry count) to minimize cost while maintaining success rate'
    status: planned
    acceptance_criteria:
    - description: Can suggest parameter adjustments that reduce cost without significantly impacting success rate
      validation: 'python3 cost_optimizer.py --tune-params'
      met: false
    tasks:
    - id: p48.d3.t1
