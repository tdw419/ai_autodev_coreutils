- id: 'phase-21'
  title: Merge Queue and Conflict Prevention (Refinery Pattern)
  status: complete
  goal: Implement Gas Town''s Refinery pattern to manage concurrent agent PRs and prevent merge conflicts
  description: 'Gas Town''s Refinery role "manages merge queues to prevent collisions" -- when multiple agents work on the same codebase simultaneously, their PRs can conflict. The current orchestrator
    can spawn multiple workers but has no merge coordination. This phase adds a merge queue system that: (1) sequences PR merges to avoid conflicts, (2) detects potential conflicts before agents start work,
    (3) rebases branches when the base has moved, (4) provides merge order recommendations. This is essential for running the orchestrator at scale with concurrent workers, directly implementing the Refinery
    pattern from the research.'
  deliverables:
  - name: Conflict detector
    description: Python module that predicts merge conflicts between workspace branches and the main branch
    status: done
    acceptance_criteria:
    - description: Module can check if workspace changes would conflict with main branch
      validation: 'create conflicting changes, run detector'
      met: true
    - description: Reports conflict probability and affected files
      validation: check output includes file list and confidence score
      met: true
    tasks:
    - id: p21.d1.t1
      title: Create conflict_detector.py module
      status: done
      description: 'Python module that: (1) runs git diff on workspace branch vs main, (2) for each changed file, checks if main branch has concurrent changes (git log --oneline main..HEAD), (3) uses git
        merge-tree --write-tree to dry-run merge and detect conflicts, (4) outputs conflict report as JSON with: workspace, branch, conflict_files, conflict_type (content vs structural), severity, suggested_action
        (rebase, wait, or proceed). Support --batch flag to check all workspaces.'
      files:
      - '~/zion/projects/agent-orchestration/conflict_detector.py'
    scope_lines: 120
    scope_files:
