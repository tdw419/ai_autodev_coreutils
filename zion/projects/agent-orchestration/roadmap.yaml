        (pipeline runs that complete without failure), avg_time_to_resolution (issue open to PR merged), avg_pipeline_duration, test_pass_rate, cost_per_issue, agent_turns_per_issue, (2) compare_periods(current,
        previous) -- compute week-over-week or month-over-month changes for each KPI, (3) detect_anomalies(kpis) -- flag KPIs that deviate significantly from historical baseline (>2 standard deviations),
        (4) --format table|json|markdown for different output modes. Store computed KPIs in ~/.orchestrator/metrics/kpis-YYYY-MM-DD.jsonl for historical analysis.'
