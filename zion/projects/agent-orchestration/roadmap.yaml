  technical_notes: 'Federation is the scaling architecture. The GitHub-label-based locking
    approach is deliberately simple: no etcd, no Redis, no external dependencies. Labels on
    GitHub Issues serve as a natural distributed lock visible to all instances. The trade-off:
    label-based locking has higher latency (API calls) but zero infrastructure cost. For high-performance
    federation, the file-based or HTTP backend can be swapped in. Federation should be opt-in:
    single-instance mode (the default) should not be affected.'
  risks:
  - Distributed locking adds latency to every issue assignment
  - Stale locks could prevent work from being picked up -- TTL expiry handles this but adds
    delay
  - Federation status could become a bottleneck if too many instances publish frequently
  - Work stealing could cause thrashing if instances constantly redistribute work
  - No consensus protocol -- federation is eventually consistent, not strongly consistent
