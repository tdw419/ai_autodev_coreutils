        as structured JSON, (2) generate_architecture_doc(project_dir) -- create a markdown architecture overview suitable for AI_GUIDE.md, (3) find_entry_points(project_dir) -- detect main files, API routes,
        CLI entry points, (4) map_dependencies(project_dir) -- build an import dependency graph, detect circular dependencies, identify unused modules. Output agent-readable summaries that help autonomous
        agents quickly understand a new codebase.'
      files:
      - '~/zion/projects/agent-orchestration/legibility.py'
