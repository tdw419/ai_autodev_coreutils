      status: planned
      description: 'Modify executor.py: (1) add checkpoint section to pipeline YAML config: enabled (bool), interval (every_step|every_N_steps|every_M_minutes), max_checkpoints (default 5), on_failure (restore_and_retry|fail),
        (2) between pipeline steps, call checkpoint.create() if enabled, (3) on step failure: if on_failure=restore_and_retry, restore from last checkpoint, adjust pipeline state to retry the failed step,
        log the recovery, (4) track checkpoint usage in execution log (phase 8): checkpoint_created, checkpoint_restored events, (5) add --no-checkpoint flag to disable (default: checkpointing off for backward
        compatibility), (6) checkpoint_restore_count metric for the metrics pipeline (phase 72). This makes long-running pipelines (10+ steps) resilient to mid-task crashes.'
