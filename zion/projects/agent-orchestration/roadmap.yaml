- id: phase-36
  title: Dynamic Policy Engine (WORKFLOW.md Loader)
  status: planned
  goal: Create a runtime policy loader that dynamically configures agent behavior per-project from structured workflow definitions
  description: 'Symphony''s Workflow Loader "parses WORKFLOW.md for prompt templates and runtime settings," acting
    as a Policy Engine that shapes agent behavior without code changes. The Hermes orchestrator uses static AI_GUIDE.md
    files (phase 12) that must be manually maintained. This phase adds a dynamic policy engine: a workflow_loader.py
    module that reads structured YAML/Markdown workflow definitions from each project, extracts agent configuration
    (system prompts, tool restrictions, quality gates, pipeline selection, environment variables), and applies them
    at runtime. This means project owners can tune orchestrator behavior by editing a workflow file rather than
    modifying the orchestrator itself. The loader supports per-label, per-priority, and per-issue-type overrides,
    enabling fine-grained control over how the orchestrator handles different kinds of work.'
  deliverables:
  - name: Workflow definition schema
    description: Structured YAML schema for defining agent policies per project
    status: planned
    acceptance_criteria:
