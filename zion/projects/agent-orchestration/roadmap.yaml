  technical_notes: 'The arena pattern is the operationalization of "code as disposable artifact." Where speculative execution (phase 28) compares strategies for a single task, the arena manages the full lifecycle: provision, execute, score, compare, select, cleanup, learn. The key innovation is the learnings extraction -- failed experiments arent just deleted, their failure modes are archived so future experiments can avoid the same mistakes. This is the "analyze the environment, not the prompt" principle from Harness Engineering applied to experimentation.'
