- id: 'phase-28'
  title: Speculative Execution and Parallel Exploration
  status: planned
  goal: Enable the orchestrator to run multiple solution strategies in parallel and select the best outcome
  description: |
    The Harness Engineering research describes running "100 parallel Ralph Wiggum loops to explore different architectural approaches, only keeping the one that passes the most rigorous quality gates." The current orchestrator assigns one worker per issue with one pipeline. This phase adds speculative execution: for complex issues, spawn multiple workers with different strategies (different roles, different prompts, different pipeline templates), run them in parallel, evaluate outcomes against quality gates, and keep the best result. This transforms the orchestrator from a single-path executor into a multi-strategy optimizer, directly applying the "code is disposable" philosophy from the Dark Factory model.
  deliverables:
  - name: Strategy definition system
    description: Define multiple solution strategies per issue type that the orchestrator can execute in parallel
    status: planned
    acceptance_criteria:
    - description: 'Can define 2+ strategies for a given issue type with different roles, prompts, and pipelines'
      validation: read strategy YAML configs
      met: false
    tasks:
    - id: p28.d1.t1
      title: Create strategy YAML schema and loader
      status: planned
      description: 'Define strategies/ directory with YAML files. Each strategy specifies: name, applicable_labels (which issue types it handles), role_override (different role than default), prompt_additions
        (extra context for this strategy), pipeline (which pipeline template to use), weight (priority for resource allocation), quality_threshold (minimum score to be considered). Create a strategies.py
        loader that matches issues to applicable strategies. Default strategies: conservative (implementer + standard pipeline), aggressive (implementer + team pipeline), exploratory (coordinator plan first,
        then implement).'
      files:
      - '~/zion/projects/agent-orchestration/strategies/'
      - '~/zion/projects/agent-orchestration/strategies.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/strategies/'
    - '~/zion/projects/agent-orchestration/strategies.py'
  - name: Parallel execution manager
    description: Spawn and manage multiple workers for the same issue using different strategies
    status: planned
    acceptance_criteria:
    - description: 'Can spawn N workers for the same issue, each with a different strategy'
      validation: 'python3 orchestrator.py --speculative ISSUE_NUM --strategies conservative,aggressive'
      met: false
    tasks:
    - id: p28.d2.t1
      title: Add speculative execution to orchestrator
      status: planned
      description: 'Add --speculative mode to orchestrator.py: (1) for a given issue, create N workspaces (one per strategy), (2) spawn workers in parallel using existing concurrency limits, (3) each worker
        runs its strategy''s pipeline independently, (4) track speculative runs in workspace metadata (strategy_name, parent_issue, is_speculative=true), (5) report speculative run status alongside normal
        runs. Add max_speculative config option (default 3) to prevent resource exhaustion.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/spawner.py'
