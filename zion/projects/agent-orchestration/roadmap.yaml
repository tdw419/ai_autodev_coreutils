  - source: 'phase-85'
    target: 'phase-104'
    type: soft
    reason: Audit trail data from phase 85 feeds the activity and risk sections
  - source: 'phase-9'
    target: 'phase-104'
    type: soft
    reason: Review sensor scores from phase 9 feed the quality trends section
  - source: 'phase-59'
    target: 'phase-104'
    type: soft
    reason: PR velocity metrics from phase 59 feed the throughput section
  - source: 'phase-35'
    target: 'phase-104'
    type: hard
    reason: Governance reports are essential before enabling dark factory mode from phase 35
  technical_notes: 'Governance reports aggregate data from multiple existing modules without creating new data sources. The report is designed for human consumption (markdown) with structured output
    (JSON) for programmatic access. Anomaly detection uses simple threshold-based rules rather than ML to keep the system deterministic and auditable.'
  risks:
  - 'Governance reports could expose sensitive information -- respect per-repo visibility settings'
  - 'Anomaly thresholds may need tuning per project -- start conservative (30%) and tighten based on experience'
  - 'Report generation could be slow for high-volume orchestrators -- cache intermediate aggregations'
  - 'Weekly reporting frequency may not catch acute issues -- consider adding alerting for critical anomalies'
  - 'Package restructuring (phase 105) could break external scripts that import modules by path -- plan migration carefully'
  - 'Alerting (phase 106) false positives could erode operator trust -- start with only critical severity enabled'
  - 'Complexity scoring (phase 107) misestimates could waste premium resources on simple tasks or under-resource complex ones -- require manual review for epic-tier assignments'
  - 'Self-upgrade (phase 108) could break the orchestrator irrecoverably -- always keep a manual rollback procedure documented'
  - 'Multi-team policies (phase 109) could create governance sprawl -- limit initial rollout to 2-3 teams'
  - 'Incident playbooks (phase 110) automated actions could make things worse -- start with alert-only mode and enable automated actions incrementally'
  scope_lines_total: 360
  test_target: 8
- id: 'phase-105'
  title: 'Orchestrator Python Package and Deployment Profiles'
  status: planned
  goal: 'Package the 19+ orchestrator modules as a proper Python package with deployment profiles (minimal/standard/full), making the system installable, composable, and production-ready'
  description: |
    The orchestrator has 19 Python modules, 15 test files, and 8 pipeline YAMLs, but they are standalone scripts
    invoked with different patterns (python3 poller.py, bash status.sh, python3 -m pytest test_dag.py). Phase 99
    creates a unified CLI, but the system still cannot be installed as a dependency, versioned, or composed into
    other Python projects. This phase packages the orchestrator as a proper Python package with pyproject.toml,
    entry points, dependency management, and deployment profiles that let operators choose the right feature set
    for their scale (minimal for single-repo, standard for multi-repo, full for enterprise with all gates).
  deliverables:
  - name: Python package structure and pyproject.toml
    description: 'Create pyproject.toml, __init__.py, and proper package layout so the orchestrator can be pip-installed'
    status: planned
    acceptance_criteria:
    - description: Package can be installed with pip install -e .
      validation: 'pip install -e . succeeds and imports work'
      met: false
    - description: Entry point script `orch` available after install
      validation: 'orch --help works'
      met: false
    tasks:
    - id: p105.d1.t1
      title: Create pyproject.toml and package structure
      status: planned
      description: 'Create pyproject.toml with: (1) package metadata (name=orchestrator, version from git tags), (2) dependencies (pyyaml, requests, rich for CLI), (3) optional dependency groups [full] for sentence-transformers, fastapi, (4) console_scripts entry point "orch=orchestrator.cli:main", (5) python_requires>=3.11, (6) tool.pytest.ini_options for test discovery. Create __init__.py with version and public API surface. Refactor existing modules under an orchestrator/ package directory.'
      files:
      - '~/zion/projects/agent-orchestration/pyproject.toml'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/pyproject.toml'
  - name: Deployment profiles (minimal/standard/full)
    description: 'Define three deployment profiles that control which modules are active based on operational scale'
    status: planned
    acceptance_criteria:
    - description: 'orch config profile minimal activates only core modules (poller, spawner, executor)'
      validation: 'orch config profile minimal && orch status shows 3 active modules'
      met: false
    - description: 'orch config profile full activates all modules including web dashboard, semantic memory, ensemble review'
      validation: 'orch config profile full && orch status shows all modules'
      met: false
    tasks:
    - id: p105.d2.t1
      title: Implement deployment profile system
      status: planned
      description: 'Create profiles/ module: (1) three YAML profile definitions -- minimal (poller, spawner, executor, basic logging), standard (adds DAG, roles, health, PR automation, safety, cost tracking), full (adds web dashboard, semantic memory, ensemble review, browser verification, speculative execution), (2) profile_loader.py reads active profile and returns set of enabled modules, (3) orchestrator startup checks profile and skips disabled modules, (4) CLI: orch config profile [minimal|standard|full|custom PATH]. This lets small teams start simple and scale up without refactoring.'
      dependencies:
      - p105.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/profiles/minimal.yaml'
      - '~/zion/projects/agent-orchestration/profiles/standard.yaml'
      - '~/zion/projects/agent-orchestration/profiles/full.yaml'
      - '~/zion/projects/agent-orchestration/profiles/profile_loader.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/profiles'
  - name: Integration with existing modules
    description: 'Ensure all 19 existing modules work correctly under the new package structure'
    status: planned
    acceptance_criteria:
    - description: All existing tests pass under the new package layout
      validation: 'python3 -m pytest tests/ -v passes'
      met: false
    tasks:
    - id: p105.d3.t1
      title: Migrate existing modules to package structure
      status: planned
      description: 'Move all .py modules under orchestrator/ package, update imports, move tests under tests/, update all shebangs and module-level imports. Ensure backward compatibility by keeping deprecated module-level scripts that import from the package. Run full test suite to verify nothing breaks.'
      dependencies:
