- id: 'phase-33'
  title: Application Legibility Toolkit
  status: planned
  goal: 'Build automated tools that make codebases directly understandable and verifiable by agents -- the "Application Legibility" principle from Harness Engineering'
  description: 'The Harness Engineering research emphasizes "Application Legibility" -- making software directly understandable and verifiable by the agent. This includes: integrated observability (local
    access to logs/metrics/traces), rigid architecture enforcement (strict layering limits agent search space), and constraints enforced mechanically via structural tests. Phase 17 covers structural invariants
    but focuses on checking existing code. This phase goes further: it provides tools that help agents UNDERSTAND a codebase quickly (architecture maps, dependency graphs, entry point discovery) and tools
    that help projects BECOME more legible (architecture linter, module boundary checker).'
