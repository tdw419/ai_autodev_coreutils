  - source: 'phase-42'
    target: 'phase-43'
    type: soft
    reason: OBSERVE nodes from phase 42 provide log context for understanding violations
  technical_notes: 'The self-healing pipeline is the realization of the "Self-Correcting Codebase" vision from the research. The key design decision is that refactoring PRs always require human review (never
    auto-merge) -- this is a safety boundary. The pipeline batches related fixes into single PRs to avoid PR fatigue. Recurrence tracking is critical: if the same violation keeps coming back, either the
    GC rule is wrong or the agent fix is insufficient. The refactoring cron should run weekly (not daily) to avoid overwhelming reviewers with PRs.'
  risks:
  - 'Automated fixes could introduce bugs -- always run tests and require human review'
  - 'Refactoring PRs could conflict with active development -- merge queue from phase 21 helps'
  - 'GC findings may be noisy (false positives) -- need confidence threshold before auto-fixing'
  - 'Weekly refactoring PRs could accumulate if not reviewed -- track stale PRs'
