- id: 'phase-73'
  title: Agent Workspace Checkpoint and Incremental Restore
  status: planned
  goal: 'Enable workspace-level snapshots and incremental restore so that crashed or interrupted agents can resume from their last good state instead of starting over'
  description: 'The research describes Symphony''s workspace isolation where "for each issue, the orchestrator creates a deterministic mapping between the issue ID and a local directory." Phase 25 covers
    orchestrator-level resilience (state recovery, checkpoint pipeline state) and Phase 11 covers workspace lifecycle management (creation, archival, cleanup), but neither addresses workspace-level checkpointing.
    When an agent is 80% through a complex task and crashes (OOM, timeout, network failure), the current system either restarts from scratch (wasting tokens and time) or archives the workspace as failed.
    This phase implements workspace checkpoints: (1) snapshot the workspace filesystem state at configurable intervals (every N pipeline steps or every M minutes), (2) on agent crash, restore from the last
    checkpoint instead of starting over, (3) incremental checkpoints that only store changes since the last snapshot (efficient for large workspaces), (4) checkpoint metadata that records the agent''s context
    at checkpoint time (current pipeline step, tokens used, files modified), and (5) a checkpoint CLI for manual inspection and rollback. This directly supports the Ralph Wiggum pattern (phase 65) by making
    loop iterations truly resumable, and improves cost efficiency by avoiding re-work on long-running tasks.'
  deliverables:
  - name: Workspace checkpoint module
    description: Create and manage filesystem snapshots of agent workspaces
    status: planned
    acceptance_criteria:
    - description: Can create a checkpoint of a workspace directory
      validation: 'python3 checkpoint.py create --workspace ./workspaces/issue-42'
      met: false
    - description: Checkpoints are incremental (only store changes since last checkpoint)
      validation: 'create two checkpoints, verify second is smaller than first'
      met: false
    tasks:
    - id: p73.d1.t1
      title: Create checkpoint.py module
      status: planned
      description: 'Create checkpoint.py: (1) create(workspace, step_id, metadata) function: snapshot workspace state, (2) snapshot strategy: use rsync --link-dest for incremental snapshots (hardlinks unchanged
        files, copies changed files), store in ~/.orchestrator/checkpoints/{workspace_id}/{step_id}/, (3) metadata: step_id, pipeline_step, timestamp, files_changed (diff from previous), disk_usage, agent_context_summary
        (truncated), (4) list(workspace) -> list of checkpoints with metadata, (5) restore(workspace, step_id) -> restore workspace to checkpoint state, (6) prune(workspace, keep_last=N) -> delete old checkpoints
        to save disk, (7) estimate_size(workspace) -> predict next checkpoint size, (8) CLI: create, list, restore, prune, estimate. rsync --link-dest is the key: it creates a full directory tree appearance
        but only stores changed files, making incremental snapshots nearly free for small changes.'
      files:
      - '~/zion/projects/agent-orchestration/checkpoint.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/checkpoint.py'
  - name: 'Checkpoint-aware executor'
    description: Integrate checkpoints into the DAG executor pipeline
    status: planned
    acceptance_criteria:
    - description: Executor creates checkpoints between pipeline steps
      validation: 'run pipeline with checkpointing enabled, verify checkpoints created'
      met: false
    - description: 'On step failure, executor can restore from last checkpoint and retry'
      validation: 'kill agent mid-pipeline, verify restore and retry'
      met: false
    tasks:
    - id: p73.d2.t1
      title: Integrate checkpoints into executor.py
      status: planned
      description: 'Modify executor.py: (1) add checkpoint section to pipeline YAML config: enabled (bool), interval (every_step|every_N_steps|every_M_minutes), max_checkpoints (default 5), on_failure (restore_and_retry|fail),
        (2) between pipeline steps, call checkpoint.create() if enabled, (3) on step failure: if on_failure=restore_and_retry, restore from last checkpoint, adjust pipeline state to retry the failed step,
        log the recovery, (4) track checkpoint usage in execution log (phase 8): checkpoint_created, checkpoint_restored events, (5) add --no-checkpoint flag to disable (default: checkpointing off for backward
        compatibility), (6) checkpoint_restore_count metric for the metrics pipeline (phase 72). This makes long-running pipelines (10+ steps) resilient to mid-task crashes.'
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
      dependencies:
      - p73.d1.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: 'Checkpoint-aware workspace lifecycle'
    description: Integrate checkpoints with workspace creation and archival
    status: planned
    acceptance_criteria:
    - description: Workspaces are created with checkpoint directory structure
      validation: 'create workspace, verify checkpoint dir exists'
      met: false
    - description: Archived workspaces retain their last checkpoint for forensic analysis
      validation: 'archive workspace, verify checkpoint preserved'
      met: false
    tasks:
    - id: p73.d3.t1
      title: Integrate checkpoints into workspace_manager.py
      status: planned
      description: 'Modify workspace_manager.py: (1) on workspace creation, create checkpoints/ subdirectory, (2) on workspace archival (phase 11), preserve last N checkpoints alongside the archived workspace
        (compressed), (3) on workspace cleanup, delete checkpoints too, (4) add checkpoint info to workspace metadata: last_checkpoint_id, checkpoint_count, total_checkpoint_size, (5) add checkpoint section
        to status.sh workspace view showing checkpoint count and total size. Checkpoints should be stored outside the workspace directory (in ~/.orchestrator/checkpoints/) so they survive workspace archival.'
      files:
      - '~/zion/projects/agent-orchestration/workspace_manager.py'
      dependencies:
      - p73.d1.t1
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/workspace_manager.py'
  - name: Checkpoint management CLI and cleanup cron
    description: CLI for managing checkpoints and automated cleanup of stale checkpoints
    status: planned
    acceptance_criteria:
    - description: 'Can list, inspect, and manually restore checkpoints from CLI'
      validation: 'python3 checkpoint.py list, inspect, restore'
      met: false
    - description: Stale checkpoints are automatically cleaned up
      validation: 'create old checkpoints, run cleanup, verify removed'
      met: false
    tasks:
    - id: p73.d4.t1
      title: Add checkpoint management and cleanup
      status: planned
      description: 'Extend checkpoint.py: (1) inspect(workspace, step_id) -> show detailed checkpoint metadata: files changed, disk usage, agent context at checkpoint time, (2) diff(workspace, step_id_1,
        step_id_2) -> show what changed between two checkpoints, (3) cleanup cron: weekly job that prunes checkpoints older than 7 days, keeps last 3 per workspace, removes orphaned checkpoints (workspace
        deleted but checkpoints remain), (4) disk usage report: total checkpoint storage, per-workspace breakdown, (5) add checkpoint management section to status.sh. Create a cron job (or add to phase
        66 maintenance automation) that runs checkpoint cleanup weekly.'
      files:
      - '~/zion/projects/agent-orchestration/checkpoint.py'
      - '~/zion/projects/agent-orchestration/status.sh'
      dependencies:
      - p73.d2.t1
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/checkpoint.py'
    - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-5'
    target: 'phase-73'
    type: soft
    reason: Checkpoints integrate with the DAG executor from phase 5
  - source: 'phase-11'
    target: 'phase-73'
    type: soft
    reason: Workspace lifecycle from phase 11 manages the workspaces that checkpoints protect
  - source: 'phase-25'
    target: 'phase-73'
    type: soft
    reason: 'State recovery from phase 25 complements workspace-level checkpointing'
  - source: 'phase-65'
    target: 'phase-73'
    type: soft
    reason: Stop hooks from phase 65 trigger checkpoints before agent loop termination
  - source: 'phase-8'
    target: 'phase-73'
    type: soft
    reason: Execution logs from phase 8 record checkpoint events
  technical_notes: 'rsync --link-dest is the ideal mechanism for incremental checkpoints: it creates a full directory tree where unchanged files are hardlinks to the previous snapshot. This means: (1) incremental
    snapshots use almost no extra disk for small changes, (2) each checkpoint is a fully usable directory (no reconstruction needed), (3) cleanup is simple (rm -rf the checkpoint dir; hardlinked files are
    preserved by other checkpoints). The trade-off: hardlinks don''t work across filesystems, so checkpoints must be on the same filesystem as the workspace. For large workspaces (>1GB), consider tar-based
    incremental snapshots as an alternative.'
  risks:
  - Checkpoints consume disk space — need aggressive pruning for large workspaces
  - 'rsync --link-dest may be slow on very large directories — consider tracking changed files via inotify instead'
  - Restoring a checkpoint while another process is writing to the workspace could corrupt state — use file locking
  - Checkpoint metadata may include sensitive agent context — consider redaction
  - 'Incremental restore may not perfectly reproduce state (file permissions, symlinks) — test edge cases'
  scope_lines_total: 390
  test_target: 8
- id: 'phase-74'
  title: Agent Trust Scoring and Gradual Autonomy Escalation
  status: planned
  goal: 'Implement a dynamic trust scoring system where agents earn progressively more autonomy based on their track record, implementing the research''s approval_policy spectrum (untrusted -> on-failure
    -> never) as a continuous escalation'
  description: 'The Symphony research specifies three approval policies: "untrusted" (human approval for every action), "on-failure" (human approval only when deterministic checks fail), and "never" (full
    autonomy, dark factory mode). Phase 15 implements static approval gates but does not implement the dynamic transition between these levels. The Harness Engineering research describes building "the harness"
    as the competitive advantage, and a key part of that harness is knowing when to trust agents and when to intervene. This phase creates: (1) a trust score module that tracks per-agent and per-role success
    rates (pass rate on first attempt, review rejection rate, invariant violation rate, cost efficiency), (2) an escalation engine that automatically promotes agents from untrusted to on-failure to never
    based on configurable thresholds (e.g., "10 consecutive successful tasks with zero invariant violations = promote to on-failure"), (3) a demotion engine that downgrades agents after failures (e.g.,
    "3 consecutive rejected PRs = demote to untrusted"), (4) per-task-type trust profiles (an agent may be trusted for bug fixes but not for database migrations), (5) trust score visibility in the dashboard
    (phase 27) and health scorecard (phase 44), and (6) manual override capability for humans to force-escalate or force-demote. This directly enables a safer path to dark factory mode (phase 35) by proving
    agent reliability before granting full autonomy.'
  deliverables:
  - name: Trust score computation module
    description: Calculate and persist trust scores for agents based on execution history
    status: planned
    acceptance_criteria:
    - description: 'Trust score is computed from execution history (success rate, rejection rate, invariant violations)'
      validation: 'python3 trust_score.py compute --agent claude-3-opus --role implementer'
      met: false
    - description: Scores are persisted and updated incrementally after each pipeline run
      validation: 'run two pipelines, verify score changes'
      met: false
    tasks:
    - id: p74.d1.t1
      title: Create trust_score.py module
      status: planned
      description: 'Create trust_score.py: (1) TrustScore dataclass: agent_id, role, task_type, success_rate (rolling window of last N tasks), rejection_rate, invariant_violation_rate, cost_efficiency (tokens_per_success),
        trust_level (untrusted|on_failure|never), consecutive_successes, consecutive_failures, last_updated, (2) compute(agent_id, role, task_type) -> read execution logs (phase 8), calculate rolling metrics
        over configurable window (default: last 50 tasks), (3) update(agent_id, role, task_type, result) -> incrementally update scores after each pipeline run (no full recompute), (4) persist to ~/.orchestrator/trust/{agent_id}_{role}_{task_type}.json,
        (5) CLI: compute, list, reset, export. Trust score formula: base_score = (success_rate * 0.4) + (1 - rejection_rate) * 0.3 + (1 - invariant_violation_rate) * 0.2 + cost_efficiency * 0.1. Trust level
        thresholds: untrusted < 0.6, on_failure >= 0.6, never >= 0.85.'
      files:
      - '~/zion/projects/agent-orchestration/trust_score.py'
    scope_lines: 140
    scope_files:
    - '~/zion/projects/agent-orchestration/trust_score.py'
  - name: Trust escalation and demotion engine
    description: Automatically promote or demote agent autonomy levels based on trust scores
    status: planned
    acceptance_criteria:
    - description: Agent is automatically promoted after meeting thresholds
      validation: 'simulate 10 consecutive successes, verify promotion'
      met: false
    - description: Agent is automatically demoted after failures
      validation: 'simulate 3 consecutive rejections, verify demotion'
      met: false
    - description: Escalation events are logged to execution history
      validation: check execution logs for escalation events
      met: false
    tasks:
    - id: p74.d2.t1
      title: Create trust_escalation.py module
      status: planned
      description: 'Create trust_escalation.py: (1) EscalationConfig: promotion_thresholds (default: 10 consecutive successes for on_failure, 25 for never), demotion_thresholds (default: 3 consecutive failures
        for demote by one level), per_task_type_overrides (e.g., database tasks require higher threshold), cooldown_period (no re-promotion within 24h of demotion), (2) check_eligibility(agent_id, role,
        task_type) -> check if agent should be promoted or demoted, (3) escalate(agent_id, role, task_type, new_level) -> update trust level, log event, notify via execution history (phase 8), (4) integrate
        with safety.py (phase 15): approval_policy reads from trust level instead of static config, (5) manual_override(agent_id, role, task_type, forced_level, reason) -> human can force escalation or
        demotion with audit trail, (6) escalation history: ~/.orchestrator/trust/escalations.jsonl. Config stored in orchestrator.yaml under trust_escalation section.'
      files:
      - '~/zion/projects/agent-orchestration/trust_escalation.py'
      dependencies:
      - p74.d1.t1
    scope_lines: 130
    scope_files:
    - '~/zion/projects/agent-orchestration/trust_escalation.py'
  - name: 'Trust-aware orchestrator integration'
    description: 'Wire trust scores into the orchestrator loop, safety gates, and status dashboard'
    status: planned
    acceptance_criteria:
    - description: Orchestrator reads trust level when assigning tasks
      validation: check orchestrator.py uses trust_score for approval policy
      met: false
    - description: Status dashboard shows trust scores and levels
      validation: 'run status.sh, verify trust information displayed'
      met: false
    tasks:
    - id: p74.d3.t1
      title: Integrate trust scores into orchestrator.py and safety.py
      status: planned
      description: 'Modify orchestrator.py: (1) before spawning a worker, check trust_score.get_trust_level(agent_id, role, task_type), (2) pass trust_level to safety.py as the effective approval_policy,
        (3) log trust_level_used in execution history. Modify safety.py: (1) add trust_level parameter to check_safety(), overrides static approval_policy, (2) add trust_level to safety decision log. Modify
        status.sh: (1) add trust score section showing per-agent trust levels and recent trend (improving/declining/stable), (2) highlight agents near promotion/demotion thresholds. Add trust metrics to
        health scorecard (phase 44): average trust level, agents at each level, escalation rate.'
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/safety.py'
      - '~/zion/projects/agent-orchestration/status.sh'
      dependencies:
      - p74.d2.t1
    scope_lines: 100
