- id: 'phase-87'
  title: Code Quality Metrics and Technical Debt Tracking
  status: planned
  goal: 'Track code quality trends (complexity, duplication, dead code, coverage) across agent-generated PRs to measure whether agent-legibility is improving or eroding'
  description: 'The research describes the end-state as "Agent-Legible Software" and emphasizes that structural tests and custom linters enforce code quality. Phase 17 (structural invariants) checks architectural
    rules and phase 10 (garbage collection) scans for convention violations, but neither measures code quality trends over time. As agents generate code at scale (the research''s Dark Factory model produces
    1M+ LOC), code quality can drift: complexity creeps up, duplication accumulates, dead code lingers, and test coverage decays. This phase creates a code quality metrics system that: (1) computes per-PR
    quality deltas (complexity change, new duplication, coverage delta), (2) tracks trends over time (weekly/monthly quality scores), (3) flags files or modules with degrading quality, (4) feeds metrics
    into the health scorecard (phase 44) and self-improvement loop (phase 19), (5) integrates with the PR automation (phase 13) to show quality impact on every PR. This provides the quantitative signal
    needed to answer "is agent-generated code getting better or worse over time?"'
  deliverables:
  - name: Code quality analyzer
    description: Module that computes code quality metrics for changed files in a PR
    status: planned
    acceptance_criteria:
    - description: 'Computes cyclomatic complexity, duplication ratio, dead code ratio, and test coverage for given files'
      validation: 'run analyzer on test files, verify metrics output'
      met: false
    - description: 'Outputs structured JSON with per-file and aggregate metrics'
      validation: check output format
      met: false
    tasks:
    - id: p87.d1.t1
      title: Create code_quality.py module
      status: planned
      description: 'Python module implementing code quality analysis: (1) complexity: use radon or simple AST-based cyclomatic complexity for Python, line-based heuristic for other languages, (2) duplication:
        use jaccard similarity on code blocks (normalize whitespace, compare 6-line windows), (3) dead code: detect unreachable code (Python AST), unused imports (ast parse), functions/methods with no callers
        (grep for references), (4) coverage: read .coverage or pytest-cov output, compute per-file coverage percentage, (5) aggregate: project-level quality score (weighted average: complexity 25%, duplication
        25%, dead code 25%, coverage 25%). CLI: python3 code_quality.py analyze --files file1.py,file2.py --base main --pr-branch feature. Output JSON with per-file and aggregate metrics.'
      files:
