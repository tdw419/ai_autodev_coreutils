    their own work at the application level, not just the unit test level. Log discovery is heuristic-based -- check common locations, don''t require configuration. Metrics reading requires the target app
    to be running -- the OBSERVE node should gracefully degrade if the app is not running (skip, don''t fail). Log injection into AI prompts must be size-limited to avoid context bloat -- summarize, don''t
