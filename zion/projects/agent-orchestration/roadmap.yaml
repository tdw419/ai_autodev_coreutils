        from the overloaded instance, (4) transfer is coordinated via the lock service: release lock on source instance, acquire on destination, (5) respect priority queue: only steal low-priority work,
        (6) log all transfers. Also add --rebalance mode for one-time manual rebalancing. Work stealing enables horizontal scaling: add more orchestrator instances and they automatically distribute load.'
      files:
      - '~/zion/projects/agent-orchestration/federation_status.py'
      dependencies:
      - p51.d2.t1
      scope_lines: 100
