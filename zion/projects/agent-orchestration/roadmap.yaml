- id: phase-25
  title: Orchestrator Resilience and State Recovery
  status: planned
  goal: Make the orchestrator fault-tolerant with crash recovery, partial state handling, and graceful degradation
  description: 'The research highlights Elixir/BEAM''s excellence in "managing long-running, concurrent,
    and fault-tolerant processes" as a deliberate architectural choice for Symphony. The Hermes orchestrator
    currently has no crash recovery: if the cron agent crashes mid-pipeline, the workspace is left in
    an indeterminate state, the issue is never updated, and no one knows the worker failed. This phase
    adds resilience: (1) workspace state is checkpointed after each node, (2) crashed pipelines can be
    resumed from the last checkpoint, (3) orphaned workspaces (from crashed orchestrator instances) are
    detected and cleaned up, (4) the orchestrator handles its own failures gracefully. This transforms
    the orchestrator from a "best-effort" tool into a reliable system that can run 24/7 without human
    intervention.'
  deliverables:
  - name: Pipeline checkpoint system
    description: Save pipeline execution state after each node so crashed pipelines can be resumed
    status: planned
    acceptance_criteria:
    - description: After each node completes, execution state is persisted to a checkpoint file
      validation: run pipeline, check checkpoint files exist after each node
      met: false
    - description: A crashed pipeline can be resumed from the last successful checkpoint
      validation: kill executor mid-pipeline, restart with --resume flag, verify it skips completed
        nodes
      met: false
    tasks:
    - id: p25.d1.t1
      title: Add checkpoint support to executor.py
      status: planned
      description: 'Modify executor.py to: (1) after each node completes, write a checkpoint to
        workspace/.orchestrator/checkpoint.json with: completed_nodes list, node_results, context
        state, pipeline_hash, (2) on startup, check for existing checkpoint and offer --resume mode
        that skips already-completed nodes, (3) validate checkpoint integrity (pipeline_hash must
        match current pipeline to prevent stale checkpoints), (4) clean up checkpoint on successful
        completion. Add --resume flag to executor CLI.'
      files:
      - ~/zion/projects/agent-orchestration/executor.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/executor.py
