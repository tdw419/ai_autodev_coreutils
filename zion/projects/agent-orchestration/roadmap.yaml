- id: phase-29
  title: Agent Strategy A/B Testing and Analytics
  status: planned
  goal: Track the performance of different agent strategies, roles, and pipeline configurations over time to optimize orchestrator effectiveness
  description: 'The Dark Factory model treats code as disposable and experiments with
    approaches. The research mentions that "when an agent failed, the team analyzed
    the environment for missing capabilities rather than refining prompts." The current
    orchestrator has no mechanism to compare different configurations or track which
    strategies lead to successful outcomes. This phase adds experiment tracking: label
    pipeline runs with their configuration (role, pipeline, prompt version, model),
    compute success metrics per configuration, and provide statistical analysis to
    identify which configurations perform best for different issue types. This enables
    data-driven optimization of the orchestrator''s harness, moving from "guess and
    check" to "measure and improve."

