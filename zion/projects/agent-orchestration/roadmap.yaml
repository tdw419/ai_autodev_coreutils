    labor." Currently the Hermes orchestrator is Hermes-internal: all interaction is through CLI scripts and cron jobs. This limits integration with external tools (IDE plugins, CI/CD systems, team dashboards,
    other orchestration frameworks). This phase builds: (1) a lightweight REST API server using Python''s built-in http.server (no Flask/FastAPI dependency), (2) endpoints for core operations: submit work,
    check status, list workers, get metrics, manage config, (3) webhook receiver for GitHub events (PR merged, issue labeled) that triggers orchestrator actions, (4) API key authentication and rate limiting,
    (5) OpenAPI spec for discoverability. This transforms the orchestrator from a Hermes-internal tool into a platform that any tool can integrate with.'
