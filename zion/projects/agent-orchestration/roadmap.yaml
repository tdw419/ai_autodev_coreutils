    research describes "doctor" logic that validates the execution environment before each tick:
    checking required CLI tools exist, git is in a clean state, API endpoints are reachable, and
    dependencies are installed. Phase 14 (Health Monitor) watches running agents, not the pre-tick
    environment. Phase 117 (Cron Mutex) handles lock files but not environment validation. Phase 119
    closes this gap with a comprehensive preflight check suite.
