- id: 'phase-115'
  title: 'Shadow Prompt Engine and Parallel Comparison'
  status: planned
  goal: 'Run parallel prompt variations on the same task for diagnostic comparison, optimization, and regression testing'
  description: |
    The Geometry OS Autodev Loop research describes a "Shadow Compiler" -- parallel prompt generation
    for diagnostic comparison and regression testing. Unlike Phase 92 (Agent Simulation) which uses
    mock agent backends for zero-cost testing, the Shadow Prompt Engine runs REAL prompt variations
    in parallel on the same task and compares outputs for quality, cost, and latency. This enables:
    (1) A/B testing of prompt strategies without manual intervention, (2) regression detection when
    prompt templates change, (3) identification of the most cost-effective prompt for each task type,
    (4) diagnostic comparison when an agent produces unexpected results. The engine takes a task
    description, generates N prompt variations (from prompt library phase 62, with optional mutations),
    runs them in parallel via delegate_task, and produces a comparison report. Results feed into
    prompt optimization (phase 90) and A/B testing analytics (phase 29). This is distinct from
    Phase 92 because simulation uses mocks (no real LLM calls) while shadow prompting runs real
    prompts (actual LLM calls with real token costs, but on the same task for apples-to-apples comparison).
  deliverables:
  - name: Shadow prompt runner
    description: 'Module that takes a task, generates prompt variations, runs them in parallel, and collects results'
    status: planned
    acceptance_criteria:
    - description: 'Can run 2+ prompt variations on the same task in parallel'
      validation: run shadow comparison, verify parallel execution
      met: false
    - description: 'Each variation produces structured output (result, cost, latency, quality score)'
      validation: check output format
      met: false
    tasks:
    - id: p115.d1.t1
      title: Create shadow prompt runner module
      status: planned
      description: 'Python module that: (1) takes a task description and N prompt variations, (2) runs each variation via delegate_task in parallel subprocesses, (3) collects structured results (output, token_cost, duration, exit_code), (4) optionally runs quality assessment on each output. Support --max-parallel flag to limit concurrent runs.'
      files:
      - '~/zion/projects/agent-orchestration/shadow_prompt.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/shadow_prompt.py'
  - name: Prompt variation generator
    description: 'Generate systematic prompt variations from base prompts for comparison testing'
    status: planned
    acceptance_criteria:
    - description: 'Can generate variations by: temperature, system prompt changes, context inclusion/exclusion, instruction rephrasing'
      validation: generate variations, verify differences
      met: false
    - description: 'Variations are deterministic and reproducible (seeded randomization)'
      validation: run twice, verify same variations
      met: false
    tasks:
    - id: p115.d2.t1
      title: Create prompt variation generator
      status: planned
      description: 'Module that takes a base prompt and generates N variations using configurable mutation strategies: (1) temperature variants (low/medium/high), (2) system prompt additions/removals, (3) context section permutations, (4) instruction rephrasing (formal/casual/concise), (5) few-shot example variations. Use seeded randomization for reproducibility.'
      dependencies:
      - p115.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/prompt_variator.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/prompt_variator.py'
  - name: Comparison report generator
    description: 'Generate structured comparison reports from shadow prompt run results'
    status: planned
    acceptance_criteria:
    - description: 'Report shows side-by-side comparison of all variations with quality, cost, latency metrics'
      validation: generate report, check format
      met: false
    - description: 'Report identifies the best variation by configurable scoring (quality-weighted, cost-weighted, balanced)'
      validation: check ranking logic
      met: false
    tasks:
    - id: p115.d3.t1
      title: Create comparison report generator
      status: planned
      description: 'Module that takes shadow run results and produces: (1) terminal table with per-variation metrics, (2) ranking by configurable scoring function, (3) diff view showing output differences, (4) recommendation (best prompt for this task type). Output as terminal table, JSON, or Markdown.'
      dependencies:
      - p115.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/shadow_report.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/shadow_report.py'
  - name: Regression detection integration
    description: 'Detect prompt regression by comparing current outputs against historical baselines'
    status: planned
    acceptance_criteria:
    - description: 'Can detect when a prompt template change degrades output quality vs. historical baseline'
      validation: change prompt, run comparison, verify regression detected
      met: false
    - description: 'Regression results feed into prompt optimization (phase 90)'
      validation: check optimization input
      met: false
    tasks:
    - id: p115.d4.t1
      title: Create regression detection module
      status: planned
      description: 'Module that maintains historical baselines for recurring task types. When a prompt template changes, automatically runs shadow comparison against baseline. Flags regression if quality drops below threshold. Feeds results into prompt optimization (phase 90) for automated rollback or refinement.'
      dependencies:
      - p115.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/shadow_regression.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/shadow_regression.py'
  dependencies:
  - source: 'phase-62'
    target: 'phase-115'
    type: soft
    reason: 'Prompt library from phase 62 provides the base prompts that shadow comparison evaluates'
  - source: 'phase-90'
    target: 'phase-115'
    type: soft
    reason: 'Prompt optimization from phase 90 consumes shadow comparison results'
  - source: 'phase-29'
    target: 'phase-115'
