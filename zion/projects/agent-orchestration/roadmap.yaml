  dependencies:
  - source: 'phase-8'
    target: 'phase-176'
    type: soft
    reason: Execution history from phase 8 provides the failure data to classify
  - source: 'phase-18'
    target: 'phase-176'
    type: soft
    reason: Self-improvement from phase 18 provides the learning infrastructure; this phase extends it to harness-level analysis
  - source: 'phase-17'
    target: 'phase-176'
    type: soft
    reason: Invariant checker from phase 17 is both a consumer and producer of gap analysis
  - source: 'phase-66'
    target: 'phase-176'
    type: soft
    reason: Maintenance cron from phase 66 runs the weekly gap report
  technical_notes: 'This is the "analyze the environment" principle from Harness Engineering made systematic. The key distinction from phase 18 (self-improvement): phase 18 asks "how can the agent do better next time?" This phase asks "what is missing from the harness that caused the agent to fail?" One is prompt/strategy optimization (agent-centric), the other is infrastructure improvement (environment-centric). Both are needed for the Dark Factory model.'
  risks:
  - 'Classification accuracy depends on log quality -- ensure execution logs capture enough context for classification'
  - 'Improvement proposals may be noisy for novel failure modes -- start with high-confidence patterns only'
  - 'Automated harness changes could break existing workflows -- always route through human review queue'
