- id: phase-50
  title: Orchestrator Chaos Engineering and Fault Injection Testing
  status: planned
  goal: Test the orchestrator''s resilience under failure conditions by injecting faults
    and verifying recovery behavior
  description: 'The research emphasizes the Elixir/BEAM runtime''s fault tolerance: hot code
    reloading, supervisor trees, and "let it crash" philosophy. The Hermes orchestrator has
    been built with various failure handling mechanisms (health checks, auto-recovery, workspace
    archival, approval timeouts) but none of these have been tested under actual failure conditions.
    This phase creates a chaos engineering toolkit that deliberately injects faults (worker
    crash, API timeout, disk full, network failure, config corruption) and verifies that the
    orchestrator recovers gracefully. This is the "Dark Factory" reliability prerequisite:
    before running fully autonomous, verify the system handles failures without human intervention.
    Modeled on chaos engineering practices (Netflix Chaos Monkey, Gremlin) but adapted for
    agent orchestration.'
  deliverables:
  - name: Fault injection framework
    description: Python module that can inject various fault types into orchestrator components
      during testing
    status: planned
    acceptance_criteria:
    - description: 'Can inject at least 5 fault types: worker crash, API timeout, disk full,
        config corruption, process kill'
      validation: python3 chaos.py --inject worker_crash --target test_workspace
      met: false
    - description: Faults can be injected programmatically (for test integration) and via CLI
        (for manual testing)
      validation: run injection from CLI and from test code
      met: false
    tasks:
    - id: p50.d1.t1
      title: Create chaos.py fault injection module
      status: planned
      description: 'Python module that: (1) defines fault types: worker_crash (kill delegate_task
        process), api_timeout (delay gh CLI responses), disk_full (fill workspace to limit),
        config_corrupt (inject invalid YAML into config files), network_failure (block GitHub
        API endpoints), process_kill (kill orchestrator mid-loop), (2) each fault has: inject()
        and restore() methods, severity level, and expected recovery behavior, (3) support
        --inject FAULT --target TARGET and --restore for manual use, (4) provide a Python
        API for programmatic use in tests: with chaos.inject("api_timeout"): ... , (5) log
        all fault injections and recovery attempts. Include a --safe-mode flag that only injects
        faults in test workspaces.'
      files:
      - ~/zion/projects/agent-orchestration/chaos.py
      scope_lines: 150
      scope_files:
      - ~/zion/projects/agent-orchestration/chaos.py
  - name: Recovery verification tests
    description: Test suite that injects faults and verifies the orchestrator recovers correctly
    status: planned
    acceptance_criteria:
    - description: Test suite covers all major fault types with pass/fail recovery verification
      validation: python3 -m pytest test_chaos.py -v
      met: false
    - description: Each test verifies specific recovery behavior (not just "no crash")
      validation: read test assertions
      met: false
    tasks:
    - id: p50.d2.t1
      title: Create test_chaos.py with fault injection tests
      status: planned
      description: 'Create pytest test suite: (1) test_worker_crash_recovery: inject worker
        crash, verify orchestrator marks workspace as failed and does not spawn replacement
        without human approval, (2) test_api_timeout_recovery: inject API timeout, verify poller
        retries and eventually skips the repo, (3) test_disk_full_recovery: fill workspace,
        verify workspace_manager detects and archives, (4) test_config_corrupt_recovery: corrupt
        YAML, verify config validation catches it and falls back to defaults, (5) test_process_kill_recovery:
        kill orchestrator, verify it resumes cleanly on restart (state recovery), (6) test_concurrent_faults:
        inject multiple faults simultaneously, verify no cascading failures. Use tmp_path fixtures
        for isolation.'
      files:
      - ~/zion/projects/agent-orchestration/test_chaos.py
      dependencies:
      - p50.d1.t1
      scope_lines: 200
      scope_files:
      - ~/zion/projects/agent-orchestration/test_chaos.py
  - name: Resilience scoring
    description: Score the orchestrator''s resilience based on chaos test results and track
      improvements over time
    status: planned
    acceptance_criteria:
    - description: Can compute a resilience score (0-100) based on chaos test pass rates
      validation: python3 chaos.py --score
      met: false
    tasks:
    - id: p50.d3.t1
      title: Add resilience scoring to chaos.py
      status: planned
      description: 'Add --score mode: (1) run all chaos tests, (2) compute per-fault-type
        recovery rate, (3) compute overall resilience score as weighted average (critical faults
        weighted higher), (4) compare against previous scores to show trend, (5) output as
        table: fault_type | injected | recovered | score | trend. Store scores in ~/.orchestrator/chaos/history.jsonl.
        Add resilience score to the health scorecard (phase 44). Target: resilience score >=80
        before enabling dark factory mode (phase 35).'
      files:
      - ~/zion/projects/agent-orchestration/chaos.py
      dependencies:
      - p50.d2.t1
      scope_lines: 80
      scope_files:
      - ~/zion/projects/agent-orchestration/chaos.py
  - name: Chaos testing cron job
    description: Scheduled job that runs chaos tests periodically and reports resilience
      status
    status: planned
    acceptance_criteria:
    - description: Cron job runs chaos tests weekly and reports resilience score
      validation: cronjob list
      met: false
    tasks:
    - id: p50.d4.t1
      title: Create chaos testing cron job
      status: planned
      description: 'Create a weekly Hermes cron that runs chaos.py --score in a test environment.
        The cron: (1) runs all chaos tests, (2) computes resilience score, (3) if score drops
        below 80%, create a GitHub Issue warning about resilience regression, (4) store results
        for trend tracking, (5) output a summary: overall score, per-fault-type scores, regressions
        detected, recommended actions. Keep the test environment isolated from production
        workspaces.'
      files: []
      dependencies:
      - p50.d3.t1
      scope_lines: 30
      scope_files: []
  dependencies:
  - source: phase-14
    target: phase-50
    type: soft
    reason: Health monitoring from phase 14 provides the baseline that chaos testing verifies
  - source: phase-25
    target: phase-50
    type: soft
    reason: Resilience from phase 25 should be validated by chaos testing
  - source: phase-7
    target: phase-50
    type: soft
    reason: Chaos tests extend the test suite from phase 7 with fault injection scenarios
  - source: phase-35
    target: phase-50
    type: hard
    reason: Dark factory mode from phase 35 requires passing chaos tests as a prerequisite
  technical_notes: 'Chaos engineering for orchestrators is different from traditional chaos
    engineering. The "system under test" is the orchestration logic (poll, spawn, recover),
    not the application code. Faults should target the orchestration layer: gh CLI failures,
    delegate_task crashes, filesystem issues. The key insight: an orchestrator that cannot
    handle its own failures will cascade those failures to all workers. Resilience score is
    the gate for dark factory mode.'
  risks:
  - Fault injection could leak into production if safe-mode is disabled -- always use test
    workspaces
  - Some faults (network failure) are hard to inject realistically in a test environment
  - Resilience scoring may not capture all failure modes -- supplement with manual testing
  - Chaos tests may be flaky if they depend on timing -- use deterministic fault injection
    where possible
  scope_lines_total: 460
  test_target: 20
- id: phase-51
  title: Orchestrator Federation and Cross-Instance Coordination
  status: planned
  goal: Enable multiple Hermes orchestrator instances to coordinate work across repos, teams,
    or cloud regions
  description: 'The research describes Gas Town managing 20-30 Claude Code instances simultaneously.
    Phase 30 covers inter-agent communication within a single orchestrator, but does not address
    the scenario where multiple Hermes orchestrator instances need to coordinate: one per organization,
    one per cloud region, or one per team. Without federation, multiple orchestrators could
    create conflicting PRs, duplicate work on the same issues, or waste resources on tasks
    already handled by another instance. This phase adds a federation layer: (1) a distributed
    lock service for issue assignment (preventing two orchestrators from working on the same
    issue), (2) a shared work status protocol for cross-instance visibility, (3) work stealing
    for load balancing between instances, and (4) a federation status view that shows all
    instances and their current workload. This is the "Kubernetes for Agents" pattern from
    Gas Town applied at the orchestrator level rather than the agent level.'
  deliverables:
  - name: Distributed lock service
    description: File-based or API-based distributed locking for issue assignment across orchestrator
      instances
    status: planned
    acceptance_criteria:
    - description: Two orchestrator instances competing for the same issue results in only
        one acquiring the lock
      validation: run two instances simultaneously, verify single assignment
      met: false
    - description: Lock acquisition and release is atomic and handles stale locks (timeout-based
        expiry)
      validation: simulate stale lock, verify cleanup
      met: false
    tasks:
    - id: p51.d1.t1
      title: Create federation_lock.py module
      status: planned
      description: 'Python module implementing distributed locking: (1) uses GitHub issue
        labels as the lock mechanism (add "orch-working-{instance_id}" label to claim an issue,
        check for existing labels before claiming), (2) supports optional file-based locking
        for non-GitHub coordination (lock files in a shared filesystem or S3), (3) lock TTL
        with automatic expiry (default 4 hours), (4) lock acquisition returns: acquired (bool),
        lock_holder (instance_id if locked by another), lock_expiry (when current lock expires),
        (5) heartbeat to extend lock TTL while work is in progress, (6) CLI: python3 federation_lock.py
        acquire --issue 42 --instance my-instance, release, status. The GitHub-label approach
        requires no external infrastructure.'
      files:
      - ~/zion/projects/agent-orchestration/federation_lock.py
      scope_lines: 120
      scope_files:
      - ~/zion/projects/agent-orchestration/federation_lock.py
  - name: Federation status protocol
    description: Shared status protocol that allows orchestrator instances to see each other''s
      workload
    status: planned
    acceptance_criteria:
    - description: Each orchestrator instance publishes its status (active issues, capacity,
        health) to a shared location
      validation: run two instances, check shared status
      met: false
    - description: Instances can query other instances'' status to avoid duplicate work
      validation: instance A checks instance B''s workload before claiming an issue
      met: false
    tasks:
    - id: p51.d2.t1
      title: Create federation_status.py module
      status: planned
      description: 'Python module for cross-instance status sharing: (1) each instance writes
        its status to a shared location (GitHub repo issue/label, shared JSON file, or simple
        HTTP endpoint), (2) status includes: instance_id, active_issues, capacity_remaining,
        health_score, last_heartbeat, repos_monitored, (3) query_all() returns status of all
        known instances, (4) query_capacity(repo) returns total capacity across all instances
        monitoring a repo, (5) detect_stale() identifies instances that have not heartbeated
        recently (possible crash), (6) CLI: python3 federation_status.py publish, query, detect-stale.
        Default shared location: a designated GitHub issue with structured comments, or a JSON
        file in a shared filesystem.'
      files:
      - ~/zion/projects/agent-orchestration/federation_status.py
      dependencies:
      - p51.d1.t1
      scope_lines: 120
      scope_files:
      - ~/zion/projects/agent-orchestration/federation_status.py
  - name: Work stealing for load balancing
    description: Enable under-loaded orchestrator instances to pick up work from over-loaded
      instances
    status: planned
    acceptance_criteria:
    - description: An idle instance can detect an overloaded instance and offer to take work
      validation: simulate load imbalance, verify work redistribution
      met: false
    - description: Work stealing respects priority and does not preempt in-progress work
      validation: check that active issues are not stolen
      met: false
    tasks:
    - id: p51.d3.t1
      title: Add work stealing to federation_status.py
      status: planned
      description: 'Add --steal-work mode: (1) query all instances for capacity, (2) if this
        instance has capacity >50% and another instance is at >80% capacity, (3) offer to
        take queued (not active) issues from the overloaded instance, (4) transfer is coordinated
        via the lock service: release lock on source instance, acquire on destination, (5)
        respect priority queue: only steal low-priority work, (6) log all transfers. Also
        add --rebalance mode for one-time manual rebalancing. Work stealing enables horizontal
        scaling: add more orchestrator instances and they automatically distribute load.'
      files:
      - ~/zion/projects/agent-orchestration/federation_status.py
      dependencies:
      - p51.d2.t1
      scope_lines: 100
      scope_files:
      - ~/zion/projects/agent-orchestration/federation_status.py
  - name: Federation integration with orchestrator
    description: Integrate federation locks and status into the orchestrator main loop
    status: planned
    acceptance_criteria:
    - description: Orchestrator acquires federation lock before spawning workers and publishes
        status after each loop
      validation: run orchestrator with federation enabled, check lock labels and status
      met: false
    - description: Federation can be enabled/disabled via config without code changes
      validation: 'set federation.enabled: false, verify orchestrator runs without federation'
      met: false
