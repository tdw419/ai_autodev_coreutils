        to pass repo_name when spawning. Update status.sh, health_check.py, and workspace_manager.py to handle the new layout. Add a migration function that moves existing workspaces to the new layout.'
      dependencies:
      - p16.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/spawner.py'
