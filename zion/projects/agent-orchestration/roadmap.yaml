- id: phase-38
  title: Cross-Project Knowledge Transfer
  status: planned
  goal: Enable agents to share learned patterns, solutions, and conventions across multiple repositories
  description: 'When the orchestrator works across multiple repos (phase 16), each project is treated
    independently. But agents often encounter the same patterns across projects: similar error handling
    approaches, shared architectural patterns, common library usage. Gas Town''s Beads system enables
    shared state between agents. This phase adds a knowledge base that captures patterns learned from
    successful pipeline runs and makes them available to agents working on other projects. When an agent
    encounters a similar problem that was solved in another repo, it gets the previous solution as context.
    This creates a "learning organization" effect where the orchestrator gets more effective over time
    across all projects, not just within a single repo.'
  deliverables:
  - name: Pattern extraction module
    description: Module that extracts reusable patterns from successful pipeline runs
    status: planned
    acceptance_criteria:
    - description: Can analyze a completed run and extract patterns (solution approach, files changed, commands used)
      validation: python3 knowledge.py extract --run RUN_ID
      met: false
    tasks:
    - id: p38.d1.t1
      title: Create knowledge.py pattern extraction module
      status: planned
      description: 'Create knowledge.py: (1) extract_patterns(run_id) -- analyze a successful execution
        log to extract: issue type (from labels/title), solution_approach (from AI node prompts and outputs),
        files_changed (from git diff in workspace), commands_used (from bash nodes), test_strategy (from
        test node), (2) classify_pattern(pattern) -- categorize the pattern (error-handling, api-design,
        refactoring, testing, etc.), (3) store_pattern(pattern) -- save to ~/.orchestrator/knowledge/patterns.jsonl
        with: hash, category, source_repo, source_issue, created_at, effectiveness (derived from test
        results). Patterns are deduplicated by content hash to avoid storing identical solutions.'
      files:
      - ~/zion/projects/agent-orchestration/knowledge.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/knowledge.py
  - name: Knowledge query module
    description: Module that retrieves relevant patterns for a given issue from the knowledge base
    status: planned
    acceptance_criteria:
    - description: Can find similar patterns from other projects for a given issue description
      validation: python3 knowledge.py query --issue "add error handling to API endpoints"
      met: false
    tasks:
    - id: p38.d2.t1
      title: Add knowledge query to knowledge.py
      status: planned
      description: 'Add query mode to knowledge.py: (1) query_patterns(issue_description, repo, top_n=3)
        -- find patterns from other repos that are relevant to the current issue, (2) relevance scoring
        based on: category match (same issue type), keyword overlap (similar terms in issue vs pattern
        description), effectiveness (prefer patterns from successful runs), recency (prefer recent patterns),
        (3) format_pattern(pattern) -- convert a pattern to a concise agent-readable context string suitable
        for inclusion in the AI node prompt, (4) --similar flag to find patterns from the same repo (intra-project
        knowledge). Output as structured JSON or formatted text.'
      files:
      - ~/zion/projects/agent-orchestration/knowledge.py
    dependencies:
    - p38.d1.t1
    scope_lines: 100
    scope_files:
    - ~/zion/projects/agent-orchestration/knowledge.py
  - name: Knowledge integration with executor
    description: Automatically inject relevant knowledge into AI node prompts
    status: planned
    acceptance_criteria:
    - description: AI nodes receive relevant cross-project patterns in their context
      validation: create a pattern, file an issue, run pipeline, check AI prompt includes the pattern
      met: false
    tasks:
    - id: p38.d3.t1
      title: Integrate knowledge into executor AI nodes
      status: planned
      description: 'Modify executor.py AI node execution to: (1) before constructing the AI prompt, call
        knowledge.query_patterns(issue_description, current_repo), (2) if relevant patterns found, append
        them to the system prompt as "Relevant patterns from other projects:" section, (3) limit context
        injection to top 3 patterns to avoid prompt bloat, (4) add config option enable_knowledge (default
        true) and knowledge_max_patterns (default 3) to orchestrator.yaml. The knowledge injection is
        transparent to the agent -- it just gets better context.'
