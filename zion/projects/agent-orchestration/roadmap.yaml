- id: 'phase-62'
  title: Prompt Engineering as Infrastructure
  status: planned
  goal: 'Treat agent prompts as version-controlled, testable, and iterable code artifacts -- the "Guides" layer of the outer harness made into infrastructure'
  description: 'The research repeatedly emphasizes that the outer harness -- specifically "guides" like agent.md files and playbooks -- is where enterprise value is created: "the majority of enterprise-specific
    value is created, as it encodes the specific quality gates and compliance standards of the organization." Phase 3 upgraded AI_GUIDE.md templates and phase 36 adds dynamic policy loading, but prompts
    themselves are not treated as first-class code artifacts. Currently, prompts are embedded in role YAMLs, pipeline configs, and Python code with no versioning, testing, or iteration infrastructure. This
    phase builds: (1) a prompt library that stores prompt templates as versioned YAML files, (2) prompt diff and rollback tools, (3) a prompt testing framework (input/output pairs with expected behavior),
    (4) automated prompt quality scoring (conciseness, clarity, instruction-following), (5) integration with the DAG executor so prompts are loaded from the library rather than embedded in code. This makes
    the "guides" layer as rigorously maintained as the code itself.'
  deliverables:
  - name: Prompt template library
    description: 'Version-controlled prompt templates stored as structured YAML files'
    status: planned
    acceptance_criteria:
    - description: 'Prompt templates can be stored, listed, and loaded'
      validation: 'python3 prompt_lib.py list && python3 prompt_lib.py show implement'
      met: false
    tasks:
    - id: p62.d1.t1
      title: Create prompt library in prompts/ directory
      status: planned
      description: 'Create prompts/ directory and prompt_lib.py: (1) each prompt template is a YAML file: id, name, description, version, category (planning, implementation, review, testing, triage), variables
        (with types and defaults), template (the actual prompt text with {{variable}} placeholders), metadata (created_by, last_modified, usage_count), (2) prompt_lib.py init -- scaffold a new prompt template,
        (3) prompt_lib.py list -- list all templates with metadata, (4) prompt_lib.py show ID -- display a template with variable descriptions, (5) prompt_lib.py render ID --var=value -- render a template
        with specific variable values, (6) prompt_lib.py history ID -- show git log of changes to this prompt. Prompts are plain YAML files tracked in git -- no database needed.'
      files:
      - '~/zion/projects/agent-orchestration/prompts/'
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
      scope_lines: 130
      scope_files:
      - '~/zion/projects/agent-orchestration/prompts/'
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
  - name: Prompt testing framework
    description: Test prompt templates against input/output test cases to verify behavior
    status: planned
    acceptance_criteria:
    - description: Can define test cases and run them against a prompt template
      validation: python3 prompt_lib.py test implement
      met: false
    tasks:
    - id: p62.d2.t1
      title: Add prompt testing to prompt_lib.py
      status: planned
      description: 'Add test command: (1) test cases defined alongside prompts in prompts/{id}_tests.yaml: input variables, expected_output_patterns (regex), forbidden_output_patterns (things the prompt
        should NOT produce), (2) test ID -- render prompt with test inputs, check output against expected/forbidden patterns, (3) test --all -- run all test suites, (4) test --watch -- re-run tests when
        prompt files change, (5) test --score -- rate prompt quality: instruction clarity (does output follow all instructions), conciseness (is output appropriately concise), consistency (do multiple runs
        with same input produce similar output), (6) output test results as TAP format for CI integration. This is "unit testing for prompts."'
      files:
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
      dependencies:
      - p62.d1.t1
      scope_lines: 130
      scope_files:
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
  - name: Prompt diff and rollback
    description: Compare prompt versions and rollback to previous versions
    status: planned
    acceptance_criteria:
    - description: Can diff two versions of a prompt and rollback
      validation: 'modify a prompt, run diff, run rollback, verify restored'
      met: false
    tasks:
    - id: p62.d3.t1
      title: Add diff and rollback to prompt_lib.py
      status: planned
      description: 'Add diff and rollback commands: (1) diff ID --compare VERSION -- show word-level diff between two versions of a prompt, (2) diff ID --last -- compare against the previous version, (3)
        diff ID --baseline -- compare against the original version, (4) highlight meaningful changes: added/removed instructions, changed variable defaults, modified constraints, (5) rollback ID --version
        VERSION -- restore a specific version from git history, (6) rollback ID --last -- undo the most recent change, (7) support --dry-run for rollback (preview without changing). Since prompts are YAML
        files in git, all versioning uses git under the hood.'
      files:
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
      dependencies:
      - p62.d1.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/prompt_lib.py'
  - name: Prompt executor integration
    description: Wire the prompt library into the DAG executor and role system
    status: planned
    acceptance_criteria:
    - description: DAG executor loads prompts from the prompt library instead of embedded strings
      validation: 'configure a pipeline to use a prompt from the library, execute it'
      met: false
    tasks:
    - id: p62.d4.t1
      title: Integrate prompt library with executor and roles
      status: planned
      description: 'Modify executor.py and roles.py: (1) AI nodes in pipeline YAML can reference prompts by ID: prompt_ref: "implement" instead of embedding prompt text, (2) role YAMLs can reference prompt
        templates for their system prompt, (3) executor resolves prompt_ref by loading from prompt library, substituting variables from pipeline context, (4) fallback: if prompt_ref not found, use inline
        prompt (backward compatible), (5) log which prompt version was used for each execution (for audit trail in phase 52), (6) support prompt overrides per-repo (repo-local prompts/ directory takes precedence
        over global). This makes prompts centrally managed and version-controlled.'
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
      - '~/zion/projects/agent-orchestration/roles.py'
      dependencies:
      - p62.d1.t1
      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/executor.py'
      - '~/zion/projects/agent-orchestration/roles.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-62'
    type: soft
    reason: DAG executor from phase 5 uses prompts that the library will manage
  - source: 'phase-6'
    target: 'phase-62'
    type: soft
    reason: Role system from phase 6 has embedded prompts that should be extracted to the library
  - source: 'phase-36'
    target: 'phase-62'
    type: soft
    reason: 'Dynamic policy engine from phase 36 and prompt library both manage agent instructions -- they should be coordinated'
  - source: 'phase-52'
    target: 'phase-62'
    type: soft
    reason: Provenance tracking from phase 52 should log which prompt version was used for each execution
  technical_notes: 'The research insight: "The outer harness is characterized by guides -- feedforward controls that shape behavior before the agent acts." Currently these guides are scattered across YAML
    files, Python code, and markdown. Centralizing them in a version-controlled library makes them maintainable, testable, and auditable. The key design decision: prompts are YAML files in git, not a database.
    This keeps them simple, diffable, and branchable. The testing framework is deliberately lightweight: regex pattern matching, not LLM-based evaluation.'
  risks:
  - 'Prompt template abstraction may add complexity without clear benefit for small teams -- keep the CLI simple'
  - 'Test cases for prompts are inherently subjective -- use pattern matching, not exact matching'
  - 'Prompt versioning depends on git discipline -- enforce commit messages on prompt changes'
  - 'Centralized prompt library could conflict with per-repo customization -- support both global and local prompts'
