- id: 'phase-84'
  title: Agent Capability Registry and Gap Detection
  status: planned
  goal: Systematically discover missing agent capabilities based on failure patterns and suggest tooling creation
  description: 'The research describes a key insight from the Dark Factory experiment: "When an agent failed, the team did not attempt to refine the prompt; instead, they analyzed the environment to identify
    missing capabilities or structures." This represents a fundamentally different approach to failure handling -- instead of retrying with better prompts, identify what the agent lacked (a tool, a linter,
    a code pattern, a test fixture) and create it. This phase builds a capability registry that: (1) catalogs available agent capabilities (tools, linters, scripts, templates), (2) analyzes failure patterns
    to identify recurring capability gaps, (3) auto-suggests new capabilities based on failure frequency and type, (4) tracks capability creation and adoption rates, (5) integrates with self-improvement
    loop (phase 19) and agent-generated tooling (phase 34).'
  deliverables:
  - name: Capability registry
    description: Catalog of available agent capabilities with discovery and metadata
    status: planned
    acceptance_criteria:
    - description: 'Registry lists all available tools, linters, scripts, and templates'
      validation: 'run registry scan, verify it discovers existing tools'
