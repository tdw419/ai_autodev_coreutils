  technical_notes: 'The backend abstraction is the Inner Harness layer from the research.
    Keep it simple: a Python ABC with 2-3 implementations. The key insight is that not all
    AI tasks need the most expensive model -- code review can use a fast model, complex implementation
    needs a powerful one. The routing engine is the "model router" pattern from production ML
    systems, applied to agent orchestration. Start with ClaudeBackend (existing delegate_task)
    and SubprocessBackend (any CLI tool), add more backends as needed.'
  risks:
  - Different backends produce different quality output -- routing a complex task to a weak
    model wastes tokens on retries
  - Backend availability varies -- fallback chains add latency
  - Cost estimation is approximate -- actual costs depend on provider pricing
  - Adding more backends increases maintenance burden -- keep the interface minimal
