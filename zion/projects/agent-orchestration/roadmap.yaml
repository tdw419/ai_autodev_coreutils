        (which pipeline template to use), quality_gates (minimum test coverage, max lint violations, required checks), env (environment variables for the workspace), limits (max turns, max files, timeout),
        labels (auto-apply labels based on issue type), hooks (pre/post pipeline shell commands). Support per-label overrides so bug issues get different policies than feature issues. Document the schema
