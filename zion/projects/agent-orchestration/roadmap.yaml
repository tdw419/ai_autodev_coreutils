- id: 'phase-93'
  title: 'Agent Long-Term Memory and Semantic Retrieval'
  status: planned
  goal: 'Build a vector-store-based memory system that enables agents to search and retrieve relevant past solutions, patterns, and domain knowledge using semantic similarity'
  description: 'The research emphasizes that in the Dark Factory, "code is treated as a disposable artifact" and the harness is what persists. Phase 47 implements knowledge extraction but uses file-based
    storage with keyword search. The research''s vision of "Agent-Legible Software" implies agents should learn from their own history -- when facing a similar task, they should automatically retrieve how
    they solved it before. Phase 82 adds context seeding but relies on exact keyword matching. No phase provides semantic retrieval: finding past solutions that are conceptually similar even when they use
    different terminology. This phase creates a lightweight vector store (using numpy/faiss, no heavy dependencies like Pinecone) that: (1) automatically extracts knowledge from successful task completions,
    (2) embeds knowledge chunks using sentence-transformers, (3) enables semantic search for context injection, (4) provides memory decay to keep the store relevant, (5) integrates with the context seeding
    system (phase 82) for automatic injection.'
  deliverables:
  - name: Vector store and embedding module
    description: 'Lightweight vector store with sentence-transformer embeddings for semantic search'
    status: planned
    acceptance_criteria:
    - description: Can embed text and store/retrieve vectors with semantic similarity
      validation: 'embed "fix auth bug" and "authentication error", verify high similarity'
      met: false
    - description: Vector store persists to disk and survives restarts
      validation: 'store vectors, restart, verify retrieval works'
      met: false
