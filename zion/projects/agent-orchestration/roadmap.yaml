  test_target: 10
- id: 'phase-90'
  title: Agent Performance Profiling and Prompt Optimization
  status: planned
  goal: 'Profile which prompts, roles, strategies, and configurations produce the best agent outcomes, creating a data-driven feedback loop for continuous optimization'
  description: 'The Dark Factory experiment''s most important insight was operational: "When an agent failed, the team did not attempt to refine the prompt; instead, they analyzed the environment to identify
    missing capabilities or structures." This phase extends that insight from failure analysis to success analysis: systematically profile which agent configurations (prompts, roles, strategies, model backends,
    context budgets) produce the best outcomes. The 86 existing phases generate massive amounts of execution data (phase 8), but no phase analyzes which configurations correlate with success. Phase 19 (self-improvement)
    does pattern analysis on failures, and phase 29 (A/B testing) compares strategies, but neither provides a comprehensive profiling view. This phase creates: (1) a performance profiler that attributes
    outcomes to configuration choices, (2) a prompt optimization engine that suggests improvements based on historical performance data, (3) a configuration recommender that suggests optimal settings for
    new tasks based on similar past tasks. This directly supports the research''s vision of continuous self-improvement and operational excellence.'
  deliverables:
  - name: Agent performance profiler
    description: 'Module that profiles agent performance by configuration, role, and strategy'
    status: planned
    acceptance_criteria:
    - description: 'Can compute per-role, per-strategy, per-prompt-template success rates'
      validation: 'inject mock execution history, verify profiling output'
      met: false
    - description: 'Identifies which configurations produce best outcomes (fewest retries, highest review scores)'
      validation: 'check profiler identifies top-performing configuration'
      met: false
    tasks:
    - id: p90.d1.t1
      title: Create agent_profiler.py module
      status: planned
      description: 'Python module implementing agent performance profiling: (1) read execution history from phase 8, group by: role (implementer, reviewer, tester), strategy (conservative, aggressive),
        prompt_template (from context), model_backend (claude, codex), context_budget_size, (2) compute per-group metrics: success_rate (tasks completed without retry), avg_turns (efficiency), avg_review_score
        (from phase 9), avg_tokens (cost efficiency), time_to_completion, retry_rate, (3) identify outliers: best and worst performing configurations, (4) correlate configuration with outcome: which settings
        predict success? Use simple statistical analysis (mean, std, correlation coefficient), (5) CLI: python3 agent_profiler.py report --period 30d --group-by role,strategy. Output as markdown table with
        per-group stats and recommendations.'
      files:
      - '~/zion/projects/agent-orchestration/agent_profiler.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/agent_profiler.py'
  - name: Prompt optimization engine
    description: Suggest prompt improvements based on historical performance data
    status: planned
    acceptance_criteria:
    - description: Can identify prompts that consistently underperform and suggest alternatives
      validation: 'inject mock data with underperforming prompt, verify suggestion'
      met: false
    - description: Tracks prompt version history and performance across versions
      validation: check prompt version history after multiple iterations
      met: false
    tasks:
    - id: p90.d2.t1
      title: Create prompt_optimizer.py module
      status: planned
      description: 'Python module implementing prompt optimization: (1) prompt_versioning: store prompt templates with versions in ~/.orchestrator/prompts/ (template_name/vN.md), track which version was
        used for each task, (2) prompt_comparison: for templates with multiple versions, compare performance metrics across versions, identify which version performs best for which task types, (3) underperform_detection:
        flag prompts where success_rate < 70% or avg_turns > 2x median, (4) suggestion_engine: for underperforming prompts, analyze successful alternatives: what do high-performing prompts have that low-performing
        ones lack? (length, structure, examples, constraints), generate suggestions like "Add concrete examples" or "Reduce prompt length (current: 2000 tokens, optimal: 800-1200)", (5) CLI: python3 prompt_optimizer.py
        analyze --template implementer, suggest --template implementer, history --template implementer.'
      dependencies:
      - p90.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/prompt_optimizer.py'
    scope_lines: 160
    scope_files:
    - '~/zion/projects/agent-orchestration/prompt_optimizer.py'
  - name: 'Task-based configuration recommender'
    description: Recommend optimal agent configuration for new tasks based on similar past tasks
    status: planned
    acceptance_criteria:
    - description: 'Given a new task description, suggests best role, strategy, and context budget'
      validation: 'provide test task, verify recommendation matches known-good configuration'
      met: false
    tasks:
    - id: p90.d3.t1
      title: Add configuration recommender to agent_profiler.py
      status: planned
      description: 'Add to agent_profiler.py: (1) task_similarity: given a new task description, find similar past tasks from execution history using keyword overlap, (2) for similar tasks, extract the
        configuration used and outcome, (3) recommend: based on top-5 similar tasks, suggest: role (most successful role for this task type), strategy (most efficient strategy), context_budget (optimal
        budget range), model_backend (best cost/quality tradeoff), (4) confidence_score: how many similar tasks exist (more = higher confidence), variance in outcomes (low variance = higher confidence),
        (5) CLI: python3 agent_profiler.py recommend --task "Fix authentication bug in login flow". Output: recommended config with confidence score and reasoning.'
      dependencies:
      - p90.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/agent_profiler.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/agent_profiler.py'
  - name: Performance profiling tests
    description: 'Test profiler, optimizer, and recommender'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover profiling accuracy, optimization suggestions, and recommendations'
      validation: 'python3 -m pytest test_agent_profiler.py -v'
      met: false
    tasks:
    - id: p90.d4.t1
      title: Create test_agent_profiler.py
      status: planned
      description: 'Create test_agent_profiler.py: (1) test profiling with mock execution history (10 tasks, 3 roles, 2 strategies), verify per-group metrics are correct, (2) test outlier detection (inject
        1 excellent and 1 terrible config, verify both flagged), (3) test prompt versioning and comparison with mock prompt versions, (4) test underperform detection with mock prompts (success rates 50%,
        80%, 95%), (5) test recommender: create task similar to a past successful task, verify it recommends the same config, (6) test confidence scoring: verify low confidence for unique tasks, high confidence
        for common task types, (7) test edge cases: empty history, single task, all failures.'
      dependencies:
      - p90.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_agent_profiler.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/test_agent_profiler.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-90'
    type: soft
    reason: Execution history from phase 8 is the primary data source for profiling
  - source: 'phase-19'
    target: 'phase-90'
    type: soft
    reason: 'Self-improvement from phase 19 consumes profiling insights for optimization recommendations'
  - source: 'phase-29'
    target: 'phase-90'
    type: soft
    reason: A/B testing from phase 29 generates the comparison data that profiling analyzes
  - source: 'phase-62'
    target: 'phase-90'
    type: soft
    reason: Prompt engineering library from phase 62 provides the prompt templates that profiling evaluates
  technical_notes: 'This phase is the "intelligence layer" on top of all the execution data. The research emphasizes that "the strategic advantage no longer belongs to those with the largest models, but
    to those with the most effective system around them." Agent profiling is how you know your system is effective: by measuring, not guessing. The recommender is the practical output -- for each new task,
    the orchestrator can say "for tasks like this, role X with strategy Y has an 87% success rate in 12 turns on average." This is the data-driven optimization that the Dark Factory experiment achieved
    through intuition, now systematized.'
  risks:
  - 'Profiling requires sufficient history to be meaningful -- recommendations should show confidence scores and fall back to defaults when data is sparse'
  - 'Prompt optimization suggestions are heuristic, not guaranteed -- present as recommendations, not mandates'
  - 'Task similarity is approximate (keyword-based) -- could miss semantic similarity, acceptable for v1'
