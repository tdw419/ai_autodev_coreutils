    reason: 'PR automation from phase 13 is extended with pre-PR verification'
  - source: 'phase-65'
    target: 'phase-67'
    type: soft
    reason: Stop hooks from phase 65 can use verification gate as a completion criterion
  technical_notes: 'The research emphasizes that agents should "verify their own work" -- this is the mechanism. The gate is a pipeline-level construct (not agent-level) which makes it deterministic and
    reliable. The auto-remediation loop bridges the gap between "check failed" and "PR ready" by attempting fixes automatically, turning the gate from a pass/fail checkpoint into a self-correcting mechanism.'
