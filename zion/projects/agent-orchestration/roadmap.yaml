    acceptance_criteria:
    - description: 'Can report refactoring trends: violations fixed over time, recurrence rate'
      validation: 'python3 refactoring.py --report --period month'
      met: false
    tasks:
    - id: p43.d4.t1
      title: Add effectiveness tracking to refactoring.py
      status: planned
      description: 'Add --report mode to refactoring.py: (1) track refactoring history in ~/.orchestrator/logs/refactoring/ (jobs generated, fixes attempted, tests passed/failed, PRs created, PRs merged),
        (2) compute recurrence rate -- do fixed violations come back? (indicates the GC rules or agent fixes need improvement), (3) track violation trend -- is the total violation count decreasing over
        time? (4) track fix quality -- what percentage of refactoring PRs pass review without changes? (5) output weekly/monthly summary. This closes the feedback loop: measure the impact of self-healing
        on codebase health.'
      dependencies:
