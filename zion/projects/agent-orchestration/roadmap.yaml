- id: phase-35
  title: Dark Factory Mode (Full Autonomous Operation)
  status: planned
  goal: Enable fully autonomous "dark factory" operation where the orchestrator manages a codebase with
    zero human code review, using the complete harness (sensors, gates, budgets, verification) to ensure
    quality
  description: 'The Harness Engineering research describes the "Dark Factory" model: "a small team built
    an internal software product with zero manually-written code" and "moved toward a Dark Factory model
    where no human reviewed the code before it was merged into the main branch." This is the endgame of
    the orchestrator: combining all previous phases into a mode where the orchestrator can autonomously
    develop a codebase end-to-end. Phases 1-34 build individual capabilities; this phase integrates them
    into a cohesive autonomous operation mode with confidence scoring, progressive trust escalation, and
    emergency stops. This is NOT about removing humans from the loop entirely -- it is about giving humans
    the option to operate in "review only" mode instead of "approve every change" mode.'
  deliverables:
  - name: Confidence scoring engine
    description: Module that computes a composite confidence score for each pipeline run based on all available signals
    status: planned
    acceptance_criteria:
    - description: Module outputs a confidence score (0-100) with breakdown by signal
      validation: python3 confidence.py --evaluate --run RUN_ID
      met: false
    tasks:
    - id: p35.d1.t1
      title: Create confidence.py module
      status: planned
      description: 'Create confidence.py: (1) evaluate_run(run_id) -- compute composite confidence from:
        test pass rate (phase 7), review sensor score (phase 9), structural invariant compliance (phase 17),
        legibility score (phase 33), cost efficiency (phase 32), historical success rate for similar tasks.
        (2) weighted_score(signals) -- configurable weights for each signal, (3) trust_level(score) --
        map score to trust tier: auto-merge (95+), draft-PR (80+), human-review (60+), block (<60).
        Store confidence history for trend analysis.'
      files:
      - ~/zion/projects/agent-orchestration/confidence.py
      - ~/zion/projects/agent-orchestration/confidence_config.yaml
    scope_lines: 150
