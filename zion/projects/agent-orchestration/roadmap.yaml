- id: 'phase-82'
  title: 'Agent Context Seeding and Warm-Start'
  status: planned
  goal: 'Automatically discover and inject relevant prior context (similar issues, solutions, code patterns) before agent starts work'
  description: 'The research describes "Guides" as feedforward controls that provide agents with "project-specific context, architectural decisions, and coding conventions that cannot be inferred from the
    codebase alone." The current orchestrator starts agents with minimal context (issue description + AI_GUIDE.md). This phase creates a context seeding system that: (1) searches execution history for similar
    past issues, (2) finds prior solutions and their outcomes, (3) identifies relevant code patterns from the codebase, (4) assembles a "context brief" that gives the agent relevant prior art, (5) injects
    the brief into the agent prompt within context budget limits. This is distinct from phase 38 (cross-project knowledge transfer) which transfers knowledge across projects; this phase focuses on within-project
    context discovery for specific tasks.'
  deliverables:
  - name: Context discovery engine
    description: Module that finds relevant prior work for a given task description
    status: planned
    acceptance_criteria:
    - description: Can find similar past issues from execution history
      validation: 'create test issue, verify similar issues are returned'
      met: false
    - description: Relevance scoring prioritizes the most useful prior work
      validation: 'check that exact-match issues score higher than loosely related ones'
      met: false
    tasks:
    - id: p82.d1.t1
      title: Create context_seeder.py module
      status: planned
      description: 'Python module implementing context discovery: (1) index execution history by issue title/description keywords, (2) given a new issue, find similar past issues using keyword overlap +
        optional embedding similarity (if sentence-transformers available), (3) for each similar issue, extract: what approach was taken, what files were changed, what the outcome was (success/failure),
        (4) search codebase for files matching keywords in the issue, (5) extract relevant code patterns (function signatures, class hierarchies, test patterns) from matched files. Output: ContextBrief
        with similar_issues (top 3), relevant_files (top 5), code_patterns (extracted snippets), budget_estimate (token count of assembled brief). CLI: python3 context_seeder.py discover --issue "Fix auth
        bug in login flow".'
