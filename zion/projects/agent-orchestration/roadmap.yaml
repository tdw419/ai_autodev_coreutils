- id: 'phase-167'
  title: 'Merkle Tree Tamper-Evident Audit Trail'
  status: planned
  goal: 'Create a cryptographically verifiable audit trail using Merkle trees that detects any tampering with agent action history'
  description: |
    The Cross-Agent Reflex Loop research describes using Merkle trees to create a
    cryptographically verifiable, tamper-evident history of agent actions. Each action
    is a leaf in the tree, and the root hash changes if any action is modified, enabling
    integrity verification without storing the full history. This is critical for dark
    factory mode (phase 35) where 0% human review means the audit trail must be
    self-verifying.

    Phase 85 (Audit Trail) is append-only but NOT cryptographically verified -- entries
    could be modified without detection. Phase 51 (Federation) mentions gossip protocols
    but NOT Merkle trees for audit integrity. Phase 163 (Unified Memory) stores memory
    entries but does NOT provide tamper-evidence. Phase 167 closes this gap with a
    Merkle tree that hashes every action, maintains a verifiable root, and supports
    efficient proof generation for individual actions.
  deliverables:
  - name: Merkle tree audit module
    description: 'Hash every agent action into a Merkle tree, maintain verifiable root hash, and generate inclusion proofs for individual actions'
    status: planned
    acceptance_criteria:
    - description: 'Every agent action is hashed and added as a leaf to the Merkle tree'
      validation: test action recording
    - description: 'Root hash changes if any action is modified, enabling tamper detection'
      validation: test tamper detection
    tasks:
    - id: p167.d1.t1
      title: Create merkle_audit.py module
      status: planned
      description: 'Create merkle_audit.py: (1) AuditEntry dataclass: entry_id, timestamp, agent_id, action_type, target, outcome, details_hash, merkle_proof, (2) MerkleAuditTree class with: append_entry(entry) that adds leaf and recomputes tree, get_root_hash() returns current root, verify_entry(entry) validates inclusion proof, verify_tree() validates entire tree integrity, generate_proof(entry_id) returns Merkle proof path, detect_tampering() compares stored root with recomputed root, (3) Hashing: SHA-256 of canonical JSON representation of each entry, (4) Tree structure: binary Merkle tree with leaf count tracking, (5) Persistence: store tree state (root hash, leaf count, tree nodes) in a JSON file alongside the audit log, (6) CLI: python3 merkle_audit.py --verify --proof <entry_id> --root --append <entry_json>.'
      dependencies:
      - p85.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/merkle_audit.py'
    - id: p167.d1.t2
      title: Integrate Merkle audit into execution log
      status: planned
      description: 'Modify execution_log.py to: (1) After logging each action, append to MerkleAuditTree, (2) Store Merkle root hash alongside the execution log, (3) On log read, verify tree integrity and flag tampered entries, (4) Provide verify_audit() function for periodic integrity checks.'
      dependencies:
      - p167.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/execution_log.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/merkle_audit.py'
    - '~/zion/projects/agent-orchestration/execution_log.py'
  - name: Merkle audit tests
    description: 'Test tree construction, tamper detection, proof generation, and verification'
    status: planned
    acceptance_criteria:
    - description: 'Appending entries updates root hash correctly'
      validation: test root hash updates
    - description: 'Modifying any entry is detected by verify_tree()'
      validation: test tamper detection
    tasks:
    - id: p167.d2.t1
      title: Write Merkle audit tests
      status: planned
      description: 'Test cases: (1) Empty tree has valid root hash, (2) Appending single entry creates valid tree, (3) Appending multiple entries builds correct tree structure, (4) Root hash changes after each append, (5) Modifying an entry body changes root hash, (6) verify_entry returns True for valid entries, (7) verify_entry returns False for tampered entries, (8) verify_tree detects tampering in any leaf, (9) generate_proof produces valid Merkle proof path, (10) Proof verification works independently of tree storage, (11) Execution log integration appends entries correctly, (12) Integrity check flags tampered entries in execution log.'
      dependencies:
      - p167.d1.t1
      - p167.d1.t2
      files:
      - '~/zion/projects/agent-orchestration/test_merkle_audit.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_merkle_audit.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-167'
    type: soft
    reason: Execution history provides the log infrastructure that Merkle audit extends with cryptographic verification
  - source: 'phase-85'
    target: 'phase-167'
    type: soft
    reason: Audit trail provides the append-only logging that Merkle tree makes tamper-evident
  technical_notes: 'The Merkle tree approach provides O(log n) proof generation and verification, making it efficient even for large audit histories. The key property is that the root hash serves as a compact integrity checksum for the entire history -- storing just the root hash (32 bytes for SHA-256) is sufficient to detect any modification to any entry. This is especially valuable for dark factory mode where the audit trail must be self-verifying without human inspection of individual entries. The implementation uses a simple binary Merkle tree with SHA-256 hashing of canonical JSON entries.'
  risks:
  - 'Merkle tree storage grows with O(n) entries -- implement tree pruning for old entries while preserving root chain'
  - 'Hash computation adds latency to every action log -- batch hash computations for high-throughput scenarios'
  - 'Canonical JSON serialization must be deterministic -- use sorted keys and no whitespace variation'
  scope_lines_total: 200
  test_target: 12
- id: 'phase-168'
  title: 'CRDT-Based Eventually-Consistent Shared State'
  status: planned
  goal: 'Implement Conflict-free Replicated Data Types for shared state between agents, enabling lock-free coordination at Gas Town scale'
  description: |
    The Cross-Agent Reflex Loop research describes CRDTs (Conflict-free Replicated
    Data Types) for shared state between agents, enabling eventually-consistent
    coordination without centralized locking. CRDTs guarantee mathematical convergence:
    all replicas eventually reach the same state regardless of message ordering or
    network partitions.

    Phase 30 (Inter-Agent Communication) has simple key-value shared state. Phase 51
    (Federation) has distributed locking via GitHub labels. But neither implements
    CRDTs for lock-free, conflict-free state sharing. At Gas Town scale (20-30
    concurrent agents), centralized locking becomes a bottleneck. Phase 168 closes
    this gap with CRDT data structures for agent coordination.
  deliverables:
  - name: CRDT shared state module
    description: 'Implement G-Counter, PN-Counter, G-Set, OR-Set, and LWW-Register CRDTs for agent coordination'
    status: planned
    acceptance_criteria:
    - description: 'Supports at least 5 CRDT types suitable for agent coordination'
      validation: test CRDT operations
    - description: 'Concurrent updates from multiple agents converge to same state'
      validation: test convergence
    tasks:
    - id: p168.d1.t1
      title: Create crdt_state.py module
      status: planned
      description: 'Create crdt_state.py: (1) CRDTBase abstract class with: merge(other), get_state(), get_value(), clone(), (2) GCounter (grow-only counter): increment(agent_id, amount), value returns sum, merge takes max per agent -- for counting completed tasks, tokens used, (3) PN-Counter (positive-negative counter): increment/decrement, merge handles both -- for budget tracking, (4) GSet (grow-only set): add(element), has(element), merge unions -- for tracking seen issues, completed features, (5) OR-Set (observed-remove set): add(element, tag), remove(element), merge handles concurrent add/remove -- for managing active task assignments, (6) LWWRegister (last-writer-wins register): set(value, timestamp), get(), merge keeps latest -- for configuration values, status updates, (7) CRDTStore class that manages named CRDT instances with: create(name, type), get(name), update(name, operation), merge_remote(agent_id, state_snapshot), export_state() for replication, (8) Persistence: serialize CRDT state to JSON file per agent, (9) CLI: python3 crdt_state.py --create --update --merge --export.'
      files:
      - '~/zion/projects/agent-orchestration/crdt_state.py'
    - id: p168.d1.t2
      title: Replace centralized shared state with CRDT store
      status: planned
      description: 'Modify the inter-agent communication (phase 30) and federation (phase 51) to use CRDTStore: (1) Replace simple key-value state with CRDT-backed state, (2) Use G-Counter for task completion counts, (3) Use OR-Set for active task assignments (replacing lock-based assignment), (4) Use LWW-Register for configuration values, (5) Add merge_remote() call when agents synchronize state.'
      dependencies:
      - p168.d1.t1
      - p30.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/crdt_state.py'
    scope_lines: 160
    scope_files:
    - '~/zion/projects/agent-orchestration/crdt_state.py'
  - name: CRDT shared state tests
    description: 'Test CRDT operations, convergence properties, and integration with orchestrator'
    status: planned
    acceptance_criteria:
    - description: 'Concurrent updates from 3+ agents converge to identical state'
      validation: test convergence with multiple agents
    - description: 'CRDT state survives process restart via persistence'
      validation: test persistence and recovery
    tasks:
    - id: p168.d2.t1
      title: Write CRDT shared state tests
      status: planned
      description: 'Test cases: (1) GCounter increment and merge converge, (2) PN-Counter increment/decrement and merge converge, (3) GSet add and merge converge (union), (4) OR-Set add/remove and merge handle concurrent add-remove correctly, (5) LWW-Register set and merge keep latest timestamp, (6) CRDTStore create/get/update/export lifecycle, (7) Three agents with concurrent updates converge to same state, (8) Network partition simulation: updates applied after reconnection converge, (9) Persistence: save and restore CRDT state, (10) Integration with inter-agent communication works correctly, (11) Task assignment via OR-Set replaces lock-based assignment, (12) Configuration update via LWW-Register works across agents.'
      dependencies:
      - p168.d1.t1
      - p168.d1.t2
      files:
      - '~/zion/projects/agent-orchestration/test_crdt_state.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_crdt_state.py'
  dependencies:
  - source: 'phase-30'
    target: 'phase-168'
    type: soft
    reason: Inter-agent communication provides the shared state that CRDTs make lock-free and conflict-free
  - source: 'phase-51'
    target: 'phase-168'
    type: soft
    reason: Federation locking provides the distributed coordination that CRDTs replace with lock-free convergence
  technical_notes: 'CRDTs provide mathematical guarantees of convergence without coordination. The key advantage over centralized locking is throughput: agents can update shared state without waiting for locks, and the system is partition-tolerant (updates can be applied while disconnected and merged later). The five CRDT types chosen cover the common coordination patterns: G-Counter for monotonic counts (tasks completed, tokens used), PN-Counter for bidirectional counts (budget remaining), G-Set for accumulating sets (seen issues), OR-Set for mutable sets (active assignments), and LWW-Register for single-value state (configuration). The CRDTStore provides a namespace for managing multiple CRDT instances.'
  risks:
  - 'OR-Set concurrent add-remove semantics may surprise users -- document behavior clearly'
  - 'LWW-Register requires synchronized clocks for correct last-writer determination -- use wall clock + monotonic counter'
  - 'CRDT state files grow unboundedly -- implement compaction for old entries'
