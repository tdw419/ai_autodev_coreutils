      title: Create aggregation engine
      status: planned
      description: 'Create aggregator.py with: (1) aggregate(candidates, task_description) that sends K candidates to an LLM with instruction to extract correct intermediate steps and combine into an improved solution, (2) quality_score(solution, test_results) that scores output based on test pass rate and code quality metrics, (3) iterate(pool, task, T_steps) that runs T rounds of selection-aggregation-scoring.'
