- id: 'phase-43'
  title: 'Automated Refactoring Pipeline (Self-Healing Codebase)'
  status: planned
  goal: 'Combine garbage collection scanning with automated fix generation and PR creation into an autonomous self-healing pipeline'
  description: 'The research describes the future outlook: "codebases are inherently self-correcting. Garbage Collection Loops run weekly as background tasks, scanning for deviations from golden principles
    and opening targeted refactoring pull requests." Phase 10 (GC) scans for convention violations and reports them. Phase 13 (PR automation) creates PRs from workspace branches. But these two capabilities
    are not connected -- GC findings require manual action to fix. This phase closes the loop by creating an automated refactoring pipeline that: (1) runs GC scanning to detect violations, (2) categorizes
    findings by severity and effort, (3) delegates each fix to an AI worker with the violation as context, (4) runs tests to verify the fix doesn''t break anything, (5) creates a PR for each batch of fixes.
    This is the "Self-Correcting Codebase" from the research made real: the orchestrator not only detects drift but actively repairs it.'
  deliverables:
  - name: Refactoring job generator
    description: Module that takes GC scan results and generates prioritized refactoring jobs
    status: planned
    acceptance_criteria:
    - description: Can take GC findings and produce a prioritized list of fix jobs
      validation: 'run GC scan, feed results to generator, verify job list'
      met: false
    - description: Jobs are grouped by file/area to minimize PR size
      validation: check that related findings are grouped
      met: false
    tasks:
    - id: p43.d1.t1
      title: Create refactoring.py job generator
      status: planned
      description: 'Create refactoring.py: (1) generate_jobs(gc_findings) -- take output from garbage_collector.py --conventions, categorize by: severity (error > warning > style), fix_effort (simple rename
        > moderate refactor > complex restructure), file_group (group findings in same file/directory), (2) prioritize_jobs(jobs) -- sort by severity * confidence, then group into PR-sized batches (max
        10 files per PR), (3) estimate_tokens(jobs) -- estimate tokens needed for each job (for budget awareness from phase 32), (4) filter_jobs(jobs, scope) -- allow filtering by category, file pattern,
        or severity threshold, (5) --dry-run to preview what refactoring PRs would be created without actually making changes. Output as structured JSON.'
      files:
      - '~/zion/projects/agent-orchestration/refactoring.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/refactoring.py'
  - name: Autonomous fix execution pipeline
    description: Pipeline YAML that autonomously fixes detected violations and creates PRs
    status: planned
    acceptance_criteria:
    - description: 'Pipeline takes a GC finding, fixes it, tests the fix, and creates a PR'
      validation: 'create a test violation, run pipeline, verify fix and PR'
      met: false
    - description: Multiple violations are batched into a single PR when related
      validation: 'create 3 violations in same file, verify single PR'
      met: false
    tasks:
    - id: p43.d2.t1
      title: 'Create auto-refactor-pipeline.yaml'
      status: planned
      description: 'Create pipelines/auto-refactor-pipeline.yaml: OBSERVE(scan logs for context) -> AI(analyze GC findings, plan fixes) -> Loop(fix violations, max=5 per iteration) -> Bash(run tests) ->
        Loop(retry on test failure, max=3) -> REVIEW(LLM judge for fix quality) -> Bash(create branch, commit fixes) -> Bash(create PR with detailed description of what was fixed and why). The pipeline
        is designed to be run by the orchestrator as a cron job, creating refactoring PRs that humans can review and merge.'
      dependencies:
