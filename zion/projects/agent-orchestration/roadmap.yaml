    description: 'Module that captures application logs, traces, and error output from running applications'
    status: planned
    acceptance_criteria:
    - description: 'Collector supports: (1) local log file tailing, (2) process stdout/stderr capture, (3) HTTP endpoint polling (health/metrics), (4) structured log parsing (JSON, key=value)'
