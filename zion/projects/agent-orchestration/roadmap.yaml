- id: phase-49
  title: Human Feedback Capture and Agent Behavior Tuning
  status: planned
  goal: Capture human review decisions from PRs and issues, analyze patterns, and feed them
    back to improve agent behavior
  description: 'The research describes humans moving "up-stack" from writing code to "designing
    invariants," "tuning scaffolds," and defining "taste." But there is no mechanism for capturing
    the human''s review decisions and using them to improve agent behavior. When a human rejects
    a PR, leaves an inline comment, or reopens a closed issue, that feedback is currently
    lost. This phase creates a feedback loop: (1) capture human review actions (approve, reject,
    comment) on agent-generated PRs, (2) analyze feedback patterns to identify recurring rejection
    reasons, (3) feed patterns back into the orchestrator as new rules, prompts, or safety
    policies, (4) track improvement over time as rejection rate decreases. This is the "outer
    harness guide" concept made adaptive -- instead of static AI_GUIDE.md rules, the system
    learns from human corrections.'
  deliverables:
  - name: Feedback capture module
    description: Module that reads GitHub review comments and PR actions on agent-generated
      PRs and structures them as feedback signals
    status: planned
    acceptance_criteria:
    - description: Can read PR review comments and categorize them (approval, rejection, suggestion,
        question)
      validation: python3 feedback_capture.py --pr 42
      met: false
    - description: Captures the relationship between feedback and the specific code changes
        that triggered it
      validation: check output links comments to files and lines
      met: false
    tasks:
    - id: p49.d1.t1
      title: Create feedback_capture.py module
      status: planned
      description: 'Python module that: (1) reads PR review comments via gh CLI (gh pr view
        --comments, gh api repos/{owner}/{repo}/pulls/{number}/comments), (2) filters for
        PRs labeled "auto-generated" or created by the orchestrator, (3) categorizes each
        comment: approval ("looks good", "lgtm"), rejection ("this approach is wrong", "please
        revert"), suggestion ("use X instead of Y", "consider Z"), question ("why did you..."),
        (4) extracts the file and line each comment refers to, (5) stores feedback in ~/.orchestrator/feedback/{repo}/YYYY-MM-DD.jsonl
        with: pr_number, issue_number, comment_text, category, file, line, reviewer. Support
        --sync flag to fetch recent feedback from GitHub.'
      files:
      - ~/zion/projects/agent-orchestration/feedback_capture.py
      dependencies:
      - p13.d1.t1
      scope_lines: 150
      scope_files:
      - ~/zion/projects/agent-orchestration/feedback_capture.py
  - name: Feedback pattern analyzer
