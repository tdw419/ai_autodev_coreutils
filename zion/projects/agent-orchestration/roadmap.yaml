- id: 'phase-80'
  title: 'Agent-Legible Error Messages and Self-Healing Hints'
  status: planned
  goal: 'Transform error messages, test failures, and diagnostic output into agent-optimized formats that enable agents to self-diagnose and self-correct without human intervention'
  description: 'The Harness Engineering research emphasizes "Application Legibility" -- making software "directly understandable and verifiable by the agent." Phase 33 focuses on architecture-level legibility
    analysis, but no phase addresses the most immediate legibility problem: error messages. When an agent runs tests and gets a failure, the raw pytest output is designed for humans, not agents. Stack traces
    are verbose, error messages assume human context, and fix suggestions (if any) are aimed at developers. This phase creates: (1) an error message transformer that converts raw test failures, lint errors,
    and runtime exceptions into agent-optimized summaries, (2) a self-healing hint generator that analyzes failures and suggests specific fixes, (3) integration with the executor (phase 5) to automatically
    transform error output before feeding it back to AI nodes, (4) a failure taxonomy that categorizes errors by type (import error, type error, assertion failure, timeout, etc.) for pattern analysis, and
    (5) a feedback loop where agents that successfully self-heal contribute to the hint database. The research states the harness should "encode the specific quality gates" of the organization -- legible
    error messages are the most basic quality gate, ensuring agents can understand and fix their own mistakes.'
  deliverables:
  - name: Error message transformer
    description: 'Convert raw error output into agent-optimized summaries'
    status: planned
    acceptance_criteria:
    - description: 'Transforms pytest failure output into concise agent-readable summary'
      validation: 'pipe pytest failure through transformer, verify output'
      met: false
    - description: 'Extracts key information: error type, file, line, message, relevant context'
      validation: verify all key fields present in transformed output
      met: false
    tasks:
    - id: p80.d1.t1
      title: Create error_transformer.py module
      status: planned
      description: 'Create error_transformer.py: (1) transform(raw_output, tool_type) -> AgentError dataclass: error_type (enum: test_failure, lint_error, runtime_error, type_error, import_error, timeout,
        permission_error, unknown), file_path, line_number, function_name, error_message (concise), raw_message (full), context_snippet (5 lines around error), suggested_fix (if determinable), severity
        (error/warning/info), (2) pytest transformer: parse FAILED lines, extract test name, assertion message, file/line from traceback (skip internal frames), (3) lint transformer: parse flake8/ruff/pylint
        output, extract rule code, file/line, message, (4) runtime transformer: parse Python Traceback, extract exception type, message, file/line from last non-internal frame, (5) context extraction: read
        source file, extract lines around error location, strip comments and blank lines, (6) output format: structured JSON or concise text (configurable), (7) CLI: transform --type pytest --input output.txt,
        transform --stdin (pipe support).'
      files:
      - '~/zion/projects/agent-orchestration/error_transformer.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/error_transformer.py'
  - name: 'Self-healing hint generator'
    description: Analyze transformed errors and generate actionable fix suggestions
    status: planned
    acceptance_criteria:
    - description: Generates fix hints for common error types
      validation: 'pipe ImportError through generator, verify suggestion'
      met: false
    - description: Hints are specific enough for an agent to act on
      validation: verify hint includes file path and suggested change
      met: false
    tasks:
    - id: p80.d2.t1
      title: Create hint_generator.py module
      status: planned
      description: 'Create hint_generator.py: (1) Hint dataclass: error_type, hint_text, confidence (0-1), fix_command (if applicable), related_files (list), (2) rule-based hints for common patterns: a)
        ImportError -> check if module needs pip install, check for typos in import, check if file exists, b) TypeError -> check function signature vs call arguments, c) AssertionError -> extract expected
        vs actual values, d) SyntaxError -> show exact line and character, e) TimeoutError -> suggest increasing timeout or breaking into smaller steps, f) FileNotFoundError -> check path, suggest creating
        file, (3) hint database: ~/.orchestrator/hints/ directory with YAML files per error type, editable by humans, (4) learning mode: when an agent successfully fixes an error, log the (error, fix) pair
        to ~/.orchestrator/hints/learned.yamll, (5) CLI: hint --error-type ImportError --message "No module named X", hint --learned (show learned hints), hint --stats (show hint effectiveness). No LLM
        calls -- all hints are rule-based or from the database.'
      files:
      - '~/zion/projects/agent-orchestration/hint_generator.py'
      dependencies:
      - p80.d1.t1
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/hint_generator.py'
  - name: Executor integration with error transformation
    description: Wire error transformation and hint generation into the DAG executor loop
    status: planned
    acceptance_criteria:
    - description: Executor automatically transforms error output before retry
      validation: 'run pipeline that fails, verify transformed error in logs'
      met: false
    - description: AI nodes receive transformed errors with hints in their retry context
      validation: check AI node prompt includes transformed error and hint
      met: false
    tasks:
    - id: p80.d3.t1
      title: Integrate error transformation into executor.py
      status: planned
      description: 'Modify executor.py: (1) after any bash node fails, run error_transformer.transform() on the output, (2) append hint_generator.generate() result to the transformed error, (3) when a loop
        node retries, include the transformed error + hint in the next iteration context (instead of raw output), (4) log transformed errors to execution history (phase 8): original_error, transformed_error,
        hint_generated, hint_applied, (5) add error_transformation config section to pipeline YAML: enabled (bool), include_hints (bool), max_hint_length (default 500 chars), (6) metrics: error_transform_count,
        hint_generation_count, hint_effectiveness (did the agent fix it after the hint). This makes the executor''s error handling "agent-legible" -- agents get concise, actionable error summaries instead
        of verbose stack traces.'
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
      dependencies:
      - p80.d2.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Error transformation tests
    description: 'Test error transformation, hint generation, and executor integration'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover all error types (pytest, lint, runtime)'
      validation: 'python3 -m pytest test_error_transformer.py -v'
      met: false
    tasks:
    - id: p80.d4.t1
      title: Create test_error_transformer.py
      status: planned
      description: 'Create test_error_transformer.py: (1) test pytest transformer with assertion failure, (2) test pytest transformer with collection error, (3) test lint transformer with flake8 output,
        (4) test runtime transformer with Traceback, (5) test context extraction from source file, (6) test hint generation for ImportError, (7) test hint generation for TypeError, (8) test hint generation
        for TimeoutError, (9) test learning mode: log learned hint, retrieve it later, (10) test CLI: transform --stdin, hint --error-type. Use fixtures with sample error outputs.'
      files:
      - '~/zion/projects/agent-orchestration/test_error_transformer.py'
      dependencies:
      - p80.d3.t1
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/test_error_transformer.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-80'
    type: soft
    reason: Error transformation integrates into the DAG executor loop from phase 5
  - source: 'phase-18'
    target: 'phase-80'
    type: soft
    reason: Trace formatter from phase 18 benefits from transformed error messages
  - source: 'phase-19'
    target: 'phase-80'
    type: soft
    reason: 'Self-improvement from phase 19 can analyze hint effectiveness to improve the hint database'
  - source: 'phase-33'
    target: 'phase-80'
    type: soft
    reason: Application legibility from phase 33 defines the standards that error transformation implements
  - source: 'phase-65'
    target: 'phase-80'
    type: soft
    reason: Stop hooks from phase 65 can use transformed errors to decide whether to continue or escalate
  technical_notes: 'Error transformation is the lowest-cost, highest-impact improvement for agent effectiveness. Raw pytest output can be 100+ lines for a single failure; the transformed version should
    be under 20 lines. The key insight from the research: "making the software directly understandable and verifiable by the agent." Error messages are the primary communication channel between the deterministic
    harness (tests, linters) and the probabilistic agent (LLM). Making this channel efficient directly improves agent success rates. Rule-based hints are preferred over LLM-generated hints to avoid token
    costs on every failure. The learning mode captures successful fixes over time, building a project-specific hint database that improves with use.'
  risks:
  - 'Error transformation may lose important information from raw output -- always include raw_message in AgentError'
  - 'Hint suggestions may be wrong -- include confidence score and always show raw error alongside hint'
  - 'Context extraction from source files adds I/O overhead -- cache file reads within a pipeline run'
  - 'Learned hints from self-healing may encode bad fixes -- require human review before promoting to shared hint database'
  scope_lines_total: 530
  test_target: 10
- id: 'phase-81'
  title: Orchestrator Plugin System and Extension Points
  status: planned
  goal: 'Create a plugin architecture that allows organization-specific customization of the orchestrator without forking'
  description: 'The research emphasizes that the outer harness is "the DNA of the organization" -- the custom architectural layer that encodes org-specific quality gates and compliance standards. All 80
    existing phases add monolithic modules to the orchestrator, requiring code changes for customization. This phase creates a plugin system with defined interfaces for extending: (1) DAG node types, (2)
    sensors (deterministic and inferential), (3) approval gates, (4) spawner behaviors, (5) context enrichers, and (6) lifecycle hooks. Plugins are discovered from a plugins/ directory and loaded via a
    simple manifest format. This enables different organizations to customize the orchestrator for their specific workflows without modifying core code.'
