- id: phase-40
  title: Multi-Model Agent Backend Abstraction
  status: planned
  goal: Abstract the AI execution layer so the orchestrator can route work to different models
    and providers based on task type, cost, and quality requirements
  description: 'The Harness Engineering research describes the Inner Harness as "infrastructure
    inside developer tools (Cursor, Claude Code, Codex)" and notes it is "increasingly commoditized
    as providers converge on similar execution primitives." The current orchestrator is tightly
    coupled to a single model/provider via delegate_task. This phase adds a backend abstraction
    layer that: (1) defines a uniform interface for AI execution, (2) supports multiple backends
    (Claude, GPT, local models, Codex), (3) routes tasks to the optimal backend based on
    task type and cost, (4) enables fallback when a backend is unavailable. This is the Inner
    Harness abstraction that Symphony treats as a pluggable component, and it unlocks cost
    optimization by routing simple tasks to cheaper models while preserving quality for complex
    ones.'
  deliverables:
  - name: Backend abstraction interface
    description: Python interface defining the uniform contract for all AI execution backends
    status: planned
    acceptance_criteria:
    - description: Interface defines execute(prompt, context, tools) -> result with structured
        output
      validation: read backend.py, check interface definition
      met: false
    - description: At least 2 backend implementations (Claude, subprocess/CLI)
      validation: read backend implementations
      met: false
    tasks:
    - id: p40.d1.t1
      title: Create backend.py abstraction layer
      status: planned
      description: 'Create backend.py with: (1) AIBackend abstract base class with execute(prompt,
        system_prompt, tools, max_turns, context_window) -> BackendResult, (2) ClaudeBackend
        -- wraps delegate_task with acp_command=claude, (3) SubprocessBackend -- wraps any
        CLI tool (Codex, aider, etc.) via subprocess, (4) MockBackend -- returns canned responses
        for testing, (5) BackendConfig dataclass with model, provider, max_tokens, temperature.
        Each backend reports: model name, token usage estimate, latency, cost estimate.'
      files:
      - ~/zion/projects/agent-orchestration/backend.py
    scope_lines: 180
    scope_files:
    - ~/zion/projects/agent-orchestration/backend.py
  - name: Backend routing engine
    description: Module that selects the optimal backend for each AI node based on task characteristics
    status: planned
    acceptance_criteria:
    - description: Can route simple tasks to cheaper backends and complex tasks to premium
        ones
      validation: test routing with different task types
      met: false
