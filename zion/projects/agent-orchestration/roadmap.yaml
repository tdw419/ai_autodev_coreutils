      scope_lines: 100
      scope_files:
      - '~/zion/projects/agent-orchestration/human_workflow.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-60'
    type: soft
    reason: Orchestrator from phase 4 creates the issues and PRs that the human workflow tooling manages
  - source: 'phase-9'
    target: 'phase-60'
