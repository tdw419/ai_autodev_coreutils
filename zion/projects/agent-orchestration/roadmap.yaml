      description: 'Add report command: (1) aggregate velocity, cost, and quality data for the report period, (2) compute key KPIs: PRs_landed, avg_time_to_merge, cost_per_pr, revert_rate, total_tokens_spent,
        (3) compute trend comparison: this_period vs previous_period (with % change), (4) identify highlights: "fastest merge", "most expensive PR", "role with highest quality", (5) generate actionable
        recommendations: "switch role X to role Y for task type Z based on quality data", (6) output as markdown report saved to ~/.orchestrator/metrics/reports/{date}.md, (7) support --format json for
        programmatic consumption. This is the report that justifies the orchestrator investment.'
