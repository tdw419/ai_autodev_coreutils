title: Hermes Agent Orchestration
version: 0.1.0
description: 'Apply patterns from OpenAI Symphony, Harness Engineering, Gas Town, and Archon to the Hermes agent ecosystem. Synthesize research into wiki, map concepts to existing infrastructure, and implement
  concrete improvements.'
project_url: ''
phases:
- id: 'phase-2'
  title: Map Symphony Patterns to Hermes Infrastructure
  status: complete
  goal: 'Create a comparison document mapping each Symphony/Gas Town/Harness concept to what Hermes already has, identifying gaps'
  description: |
    Several patterns from the research doc already exist in Hermes in different forms.
    This phase creates a structured mapping and identifies specific gaps to close.
  deliverables:
  - name: Hermes vs Symphony comparison wiki page
    description: 'Create comparisons/hermes-vs-symphony.md mapping each pattern to Hermes equivalents'
    status: done
    acceptance_criteria:
    - description: Covers at least 8 pattern mappings with gap analysis
      validation: 'read page, count mappings'
      met: true
    - description: 'Each mapping identifies: Hermes equivalent, maturity level, specific gaps'
      validation: check table format
      met: true
    tasks:
    - id: p2.d1.t1
      title: 'Create comparisons/hermes-vs-symphony.md'
      status: done
      description: |
        Map these patterns to Hermes equivalents:
        1. Issue tracker as control plane -> GitHub Issues skill + Paperclip
        2. Workspace isolation -> delegate_task workdir isolation
        3. WORKFLOW.md policy engine -> AGENT.md / AI_GUIDE.md
        4. Agent runner (Codex) -> delegate_task + acp_command=claude
        5. Ralph Wiggum loop -> RFL with carry-forward
        6. Outer Harness (guides) -> skills system + AGENT.md
        7. Outer Harness (sensors) -> keep-or-revert, code-review skill
        8. Orchestrator layer -> cron scheduler + continuous-roadmap-worker
        9. Deterministic DAG (Archon) -> no equivalent (GAP)
        10. Specialized agent roles (Gas Town) -> partial via delegate-dispatch (GAP)
        11. Garbage Collection Loops -> no equivalent (GAP)
        12. agent.md spec -> partial via AI_GUIDE.md convention (GAP)
      files:
      - '~/wiki/comparisons/hermes-vs-symphony.md'
    scope_lines: 150
    scope_files:
    - '~/wiki/comparisons/hermes-vs-symphony.md'
  - name: Gap priority ranking
    description: 'Rank identified gaps by implementation effort vs value, produce actionable recommendations'
    status: done
    acceptance_criteria:
    - description: 'Each gap has: description, effort (low/med/high), value (low/med/high), recommendation'
      validation: read comparison page gap section
      met: true
    tasks:
    - id: p2.d2.t1
      title: Add gap priority ranking to comparison page
      status: done
      description: 'After the mapping table, add a ranked list of gaps with effort/value assessment and specific recommendation for each'
      dependencies:
      - p2.d1.t1
      files:
      - '~/wiki/comparisons/hermes-vs-symphony.md'
    scope_lines: 60
    scope_files:
    - '~/wiki/comparisons/hermes-vs-symphony.md'
  dependencies:
  - source: 'phase-1'
    target: 'phase-2'
    type: informs
    reason: Wiki pages from phase 1 provide the reference material for the mapping
  technical_notes: 'The comparisons/ directory currently has 0 pages -- this will be the first. Make it good as a template.'
  risks:
  - 'Some Hermes equivalents may be undocumented -- need to check skills and session history'
  scope_lines_total: 740
  test_target: 0
- id: 'phase-3'
  title: 'Close High-Value Gaps with Existing Tools'
  status: complete
  goal: 'Implement the highest-value gaps identified in phase 2 using existing Hermes infrastructure'
  description: |
    Based on the gap analysis, implement quick wins that leverage what's already built.
    Focus on: agent.md improvements, garbage collection loops, and outer harness sensors.
  deliverables:
  - name: AI_GUIDE.md template upgrade
    description: 'Update the ai-guide skill to incorporate agent.md best practices from the research (three-tier boundaries, executable commands, code examples)'
    status: done
    acceptance_criteria:
    - description: 'ai-guide skill includes agent.md structure recommendations'
      validation: read skill content
      met: true
    - description: 'Three-tier boundaries (Always/Ask First/Never) included as template section'
      validation: 'grep skill for ''three-tier'' or ''boundaries'''
      met: true
    tasks:
    - id: p3.d1.t1
      title: 'Patch ai-guide skill with agent.md best practices'
      status: done
      description: 'Add agent.md spec''s 4 key sections as recommended additions to AI_GUIDE.md template: tech stack definition, executable commands, code examples, three-tier boundaries'
      files:
      - '~/.hermes/skills/software-development/ai-guide/SKILL.md'
    scope_lines: 40
    scope_files:
    - '~/.hermes/skills/software-development/ai-guide/SKILL.md'
  - name: Convention garbage collection cron job
    description: Create a weekly cron job that scans project codebases for deviations from documented conventions and opens issues or creates tasks
    status: done
    acceptance_criteria:
    - description: Cron job exists and runs weekly
      validation: cronjob list
      met: true
    - description: 'Checks at least 3 convention types (naming, structure, test patterns)'
      validation: read cron prompt
      met: true
    tasks:
    - id: p3.d2.t1
      title: Create garbage collection cron job
      status: done
      description: 'Create a weekly cron job that reads AI_GUIDE.md from target projects, scans code for convention violations (naming patterns, file structure, missing tests), and reports findings. Start
        with geometry-os as the target project.'
      files: []
    scope_lines: 30
    scope_files: []
  - name: 'Outer harness sensor: automated test gating for delegate_task'
    description: 'Create a wrapper pattern/skill that automatically runs tests after delegate_task completion and re-runs on failure (deterministic sensor)'
    status: done
    acceptance_criteria:
    - description: 'Skill or documented pattern exists for test-after-delegate'
      validation: skill_view or read skill file
      met: true
    - description: 'Includes retry-with-context on test failure'
      validation: read skill content
      met: true
    tasks:
    - id: p3.d3.t1
      title: 'Create delegate-test-gate skill'
      status: done
      description: 'Create a skill that wraps delegate_task with: (1) run task, (2) run tests, (3) if tests fail, re-delegate with test output as context, (4) repeat up to N times. Pattern from outer harness
        deterministic sensors.'
      files:
      - '~/.hermes/skills/.archive/delegate-test-gate/SKILL.md'
    scope_lines: 80
    scope_files:
    - '~/.hermes/skills/.archive/delegate-test-gate/SKILL.md'
  dependencies:
  - source: 'phase-2'
    target: 'phase-3'
    type: informs
    reason: Gap analysis from phase 2 determines which quick wins to prioritize
  technical_notes: 'These are low-risk changes to existing infrastructure. No new services needed.'
  risks:
  - Garbage collection cron needs careful scoping to avoid noisy reports
  scope_lines_total: 890
  test_target: 0
- id: 'phase-4'
  title: 'Build Lightweight Symphony-Style Orchestrator'
  status: complete
  goal: 'Build a Hermes-native orchestrator that uses GitHub Issues as a control plane to drive autonomous coding agents'
  description: |
    This is the main build phase. Create an orchestrator that polls GitHub Issues for
    tasks, spawns delegate_task workers in isolated workdirs, and manages status
    lifecycle. Modeled on Symphony but using Hermes's existing cron + delegate_task
    infrastructure instead of Elixir/Codex.
  deliverables:
  - name: 'Orchestrator core: issue poller'
    description: 'Script that polls GitHub Issues (repo TBD) for issues with specific labels (e.g. ''agent-ready''), returns structured task list'
    status: done
    acceptance_criteria:
    - description: Polls GitHub Issues API via gh CLI
      validation: 'run script, check output'
      met: true
    - description: 'Filters by label, excludes in-progress/completed'
      validation: test with labeled issues
      met: true
    tasks:
    - id: p4.d1.t1
      title: Create issue poller script
      status: done
      description: 'Python script using gh CLI to poll GitHub Issues. Filter by label ''agent-ready''. Return JSON with issue number, title, body, labels. Skip issues already assigned or closed.'
      files:
      - '~/zion/projects/agent-orchestration/poller.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/poller.py'
  - name: 'Orchestrator core: worker spawner'
    description: 'Script that takes an issue from the poller and spawns a delegate_task worker with appropriate context, workdir, and skills'
    status: done
    acceptance_criteria:
    - description: Spawns delegate_task with issue context as prompt
      validation: test with a real issue
      met: true
    - description: Creates isolated workdir per issue
      validation: check workdir creation
      met: true
    - description: 'Uses acp_command=claude for reasoning tasks'
      validation: check delegate_task params
      met: true
    tasks:
    - id: p4.d2.t1
      title: Create worker spawner script
      status: done
      description: 'Python script that receives an issue, creates workdir at ~/zion/projects/agent-orchestration/workspaces/ISSUE-NUM, builds prompt from issue title+body+AI_GUIDE.md, calls delegate_task
        with appropriate toolsets'
      dependencies:
      - p4.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/spawner.py'
  - name: Orchestrator cron integration
    description: 'Wire poller + spawner into a Hermes cron job that runs on a schedule, with concurrency limits'
    status: done
    acceptance_criteria:
    - description: Cron job runs orchestrator on schedule
      validation: cronjob list
      met: true
    - description: Respects max_concurrent limit (configurable)
      validation: check cron prompt for limit
      met: true
    tasks:
    - id: p4.d3.t1
      title: Create orchestrator cron job
      status: done
      description: 'Create Hermes cron job that runs the orchestrator loop: poll issues -> filter ready -> spawn workers (up to N concurrent) -> update issue status. Include config for repo, labels, max_concurrent,
        polling interval.'
      dependencies:
      - p4.d1.t1
      - p4.d2.t1
      files: []
    scope_lines: 40
    scope_files: []
  - name: Orchestrator status dashboard
    description: 'Simple status command showing active workers, recent completions, queue depth'
    status: done
    acceptance_criteria:
    - description: Can run from terminal to see orchestrator state
      validation: run status command
      met: true
    tasks:
    - id: p4.d4.t1
      title: Create orchestrator status command
      status: done
      description: 'CLI command (or script) that reads workspace state and reports: active workers (by issue number), completed issues, failed issues, queue depth. Output as simple terminal table.'
      dependencies:
      - p4.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/status.sh'
    scope_lines: 50
    scope_files:
    - '~/zion/projects/agent-orchestration/status.sh'
  dependencies:
  - source: 'phase-3'
    target: 'phase-4'
    type: soft
    reason: 'Quick wins from phase 3 (test gating, AI_GUIDE improvements) make the orchestrator more effective, but not strictly required'
  technical_notes: 'Uses gh CLI for GitHub, delegate_task for workers, cron for scheduling. No Elixir, no Codex -- pure Hermes stack. Workspace isolation via delegate_task workdir param. Consider reusing
    delegate-dispatch skill patterns.'
  risks:
  - GitHub API rate limits on frequent polling
  - 'delegate_task sessions are synchronous within a turn -- need to handle long-running tasks via background processes or chained cron'
  - Issue state management race conditions with multiple workers
  scope_lines_total: 1160
  test_target: 0
- id: 'phase-5'
  title: 'Archon-Style Deterministic DAG for Hermes'
  status: complete
  goal: 'Implement a YAML-based DAG runner that forces delegate_task workers through a defined pipeline (plan, implement, test, review, PR)'
  description: |
    Archon uses YAML DAGs to make agent workflows deterministic. This phase brings that
    pattern to Hermes: define a pipeline as a YAML DAG, execute nodes sequentially,
    with AI nodes using delegate_task and bash nodes running tests/lint/git.
  deliverables:
  - name: DAG YAML schema and parser
    description: 'Define schema for workflow YAML (nodes, edges, node types) and write parser'
    status: done
    acceptance_criteria:
    - description: 'Schema supports AI, Bash, Loop, Dependency node types'
      validation: parse example YAML
      met: true
    tasks:
    - id: p5.d1.t1
      title: Create DAG schema and parser
      status: done
      description: 'Python module with Pydantic/dataclass models for DAG nodes (AI, Bash, Loop, Dependency) and edges. YAML parser that validates the DAG is acyclic. Include a default ''standard-pipeline.yaml''
        for plan->implement->test->review.'
      files:
      - '~/zion/projects/agent-orchestration/dag.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/dag.py'
  - name: DAG executor
    description: 'Execute DAG nodes: AI nodes via delegate_task, Bash nodes via terminal, Loop nodes with retry logic'
    status: done
    acceptance_criteria:
    - description: 'Executes a simple 3-node pipeline end-to-end'
      validation: run with example YAML
      met: true
    - description: Stops on Bash node failure (deterministic gate)
      validation: test with failing test node
      met: true
    tasks:
    - id: p5.d2.t1
      title: Create DAG executor
      status: done
      description: 'Python executor that walks the DAG topologically. AI nodes: build prompt from node config + context, call delegate_task. Bash nodes: run shell command, check exit code. Loop nodes: repeat
        child until condition met. Dependency nodes: just enforce order. Output results per node.'
      dependencies:
      - p5.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Standard pipeline template
    description: 'Default workflow YAML for the standard dev pipeline: plan, implement, lint, test, review, commit'
    status: done
    acceptance_criteria:
    - description: Template covers full dev lifecycle with gates
      validation: 'read YAML, trace through nodes'
      met: true
    tasks:
    - id: p5.d3.t1
      title: 'Create standard-pipeline.yaml'
      status: done
      description: 'YAML file defining: AI(plan) -> AI(implement) -> Bash(lint) -> Bash(test) -> Loop(fix-on-failure, max=3) -> AI(review) -> Bash(git commit). Include prompts and shell commands for each
        node.'
      dependencies:
      - p5.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/pipelines/standard-pipeline.yaml'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/pipelines/standard-pipeline.yaml'
  - name: Integrate DAG with orchestrator (phase 4)
    description: Wire DAG executor into the orchestrator so each issue goes through the pipeline
    status: done
    acceptance_criteria:
    - description: Orchestrator spawns DAG executor instead of raw delegate_task
      validation: check orchestrator cron prompt
      met: true
    tasks:
    - id: p5.d4.t1
      title: Integrate DAG executor into orchestrator
      status: done
      description: Modify the orchestrator spawner to use DAG executor with the standard pipeline instead of a single delegate_task call. Each issue becomes a DAG execution.
      dependencies:
      - p4.d3.t1
      - p5.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 40
    scope_files:
    - '~/zion/projects/agent-orchestration/spawner.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-5'
    type: soft
    reason: DAG executor enhances the orchestrator but can also run standalone for manual use
  technical_notes: 'Keep it simple -- no Phoenix dashboard, no Dolt database. Just YAML + Python + Hermes tools. The DAG runner is a library, not a service.'
  risks:
  - 'DAG complexity can grow unbounded -- cap at 10 nodes per pipeline'
  - Error propagation across nodes needs clear semantics
  scope_lines_total: 1570
  test_target: 0
- id: 'phase-6'
  title: 'Gas Town-Style Role Specialization'
  status: complete
  goal: 'Implement role-based agent specialization where different workers have different prompts, toolsets, and responsibilities'
  description: |
    Gas Town assigns specialized roles (Mayor, Polecat, Deacon, etc.) to agents.
    This phase brings role specialization to Hermes: define role profiles as skills
    or prompt templates, and let the orchestrator assign roles to workers based on
    task type.
  deliverables:
  - name: Role profile system
    description: 'Define agent roles as YAML profiles with prompts, toolsets, and capabilities'
    status: done
    acceptance_criteria:
    - description: 'At least 4 roles defined (implementer, reviewer, tester, coordinator)'
      validation: read role YAML files
      met: true
    tasks:
    - id: p6.d1.t1
      title: Create role profile YAMLs
      status: done
      description: 'Create roles/ directory with YAML profiles for: implementer (code writing, full tools), reviewer (read-only + suggestions), tester (run tests, report), coordinator (triage, assign, no
        code changes). Each has: name, description, system_prompt additions, allowed_toolsets, max_turns.'
      files:
      - '~/zion/projects/agent-orchestration/roles/'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/roles/'
  - name: 'Role-aware orchestrator'
    description: Update orchestrator to match issues to roles based on labels or heuristics
    status: done
    acceptance_criteria:
    - description: 'Issues with ''bug'' label get tester role, ''feature'' gets implementer, etc.'
      validation: test with labeled issues
      met: true
    tasks:
    - id: p6.d2.t1
      title: Add role matching to orchestrator
      status: done
      description: 'Update spawner.py to select role profile based on issue labels or title heuristics. Pass role-specific prompt additions and toolsets to delegate_task.'
      dependencies:
      - p4.d3.t1
      - p6.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/spawner.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/spawner.py'
  - name: 'Multi-role pipeline'
    description: 'Create a pipeline where different roles handle different stages (implementer writes code, tester validates, reviewer approves)'
    status: done
    acceptance_criteria:
    - description: Pipeline YAML uses different roles for different nodes
      validation: read pipeline YAML
      met: true
    tasks:
    - id: p6.d3.t1
      title: 'Create multi-role pipeline YAML'
      status: done
      description: 'Create a pipeline YAML where: AI(plan, role=coordinator) -> AI(implement, role=implementer) -> Bash(test) -> Loop(fix, role=implementer) -> AI(review, role=reviewer) -> Bash(commit).
        Requires role field on AI nodes.'
      dependencies:
      - p5.d3.t1
      - p6.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/pipelines/team-pipeline.yaml'
    scope_lines: 50
    scope_files:
    - '~/zion/projects/agent-orchestration/pipelines/team-pipeline.yaml'
  dependencies:
  - source: 'phase-5'
    target: 'phase-6'
    type: soft
    reason: Role specialization builds on the DAG executor from phase 5
  technical_notes: 'Roles are prompt+toolset profiles, not separate processes. Same delegate_task infrastructure, different configuration. This is the ''Outer Harness'' concept -- role profiles ARE guides.'
  risks:
  - Role matching heuristics may be too simplistic
  - 'Over-specialization can reduce flexibility for novel tasks'
  scope_lines_total: 1780
  test_target: 0
