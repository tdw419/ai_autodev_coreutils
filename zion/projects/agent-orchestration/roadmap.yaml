      dependencies:
      - p128.d3.t1
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/test_spec_workflow.py'
  dependencies:
  - source: 'phase-5'
    target: 'phase-128'
    type: soft
    reason: 'DAG executor provides the execution engine; SPEC nodes extend the node type registry'
  - source: 'phase-26'
    target: 'phase-128'
    type: soft
    reason: 'Work Decomposition breaks issues into sub-issues; Spec-Driven Workflow provides a more formal alternative with structured artifacts'
  - source: 'phase-45'
    target: 'phase-128'
    type: soft
    reason: 'WORKFLOW.md Engine loads runtime policies; Spec artifacts define task-level policies as structured data'
  technical_notes: |-
    The OpenSpec pattern addresses "context rot" -- the degradation of agent
    performance as chat history accumulates irrelevant context. By creating
    structured artifacts (proposal, requirements, design, tasks) BEFORE execution
    begins, the agent always has fresh, focused context. The RFC 2119 keywords
    (MUST, SHALL, SHOULD, MAY) remove ambiguity from requirements. The Given/When/Then
    scenarios make requirements machine-verifiable. The 2-5 minute task granularity
    keeps the agent's context window focused on a single problem. The "task pass rate"
    metric (from the research) measures spec quality: a high pass rate means the
    spec was well-defined, a low rate means requirements were too vague. This metric
    feeds into the self-improvement loop (phase 19).
  risks:
  - 'Spec generation adds latency before implementation starts -- the research targets <30 minutes for spec phase'
  - 'Spec quality depends on the LLM generating coherent requirements -- spec_validator catches structural issues but not semantic ones'
  - 'Over-specification can reduce agent flexibility for novel problems -- support skipping spec phase via pipeline config'
  - 'RFC 2119 keyword compliance may be too rigid for some task types -- SHOULD and MAY provide flexibility'
  scope_lines_total: 610
  test_target: 10

- id: 'phase-129'
  title: Git Worktree-Based Task Isolation
  status: planned
  goal: 'Replace directory-based workspace isolation with git worktrees, enabling parallel agents to work on different branches of the same repository without file system conflicts'
  description: |-
    The "AI Command Centers Beyond Terminals" research describes Vibe Kanban's use of git worktrees
    as the primary isolation mechanism: "a separate Git worktree -- a linked copy of the repository
    that shares the .git directory but possesses its own isolated checkout -- for every task assigned
    to an agent." This ensures "Agent A can work on a feature-authentication branch while Agent B
    addresses a bug-fix in the documentation, without any risk of stepping on each other's toes."
    Phase 11 (Workspace Lifecycle) creates isolated directories. Phase 64 (Sandboxing) provides
    OS-level isolation. But neither creates git-native worktrees that share commit history and
    enable intentional merge points. This phase adds: (1) worktree creation per task with automatic
    branch naming, (2) worktree cleanup after task completion or failure, (3) worktree status
    tracking so the orchestrator knows which worktrees exist, (4) conflict detection at merge time
    leveraging git's native merge machinery, (5) worktree pool management to prevent resource
    exhaustion. Git worktrees are lighter than full clones, share object storage, and integrate
    naturally with the existing git-based workflow.
  deliverables:
  - name: Worktree manager module
    description: 'Create worktree_manager.py that handles worktree lifecycle (create, list, cleanup, status)'
    status: planned
    acceptance_criteria:
    - description: Can create a worktree for a given task, checkout a branch, and return the path
      validation: 'python3 worktree_manager.py create --issue 123 --repo ~/zion/projects/target'
      met: false
    - description: Can list all active worktrees with their branches and ages
      validation: 'python3 worktree_manager.py list'
      met: false
    - description: Can clean up a worktree after task completion, removing the directory and pruning the branch
      validation: 'python3 worktree_manager.py cleanup --issue 123'
      met: false
    tasks:
    - id: p129.d1.t1
      title: Create worktree_manager.py
      status: planned
      description: |-
        Create worktree_manager.py: (1) create_worktree(repo_path, issue_number, branch_prefix="orch")
        -> str: run "git worktree add <path> -b <branch>", return worktree path, (2) list_worktrees(repo_path)
        -> list[dict]: run "git worktree list", parse output, include branch name, age, and
        associated issue number (stored in metadata file), (3) cleanup_worktree(repo_path, issue_number):
        run "git worktree remove <path>", prune branch if merged, remove metadata, (4)
        worktree_status(repo_path) -> dict: count active worktrees, total disk usage, oldest
        worktree age, (5) store metadata (issue_number, created_at, status) in .orch-worktree
        file inside each worktree for correlation, (6) handle edge cases: worktree already exists,
        branch name collision, repo not a git repository, worktree locked by another process.
      files:
      - '~/zion/projects/agent-orchestration/worktree_manager.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/worktree_manager.py'
  - name: Worktree integration with spawner
    description: 'Integrate worktree_manager into the worker spawner so agents automatically get worktree-isolated workspaces'
    status: planned
    acceptance_criteria:
    - description: Spawner uses worktree_manager instead of plain directory creation when available
      validation: 'check spawner.py imports and calls worktree_manager'
      met: false
    - description: Falls back to plain directory if worktree creation fails
      validation: 'test with non-git directory, verify fallback'
      met: false
    tasks:
    - id: p129.d2.t1
      title: Integrate worktree_manager into spawner.py
      status: planned
      description: |-
        Update spawner.py: (1) import worktree_manager, (2) in spawn_worker(), try
        create_worktree() first, fall back to existing directory-based isolation if it fails
        (not a git repo, worktree limit reached), (3) pass worktree path as working directory
        to delegate_task, (4) on task completion (success or failure), call cleanup_worktree(),
        (5) add worktree_status() to the status command output so operators can see active
