        value), session.click(selector), session.screenshot(path), (3) session.get_page_text() -- extract visible text for assertion, (4) session.wait_for(selector, timeout) -- wait for element to appear,
        (5) session.close(). Use subprocess to manage Chrome process. Fall back gracefully if Chrome is not installed. Include --mode headed for debugging.'
