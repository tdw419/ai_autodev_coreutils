- id: 'phase-67'
  title: 'Pre-PR Self-Verification Gate'
  status: planned
  goal: 'Create a pipeline gate that combines deterministic and inferential checks, requiring agents to verify their own work before PR submission'
  description: 'The research states agents can "drive application-level tools (Chrome DevTools, CLI scripts) to verify their own work before submitting a pull request." This phase creates a pre-PR verification
    gate that runs a battery of checks (tests, lints, invariant checks, review sensor) and only allows PR creation when all checks pass. This is the "self-verify" step that turns agent output from "probably
    correct" to "verified correct."'
  deliverables:
  - name: 'Pre-PR verification gate module'
    description: Create verify_gate.py that runs verification checks and produces a pass/fail verdict
    status: planned
    acceptance_criteria:
    - description: Gate runs configurable set of verification checks in sequence
      validation: test with mock checks that pass and fail
      met: false
    - description: 'Gate produces structured report with per-check results'
      validation: inspect output report
      met: false
    tasks:
    - id: p67.d1.t1
      title: Create verify_gate.py with verification framework
      status: planned
      description: 'Create verify_gate.py with: (1) VerifyCheck dataclass: name, type (deterministic/inferential), command_or_function, timeout, required (fatal if fails), (2) VerifyResult dataclass: check_name,
        passed, output, duration, severity, (3) VerifyGate class: register checks, run all, produce verdict, (4) built-in check types: BASH_CHECK (run shell command, check exit code), PYTHON_TEST (run pytest,
        parse results), INFERENTIAL (call review_sensor.py, check threshold), FILE_PATTERN (check for/against file patterns), INTEGRATION_TEST (run integration test command), (5) gate config in YAML: verify_gate.yaml
        with check definitions, thresholds, required/optional flags, (6) CLI: python3 verify_gate.py --workspace PATH --config verify_gate.yaml, (7) exit code 0 = all required checks pass, exit code 1 =
        failures, (8) JSON output mode for programmatic consumption'
      files:
      - '~/zion/projects/agent-orchestration/verify_gate.py'
      - '~/zion/projects/agent-orchestration/verify_gate.yaml'
      scope_lines: 130
      scope_files:
