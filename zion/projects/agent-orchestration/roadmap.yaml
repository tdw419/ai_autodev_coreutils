- id: phase-14
  title: Agent Health Monitoring (Deacon Pattern)
  status: complete
  goal: Implement the Gas Town Deacon pattern -- a health supervision daemon that monitors running workers, detects
    stuck agents, and manages resource usage
  description: 'Gas Town''s Deacon role is a "daemon beacon; central health supervisor" that monitors
    the health of all running agents. Currently the orchestrator can spawn workers but has no way to
    detect if a worker is stuck, consuming excessive resources, or has silently failed. This phase adds
    health monitoring: periodic checks on workspace activity, disk usage tracking, timeout detection,
    and auto-recovery or escalation for unhealthy workers. This is essential for running the orchestrator
    in production where workers may run for hours.

    '
  deliverables:
  - name: Health check module
    description: Python module that checks the health of active worker workspaces
    status: done
    acceptance_criteria:
    - description: Module can scan all active workspaces and report health status per worker
      validation: python3 health_check.py --all
      met: true
    - description: Detects stuck workers (no file changes in N minutes)
      validation: create a stale workspace, run health check
      met: true
    tasks:
    - id: p14.d1.t1
      title: Create health_check.py module
      status: done
      description: 'Python module that: (1) scans all workspaces with status "in-progress", (2)
        checks last file modification time (stuck detection), (3) measures disk usage per workspace,
        (4) checks for zombie processes (optional, via ps), (5) reports health as JSON with per-worker
        status (healthy, stale, oversized, unknown). Configurable thresholds: stale_after_minutes
        (default 30), max_disk_mb (default 500). Support --watch flag for continuous monitoring.'
      files:
      - ~/zion/projects/agent-orchestration/health_check.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/health_check.py
  - name: Auto-recovery for stuck workers
    description: Automatically detect and handle stuck workers (timeout, escalation, or restart)
    status: done
    acceptance_criteria:
    - description: Stuck workers are detected and marked as failed after timeout
      validation: simulate stuck worker, verify detection
      met: true
    tasks:
    - id: p14.d2.t1
      title: Add auto-recovery logic to health_check.py
      status: done
      description: 'Add to health_check.py: (1) when a worker is stale beyond threshold, update
        its meta.json status to "failed", (2) post a comment on the GitHub issue explaining the
        timeout, (3) optionally archive the workspace, (4) log the recovery event. Support --auto-recover
        flag and --escalate flag (create a new issue for human review). Recovery modes: mark-failed
        (default), archive, retry (re-spawn with reduced max_turns).'
      dependencies:
      - p14.d1.t1
      files:
      - ~/zion/projects/agent-orchestration/health_check.py
    scope_lines: 80
    scope_files:
    - ~/zion/projects/agent-orchestration/health_check.py
