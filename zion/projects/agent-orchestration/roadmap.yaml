- id: 'phase-83'
  title: Orchestrator State Persistence and Migration Layer
  status: planned
  goal: 'Create a version-controlled persistence layer for all orchestrator state with schema migration support'
  description: 'The research describes "Beads, a version-controlled SQL database built on Dolt" as the persistent source of truth for Gas Town''s work coordination. The current orchestrator uses file-backed
    JSON Lines for state (merge queue, workspaces, execution logs, etc.) but has no schema versioning, migration support, or backup/restore. As the system grows to 80+ modules with multiple state files,
    the risk of incompatible state format changes increases. This phase creates a unified persistence layer that: (1) defines schemas for all orchestrator state, (2) supports versioned migrations when schemas
    change, (3) provides backup and restore, (4) ensures atomic writes to prevent corruption, (5) provides a single CLI for state management.'
  deliverables:
  - name: State schema definitions and registry
    description: Define versioned schemas for all orchestrator state types
    status: planned
    acceptance_criteria:
    - description: 'Schemas cover all major state types (workspaces, execution logs, merge queue, config)'
      validation: 'list schemas, verify coverage of existing state files'
      met: false
    - description: Each schema has a version number and migration path
      validation: check schema definitions include version field
      met: false
    tasks:
    - id: p83.d1.t1
      title: Create state_schemas.py with versioned schema definitions
      status: planned
      description: 'Python module defining versioned schemas for orchestrator state: (1) workspace_state schema (v1: workspace_id, issue, branch, status, created_at, updated_at, metadata), (2) execution_log
        schema (v1: timestamp, issue, phase, status, tokens, duration, result), (3) merge_queue schema (v1: pr_number, status, priority, conflicts, created_at), (4) config_state schema (v1: key, value,
        source, updated_at). Each schema: name, version, fields with types, migration_functions dict mapping old_version -> migration_callable. Use dataclasses for schema definitions.'
      files:
      - '~/zion/projects/agent-orchestration/state_schemas.py'
    scope_lines: 120
    scope_files:
