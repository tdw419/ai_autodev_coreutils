- id: 'phase-153'
  title: AI Gateway Token Governance and Directional Guardrails
  status: planned
  goal: 'Prevent runaway token costs from unbounded agent loops via directional guardrails, recursive loop detection, and hard token quotas'
  description: |
    The "Auto Research: Agentic Loops Explained" research (184 lines, 36 citations)
    describes how agentic loops may cycle 50-200 times for a single task, creating massive
    token costs that can burn thousands of dollars overnight if left unchecked. Enterprises
    have adopted AI Gateways (e.g., Kong AI Gateway) that enforce "directional guardrails":
    monitoring recursive token generation and setting hard quotas on output tokens. The
    research notes the shift from "task-based billing" to "execution-based billing" where
    a 50-cycle loop counts as one execution rather than 50 separate tasks. Phase 70
    (Backpressure) handles API rate limits (429 errors) reactively but does NOT implement
    proactive directional guardrails or hard token quotas. Phase 20 (Context Budget)
    manages per-session context but NOT cumulative token consumption across loops. Phase 143
    (Adaptive Quality Throttling) adjusts quality based on budget but does NOT detect
    recursive token generation patterns or enforce hard spending limits.
  deliverables:
  - name: Token governance engine
    description: 'Track cumulative token consumption and enforce hard quotas across agent loops'
    status: planned
    acceptance_criteria:
    - description: 'Cumulative token consumption is tracked per task and per session'
      validation: test tracking
    - description: 'Hard quota limits prevent runaway spending (configurable per task tier)'
      validation: test quota enforcement
    tasks:
    - id: p153.d1.t1
      title: Create token governance engine
      status: planned
      description: 'Create token_governor.py: (1) TokenGovernor class with consume(tokens, task_id, session_id), (2) Hard quota per task (configurable, default 100k tokens), (3) Hard quota per session (configurable, default 500k tokens), (4) Hard daily quota (configurable, default 2M tokens), (5) QuotaExceeded exception with metadata: current_usage, limit, task_id, (6) Quota check before each LLM call in the harness, (7) Reset quotas on task completion or session start, (8) Persist quota state to file for crash recovery.'
      files:
      - '~/zion/projects/agent-orchestration/token_governor.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/token_governor.py'
  - name: Recursive loop detection and directional guardrails
    description: 'Detect patterns of recursive token generation and enforce directional spending controls'
    status: planned
    acceptance_criteria:
    - description: 'Recursive spending patterns (e.g., token cost accelerating) are detected within 3 iterations'
      validation: test detection
    - description: 'Directional guardrails reduce quality tier when spending accelerates'
      validation: test tier reduction
    tasks:
    - id: p153.d2.t1
      title: Create recursive loop detector
      status: planned
      description: 'Create recursive_detector.py: (1) RecursiveLoopDetector class that monitors token spending patterns, (2) Track tokens per iteration: if iteration N+1 costs > 1.5x iteration N for 3 consecutive iterations, flag as recursive acceleration, (3) Track cost-per-progress ratio: if token cost is increasing but task completion progress is flat, flag as runaway loop, (4) On detection: (a) log warning with full spending history, (b) emit event for downstream handlers, (c) optionally force quality tier reduction (think -> default -> background), (d) optionally force task termination if acceleration continues after tier reduction.'
