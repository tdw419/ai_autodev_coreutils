- id: 'phase-8'
  title: Execution History and Observability
  status: complete
  goal: 'Add persistent execution logging so past orchestrator runs can be inspected, debugged, and analyzed'
  description: 'The current system has no execution history. When a pipeline runs, results are printed to stdout and lost. This phase adds a JSON-based execution log that records every pipeline run, every
    node execution, and every orchestrator loop iteration. Includes a CLI to query past runs. This addresses gap #7 from the comparison page (observability) and is essential for production use.'
  deliverables:
  - name: Execution log storage
    description: 'JSON-based log that records every pipeline run with timestamps, node results, and context'
    status: done
    acceptance_criteria:
    - description: Executor writes results to a persistent log file after each run
      validation: 'run executor, check log file exists and contains run data'
      met: true
    tasks:
    - id: p8.d1.t1
      title: Add execution logging to DAGExecutor
      status: done
      description: 'Create execution_log.py module that creates ~/.orchestrator/logs/ directory, writes one JSON file per run (named by timestamp), stores pipeline name, all node results, duration, context,
        and final status. Integrate into executor.py run() method.'
      files:
      - '~/zion/projects/agent-orchestration/execution_log.py'
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/execution_log.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Orchestrator loop logging
    description: 'Log each orchestrator loop iteration (poll results, spawn decisions, worker state)'
