  description: 'The research describes the Dark Factory model where "no human reviewed the code before it was merged." Phase 35 implements dark factory mode, but no phase provides the compliance-grade audit
    trail that enterprise adoption requires. When agents operate autonomously at scale, organizations need: (1) a complete, tamper-proof record of every agent action, (2) attribution tracking (which agent/role/session
    performed each action), (3) compliance reporting (what changed, when, by whom, with what approval), (4) post-incident forensics (reconstruct the chain of events leading to an issue). This phase creates
    an append-only audit log that is cryptographically chained (each entry references the previous entry''s hash) to detect tampering, with query and reporting capabilities.'
  deliverables:
  - name: 'Append-only audit log with cryptographic chaining'
    description: 'Tamper-proof log that records every agent action with hash chaining'
    status: planned
    acceptance_criteria:
    - description: Each log entry includes a hash of the previous entry
      validation: 'inspect log file, verify hash chain is intact'
      met: false
    - description: Tampering with any entry breaks the chain and is detectable
      validation: 'modify a historical entry, run verification, verify chain broken'
      met: false
    tasks:
    - id: p85.d1.t1
      title: Create audit_log.py module
      status: planned
      description: 'Python module implementing append-only audit log: (1) each entry: timestamp, session_id, agent_role, action_type (spawn, execute, approve, merge, config_change, policy_change), action_detail
        (JSON), issue_id, workspace_id, approval_status, token_usage, previous_hash, entry_hash (SHA-256 of all fields + previous_hash). (2) append-only: entries written to ~/.orchestrator/audit.log.jsonl,
        (3) verify(): walk the chain, check every hash, report any breaks, (4) query(): filter by agent_role, action_type, time_range, issue_id. CLI: python3 audit_log.py verify, query --role Polecat --action
        merge, report --last 7d, export --format csv.'
      files:
      - '~/zion/projects/agent-orchestration/audit_log.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/audit_log.py'
  - name: Audit event instrumentation
    description: Add audit logging calls to all orchestrator modules
    status: planned
    acceptance_criteria:
    - description: All major orchestrator actions are logged to audit trail
      validation: 'run orchestrator through a full task lifecycle, verify audit entries'
      met: false
    - description: 'Sensitive data (tokens, secrets) is redacted from audit entries'
      validation: check audit entries contain no raw tokens or secrets
      met: false
    tasks:
    - id: p85.d2.t1
      title: Instrument orchestrator modules with audit logging
      status: planned
      description: 'Add audit_log.record() calls to: (1) orchestrator.py: issue pickup, worker spawn, worker completion, loop iteration, (2) spawner.py: workspace creation, agent launch, session end, (3)
        executor.py: pipeline start, node execution, pipeline completion, (4) safety.py: approval request, approval decision (approve/deny), (5) pr_automation.py: PR creation, PR merge, (6) config_watcher.py
        (phase 22): config change events. Each call includes full context (session_id, role, issue, action). Implement redaction: strip API keys, tokens, and file content from action_detail field.'
      dependencies:
      - p85.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/spawner.py'
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/spawner.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Compliance reporting and forensics
    description: Create compliance reports and forensic analysis tools
    status: planned
    acceptance_criteria:
    - description: Can generate compliance report for a date range
      validation: 'run report for last 30 days, verify it covers all action types'
      met: false
    - description: Can reconstruct the chain of events for a specific issue
      validation: 'trace a completed issue, verify full action chain is recovered'
      met: false
    tasks:
    - id: p85.d3.t1
      title: Add compliance reporting to audit_log.py
      status: planned
      description: 'Add reporting methods to audit_log.py: (1) compliance_report(start, end): generates markdown report with: total actions by type, unique agents/sessions, approval rate, merge rate, config
        changes, policy violations, summary statistics, (2) issue_timeline(issue_id): reconstructs full action chain for an issue with timestamps and outcomes, (3) agent_activity(session_id): all actions
        by a specific agent session, (4) anomaly_detection(): flag unusual patterns (sudden spike in actions, denied approvals, config changes outside maintenance windows). Add compliance report to weekly
        maintenance cron (phase 66).'
      dependencies:
      - p85.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/audit_log.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/audit_log.py'
  - name: Audit trail tests
    description: 'Test audit logging, verification, and reporting'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover hash chain integrity, tampering detection, and reporting'
      validation: 'python3 -m pytest test_audit_log.py -v'
      met: false
    tasks:
    - id: p85.d4.t1
      title: Create test_audit_log.py
      status: planned
      description: 'Create test_audit_log.py: (1) test append and verify clean chain, (2) test tampering detection (modify entry, verify chain breaks), (3) test query filtering by role, action, time range,
        (4) test compliance report generation, (5) test issue timeline reconstruction, (6) test redaction of sensitive data, (7) test anomaly detection with injected anomalies, (8) test CLI commands, (9)
        test concurrent appends (multiple sessions writing simultaneously).'
      dependencies:
      - p85.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_audit_log.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/test_audit_log.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-85'
    type: soft
    reason: Audit trail instruments the orchestrator loop from phase 4
  - source: 'phase-8'
    target: 'phase-85'
    type: soft
    reason: 'Audit trail complements execution history from phase 8 with tamper-proof logging'
  - source: 'phase-15'
    target: 'phase-85'
    type: soft
    reason: Safety policies from phase 15 generate approval events that must be audited
  - source: 'phase-35'
    target: 'phase-85'
    type: hard
    reason: 'Dark factory mode from phase 35 requires audit trail as a prerequisite -- 0% human review means the audit log is the only accountability mechanism'
  - source: 'phase-52'
    target: 'phase-85'
    type: soft
    reason: 'Provenance tracking from phase 52 and audit trail both track agent actions -- they should share data'
  technical_notes: 'Cryptographic hash chaining provides tamper detection without requiring a blockchain or external trust anchor. SHA-256 is sufficient for this use case. The audit log is append-only by
    convention (the module only provides append and verify methods, no delete or modify). For enterprise compliance, the audit log can be exported and stored in immutable storage (WORM drive, cloud immutable
    bucket). The key insight from the research: dark factory mode is only viable when there is a complete record of what happened. The audit trail is the accountability layer that makes autonomous operation
    acceptable to organizations.'
  risks:
  - 'Audit logging adds overhead to every operation -- keep entries compact and batch writes'
  - 'Hash chain verification is O(n) -- cache verified state and only verify new entries incrementally'
  - 'Audit log could grow very large at Gas Town scale -- implement rotation/archival for old entries'
  - 'Sensitive data redaction may miss custom secrets -- provide redaction rules configuration'
  scope_lines_total: 500
  test_target: 10
- id: 'phase-86'
  title: Orchestrator Feature Flags and Gradual Rollout
  status: planned
  goal: Create a feature flag system for safely rolling out new orchestrator behaviors with automatic rollback
  description: 'The research highlights Elixir/BEAM''s "hot code reloading" as a key feature of the Symphony reference implementation -- the ability to update the system without interrupting active agent
    sessions. Phase 22 (config hot-reload) handles configuration changes, but feature flags serve a different purpose: they allow new behaviors to be rolled out gradually to a percentage of tasks, with
    automatic rollback if error rates increase. This is essential for safely evolving the orchestrator as it grows to 80+ modules. This phase creates a feature flag system that: (1) defines flags with rollout
    percentages and target criteria, (2) evaluates flags per-task to determine which behaviors are active, (3) monitors error rates per flag and auto-rollbacks on degradation, (4) provides CLI for flag
    management and rollout control.'
  deliverables:
  - name: Feature flag engine
    description: 'Define, evaluate, and manage feature flags for orchestrator behaviors'
    status: planned
    acceptance_criteria:
    - description: Flags can be defined with rollout percentage and targeting rules
      validation: 'create flag with 10% rollout, verify evaluation distribution'
      met: false
    - description: Flag evaluation is deterministic per task (same task always gets same result)
      validation: 'evaluate same task twice, verify consistent result'
      met: false
    tasks:
    - id: p86.d1.t1
      title: Create feature_flags.py module
      status: planned
      description: 'Python module implementing feature flags: (1) flag definition: name, description, enabled (bool), rollout_percentage (0-100), targeting_rules (issue_labels, repos, agent_roles), created_at,
        created_by, (2) evaluation: given a task context (issue_id, labels, repo, role), determine if flag is active using: hash(issue_id + flag_name) % 100 < rollout_percentage, (3) flag storage: ~/.orchestrator/feature_flags.json,
        (4) support flag variants (not just on/off) for A/B testing: variant_a, variant_b with different rollout percentages. CLI: python3 feature_flags.py list, create <name> --rollout 10, enable <name>,
        disable <name>, rollout <name> --percentage 50, evaluate <name> --issue 42, stats <name>.'
      files:
      - '~/zion/projects/agent-orchestration/feature_flags.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/feature_flags.py'
  - name: 'Flag monitoring and auto-rollback'
    description: Monitor error rates per flag and automatically rollback on degradation
    status: planned
    acceptance_criteria:
    - description: Can detect error rate increase for a specific flag
      validation: 'enable flag, inject failures, verify detection'
      met: false
    - description: 'Auto-rollback disables flag when error threshold exceeded'
      validation: 'set threshold to 5%, inject 6% failure rate, verify flag disabled'
      met: false
    tasks:
    - id: p86.d2.t1
      title: 'Add monitoring and auto-rollback to feature_flags.py'
      status: planned
      description: 'Add flag monitoring: (1) track per-flag metrics: total_evaluations, total_errors, error_rate, avg_duration, last_error_time, (2) configurable thresholds: max_error_rate (default 10%),
        min_sample_size (default 20 tasks), rollback_action (disable flag / revert to previous rollout), (3) evaluation hook: after each task completion, if flag was active, update flag metrics, (4) auto-rollback:
        if error_rate exceeds threshold for min_sample_size tasks, execute rollback_action and log the event, (5) alerting: print warning to orchestrator log when rollback occurs. CLI: python3 feature_flags.py
        monitor, rollback <name>, set-threshold <name> --max-error-rate 5.'
      dependencies:
      - p86.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/feature_flags.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/feature_flags.py'
  - name: Integration with orchestrator modules
    description: Wire feature flags into key orchestrator decision points
    status: planned
    acceptance_criteria:
    - description: At least 5 orchestrator behaviors are controlled by feature flags
      validation: 'list flags, verify they control distinct behaviors'
      met: false
    tasks:
    - id: p86.d3.t1
      title: Integrate feature flags into orchestrator decision points
      status: planned
      description: 'Add flag checks to orchestrator modules: (1) orchestrator.py: "speculative_execution" flag controls whether phase 28 speculative execution is active for a task, (2) executor.py: "context_seeding"
        flag controls whether phase 82 context seeding is active, (3) spawner.py: "auto_rebase" flag controls whether merge queue auto-rebase is active, (4) safety.py: "auto_approve" flag controls whether
        certain low-risk actions skip approval, (5) garbage_collector.py: "auto_fix" flag controls whether GC auto-fixes issues or just reports them. Each flag check: evaluate flag for current task context,
        log flag evaluation result in execution history.'
      dependencies:
      - p86.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/executor.py'
    scope_lines: 60
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/executor.py'
  - name: Feature flag tests
    description: 'Test flag evaluation, monitoring, auto-rollback, and integration'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover flag evaluation distribution, monitoring accuracy, and auto-rollback'
      validation: 'python3 -m pytest test_feature_flags.py -v'
      met: false
    tasks:
    - id: p86.d4.t1
      title: Create test_feature_flags.py
      status: planned
      description: 'Create test_feature_flags.py: (1) test flag creation and storage, (2) test evaluation distribution (1000 evaluations at 10% rollout should be ~100 active, chi-squared test), (3) test
        deterministic evaluation (same issue always gets same result), (4) test targeting rules (label-based, repo-based), (5) test error rate monitoring, (6) test auto-rollback triggers at threshold, (7)
        test variant rollout distribution, (8) test integration with orchestrator.py (flag controls behavior), (9) test CLI commands, (10) test edge cases: 0% rollout (never active), 100% rollout (always
        active), flag disabled mid-task.'
      dependencies:
      - p86.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_feature_flags.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/test_feature_flags.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-86'
    type: soft
    reason: Feature flags control orchestrator loop behaviors from phase 4
  - source: 'phase-22'
    target: 'phase-86'
    type: soft
    reason: 'Config hot-reload from phase 22 can reload flag configuration without restart'
  - source: 'phase-28'
    target: 'phase-86'
    type: soft
    reason: Speculative execution from phase 28 is a prime candidate for gradual rollout via feature flags
  - source: 'phase-29'
    target: 'phase-86'
    type: soft
    reason: A/B testing from phase 29 benefits from feature flag variant support
  technical_notes: 'Feature flags use deterministic hash-based evaluation (hash of issue_id + flag_name) rather than random assignment. This ensures the same task always gets the same flag evaluation, even
    across orchestrator restarts. The rollout percentage controls what fraction of new tasks see the new behavior. Existing tasks continue with their original evaluation. Auto-rollback is a safety net --
    it should be configured conservatively (high error threshold, sufficient sample size) to avoid false positives. The research''s Elixir hot code reloading is about updating code without restart; feature
    flags achieve a similar goal at the behavior level -- enabling new behaviors without code deployment.'
  risks:
  - 'Feature flags add conditional logic that makes code harder to understand -- limit flag checks to integration points'
  - 'Auto-rollback could disable a flag that is working correctly due to unrelated failures -- require manual review before rollback'
  - 'Too many flags create configuration complexity -- retire flags after full rollout (100% for 2+ weeks)'
  - 'Flag evaluation must be fast -- cache flag definitions and only reload on change'
  scope_lines_total: 450
  test_target: 10
- id: 'phase-87'
  title: Code Quality Metrics and Technical Debt Tracking
  status: planned
  goal: 'Track code quality trends (complexity, duplication, dead code, coverage) across agent-generated PRs to measure whether agent-legibility is improving or eroding'
  description: 'The research describes the end-state as "Agent-Legible Software" and emphasizes that structural tests and custom linters enforce code quality. Phase 17 (structural invariants) checks architectural
    rules and phase 10 (garbage collection) scans for convention violations, but neither measures code quality trends over time. As agents generate code at scale (the research''s Dark Factory model produces
    1M+ LOC), code quality can drift: complexity creeps up, duplication accumulates, dead code lingers, and test coverage decays. This phase creates a code quality metrics system that: (1) computes per-PR
    quality deltas (complexity change, new duplication, coverage delta), (2) tracks trends over time (weekly/monthly quality scores), (3) flags files or modules with degrading quality, (4) feeds metrics
    into the health scorecard (phase 44) and self-improvement loop (phase 19), (5) integrates with the PR automation (phase 13) to show quality impact on every PR. This provides the quantitative signal
    needed to answer "is agent-generated code getting better or worse over time?"'
  deliverables:
  - name: Code quality analyzer
    description: Module that computes code quality metrics for changed files in a PR
    status: planned
    acceptance_criteria:
    - description: 'Computes cyclomatic complexity, duplication ratio, dead code ratio, and test coverage for given files'
      validation: 'run analyzer on test files, verify metrics output'
      met: false
    - description: 'Outputs structured JSON with per-file and aggregate metrics'
      validation: check output format
      met: false
    tasks:
    - id: p87.d1.t1
      title: Create code_quality.py module
      status: planned
      description: 'Python module implementing code quality analysis: (1) complexity: use radon or simple AST-based cyclomatic complexity for Python, line-based heuristic for other languages, (2) duplication:
        use jaccard similarity on code blocks (normalize whitespace, compare 6-line windows), (3) dead code: detect unreachable code (Python AST), unused imports (ast parse), functions/methods with no callers
        (grep for references), (4) coverage: read .coverage or pytest-cov output, compute per-file coverage percentage, (5) aggregate: project-level quality score (weighted average: complexity 25%, duplication
        25%, dead code 25%, coverage 25%). CLI: python3 code_quality.py analyze --files file1.py,file2.py --base main --pr-branch feature. Output JSON with per-file and aggregate metrics.'
      files:
      - '~/zion/projects/agent-orchestration/code_quality.py'
    scope_lines: 200
    scope_files:
    - '~/zion/projects/agent-orchestration/code_quality.py'
  - name: Quality trend tracker
    description: Track quality metrics over time and detect degradation trends
    status: planned
    acceptance_criteria:
    - description: Stores historical quality metrics and computes trends
      validation: 'run analyzer multiple times, verify trend computation'
      met: false
    - description: Alerts when quality degrades beyond threshold
      validation: 'inject degrading metrics, verify alert'
      met: false
    tasks:
    - id: p87.d2.t1
      title: Create quality_trends.py module
      status: planned
      description: 'Python module implementing quality trend tracking: (1) after each PR analysis, append metrics to ~/.orchestrator/quality_history.jsonl (pr_number, date, metrics_per_file, aggregate_score),
        (2) compute trends: weekly average score, week-over-week delta, rolling 4-week moving average, (3) degradation detection: alert if moving average drops by >5% in any single metric over 2 weeks,
        (4) per-module tracking: track quality per top-level directory to identify which parts of the codebase are degrading, (5) CLI: python3 quality_trends.py report --period weekly --top 10 modules,
        trend --metric complexity --weeks 4, alert --threshold 5. Output as markdown table with trend arrows.'
      dependencies:
      - p87.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/quality_trends.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/quality_trends.py'
  - name: Integration with PR automation and health scorecard
    description: Wire quality metrics into PR workflow and health monitoring
    status: planned
    acceptance_criteria:
    - description: PR comments include quality impact summary
      validation: 'create test PR, verify quality comment appears'
      met: false
    - description: Health scorecard includes code quality trend
      validation: check health scorecard output for quality section
      met: false
    tasks:
    - id: p87.d3.t1
      title: Integrate code_quality into pr_automation and health_monitor
      status: planned
      description: 'Modify pr_automation.py: (1) after PR creation, run code_quality.py analyze on changed files, (2) post quality summary as PR comment: "Code Quality Impact: complexity +2.1 (was 4.3,
        now 6.4), duplication 0%, dead code removed: 15 lines, coverage: 78% (+2%).", (3) if quality degrades beyond thresholds, flag for human review. Modify health_monitor.py: (1) add code_quality section
        to health report, (2) include 4-week trend for each metric, (3) flag degrading modules. Add quality metrics to velocity_metrics.py (phase 59) for ROI correlation.'
      dependencies:
      - p87.d2.t1
      - p13.d1.t1
      - p14.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/pr_automation.py'
      - '~/zion/projects/agent-orchestration/health_monitor.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/pr_automation.py'
    - '~/zion/projects/agent-orchestration/health_monitor.py'
  - name: Code quality tests
    description: 'Test quality analyzer, trend tracker, and integration'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover quality computation, trend analysis, and PR integration'
      validation: 'python3 -m pytest test_code_quality.py -v'
      met: false
    tasks:
    - id: p87.d4.t1
      title: Create test_code_quality.py
      status: planned
      description: 'Create test_code_quality.py: (1) test complexity computation on simple functions (expected values), (2) test duplication detection with known duplicate blocks, (3) test dead code detection
        (unused import, unreachable code), (4) test coverage parsing from mock .coverage data, (5) test aggregate scoring with weighted metrics, (6) test trend computation: inject 4 weeks of data, verify
        moving average and degradation detection, (7) test PR comment formatting, (8) test edge cases: empty files, binary files, non-Python files (skip with message).'
      dependencies:
      - p87.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_code_quality.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/test_code_quality.py'
  dependencies:
  - source: 'phase-10'
    target: 'phase-87'
    type: soft
    reason: Convention scanning from phase 10 provides baseline quality data that metrics build on
  - source: 'phase-13'
    target: 'phase-87'
    type: soft
    reason: PR automation from phase 13 is the integration point for quality metrics on PRs
  - source: 'phase-17'
    target: 'phase-87'
    type: soft
    reason: 'Structural invariants from phase 17 provide architectural quality signals complementary to code-level metrics'
  - source: 'phase-44'
    target: 'phase-87'
    type: soft
    reason: Health scorecard from phase 44 should include code quality trends as a quality signal
  technical_notes: 'This phase is the "is it working?" measurement layer. The research claims 10x velocity but warns that speed without quality is worthless. The code quality metrics answer: are agents
    producing clean code or accumulating technical debt? Use radon for Python complexity (pip install radon). For other languages, use line-based heuristics (lines per function, nesting depth, comment ratio).
    Duplication detection should be fast (<5s for typical PRs) since it runs on every PR.'
  risks:
  - 'Quality analysis could be slow on large PRs -- limit to changed files only, not full codebase'
  - 'Duplication detection has high false-positive rate -- tune similarity threshold and require minimum block size'
  - 'Coverage data may not exist for all projects -- graceful fallback to "coverage': unknown"
  scope_lines_total: 550
  test_target: 10
- id: 'phase-88'
  title: Automated Documentation Synchronization
  status: planned
  goal: 'Keep project documentation in sync with code changes by auto-detecting documentation drift and updating affected docs as part of the agent pipeline'
  description: 'The research emphasizes "Application Legibility" -- making software "directly understandable and verifiable by agents." Documentation is a core component of legibility: README, API docs,
    inline comments, and code examples should reflect the current state of the codebase. Phase 12 (agent self-documentation) generates AI_GUIDE.md but does not keep other docs in sync. When agents modify
    functions, rename classes, add parameters, or change behavior, the documentation often becomes stale. This phase creates a documentation synchronization system that: (1) detects documentation drift
    (docstrings that don''t match signatures, README examples that don''t work, changelog gaps), (2) auto-updates affected documentation as a pipeline step, (3) tracks documentation coverage over time (which
    files have docs, which don''t), (4) integrates with the garbage collection loop (phase 10) for periodic doc freshness checks. This directly supports the research''s vision of "Agent-Legible Software."'
  deliverables:
  - name: Documentation drift detector
    description: Module that detects when documentation is out of sync with code
    status: planned
    acceptance_criteria:
    - description: Detects docstrings that don't match function signatures
      validation: 'modify a function signature, verify drift detected'
      met: false
    - description: Detects stale code examples in README files
      validation: 'change an API, verify README example flagged'
      met: false
    tasks:
    - id: p88.d1.t1
      title: Create doc_sync.py module
      status: planned
      description: 'Python module implementing documentation drift detection: (1) Python docstring check: parse function/method signatures with AST, compare parameter names in docstring (Google/Sphinx/numpy
        style) against actual parameters, flag mismatches, (2) README example check: extract code blocks from README.md, attempt to parse/run them (syntax check at minimum, execution if safe), flag broken
        examples, (3) module doc check: verify each Python module has a docstring, (4) API doc check: if sphinx/mkdocs config exists, check that all public symbols are documented, (5) changelog check: compare
        git log since last changelog entry, flag unreleased changes. CLI: python3 doc_sync.py check --scope pr --base main. Output: list of drift items with file, line, type, description, suggested fix.'
      files:
      - '~/zion/projects/agent-orchestration/doc_sync.py'
    scope_lines: 180
    scope_files:
    - '~/zion/projects/agent-orchestration/doc_sync.py'
  - name: 'Auto-documentation updater'
    description: Automatically update stale documentation based on code changes
    status: planned
    acceptance_criteria:
    - description: 'Can auto-fix docstring parameter mismatches'
      validation: 'inject mismatch, run updater, verify fix'
      met: false
    - description: Generates docstring stubs for undocumented functions
      validation: 'add undocumented function, run updater, verify stub created'
      met: false
    tasks:
    - id: p88.d2.t1
      title: 'Add auto-fix to doc_sync.py'
      status: planned
      description: 'Add auto-fix capabilities to doc_sync.py: (1) fix_docstrings: update parameter lists in docstrings to match actual signatures, add missing parameter docs, remove stale parameters, (2)
