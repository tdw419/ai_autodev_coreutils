- id: phase-28
  title: Speculative Execution and Parallel Exploration
  status: planned
  goal: Enable the orchestrator to run multiple solution strategies in parallel and select the best outcome
  description: 'The Harness Engineering research describes running "100 parallel Ralph
    Wiggum loops to explore different architectural approaches, only keeping the one
    that passes the most rigorous quality gates." The current orchestrator assigns
    one worker per issue with one pipeline. This phase adds speculative execution:
    for complex issues, spawn multiple workers with different strategies (different
    roles, different prompts, different pipeline templates), run them in parallel,
    evaluate outcomes against quality gates, and keep the best result. This transforms
    the orchestrator from a single-path executor into a multi-strategy optimizer,
    directly applying the "code is disposable" philosophy from the Dark Factory model.

    '
  deliverables:
  - name: Strategy definition system
    description: Define multiple solution strategies per issue type that the orchestrator can execute in parallel
    status: planned
    acceptance_criteria:
    - description: Can define 2+ strategies for a given issue type with different roles, prompts, and pipelines
      validation: read strategy YAML configs
      met: false
    tasks:
    - id: p28.d1.t1
      title: Create strategy YAML schema and loader
      status: planned
      description: 'Define strategies/ directory with YAML files. Each strategy specifies:
        name, applicable_labels (which issue types it handles), role_override (different
        role than default), prompt_additions (extra context for this strategy), pipeline
        (which pipeline template to use), weight (priority for resource allocation),
        quality_threshold (minimum score to be considered). Create a strategies.py
        loader that matches issues to applicable strategies. Default strategies: conservative
        (implementer + standard pipeline), aggressive (implementer + team pipeline),
        exploratory (coordinator plan first, then implement).'
      files:
      - ~/zion/projects/agent-orchestration/strategies/
      - ~/zion/projects/agent-orchestration/strategies.py
    scope_lines: 120
    scope_files:
    - ~/zion/projects/agent-orchestration/strategies/
    - ~/zion/projects/agent-orchestration/strategies.py
