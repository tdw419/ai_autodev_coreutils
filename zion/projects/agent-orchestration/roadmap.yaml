- id: 'phase-101'
  title: Orchestrator Data Lifecycle and Retention
  status: planned
  goal: 'Implement automated retention policies, log rotation, and storage management for all orchestrator data'
  description: 'With 20+ phases producing persistent data (execution logs, workspace state, merge queue, cost tracking, health history, knowledge base, session recordings, audit trail, etc.), storage grows
    unboundedly. The research describes a system running 24/7, constantly refactoring, testing, and improving its own codebase -- such a system generates significant data volume over time. No existing phase
    handles retention policies, log rotation, archive strategies, or storage cleanup. Without data lifecycle management, the orchestrator will eventually consume all available disk space and degrade performance.
    This phase creates a unified data lifecycle manager that classifies data by retention tier, automatically archives or deletes old data, provides storage usage reporting, and ensures compliance with
    data retention requirements.'
