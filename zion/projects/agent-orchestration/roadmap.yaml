      status: planned
      description: 'Add detect_orphans() function to workspace_manager.py: (1) find all workspaces with status "in-progress" or "active", (2) check if the orchestrator process that created them is still
        running (via PID stored in meta.json, if available), (3) check if the workspace has recent file activity (any changes in the last N minutes), (4) classify orphans as: recoverable (has checkpoint,
        can resume), stale (no recent activity, needs attention), or zombie (process dead, no checkpoint, needs manual review). Add --detect-orphans CLI flag.'
      files:
