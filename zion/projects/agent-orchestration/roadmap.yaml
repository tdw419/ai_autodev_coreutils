  - source: 'phase-81'
    target: 'phase-105'
    type: soft
    reason: 'Plugin system (phase 81) defines the module interface that deployment profiles toggle'
  technical_notes: 'The package restructuring is a refactor, not a rewrite -- all existing module logic stays the same, only import paths change. Backward compatibility scripts ensure the transition is seamless. Deployment profiles work by having each module check if it is enabled in the active profile at import time, not by physically excluding files.'
  risks:
  - 'Import path changes could break external references to existing scripts -- backward compat wrappers are essential'
  - 'Package dependencies could conflict with target project dependencies -- use virtual environments'
  - 'Profile system adds a layer of indirection that could confuse debugging -- always show active profile in status output'
