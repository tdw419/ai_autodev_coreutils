        has version numbers, that examples are in fenced code blocks with language tags, (4) validate_consistency(parsed): check that tech_stack languages match example code block languages, that commands
        reference tools that exist in tech_stack, (5) score_agent_md(filepath): return 0-100 compliance score with breakdown by category.'
