    description: 'Test profiler, optimizer, and recommender'
    status: planned
    acceptance_criteria:
    - description: 'Tests cover profiling accuracy, optimization suggestions, and recommendations'
      validation: 'python3 -m pytest test_agent_profiler.py -v'
      met: false
    tasks:
    - id: p90.d4.t1
      title: Create test_agent_profiler.py
      status: planned
      description: 'Create test_agent_profiler.py: (1) test profiling with mock execution history (10 tasks, 3 roles, 2 strategies), verify per-group metrics are correct, (2) test outlier detection (inject
        1 excellent and 1 terrible config, verify both flagged), (3) test prompt versioning and comparison with mock prompt versions, (4) test underperform detection with mock prompts (success rates 50%,
        80%, 95%), (5) test recommender: create task similar to a past successful task, verify it recommends the same config, (6) test confidence scoring: verify low confidence for unique tasks, high confidence
        for common task types, (7) test edge cases: empty history, single task, all failures.'
      dependencies:
      - p90.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_agent_profiler.py'
    scope_lines: 120
    scope_files:
    - '~/zion/projects/agent-orchestration/test_agent_profiler.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-90'
    type: soft
    reason: Execution history from phase 8 is the primary data source for profiling
  - source: 'phase-19'
    target: 'phase-90'
    type: soft
    reason: 'Self-improvement from phase 19 consumes profiling insights for optimization recommendations'
  - source: 'phase-29'
    target: 'phase-90'
    type: soft
    reason: A/B testing from phase 29 generates the comparison data that profiling analyzes
  - source: 'phase-62'
    target: 'phase-90'
    type: soft
    reason: Prompt engineering library from phase 62 provides the prompt templates that profiling evaluates
  technical_notes: 'This phase is the "intelligence layer" on top of all the execution data. The research emphasizes that "the strategic advantage no longer belongs to those with the largest models, but
    to those with the most effective system around them." Agent profiling is how you know your system is effective: by measuring, not guessing. The recommender is the practical output -- for each new task,
    the orchestrator can say "for tasks like this, role X with strategy Y has an 87% success rate in 12 turns on average." This is the data-driven optimization that the Dark Factory experiment achieved
    through intuition, now systematized.'
  risks:
  - 'Profiling requires sufficient history to be meaningful -- recommendations should show confidence scores and fall back to defaults when data is sparse'
  - 'Prompt optimization suggestions are heuristic, not guaranteed -- present as recommendations, not mandates'
  - 'Task similarity is approximate (keyword-based) -- could miss semantic similarity, acceptable for v1'
