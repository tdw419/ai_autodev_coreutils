        on: category match (same issue type), keyword overlap (similar terms in issue vs pattern description), effectiveness (prefer patterns from successful runs), recency (prefer recent patterns), (3)
        format_pattern(pattern) -- convert a pattern to a concise agent-readable context string suitable for inclusion in the AI node prompt, (4) --similar flag to find patterns from the same repo (intra-project
