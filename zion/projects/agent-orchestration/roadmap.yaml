    -- at the scale of hundreds to low thousands of entries, this is fast enough. If the store grows beyond 10K entries, consider upgrading to faiss-cpu for approximate nearest neighbor search. The memory
    decay feature is important: without it, the store grows unbounded and retrieval quality degrades as irrelevant old entries dilute search results. Default retention: 90 days, configurable per project.'
