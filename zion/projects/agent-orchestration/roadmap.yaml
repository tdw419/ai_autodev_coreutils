  - source: 'phase-14'
    target: 'phase-72'
    type: soft
    reason: Health monitoring from phase 14 produces metrics that should be exported
  - source: 'phase-32'
    target: 'phase-72'
    type: soft
    reason: Cost tracking from phase 32 produces token/cost metrics that should be exported
  - source: 'phase-44'
    target: 'phase-72'
    type: soft
    reason: Health scorecard from phase 44 defines the KPIs that metrics should track
  - source: 'phase-70'
    target: 'phase-72'
    type: soft
    reason: Backpressure signals from phase 70 should be exposed as metrics
  technical_notes: 'The metrics pipeline is the final piece of the observability stack. The research describes a "Phoenix-based live observability dashboard" — this phase provides the data layer that any
    dashboard (Grafana, custom, terminal) can consume. Using Prometheus format is the industry standard and enables integration with the entire Prometheus/Grafana ecosystem (alerting rules, recording rules,
    Thanos for long-term storage). The stdlib HTTP server keeps dependencies minimal — no Flask, no FastAPI, no gunicorn. For production, users typically put Prometheus behind a reverse proxy with TLS.'
  risks:
  - 'Metrics collection adds overhead to every operation — keep recording fast (in-memory, batched)'
  - 'High-cardinality labels (e.g. per-issue) can explode Prometheus storage — use low-cardinality labels only'
