- id: 'phase-97'
  title: 'Multi-Session Task Chaining with Context Marshaling'
  status: planned
  goal: 'Enable long-running tasks to span multiple agent sessions with automatic context handoff, implementing the research''s core pattern of persistence through externalized artifacts'
  description: 'The research describes the Ralph Wiggum pattern where agents run in autonomous loops until completion, with context reset at every iteration to stay in the "smart zone." While phase 20 handles
    context window budgeting and phase 65 handles stop hooks for single-session loops, no phase implements the CHAINING pattern -- where a task too large for one session is automatically decomposed across
    multiple sessions, with each session''s output becoming the next session''s input. The research specifically highlights this as the key to handling "large-scale refactors or complex migrations" that
    exceed single-session capacity. This phase creates the session chain manager that: detects when a task needs multi-session execution, saves intermediate state (partial results, decisions made, files
    modified), creates a new session with marshaled context sized to fit the smart zone, and tracks the chain of sessions for a single logical task.'
  deliverables:
  - name: Session chain manager core
    description: 'Module that manages multi-session task chains with automatic context marshaling between sessions'
    status: planned
    acceptance_criteria:
    - description: Creates session chains with unique chain IDs tracking all sessions for a logical task
      validation: 'create_chain returns chain_id, list_sessions(chain_id) shows all sessions'
      met: false
    - description: 'Marshals context between sessions (partial results, modified files, decisions)'
      validation: 'end_session saves state, begin_next_session loads it correctly'
      met: false
    - description: Respects context budget from phase 20 when constructing session prompts
      validation: marshaled context fits within configured budget limit
      met: false
    tasks:
    - id: p97.d1.t1
      title: Create session_chain.py
      status: planned
      description: 'Create session_chain.py with: (1) create_chain(task_description, workspace_path): initialize a new chain with chain_id (UUID), store metadata in ~/.orchestrator/chains/{chain_id}/chain.json,
        (2) start_session(chain_id, prompt): create a new session within the chain, generate context_brief from previous sessions (using context_budget module from phase 20), store session metadata, (3)
        end_session(chain_id, session_id, result): save session outcome -- files_modified (git diff names), decisions_made (extracted from agent output), partial_results (key findings or progress notes),
        next_steps (what remains to be done), (4) get_chain_context(chain_id, max_tokens): marshal context from all previous sessions into a brief that fits within max_tokens, prioritizing: task description
        (always included), last session outcome (always included), cumulative file change list (truncated if needed), key decisions (summarized), (5) is_chain_complete(chain_id): check if the original task
        description has been fulfilled based on completion criteria in last session outcome, (6) list_chains(): list all active and completed chains with status, session count, total duration.'
      files:
      - '~/zion/projects/agent-orchestration/session_chain.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/session_chain.py'
  - name: 'Chain-aware orchestrator integration'
    description: 'Extend the orchestrator to detect tasks needing multi-session execution and manage chains'
    status: planned
    acceptance_criteria:
    - description: 'Orchestrator detects when a task exceeds single-session capacity and creates a chain'
      validation: 'large issue triggers chain creation instead of single-session execution'
      met: false
    - description: Chain progress is visible in status dashboard
      validation: status.sh shows active chains with session counts
      met: false
    tasks:
    - id: p97.d2.t1
      title: Integrate session chains into orchestrator
      status: planned
      description: 'Extend orchestrator.py: (1) add task_size_estimator(task_description, workspace): estimate whether a task needs multi-session execution based on: description length, number of files
        likely affected (from grep), historical data for similar tasks (from execution history phase 8), (2) if estimated as multi-session, create_chain and run first session, (3) after first session completes,
        check is_chain_complete, if not complete, schedule next session via cron with chained context, (4) chain_status in orchestrator state: active_chains count, chains_completed count, average_sessions_per_chain,
        (5) update status.sh to show chain information: chain_id, task title, sessions completed, estimated remaining sessions, current status.'
      dependencies:
      - p97.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/orchestrator.py'
      - '~/zion/projects/agent-orchestration/status.sh'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/orchestrator.py'
    - '~/zion/projects/agent-orchestration/status.sh'
  - name: Chain context DAG pipeline node
    description: 'Add CHAIN_CONTEXT node type to DAG executor for multi-session pipeline steps'
    status: planned
    acceptance_criteria:
    - description: CHAIN_CONTEXT node resumes a chain and provides marshaled context to downstream AI nodes
      validation: pipeline with chain_context node correctly loads previous session context
      met: false
    - description: CHAIN_COMPLETE node checks if a chain is done and branches pipeline accordingly
      validation: pipeline branches on chain completion status
      met: false
    tasks:
    - id: p97.d3.t1
      title: Add chain nodes to DAG executor
      status: planned
      description: 'Extend dag.py executor: (1) CHAIN_CONTEXT node type: {type: chain_context, chain_id: "auto" | "<uuid>", max_tokens: 8000}, loads chain context and injects into pipeline context for downstream
        AI nodes, (2) CHAIN_COMPLETE node type: {type: chain_complete, chain_id: "auto"}, checks if chain is complete, outputs boolean to pipeline context for conditional branching (Dependency node), (3)
        CHAIN_END_SESSION node type: {type: chain_end_session, chain_id: "auto"}, saves current session results to chain, (4) add multi-session-pipeline.yaml template: AI(plan) -> BASH(test plan) -> CHAIN_CONTEXT
        -> AI(implement batch 1) -> CHAIN_END_SESSION -> CHAIN_COMPLETE -> [if not complete] -> loop back to CHAIN_CONTEXT, (5) chain nodes integrate with execution log (phase 8) for full traceability.'
      dependencies:
      - p97.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/dag.py'
      - '~/zion/projects/agent-orchestration/pipelines/multi-session-pipeline.yaml'
