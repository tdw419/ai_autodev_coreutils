- id: 'phase-103'
  title: Agent-Ready Issue Filing and Speculative Ticket CLI
  status: planned
  goal: 'Provide a CLI tool for operators to quickly create well-structured agent-ready issues, enabling the "speculative ticket filing" workflow described in the Symphony research'
  description: 'The Symphony research describes the key workflow shift that drives the 500% PR increase: "engineers shifted from supervising single tasks to filing speculative tickets and reviewing completed work." The orchestrator consumes agent-ready
    issues (phase 4 poller), but no phase helps operators create them efficiently. Currently, filing a well-structured agent-ready issue requires manually writing a title, description, acceptance criteria, and applying the correct labels and assignees.
    This phase creates a CLI tool that: (1) provides interactive and non-interactive modes for filing agent-ready issues, (2) offers issue templates for common task types (bug fix, feature, refactor, test, docs), (3) auto-derives acceptance
    criteria from the issue description, (4) applies the correct labels, (5) supports bulk filing from a YAML manifest for speculative exploration (filing 5 variants of a task to let the orchestrator try multiple approaches), and (6) validates
    issue structure against the agent-ready schema before submission. This is the "input side" of the issue-tracker-as-control-plane pattern, complementing the "output side" handled by the poller.'
  deliverables:
  - name: Issue filing CLI with templates
    description: CLI tool for creating agent-ready issues with templates and validation
    status: planned
    acceptance_criteria:
    - description: Can create a single agent-ready issue from CLI with title, description, and labels
      validation: 'python3 issue_filer.py create --repo owner/repo --title "Fix login bug" --desc "Users cannot login..." --label agent-ready'
      met: false
    - description: Provides at least 5 issue templates for common task types
      validation: 'python3 issue_filer.py templates --list'
      met: false
    tasks:
    - id: p103.d1.t1
      title: Create issue_filer.py with templates
      status: planned
      description: 'Create issue_filer.py: (1) create_issue(repo, title, description, labels, template, acceptance_criteria) uses gh CLI to create a GitHub issue, (2) get_templates() returns built-in templates
        for bug-fix, feature, refactor, test-add, docs-update, each with a description skeleton and suggested acceptance criteria, (3) validate_issue(title, description, labels) checks minimum quality
        (title > 10 chars, description > 50 chars, has acceptance criteria or template), (4) interactive mode prompts for fields with tab-completion from templates, (5) CLI: python3 issue_filer.py create
        [--repo REPO] [--title TITLE] [--desc DESC] [--label LABEL] [--template TYPE] [--accept "crit1,crit2"] [--interactive] [--dry-run].'
      files:
      - '~/zion/projects/agent-orchestration/issue_filer.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/issue_filer.py'
  - name: Bulk speculative filing from YAML manifest
    description: File multiple related issues at once for speculative exploration
    status: planned
    acceptance_criteria:
    - description: Can create multiple issues from a YAML manifest file
      validation: 'python3 issue_filer.py bulk --manifest speculative.yaml --dry-run'
      met: false
    - description: Each issue in the manifest can reference a parent issue for traceability
      validation: 'created issues have "Part of #PARENT" in their body'
      met: false
    tasks:
    - id: p103.d2.t1
      title: Add bulk filing from YAML manifest
      status: planned
      description: 'Extend issue_filer.py: (1) bulk_create(manifest_path) reads a YAML file with a list of issues (title, description, template, labels, parent_issue), (2) each issue body includes
        "Part of #{parent}" if parent is specified, (3) issues are created sequentially with rate limiting (respect GitHub API limits), (4) output includes a summary table with issue numbers and URLs,
        (5) CLI: python3 issue_filer.py bulk --manifest FILE [--dry-run] [--delay SECONDS]. The manifest format: issues: [{title, desc, template, labels, parent, priority}].'
      dependencies:
      - p103.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/issue_filer.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/issue_filer.py'
  - name: Acceptance criteria auto-generation
    description: Generate acceptance criteria from issue description using LLM or heuristic rules
    status: planned
    acceptance_criteria:
    - description: Can auto-generate acceptance criteria from a description
      validation: 'python3 issue_filer.py generate-criteria --desc "Fix the login timeout issue" --type bug-fix'
      met: false
    tasks:
    - id: p103.d3.t1
      title: Add acceptance criteria generation
      status: planned
      description: 'Extend issue_filer.py: (1) generate_criteria(description, issue_type) uses template-based heuristic rules (not LLM) to suggest acceptance criteria, (2) bug-fix template:
        "Reproduction steps documented", "Fix does not break existing tests", "Edge case N handled", (3) feature template: "Acceptance criteria defined", "Tests added", "Documentation updated",
        (4) refactor template: "Behavior unchanged", "Tests pass", "Code complexity reduced", (5) CLI: python3 issue_filer.py generate-criteria --desc DESC --type TYPE [--format json|markdown].'
      dependencies:
      - p103.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/issue_filer.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/issue_filer.py'
  - name: Issue filing tests
    description: Tests for issue filing CLI
    status: planned
    acceptance_criteria:
    - description: Tests cover create, bulk, and criteria generation with dry-run
      validation: 'python3 -m pytest test_issue_filer.py -v'
      met: false
    tasks:
    - id: p103.d4.t1
      title: Create test_issue_filer.py
      status: planned
      description: 'Create test_issue_filer.py: (1) test_template_list: verify all 5+ templates exist with required fields, (2) test_validate_issue: verify validation catches empty title,
        short description, missing labels, (3) test_bulk_manifest_parsing: verify YAML manifest is parsed correctly, (4) test_criteria_generation: verify each template type produces sensible criteria,
        (5) test_dry_run: verify dry-run mode does not create actual issues, (6) test_parent_reference: verify parent issue is referenced in body. All tests use dry-run mode or mock gh CLI.'
      dependencies:
      - p103.d2.t1
      - p103.d3.t1
      files:
      - '~/zion/projects/agent-orchestration/test_issue_filer.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_issue_filer.py'
  dependencies:
  - source: 'phase-4'
    target: 'phase-103'
    type: soft
    reason: Issue filer creates the issues that the orchestrator poller from phase 4 consumes
  - source: 'phase-13'
    target: 'phase-103'
    type: soft
    reason: PR automation from phase 13 closes the loop -- issues filed by 103 are executed by the orchestrator and turned into PRs by 13
  - source: 'phase-26'
    target: 'phase-103'
    type: soft
    reason: Work decomposition from phase 26 may generate sub-issues that benefit from the filing tool
  - source: 'phase-60'
    target: 'phase-103'
    type: soft
    reason: Human-agent workflow optimization from phase 60 benefits from streamlined issue filing
  technical_notes: 'The filing tool uses gh CLI exclusively (no direct GitHub API calls) to stay consistent with the project convention. Templates are YAML-based and user-extensible. The bulk filing
    feature implements the research''s "speculative ticket filing" concept where engineers file multiple variants of a task for the orchestrator to explore in parallel (with phase 28 speculative execution).'
  risks:
  - 'Poorly structured issues waste orchestrator tokens -- the validation step is critical'
  - 'Bulk filing could spam repos with low-quality issues -- require dry-run review first'
  - 'Template quality directly affects agent success rate -- templates need iteration based on actual results'
  - 'Acceptance criteria auto-generation is heuristic-based and may not match project-specific standards'
  scope_lines_total: 410
  test_target: 8
- id: 'phase-104'
  title: Orchestrator Governance and Compliance Reporting
  status: planned
  goal: 'Generate periodic compliance reports summarizing orchestrator activity, enabling organizational accountability for dark factory mode operation'
  description: 'The research describes the Dark Factory model where zero human review occurs before code is merged. This requires robust accountability: stakeholders need to understand what the orchestrator
    did, what changed, what was auto-approved, how much it cost, and whether quality is improving or degrading. Phase 85 (audit trail) logs individual agent actions, Phase 44 (health scorecard) tracks
    system health, and Phase 59 (PR velocity metrics) measures throughput. But no phase synthesizes these signals into a human-readable governance report suitable for stakeholders who don''t read
    logs or dashboards. This phase creates a periodic report generator that produces weekly/monthly governance summaries: agent activity breakdown, auto-approval rates and trends, cost attribution by
    repo/role/task-type, quality trend analysis (review scores, test pass rates, invariant violations), and risk highlights (failed remediations, budget overruns, trust score changes). This makes
    dark factory mode defensible to engineering leadership and compliance teams.'
  deliverables:
  - name: Governance report generator
    description: Module that synthesizes orchestrator data into human-readable compliance reports
    status: planned
    acceptance_criteria:
    - description: Can generate a weekly governance report from execution logs, audit trail, and cost data
      validation: 'python3 governance_report.py generate --period weekly --output report.md'
      met: false
    - description: Report includes sections for activity, cost, quality, and risk
      validation: 'generated report has all 4 sections with data'
      met: false
    tasks:
    - id: p104.d1.t1
      title: Create governance_report.py module
      status: planned
      description: 'Create governance_report.py: (1) generate_report(period, output_format) aggregates data from execution_log (phase 8), audit trail (phase 85), cost_tracker (phase 32), health_scorecard
        (phase 44), and review_sensor (phase 9), (2) report sections: Executive Summary (key metrics, trend arrows), Agent Activity (issues processed, PRs created, by repo/role), Cost Attribution
        (tokens consumed, cost by repo/role/task-type, budget utilization), Quality Trends (review scores over time, test pass rates, invariant violations, trust score changes), Risk Highlights
        (failed remediations, budget overruns, approval escalations, worker crashes), (3) support markdown and JSON output formats, (4) CLI: python3 governance_report.py generate [--period weekly|monthly]
        [--format markdown|json] [--output FILE] [--repo REPO].'
      files:
      - '~/zion/projects/agent-orchestration/governance_report.py'
    scope_lines: 150
    scope_files:
    - '~/zion/projects/agent-orchestration/governance_report.py'
  - name: Trend analysis and anomaly detection
    description: Detect significant changes in orchestrator metrics that warrant attention
    status: planned
    acceptance_criteria:
    - description: Can detect when key metrics change significantly week-over-week
      validation: 'inject metric changes, verify anomaly flags in report'
      met: false
    tasks:
    - id: p104.d2.t1
      title: Add trend analysis to governance reports
      status: planned
      description: 'Extend governance_report.py: (1) compare_current_vs_previous(period) computes week-over-week or month-over-month changes for key metrics, (2) flag_anomalies() highlights metrics
        that changed by >20% or crossed a threshold (e.g., cost doubled, approval rate dropped below 90%, trust score decreased), (3) trend arrows in markdown output (↑↓→) with magnitude, (4) anomaly
        section at top of report with recommended actions ("Review: auto-approval rate dropped 15% -- check for quality regression"), (5) support baseline comparison against configurable thresholds.'
      dependencies:
      - p104.d1.t1
      files:
      - '~/zion/projects/agent-orchestration/governance_report.py'
    scope_lines: 100
    scope_files:
    - '~/zion/projects/agent-orchestration/governance_report.py'
  - name: Scheduled governance reporting cron
    description: Weekly cron job that generates and delivers governance reports
    status: planned
    acceptance_criteria:
    - description: Cron job generates a weekly governance report automatically
      validation: 'cronjob list shows governance-report job'
      met: false
    tasks:
    - id: p104.d3.t1
      title: Create governance reporting cron job
      status: planned
      description: 'Create weekly Hermes cron job that generates a governance report and saves it to ~/zion/projects/agent-orchestration/reports/governance-YYYY-MM-DD.md. Include a summary in the
        cron output for the operator. Schedule weekly on Monday at 08:00 for previous week review.'
      dependencies:
      - p104.d1.t1
      files: []
    scope_lines: 30
    scope_files: []
  - name: Governance report tests
    description: Tests for governance report generation
    status: planned
    acceptance_criteria:
    - description: Tests cover report generation with mock data and anomaly detection
      validation: 'python3 -m pytest test_governance_report.py -v'
      met: false
    tasks:
    - id: p104.d4.t1
      title: Create test_governance_report.py
      status: planned
      description: 'Create test_governance_report.py: (1) test_report_generation: generate report from mock execution/cost/health data, verify all sections present, (2) test_trend_analysis: create
        two periods with known differences, verify trend arrows and percentages, (3) test_anomaly_detection: inject >20% cost increase and >10% quality drop, verify both flagged, (4) test_empty_data:
        generate report with no data, verify graceful handling with "no data" messages, (5) test_markdown_format: verify output is valid markdown with headers and tables, (6) test_json_format:
        verify JSON output is valid and contains all expected keys.'
      dependencies:
      - p104.d2.t1
      files:
      - '~/zion/projects/agent-orchestration/test_governance_report.py'
    scope_lines: 80
    scope_files:
    - '~/zion/projects/agent-orchestration/test_governance_report.py'
  dependencies:
  - source: 'phase-8'
    target: 'phase-104'
    type: soft
    reason: Governance reports read execution history logs from phase 8
  - source: 'phase-32'
    target: 'phase-104'
    type: soft
    reason: Cost tracking data from phase 32 feeds the cost attribution section
  - source: 'phase-44'
    target: 'phase-104'
    type: soft
    reason: Health scorecard data from phase 44 feeds the quality trends section
  - source: 'phase-85'
    target: 'phase-104'
    type: soft
    reason: Audit trail data from phase 85 feeds the activity and risk sections
  - source: 'phase-9'
    target: 'phase-104'
    type: soft
    reason: Review sensor scores from phase 9 feed the quality trends section
  - source: 'phase-59'
    target: 'phase-104'
    type: soft
    reason: PR velocity metrics from phase 59 feed the throughput section
  - source: 'phase-35'
    target: 'phase-104'
    type: hard
    reason: Governance reports are essential before enabling dark factory mode from phase 35
  technical_notes: 'Governance reports aggregate data from multiple existing modules without creating new data sources. The report is designed for human consumption (markdown) with structured output
    (JSON) for programmatic access. Anomaly detection uses simple threshold-based rules rather than ML to keep the system deterministic and auditable.'
  risks:
  - 'Governance reports could expose sensitive information -- respect per-repo visibility settings'
  - 'Anomaly thresholds may need tuning per project -- start conservative (30%) and tighten based on experience'
  - 'Report generation could be slow for high-volume orchestrators -- cache intermediate aggregations'
  - 'Weekly reporting frequency may not catch acute issues -- consider adding alerting for critical anomalies'
  scope_lines_total: 360
  test_target: 8
global_risks:
- 'Symphony/Gas Town/Archon are all rapidly evolving -- this roadmap may need updates as those projects change'
- 'delegate_task sessions are synchronous and bounded by parent turn -- long-running orchestrator tasks need careful design (background terminals or chained cron)'
- 'GitHub Issues as control plane requires a public or accessible repo -- private repo token management adds complexity'
- 'Token costs for autonomous loops can escalate quickly (Symphony team uses 1B tokens/day) -- need cost awareness in the orchestrator'
- Speculative execution (phase 28) can multiply costs if not carefully budgeted
- 'Inter-agent coordination (phase 30) adds complexity that may not be needed at low concurrency levels'
- 'Dark factory mode (phase 35) should only be enabled for well-tested projects with comprehensive safety gates'
- 'Token budget enforcement (phase 32) relies on estimates -- actual costs may differ significantly'
- 'Code quality metrics (phase 87) could slow down PR workflow if analysis takes too long -- keep analysis fast (<10s per PR)'
- 'Documentation sync (phase 88) auto-fix could alter intended docs -- always require human review for prose changes'
- Release automation (phase 89) should gate major version bumps behind human approval to prevent premature breaking releases
- 'Agent profiling (phase 90) recommendations are only as good as the execution history -- sparse data means low-confidence recommendations'
- 'Web dashboard (phase 91) could expose sensitive orchestrator state -- authentication is critical for non-localhost access'
- 'WebSocket connections (phase 91) could accumulate on long-running servers -- implement heartbeat and cleanup'
- 'Dashboard server (phase 91) adds FastAPI/uvicorn as a runtime dependency -- keep it optional'
- 'Mock agent (phase 92) behavior may not match real agent behavior -- focus on testing orchestrator logic, not agent quality'
- 'Dry-run traces (phase 92) could be large for complex pipelines -- implement truncation'
- 'sentence-transformers (phase 93) adds an 80MB dependency -- make it optional, fall back to keyword search'
- 'Vector store (phase 93) could grow large -- implement size limits and automatic compaction'
- 'Cross-project memory (phase 93) could leak proprietary patterns between repos -- per-project isolation is essential'
- 'Ensemble review (phase 94) uses N times more tokens than single review -- cost-aware selection is essential'
- 'Synthesis quality (phase 94) depends on reviewer agreement -- high conflict rates indicate poorly calibrated perspectives'
- 'Auto-remediation (phase 95) could make things worse (kill wrong worker, reset wrong workspace) -- extensive testing required'
- Remediation rate limits (phase 95) could prevent fixing legitimate issues during outage storms
- 'Workspace reset (phase 95) could lose uncommitted work -- always checkpoint before remediation'
- 'agent.md validator (phase 96) may reject useful but non-standard agent.md formats as the spec evolves'
- 'agent.md auto-fix (phase 96) could alter intended content -- always show diff before applying'
- 'Task size estimation (phase 97) may be inaccurate -- conservative defaults with learning from historical data'
- 'Context marshaling (phase 97) could lose critical information between sessions -- prioritize task description and last session outcome'
- 'Chain state files (phase 97) could grow large -- implement retention/archival for completed chains'
- 'Webhook server (phase 37) requires network exposure -- needs security review for production use'
- 'Cross-project knowledge (phase 38) could leak proprietary patterns between repos -- need per-repo knowledge isolation controls'
- 'Browser automation (phase 39) requires Chrome/Chromium -- adds a heavy runtime dependency and may not work in all CI environments'
- 'Multi-model routing (phase 40) could route complex tasks to underpowered models if scoring is wrong -- need conservative defaults'
- 'Priority scheduling (phase 41) could starve complex tasks if urgency weights favor simple fast completions -- need starvation prevention'
- 'External observability (phase 42) could expose sensitive data from logs -- need PII/secrets filtering before injecting into agent context'
- 'Automated refactoring (phase 43) could make incorrect fixes that pass tests but change semantics -- always require human review for refactoring PRs'
- 'Health scorecard (phase 44) KPIs may not capture what matters initially -- need iteration based on real usage patterns'
- 'WORKFLOW.md format (phase 45) may evolve as Symphony matures -- parser needs version tolerance'
- 'Per-project WORKFLOW.md files (phase 45) could conflict with orchestrator.yaml global settings -- need clear precedence rules'
- 'Symphony-to-Hermes translation (phase 45) may lose information for Symphony features with no Hermes equivalent'
- 'Semantic principle checks (phase 46) are expensive and inconsistent -- use sparingly, only for high-value principles'
- 'Too many principles (phase 46) creates noise -- start with 10-15 and grow slowly'
- 'Principle evolution (phase 46) could drift from original intent -- human review required for all new principles'
- 'Knowledge extraction quality (phase 47) depends on session summary -- poorly summarized sessions add noise'
- 'Knowledge base (phase 47) could grow large -- need retention policies and pruning'
- 'Injecting past knowledge (phase 47) into prompts adds context tokens -- must respect budget limits'
- 'Knowledge relevance scoring (phase 47) may be inaccurate for novel tasks -- don''t let stale knowledge mislead'
- 'Aggressive cost optimization (phase 48) could reduce quality -- always measure success rate impact'
- Model tier recommendations (phase 48) require sufficient historical data (50+ runs per task type)
- Parameter tuning (phase 48) could make some edge cases worse while improving the average case
- 'Feedback categorization (phase 49) may be inaccurate -- need human validation of categories'
- 'Auto-generated suggestions (phase 49) could conflict with existing rules -- need deduplication'
- 'Reviewer comments may be subjective or wrong -- the system should not blindly follow all feedback'
- 'Fault injection (phase 50) could leak into production if safe-mode is disabled -- always use test workspaces'
- 'Resilience scoring (phase 50) may not capture all failure modes -- supplement with manual testing'
- 'Chaos tests (phase 50) may be flaky if they depend on timing -- use deterministic fault injection where possible'
- Distributed locking (phase 51) adds latency to every issue assignment
- 'Stale locks (phase 51) could prevent work from being picked up -- TTL expiry handles this but adds delay'
- Federation status (phase 51) could become a bottleneck if too many instances publish frequently
- Work stealing (phase 51) could cause thrashing if instances constantly redistribute work
- 'No consensus protocol (phase 51) -- federation is eventually consistent, not strongly consistent'
- agent.md generator (phase 55) may produce inaccurate tech stack detection for unusual project layouts
- Generated agent.md files (phase 55) need human review before production use
- 'Symphony spec compliance (phase 56) may break if Symphony spec changes -- needs version tolerance'
- Linear API adapter (phase 56) requires separate auth token and has rate limits
- Skill composition (phase 57) could create conflicting prompts that confuse agents
- No centralized skill registry (phase 57) means discovery depends on documentation
- 'Session recordings (phase 58) could expose secrets in agent context -- redaction essential'
- 'Forensic analysis (phase 58) heuristics may produce false positives -- treat as suggestions'
- Velocity metrics (phase 59) depend on GitHub API availability and rate limits
- 'Cost-per-PR attribution (phase 59) is imprecise -- execution logs may not map 1:1 to PRs'
- 'Human workflow auto-classification (phase 60) may mislabel issues -- require human confirmation'
- 'Benchmark tasks (phase 61) may not represent real-world complexity -- include diverse task types'
- 'Benchmark execution (phase 61) uses real tokens -- run weekly not per-commit to control costs'
- 'Prompt library centralization (phase 62) could conflict with per-repo customization -- support overrides'
- 'REST API (phase 63) exposes internal orchestrator state -- authentication is critical'
- 'Webhook receiver (phase 63) requires network exposure -- needs firewall rules and TLS'
- 'LD_PRELOAD sandboxing (phase 64) may not work with statically-linked binaries'
- 'Overly restrictive sandboxing (phase 64) could break legitimate agent operations (pip, git)'
- 'Stop hooks (phase 65) could false-positive on completion tags -- use specific tag formats'
- 'Maintenance automation (phase 66) auto-filing issues could spam repos with findings'
- 'Pre-PR verification gate (phase 67) could block legitimate PRs if checks too strict'
- Agent identity (phase 68) profiling could create unfair task distribution over time
- 'Integration tests (phase 69) mock-based approach may miss real-world GitHub API quirks'
- Backpressure (phase 70) could cause work starvation if rate limits are sustained for long periods
- Circuit breaker (phase 70) recovery timeout misconfiguration could leave APIs permanently blocked
- Config validation (phase 71) schemas may not cover all config edge cases as the system evolves
- 'Config migration (phase 71) bugs could corrupt production configs -- always backup before migrating'
- 'Metrics pipeline (phase 72) high-cardinality labels could explode Prometheus storage costs'
- 'Metrics HTTP server (phase 72) exposes internal orchestrator state -- require auth for non-localhost access'
- Workspace checkpoints (phase 73) could consume significant disk space on large workspaces
- 'Checkpoint restore (phase 73) during active writes could corrupt workspace state -- file locking is critical'
- 'Plugin system (phase 81) extensibility could be exploited -- audit trail captures all plugin activity'
- 'Context seeding (phase 82) could leak proprietary code patterns into prompts -- audit trail tracks what was injected'
- 'State migration (phase 83) could corrupt data -- always backup before migrating'
- 'Capability gap detection (phase 84) could create unnecessary tools -- require human review before acting on suggestions'
- 'Audit log (phase 85) could grow very large -- implement rotation/archival for old entries'
- 'Feature flags (phase 86) could enable risky behaviors -- audit trail tracks all flag evaluations and rollbacks'
- 'Speculative ticket filing (phase 103) could create too many low-quality issues -- require dry-run review first'
- 'Governance reports (phase 104) aggregate from many data sources -- a bug in one source could corrupt the entire report'
conventions:
- Python scripts use python3 (no bare python command on this system)
- 'GitHub API via gh CLI, not raw curl'
- 'All new code goes to ~/zion/projects/agent-orchestration/'
- Skills go to ~/.hermes/skills/ following existing category structure
- 'Wiki pages follow SCHEMA.md conventions (frontmatter, wikilinks, tag taxonomy)'
