# Hermes Agent Orchestrator Configuration
#
# Override any setting via environment variables:
#   ORCH_REPO, ORCH_LABEL, ORCH_MAX_CONCURRENT, ORCH_PROJECT_DIR, ORCH_PIPELINE
#
# Multi-repo mode: use "repos" list instead of singular "repo".
# Single-repo mode: set "repo" (string) for backward compatibility.
# If both are set, "repos" takes precedence.

# --- Single-repo mode (backward compatible) ---
# GitHub repo to poll for issues
repo: ""

# Label that marks issues as ready for agent work
label: agent-ready

# Maximum number of parallel workers (global, applies across all repos)
max_concurrent: 2

# Base project directory
project_dir: ~/zion/projects/agent-orchestration

# Pipeline YAML for DAG mode (empty = direct delegate_task mode)
pipeline: ""

